<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main_layout}">
<head>
    <meta charset="UTF-8">
    <title>자료실 > 정기발간자료 > 다운로드</title>
    <meta name="" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div layout:fragment="main_content" class="content_wrap">
    <h3 class="stit">다운로드</h3>
    <div class="board_search mt30 mb10">
        <p class="count">총 <strong class="color_01" id="totalCount">0</strong> 건</p>
        <div class="board_search mb10">
            <fieldset>
                <select name="searchType" id="searchType" title="검색 옵션 선택">
                    <option value="bbsall">전체</option>
                    <option value="bbstitle">제목</option>
                    <option value="bbsconts">내용</option>
                </select>
                <input type="text" name="searchKeyword" id="searchKeyword" value="" title="검색어를 입력해주세요.">
                <button class="btn_basic_ss" onclick="portal502.search()">검색</button>
            </fieldset>
        </div>
    </div>
    <div class="photo_list_wrap s_box">
        <ul id="periodicalList">
            <!-- 목록이 동적으로 추가됩니다 -->
        </ul>
    </div>
    <div id="paging_wrap" class="paging_wrap">
        <a href="javascript:" class="first page_first">첫 페이지</a>
        <a href="javascript:" class="previous page_prev">전 페이지</a>
        <div class="namber pagination_container"></div>
        <a href="javascript:" class="next page_next">다음 페이지</a>
        <a href="javascript:" class="last page_last">끝 페이지</a>
    </div>
</div>
<script layout:fragment="main_scripts" th:inline="javascript" type="text/javascript">
    const portal502 = {

        /**
         * 상태
         */
        state: {
            pageInfo: null,
            pageNum: 1,
            pageSize: 6,
            searchType: 'bbsall',
            searchKeyword: '',
            filePath: /*[[${basicFilePath}]]*/''
        },

        /**
         * 초기 로드
         */
        init: function () {
            const _this = this;
            _this.initEvent();

            // 검색조건 복원
            _this.fnRestoreState();

            _this.loadList();
        },

        /**
         * 이벤트 바인딩
         */
        initEvent: function () {
            const _this = this;

            // 검색어 엔터키
            document.getElementById('searchKeyword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    _this.search();
                }
            });
        },

        /**
         * 목록 조회
         */
        loadList: function () {
            const _this = this;
            SearchState.saveForm('portal502', '.board_search', { pageNum: _this.state.pageNum });

            const params = new URLSearchParams({
                pageNum: _this.state.pageNum,
                pageSize: _this.state.pageSize,
                searchType: _this.state.searchType,
                searchKeyword: _this.state.searchKeyword
            });

            SearchState.updateUrl(params);

            fetch(`/api/common/portal502/list?${params}`)
                .then(response => {
                    return response.json();
                })
                .then(result => {
                    if (result.code === 200 && result.data) {
                        _this.state.pageInfo = result.data;
                        _this.renderList();
                        _this.renderPagination();
                    } else {
                        console.error('API 실패:', result);
                        alert('목록을 불러오는데 실패했습니다.');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('목록을 불러오는 중 오류가 발생했습니다.');
                });
        },

        /**
         * 목록 렌더링
         */
        renderList: function () {
            const _this = this;
            const list = _this.state.pageInfo.list;
            const listContainer = document.getElementById('periodicalList');

            // 총 건수
            document.getElementById('totalCount').textContent = _this.state.pageInfo.total;

            // 목록이 비어있는 경우
            if (!list || list.length === 0) {
                listContainer.innerHTML = '<div class="no_data_msg" style="width:100%; text-align:center; padding:50px 0;">등록된 정기발간자료가 없습니다.</div>';
                return;
            }

            // 목록 렌더링
            const filePath = _this.state.filePath;
            listContainer.innerHTML = list.map(item => {
                const coverImgUrl = item.coverFilePath ? `${filePath}${item.coverFilePath}/${item.coverFileName}` : '/portal/images/100x130.crop.jpg';
                return `
                <li>
                    <a href="javascript:;" onclick="portal502.goDetail(${item.fxtmPblsDataOid})">
                        <span class="img">
                            <img src="${coverImgUrl}"
                                 alt="${item.fxtmPblsDataTtl} 이미지">
                        </span>
                        <div class="text_wrap">
                            <strong>${item.fxtmPblsDataTtl}</strong>
                            <ul class="down_list">
                                <li><b>저자</b> : ${item.aut || ''}</li>
                                <li><b>페이지</b> : ${item.pageNum || ''}</li>
                                <li><b>발행일</b> : ${_this.formatDate(item.pblcnDt)}</li>
                            </ul>
                        </div>
                        <div class="desc_wrap">
                            <em>${_this.formatDate(item.pblcnDt)}</em>
                            <em>${item.inqCnt || 0}</em>
                        </div>
                        ${_this.renderFileIcons(item)}
                    </a>
                </li>
            `;
            }).join('');
        },

        /**
         * 파일 아이콘 렌더링
         */
        renderFileIcons: function (item) {
            const icons = [];

            if (item.cvrImg2Oid) {
                const ext = item.fullFileExt ? item.fullFileExt.toLowerCase() : '';
                let iconClass = 'pdf';
                let iconText = 'PDF';

                if (ext === 'hwp' || ext === 'hwpx') {
                    iconClass = 'hwp';
                    iconText = '한글파일';
                } else if (ext === 'doc' || ext === 'docx') {
                    iconClass = 'doc';
                    iconText = 'WORD';
                }

                icons.push(`<i class="ico_file ${iconClass}">${iconText}</i>`);
            }

            if (item.cvrImg1Oid) {
                icons.push('<i class="ico_file img">이미지</i>');
            }

            if (icons.length > 0) {
                return `<div class="down_icon">${icons.join('')}</div>`;
            }

            return '';
        },

        /**
         * 페이지네이션 렌더링
         */
        renderPagination: function () {
            const _this = this;

            const pageInfo = _this.state.pageInfo;

            if (!pageInfo) return;

            const container = document.querySelector('.pagination_container');
            const totalPages = pageInfo.pages;
            const currentPage = pageInfo.pageNum;

            let html = '';

            // 페이지 번호 계산
            let startPage = Math.floor((currentPage - 1) / 10) * 10 + 1;
            let endPage = Math.min(startPage + 9, totalPages);

            for (let i = startPage; i <= endPage; i++) {
                if (i === currentPage) {
                    html += `<strong class="active">${i}</strong>`;
                } else {
                    html += `<a href="javascript:;" onclick="portal502.goPage(${i})">${i}</a>`;
                }
            }

            container.innerHTML = html;

            // 첫 페이지, 이전 페이지, 다음 페이지, 끝 페이지 버튼
            const firstBtn = document.querySelector('.page_first');
            const prevBtn = document.querySelector('.page_prev');
            const nextBtn = document.querySelector('.page_next');
            const lastBtn = document.querySelector('.page_last');

            firstBtn.onclick = () => _this.goPage(1);
            prevBtn.onclick = () => _this.goPage(Math.max(1, currentPage - 1));
            nextBtn.onclick = () => _this.goPage(Math.min(totalPages, currentPage + 1));
            lastBtn.onclick = () => _this.goPage(totalPages);
        },

        /**
         * 페이지 이동
         */
        goPage: function (pageNum) {
            this.state.pageNum = pageNum;
            this.loadList();
            window.scrollTo(0, 0);
        },

        /**
         * 검색
         */
        search: function () {
            this.state.searchType = document.getElementById('searchType').value;
            this.state.searchKeyword = document.getElementById('searchKeyword').value;
            this.state.pageNum = 1;
            this.loadList();
        },

        /**
         * 상세 페이지 이동
         */
        goDetail: function (fxtmPblsDataOid) {
            location.href = `/page/portal502-1?fxtmPblsDataOid=${fxtmPblsDataOid}`;
        },

        /**
         * 날짜 포맷
         */
        formatDate: function (dateStr) {
            if (!dateStr) return '';
            return dateStr.replace(/-/g, '.');
        },

        /**
         * 검색조건 복원
         */
        fnRestoreState: function () {
            const _this = this;

            // 1. URL 파라미터로 복원
            const _fieldMap = { searchKeyword: 'searchKeyword', searchType: 'searchType' };
            const urlPage = SearchState.restoreFromUrl(_fieldMap, 'pageNum');
            if (urlPage !== null) {
                _this.state.pageNum = urlPage;
                _this.state.searchType = document.getElementById('searchType').value || 'bbsall';
                _this.state.searchKeyword = document.getElementById('searchKeyword').value || '';
            } else {
                // 2. sessionStorage 로 복원
                const saved = SearchState.restoreForm('portal502', '.board_search');
                if (saved) {
                    _this.state.pageNum = saved._extra.pageNum || 1;
                    _this.state.searchType = document.getElementById('searchType').value || 'bbsall';
                    _this.state.searchKeyword = document.getElementById('searchKeyword').value || '';
                }
            }

            // 3. 뒤로가기 / 앞으로가기 시
            SearchState.handlePopState(_fieldMap, 'pageNum', function(page) {
                _this.state.pageNum = page;
                _this.state.searchType = document.getElementById('searchType').value || 'bbsall';
                _this.state.searchKeyword = document.getElementById('searchKeyword').value || '';
                _this.loadList();
            });
        }
    };

    document.addEventListener("DOMContentLoaded", function() {
        portal502.init();
    });
</script>
</body>
</html>
