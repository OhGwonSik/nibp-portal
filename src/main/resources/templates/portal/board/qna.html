<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/main_layout}">
<head>
    <meta charset="UTF-8">
    <title>소통·참여 > Q&A</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div layout:fragment="main_content" class="content_wrap">
    <h3 class="stit">Q&amp;A</h3>
    <!--<div id="qna_category" class="sub_tab_menu">
        <ul id="qna_tab_menu">
            <li class="on"><a href="javascript:;" data-category="">전체</a></li>
            <li th:each="category : ${QnaCategoryList}">
                <a href="javascript:;"
                   th:data-category="${ctgry.cdVal}"
                   th:text="${ctgry.cdNm}"></a>
            </li>
        </ul>
    </div>-->
    <div class="board_search mb10">
        <p class="count">총 <strong class="color_01" id="qna_total_count" th:text="${QnaPostList?.total ?: 0}">0</strong> 건</p>
        <fieldset>
            <legend>분류 검색</legend>
            <select id="qna_search_type" title="검색 옵션 선택" class="wp100">
                <option value="qna_ttl">제목</option>
                <option value="ntc_cn">내용</option>
                <option value="all">제목+내용</option>
            </select>
            <input type="text" id="qna_keyword" title="검색어를 입력해주세요." class="wp200" autocomplete="off">
            <button id="qna_board_btn_search" class="btn_basic_ss">검색</button>
            <button id="qna_btn_write" class="btn_basic_s">문의하기</button>
        </fieldset>
    </div>
    <div class="table_layout">
        <table>
            <caption>Q&amp;A 테이블</caption>
            <colgroup>
                <col style="width: 90px;">
                <col style="width: auto;">
                <col style="width: 15%;">
                <col style="width: 15%;">
            </colgroup>
            <thead>
            <tr>
                <th scope="col">번호</th>
                <th scope="col">제목</th>
                <th scope="col">답변여부</th>
                <th scope="col">등록일</th>
            </tr>
            </thead>
            <tbody id="qna_board_tbody">
            <tr th:if="${QnaPostList?.list == null or #lists.isEmpty(QnaPostList.list)}">
                <td class="tac" colspan="4">조회된 결과가 없습니다.</td>
            </tr>

            <tr th:each="item : ${QnaPostList?.list ?: {}}">
                <td th:text="${item.qnaOid}"></td>
                <td class="tal">
                    <a href="javascript:" class="link qna_link" th:data-id="${item.qnaOid}" th:data-secret="${item.prvtPstYn}" th:data-pswd="${item.pswd}">
                        <i th:if="${item.prvtPstYn == 'Y'}" class="px_lock">잠금</i>
                        <span th:text="${item.qnaTtl}"></span>
                    </a>
                </td>
                <td th:text="${item.ansYn == 'Y' ? '완료' : '대기'}"></td>
                <td th:text="${#temporals.format(item.regDt, 'yyyy-MM-dd')}"></td>
            </tr>
            </tbody>
        </table>
        <span class="scroll_img">스크롤</span>
    </div>
    <div class="btn_wrap_right mt10">
        <button id="qna_btn_write_b" class="btn_basic_s">문의하기</button>
    </div>
    <div id="paging_wrap" class="paging_wrap">
        <a href="javascript:" class="first page_first">첫 페이지</a>
        <a href="javascript:" class="previous page_prev">전 페이지</a>
        <div class="namber pagination_container"></div>
        <a href="javascript:" class="next page_next">다음 페이지</a>
        <a href="javascript:" class="last page_last">끝 페이지</a>
    </div>
</div>
<th:block layout:fragment="main_modal">
    <th:block th:replace="~{portal/modal/qna_secret :: qna_secret}"></th:block>
</th:block>
<script layout:fragment="main_scripts" th:inline="javascript" type="text/javascript">
    const qna = {

        /**
         * 상태
         */
        state: {
            categories: /*[[${QnaCategoryList}]]*/ [],
            all: /*[[${QnaPostList}]]*/ '',
            pageIndex: 1,
            pageCnt: 10,
            ctgry: /*[[${param.ctgry}]]*/ '' || ''
        },

        /**
         * 초기 로드
         */
        init: function () {
            this.initEvent();

            const category = this.state.ctgry || '';

            $('#qna_category  li').removeClass('on');
            $('#qna_category  a[data-category="' + category + '"]')
                .parent('li')
                .addClass('on');

            // 검색조건 복원
            this.fnRestoreState();

            this.renderPagination();

            this.getListData();
        },

        /**
         * 이벤트 바인딩
         */
        initEvent: function () {
            const _this = this;

            // 카테고리 탭 클릭
			document.querySelectorAll('#qna_category a').forEach(function (link) {
	                link.addEventListener('click', function (e) {
                    e.preventDefault();

                    // 1. 탭 활성화 UI 처리
                    document.querySelectorAll('#qna_category li').forEach(li => li.classList.remove('on'));
                    this.closest('li').classList.add('on');

                    // 2. 내부 상태 업데이트
                    const category = this.dataset.ctgry || '';
                    _this.state.ctgry = category;
                    _this.state.pageIndex = 1;

                    // 주소창 URL 변경 (새로고침)
                    const newUrl = window.location.pathname + (category ? '?category=' + ctgry : '');
                    window.location.href = newUrl;
                    return;
                });
            });

            // 검색 버튼 클릭
            document.getElementById("qna_board_btn_search").addEventListener('click', function () {
                _this.state.pageIndex = 1;
                _this.getListData();
            });

            // 엔터키 검색
            document.getElementById('qna_keyword').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });

            // 제목 클릭
            document.querySelector("#qna_board_tbody").addEventListener("click", function (e) {
                const link = e.target.closest(".qna_link");
                if (!link) return;
                e.preventDefault();

                const qnaOid = Number(link.dataset.id);
                const secretYn = link.dataset.secret;
                const pswd = link.dataset.pswd;

                _this.fnGoToDetail(qnaOid, secretYn, pswd);
            });

            // 문의하기 버튼 클릭 (2개)
            document.getElementById('qna_btn_write').addEventListener('click', function () {
            	SearchState.clear('portal_qna');
            	const category = qna.state.ctgry;
                let url = `${contextPath}/board/qna/write`;

                if (category && category !== 'ALL') {
                    url += `?category=${ctgry}`;
                }

                window.location.href = url;
            });
            document.getElementById('qna_btn_write_b').addEventListener('click', function () {
            	SearchState.clear('portal_qna');
            	const category = qna.state.ctgry;
                let url = `${contextPath}/board/qna/write`;

                if (category && category !== 'ALL') {
                    url += `?category=${ctgry}`;
                }
                window.location.href = url;
            });
        },

        /**
         * 페이지네이션 렌더링
         */
        renderPagination: function () {
            const _this = this;

            if (!_this.state.all) {
                return;
            }

            const totalPages = _this.state.all.pages;

            // 공통 페이지네이션 함수 호출
            uiCommon.pagination.render({
                currentPage: _this.state.pageIndex,
                totalPages: totalPages,
                onPageChange: function(page) {
                    _this.state.pageIndex = page;
                    _this.getListData();
                }
            });
        },

        /**
         * 목록 데이터 조회
         */
        getListData: async function () {
            SearchState.saveForm('portal_qna', '.board_search', { pageIndex: this.state.pageIndex });

            const param = new URLSearchParams({
                page: this.state.pageIndex,
                size: this.state.pageCnt,
                keyword: document.getElementById('qna_keyword').value.trim() || '',
                searchType: document.getElementById('qna_search_type').value.trim() || '',
                ctgry: this.state.ctgry || ''
            });

            SearchState.updateUrl(param);

            try {
                const response = await API.get('/api/common/portal/qna/list/filter?' + param);

                // 페이지 데이터에 저장
                this.state.all = response;
                this.renderTable();
                this.renderPagination();
            } catch (error) {
                console.error('목록 조회 실패:', error);
                // uiCommon.fnShowAlertModal('목록 조회에 실패했습니다.');
            }
        },

        /**
         * 메인 테이블 렌더링
         */
        renderTable: function () {
            const tbody = document.getElementById("qna_board_tbody");
            tbody.innerHTML = '';

            // 총 건수 업데이트
            const totalCountEl = document.getElementById('qna_total_count');
            if (totalCountEl) {
                totalCountEl.textContent = this.state.all ? this.state.all.total : 0;
            }

            if (!this.state.all || !this.state.all.list || this.state.all.list.length === 0) {
                tbody.innerHTML = '<tr><td class="tac" colspan="4">조회된 결과가 없습니다.</td></tr>';
                return;
            }

            const list = this.state.all.list;
            let html = '';
            list.forEach(function (item) {
                const lockIcon = item.prvtPstYn === 'Y' ? '<i class="px_lock">잠금</i> ' : '';
                const answerStatus = item.ansYn === 'Y' ? '완료' : '대기';

                html += `
                    <tr>
                        <td>${item.qnaOid}</td>
                        <td class="tal">
                            <a href="javascript:" class="link qna_link" data-id="${item.qnaOid}" data-secret="${item.prvtPstYn}" data-pswd="${item.pswd || ''}">
                                ${lockIcon}${item.qnaTtl}
                            </a>
                        </td>
                        <td>${answerStatus}</td>
                        <td>${common.formatDate(item.regDt)}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        },

        /**
         * 페이지 이동 - Q&A 상세
         */
        fnGoToDetail: async function (qnaOid) {
            try {
                // Q&A 읽기 권한 체크
                const response = await API.get('/api/common/portal/qna/post/verify-access/' + qnaOid, {}, {
                    handleAuthError: false,
                    showLoading: false
                });
                // 권한 있음 / 비밀번호 요구 모두 200이지만
                // 비밀번호 요구는 action에 행위 값이 담겨있음 (REQUIRED_PASSWORD)
                if(response && response.action){
                	qna_secret.initModal(qnaOid, null, 'qna', null, null, null, this.state.ctgry);
                }else{
                	const category = this.state.ctgry || '';
                    // 200 : 권한 있음 (공개글, 관리자, 본인, 세션인증[비밀번호 입력후 성공시 5분간 세션])
                    window.location.href = contextPath + '/board/qna/post?qnaOid=' + qnaOid + '&category=' + category;
                }
                
            } catch (error) {
                if (error.stts === 403) {
                    // 403 Forbidden -> 회원 글 (접근 불가)
                    // (타인이 회원 비밀글을 클릭한 경우)
                    uiCommon.fnShowAlertModal('비밀글에 접근할 권한이 없습니다.');
                    
                } else if (error.stts === 404) {
                    uiCommon.fnShowAlertModal('게시글이 존재하지 않습니다.');
                } else {
                    console.error(error);
                    uiCommon.fnShowAlertModal('오류가 발생했습니다.');
                }
            }
        },

        /**
         * 초기 카테고리 설정
         */
        setInitialCategory: function () {
            const _this = this;

            // URL 파라미터로 전달된 category가 있으면 해당 탭 활성화 및 데이터 조회
            if (_this.state.ctgry) {
                // 모든 탭에서 on 클래스 제거
                document.querySelectorAll('#qna_category li').forEach(li => li.classList.remove('on'));

                // 해당 category를 가진 탭 찾아서 활성화
                const targetTab = document.querySelector(`#qna_category a[data-category="${_this.state.ctgry}"]`);
                if (targetTab) {
                    targetTab.closest('li').classList.add('on');
                }
            }
        },

        /**
         * 검색조건 복원
         */
        fnRestoreState: function () {
            const _this = this;

            // 1. URL 파라미터로 복원
            const _fieldMap = { keyword: 'qna_keyword', searchType: 'qna_search_type' };
            const urlPage = SearchState.restoreFromUrl(_fieldMap);
            if (urlPage !== null) {
                _this.state.pageIndex = urlPage;
            } else {
                // 2. sessionStorage 로 복원
                const saved = SearchState.restoreForm('portal_qna', '.board_search');
                if (saved) {
                    _this.state.pageIndex = saved._extra.pageIndex || 1;
                }
            }

            // 3. 뒤로가기 / 앞으로가기 시
            SearchState.handlePopState(_fieldMap, 'page', function(page) {
                _this.state.pageIndex = page;
                _this.getListData();
            });
        }
    }
    document.addEventListener("DOMContentLoaded", function() {
        qna.init();
    });
</script>
</body>
</html>
