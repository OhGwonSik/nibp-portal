<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/main_layout}">
<head>
    <meta charset="UTF-8">
    <title>소통·참여 > FAQ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div layout:fragment="main_content" class="content_wrap">
    <h3 class="stit">FAQ</h3>
    <div id="faq_category" class="sub_tab_menu">
        <ul>
            <li class="on"><a href="javascript:;" data-category="">전체</a></li>
            <li th:each="category : ${FaqCategoryList}">
                <a th:if="${ctgry.cdVal == 'LST'}"
                   href="https://www.lst.go.kr/comm/faq.do"
                   th:data-category="${ctgry.cdVal}"
                   th:text="${ctgry.cdNm}"
                   th:title="|새창열림|"
                   th:target="|_blank|"></a>
                <a th:unless="${ctgry.cdVal == 'LST'}"
                   href="javascript:void(0);"
                   th:data-category="${ctgry.cdVal}"
                   th:text="${ctgry.cdNm}"></a>
            </li>
        </ul>
    </div>
    <div class="board_search mb10">
        <p class="count">총 <strong class="color_01" id="faq_total_count" th:text="${(FaqPostList?.total ?: 0)}">0</strong> 건</p>
        <fieldset>
            <input id="faq_keyword" type="text" title="검색어를 입력해주세요." class="wp200">
            <button id="faq_board_btn_search" class="btn_basic_ss">검색</button>
        </fieldset>
    </div>

    <dl id="faq_board_container" class="webtong_faq">
        <th:block th:if="${FaqPostList?.list == null or #lists.isEmpty(FaqPostList.list)}">
            <p class="tac">조회된 결과가 없습니다.</p>
        </th:block>

        <th:block th:each="item : ${FaqPostList?.list ?: {}}">
            <dt><a href="javascript:;" title="답변 열기" th:text="${item.qstnCn}">질문</a></dt>
            <dd>
                <div class="in_content post-content" th:utext="${item.ansCn}">답변</div>
            </dd>
        </th:block>
    </dl>
    <div id="paging_wrap" class="paging_wrap">
        <a href="javascript:" class="first page_first">첫 페이지</a>
        <a href="javascript:" class="previous page_prev">전 페이지</a>
        <div class="namber pagination_container"></div>
        <a href="javascript:" class="next page_next">다음 페이지</a>
        <a href="javascript:" class="last page_last">끝 페이지</a>
    </div>
</div>
<script layout:fragment="main_scripts" th:inline="javascript" type="text/javascript">
    const faq = {

        /**
         * 상태
         */
        state: {
            categories: /*[[${FaqCategoryList}]]*/ [],
            all: /*[[${FaqPostList}]]*/ '',
            pageIndex: 1,
            pageCnt: 10,
            ctgry: /*[[${param.ctgry}]]*/ '' || ''
        },

        /**
         * 초기 로드
         */
        init: function () {
            this.initEvent();

            const raw = this.state.ctgry;
            const category = Array.isArray(raw) ? (raw[0] || '') : (raw || '');
            this.state.ctgry = category;

            document.querySelectorAll('#faq_category li').forEach(li => li.classList.remove('on'));
            const target = document.querySelector(`#faq_category a[data-category="${ctgry}"]`);
            if (target) target.closest('li').classList.add('on');
            else document.querySelector('#faq_category li')?.classList.add('on'); // fallback: 전체

            // 검색조건 복원
            this.fnRestoreState();

            this.getListData();
        },

        /**
         * 이벤트 바인딩
         */
        initEvent: function () {
            const _this = this;

            // 카테고리 탭 클릭
            document.querySelectorAll('#faq_category a').forEach(function (link) {
                link.addEventListener('click', function (e) {
                    const category = this.dataset.ctgry || '';

                    // LST 카테고리는 <a> 태그의 외부 링크로 이동
                    if (category === 'LST') {
                        return;
                    }

                    e.preventDefault();
                    const newUrl = window.location.pathname + (category ? '?category=' + ctgry : '');
                    window.location.href = newUrl;
                });
            });


            // 검색 버튼 클릭
            document.getElementById("faq_board_btn_search").addEventListener('click', function () {
                _this.state.pageIndex = 1;
                _this.getListData();
            });

            // 엔터키 검색
            document.getElementById("faq_keyword").addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });
        },

        /**
         * 토글 이벤트 바인딩
         */
        bindToggleEvent: function () {
            $('.webtong_faq dt').off('click').on('click', function () {
                $('.webtong_faq dt').removeClass('active').find('a').attr('title', '답변 열기');
                $('.webtong_faq dd').slideUp();

                let $dt = $(this);
                let $a = $dt.find('a');
                let $dd = $dt.next('dd');
                let isOpen = $dd.is(':visible');
                if (isOpen) { return; }

                $dt.addClass('active');
                $dd.slideDown();
                $a.attr('title', '답변 닫기');
            });
        },

        /**
         * 페이지네이션 렌더링
         */
        renderPagination: function () {
            const _this = this;

            if (!_this.state.all) {
                return;
            }

            const totalPages = _this.state.all.pages;

            // 공통 페이지네이션 함수 호출
            uiCommon.pagination.render({
                currentPage: _this.state.pageIndex,
                totalPages: totalPages,
                onPageChange: function(page) {
                    _this.state.pageIndex = page;
                    _this.getListData();
                }
            });
        },

        /**
         * 목록 데이터 조회
         */
        getListData: async function () {
            SearchState.saveForm('portal_faq', '.board_search', { pageIndex: this.state.pageIndex });

            const param = new URLSearchParams({
                page: this.state.pageIndex,
                size: this.state.pageCnt,
                keyword: document.getElementById('faq_keyword').value.trim() || ''
            });

            // 카테고리 필터 추가
            if (this.state.ctgry) {
                param.append('category', this.state.ctgry);
            }

            SearchState.updateUrl(param);

            try {
                const response = await API.get('/api/common/portal/faq/list/filter?' + param);

                // 페이지 데이터에 저장
                this.state.all = response;
                this.renderPage();
                this.renderPagination();
            } catch (error) {
                console.error('목록 조회 실패:', error);
                // uiCommon.fnShowAlertModal('목록 조회에 실패했습니다.');
            }
        },

        /**
         * 메인 화면 렌더링
         */
        renderPage: function () {
            const _this = this;
            const container = document.getElementById("faq_board_container");
            container.innerHTML = '';

            // 총 건수 업데이트
            const totalCountEl = document.getElementById('faq_total_count');
            if (totalCountEl) {
                totalCountEl.textContent = this.state.all ? this.state.all.total : 0;
            }

            if (!this.state.all || !this.state.all.list || this.state.all.list.length === 0) {
                container.innerHTML = '<p class="tac">조회된 결과가 없습니다.</p>';
                return;
            }

            const list = this.state.all.list;
            let html = '';
            list.forEach(function (item) {
                html += `
                    <dt><a href="javascript:;" title="답변 열기">${item.qstnCn}</a></dt>
                    <dd>
                        <div class="in_content post-content">${item.ansCn}</div>
                    </dd>
                `;
            });
            container.innerHTML = html;

            // 렌더링 후 토글 이벤트 다시 바인딩
            _this.bindToggleEvent();
        },

        /**
         * 초기 카테고리 설정
         */
        setInitialCategory: function () {
            const _this = this;

            // URL 파라미터로 전달된 category가 있으면 해당 탭 활성화 및 데이터 조회
            if (_this.state.ctgry) {
                // 모든 탭에서 on 클래스 제거
                document.querySelectorAll('#faq_category li').forEach(li => li.classList.remove('on'));

                // 해당 category를 가진 탭 찾아서 활성화
                const targetTab = document.querySelector(`#faq_category a[data-category="${_this.state.ctgry}"]`);
                if (targetTab) {
                    targetTab.closest('li').classList.add('on');
                }
            }
        },

        /**
         * 검색조건 복원
         */
        fnRestoreState: function () {
            const _this = this;

            // 1. URL 파라미터로 복원
            const _fieldMap = { keyword: 'faq_keyword' };
            const urlPage = SearchState.restoreFromUrl(_fieldMap);
            if (urlPage !== null) {
                _this.state.pageIndex = urlPage;
            } else {
                // 2. sessionStorage 로 복원
                const saved = SearchState.restoreForm('portal_faq', '.board_search');
                if (saved) {
                    _this.state.pageIndex = saved._extra.pageIndex || 1;
                }
            }

            // 3. 뒤로가기 / 앞으로가기 시
            SearchState.handlePopState(_fieldMap, 'page', function(page) {
                _this.state.pageIndex = page;
                _this.getListData();
            });
        }
    }
    document.addEventListener("DOMContentLoaded", function() {
        faq.init();
    });
</script>
</body>
</html>
