<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/main_layout}">
<head>
    <meta charset="UTF-8">
    <title>일반게시판 > 쓰기</title>
    <meta name="" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div layout:fragment="main_content" class="content_wrap">
    <h3 class="stit">공지사항</h3>
    <p class="btn_wrap_right mb10"><em class="point"></em>표시는 필수 입력 항목입니다.</p>
    <div class="table_layout t_tal">
        <table>
            <caption>공지사항 등록 테이블</caption>
            <colgroup>
                <col style="width: 150px;">
                <col style="width: auto;">
            </colgroup>
            <tbody>
            <tr>
                <th scope="row" class="point"><label for="lb_01">제목</label></th>
                <td>
                    <input type="text" id="lb_01" title="제목 입력해" class="w100" placeholder="제목을 입력해 주세요">
                    <p class="mt5">
                        <input type="checkbox" id="check_01" name="check">
                        <label for="check_01" class="ml5">공지</label>
                    </p>
                </td>
            </tr>
            <tr>
                <th scope="row"><label for="radio_01_01">공개여부</label></th>
                <td>
                    <div class="radio-box">
                        <span><input type="radio" id="radio_01_01" name="radio_01" checked=""><label for="radio_01_01">공개</label></span>
                        <span><input type="radio" id="radio_01_02" name="radio_01"><label for="radio_01_02">비공개</label></span>
                    </div>
                </td>
            </tr>
            <!--채용공고 게시판일 경우 s-->
            <tr>
                <th scope="row" class="point"><label>모집유형</label></th>
                <td>
                    <div class="radio-box">
                        <span><input type="checkbox" id="check_02" name="check02"><label for="check_02" class="ml5">신입</label></span>
                        <span class="ml10"><input type="checkbox" id="check_03" name="check02"><label for="check_03" class="ml5">경력</label></span>
                    </div>
                </td>
            </tr>
            <tr>
                <th scope="row" class="point"><label>진행상태</label></th>
                <td>
                    <div class="radio-box">
                        <span><input type="radio" id="radio_02_01" name="radio_02"><label for="radio_02_01">모집 중</label></span>
                        <span><input type="radio" id="radio_02_02" name="radio_02"><label for="radio_02_02">모집종료</label></span>
                    </div>
                </td>
            </tr>
            <tr>
                <th scope="row" class="point"><label>모집기간</label></th>
                <td>
                    <div class="flex_col">
                        <span class="datepicker"><input type="text" value="" class="w100 datepick" id="datepicker1"><img class="ui-datepicker-trigger" th:src="@{/portal/images/ico_date.png}" alt="선택" title="선택"></span> ~
                        <span class="datepicker"><input type="text" value="" class="w100 datepick" id="datepicker2"><img class="ui-datepicker-trigger" th:src="@{/portal/images/ico_date.png}" alt="선택" title="선택"></span>
                    </div>
                </td>
            </tr>
            <!--채용공고 게시판일 경우 e-->
            <!--입찰공고 게시판일 경우 s-->
            <tr>
                <th scope="row" class="point"><label>진행상태</label></th>
                <td>
                    <div class="radio-box">
                        <span><input type="radio" id="radio_02_01" name="radio_02" checked=""><label for="radio_02_01">입찰 중</label></span>
                        <span><input type="radio" id="radio_02_02" name="radio_02"><label for="radio_02_01">입찰종료</label></span>
                    </div>
                </td>
            </tr>
            <tr>
                <th scope="row" class="point"><label>입찰기간</label></th>
                <td>
                    <div class="flex_col">
                        <span class="datepicker"><input type="text" value="" class="w100 datepick" id="datepicker1"><img class="ui-datepicker-trigger" th:src="@{/portal/images/ico_date.png}" alt="선택" title="선택"></span> ~
                        <span class="datepicker"><input type="text" value="" class="w100 datepick" id="datepicker2"><img class="ui-datepicker-trigger" th:src="@{/portal/images/ico_date.png}" alt="선택" title="선택"></span>
                    </div>
                </td>
            </tr>
            <!--입찰공고 게시판일 경우 e-->
            <tr>
                <th scope="row" class="point"><label for="lb_03">내용</label></th>
                <td><textarea title="내용 입력" placeholder="내용을 입력해 주세요" id="lb_03">에디터가 들어가는 영역입니다.</textarea></td>
            </tr>
            <tr>
                <th scope="row"><label for="User_institutions">첨부파일</label></th>
                <td>
                    <div class="file_upload">
                        <label for="file" class=""><span>파일찾기</span></label>
                        <input type="file" id="file" title="파일첨부">
                        <span class="file_txt">* 파일을 첨부해 주세요.</span>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
        <span class="scroll_img">스크롤</span>
    </div>
    <div class="btn_wrap mt20">
        <a href="javascript:;" class="btn_basic">확인</a>
        <a href="javascript:;" class="btn_basic bg_gray">취소</a>
    </div>
</div>
<script layout:fragment="main_scripts" th:inline="javascript" type="text/javascript">
    const common_board_write = {

        /**
         * 상태
         */
        state: {
            all: [],
            pageIndex: 1,
            pageCnt: 10
        },

        /**
         * 초기 로드
         */
        init: function () {
            const _this = this;
            _this.initEvent();
        },

        /**
         * 이벤트 바인딩
         */
        initEvent: function () {
            const _this = this;

        }
    }
    document.addEventListener("DOMContentLoaded", function() {
        common_board_write.init();
    });
</script>
</body>
</html>
