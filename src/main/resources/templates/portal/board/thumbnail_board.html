<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main_layout}">
<head>
    <meta charset="UTF-8">
    <title th:text="${boardInfo.bbsNm}">썸네일 게시판</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div layout:fragment="main_content" class="content_wrap">

    <h3 class="stit" th:text="${boardInfo.bbsNm}">썸네일 게시판</h3>

    <div class="board_search mb10">
        <strong>총 <span id="totalCountDisplay" th:text="${boardPostList.total}">0</span>건</strong>
        <fieldset>
            <select th:if="${boardInfo.ctgryYn == 'Y' and boardInfo.ctgryList != null}"
                    id="searchCategory" class="wp100" title="분류 선택">
                <option value="">전체 분류</option>
                <option th:each="cat : ${#strings.arraySplit(#strings.replace(#strings.replace(#strings.replace(boardInfo.ctgryList, '(', ''), ')', ''), '''', ''), ',')}"
                        th:value="${#strings.trim(cat)}"
                        th:text="${#strings.trim(cat)}"
                        th:selected="${boardRequestDto.ctgry == #strings.trim(cat)}">
                </option>
            </select>

            <select id="searchType" title="검색 옵션 선택" class="wp100">
                <option value="all" th:selected="${boardRequestDto.searchType == 'all'}">전체</option>
                <option value="title" th:selected="${boardRequestDto.searchType == 'title'}">제목</option>
                <option value="content" th:selected="${boardRequestDto.searchType == 'content'}">내용</option>
            </select>

            <input type="text" id="keyword" th:value="${boardRequestDto.keyword}" title="검색어를 입력해주세요." class="wp200" placeholder="검색어 입력">
            <button type="button" class="btn_basic_ss" onclick="thumbnailBoard.search()">검색</button>
        </fieldset>
    </div>

    <hr class="hr_line">

    <div class="photo_list_wrap">
        <ul id="thumbnailList">
            <li th:if="${boardPostList == null or #lists.isEmpty(boardPostList.list)}" style="width: 100%; border:none;">
                <div class="no_data_msg" style="text-align:center; padding:80px 0; sizeW:100%;">
                    등록된 게시글이 없습니다.
                </div>
            </li>
        </ul>
    </div>

    <div id="paging_wrap" class="paging_wrap">
        <a href="javascript:" class="first page_first">첫 페이지</a>
        <a href="javascript:" class="previous page_prev">전 페이지</a>
        <div class="namber pagination_container"></div>
        <a href="javascript:" class="next page_next">다음 페이지</a>
        <a href="javascript:" class="last page_last">끝 페이지</a>
    </div>

</div>

<script layout:fragment="main_scripts" th:inline="javascript" type="text/javascript">
    const thumbnailBoard = {
        // [상태 관리]
        state: {
            bbsOid: /*[[${boardInfo.bbsOid}]]*/ 0,
            reqDto: /*[[${boardRequestDto}]]*/ {},
            config: /*[[${boardInfo}]]*/ {},
            strgFilePath: /*[[${basicFilePath}]]*/ '/files/',
            DEFAULT_IMG: /*[[@{/admin/images/Thumbnail_img.png}]]*/ '/admin/images/Thumbnail_img.png',

            // 초기 데이터 바인딩
            all: /*[[${boardPostList.list}]]*/ [], // 전체 목록 데이터
            total: /*[[${boardPostList.total}]]*/ 0, // 전체 건수
            pages: /*[[${boardPostList.pages}]]*/ 1, // 전체 페이지 수
            pageIndex: 1, // 현재 페이지 번호
            pageCnt: /*[[${boardInfo.pageCnt}]]*/ 10, // 페이지 당 게시글 수
            pagingCnt: /*[[${boardInfo.pagingCnt}]]*/ 5
        },

        getSearchStateId: function() {
            return 'portal_thumbnail_board_' + this.state.config.bbsOid;
        },

        init: function() {
            const _this = this;

            // 검색 엔터키 이벤트
            const keywordInput = document.getElementById('keyword');
            if(keywordInput) {
                keywordInput.addEventListener("keydown", (e) => {
                    if (e.key === "Enter"){
                    	_this.state.pageIndex = 1;
                    	_this.search();
                    }
                });
            }

            // 카테고리 변경 시 검색
            const categorySelect = document.getElementById('searchCategory');
            if(categorySelect) {
                categorySelect.addEventListener('change', () => {
                	_this.state.pageIndex = 1;
                    _this.search();
                });
            }

            // 검색조건 복원
            _this.fnRestoreState();

            // 초기 화면 렌더링 (Thymeleaf 데이터를 기반으로 그리기)
            this.renderList(_this.state.all);
            this.initPagination();
        },

        /**
         * [API 호출] 목록 데이터 조회
         */
        getListData: async function () {
            const _this = this;
            SearchState.saveForm(_this.getSearchStateId(), '.board_search', { pageIndex: _this.state.pageIndex });

            const keyword = document.getElementById('keyword').value;
            const searchType = document.getElementById('searchType').value;
            const categoryEl = document.getElementById('searchCategory');
            const category = categoryEl ? categoryEl.value : '';

            const params = new URLSearchParams({
                bbsOid: _this.state.bbsOid,
                menuCd: _this.state.reqDto.menuCd,
                page: _this.state.pageIndex,
                size: _this.state.pageCnt,
                keyword: keyword,
                searchType: searchType,
                ctgry: category
            });

            SearchState.updateUrl(params);

            try {
                // API 호출
                const response = await API.get('/api/common/board/list/filter?' + params);

                // State 업데이트
                _this.state.pageIndex = response.pageNum;
                _this.state.total = response.total;
                _this.state.pages = response.pages;
                _this.state.all = response.list;

                // 화면 갱신
                _this.renderList(response.list);
                _this.initPagination();

            } catch (error) {
                console.error('목록 조회 실패:', error);
            }
        },

        /**
         * [렌더링] 리스트 HTML 그리기 (photo_list_wrap 구조)
         */
        renderList: function(list) {
            const _this = this;
            const ul = document.getElementById('thumbnailList');
            const totalDisplay = document.getElementById('totalCountDisplay');

            if(totalDisplay) totalDisplay.innerText = this.state.total;

            if (!list || list.length === 0) {
                ul.innerHTML = `
       	            <li style="width: 100%; border-bottom: 1px solid #ddd;">
       	                <div class="no_data_msg" style="text-align:center; padding:80px 0;">
       	                    등록된 게시글이 없습니다.
       	                </div>
       	            </li>`;
                return;
            }

            let html = '';
            list.forEach(post => {
                // 1. 이미지 직접 경로 처리 (basicFilePath + thmbPath 조합)
                let imgSrc = this.state.DEFAULT_IMG;

                if (post.thmbPath) {
                    const base = this.state.strgFilePath;
                    const path = post.thmbPath;

                    // 경로 구분자(/) 중복 방지 및 안전한 결합
                    const cleanBase = base.endsWith('/') ? base.slice(0, -1) : base;
                    const cleanPath = path.startsWith('/') ? path : '/' + path;

                    imgSrc = cleanBase + cleanPath;
                }

                // 2. 날짜 포맷 (yyyy.MM.dd)
                let dateStr = post.regDt;
                if(Array.isArray(post.regDt)) {
                    const y = post.regDt[0];
                    const m = String(post.regDt[1]).padStart(2, '0');
                    const d = String(post.regDt[2]).padStart(2, '0');
                    dateStr = `${y}.${m}.${d}`;
                } else if(typeof post.regDt === 'string') {
                    dateStr = post.regDt.substring(0, 10).replaceAll('-', '.');
                }

                // 3. 본문 요약 (HTML 태그 제거 후 텍스트만 추출)
                let contentSummary = '';
                if(post.bbsPstCn) {
                    contentSummary = post.bbsPstCn.replace(/<[^>]*>?/gm, '');
                    if(contentSummary.length > 100) {
                        contentSummary = contentSummary.substring(0, 100) + '...';
                    }
                }

                // 4. HTML 조립
                html += `
       	            <li>
       	                <a href="javascript:;" onclick="thumbnailBoard.moveDetail(${post.bbsPstOid})">
       	                    <span class="img">
       	                        <img src="${imgSrc}"
       	                             alt="${post.bbsPstTtl}"
       	                             style="width: 100%; height: 100%; object-fit: cover;"
       	                             onerror="this.onerror=null; this.src='${this.state.DEFAULT_IMG}';">
       	                    </span>
       	                    <div class="text_wrap">
       	                        <strong>${post.bbsPstTtl}</strong>
       	                        <p class="post-content">${contentSummary}</p>
       	                        <div class="desc_wrap">
       	                            <em>${dateStr}</em>
       	                            <em>조회수: ${post.inqCnt}</em>
       	                        </div>
       	                    </div>
       	                </a>
       	            </li>
       	        `;
            });
            ul.innerHTML = html;
        },

        /**
         * [페이징] uiCommon 사용
         */
        initPagination: function() {
            const _this = this;

            if (!_this.state.all) {
                return;
            }

            const totalPages = _this.state.pages;

            // 공통 페이지네이션 함수 호출
            uiCommon.pagination.render({
                currentPage: _this.state.pageIndex,
                totalPages: totalPages,
                onPageChange: function(page) {
                    _this.state.pageIndex = page;
                    _this.getListData();
                }
            });
        },

        movePage: function(targetPage) {
            this.state.pageIndex = targetPage;
            this.getListData();
        },

        search: function() {
            this.state.pageIndex = 1;
            this.getListData();
        },

        moveDetail: async function(bbsPstOid) {
            const _this = this;

            await _this.updateViewCount(bbsPstOid);

            const menuCd = this.state.reqDto.menuCd;
            const bbsOid = this.state.config.bbsOid;
            location.href = contextPath + `/board/post?menuCd=${menuCd}&bbsOid=${bbsOid}&bbsPstOid=${bbsPstOid}`;
        },

        updateViewCount: async function (bbsPstOid) {
            if(!bbsPstOid) return;
            const _this = this;

            try {
                const param = {
                    bbsPstOid: bbsPstOid,
                    menuCd: _this.state.reqDto.menuCd
                }

                await API.patch('/api/common/board/view-count', param);
            } catch (error) {
                console.error('조회수 증가 실패:', error);
            }
        },


        /**
         * 검색조건 복원
         */
        fnRestoreState: function () {
            const _this = this;

            // 1. URL 파라미터로 복원
            const _fieldMap = { keyword: 'keyword', searchType: 'searchType', ctgry: 'searchCategory' };
            const urlPage = SearchState.restoreFromUrl(_fieldMap);
            if (urlPage !== null) {
                _this.state.pageIndex = urlPage;
            } else {
                // 2. sessionStorage 로 복원
                const saved = SearchState.restoreForm(_this.getSearchStateId(), '.board_search');
                if (saved) {
                    _this.state.pageIndex = saved._extra.pageIndex || 1;
                }
            }

            // 3. 뒤로가기 / 앞으로가기 시
            SearchState.handlePopState(_fieldMap, 'page', function(page) {
                _this.state.pageIndex = page;
                _this.getListData();
            });
        },
    };

    document.addEventListener("DOMContentLoaded", function() {
        thumbnailBoard.init();
    });
</script>

</body>
</html>
