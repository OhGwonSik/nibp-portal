<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/main_layout}">
<head>
    <meta charset="UTF-8">
    <title>소통·참여 > Q&A > Q&A 상세</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div layout:fragment="main_content" class="content_wrap">
    <h3 class="stit">Q&amp;A</h3>

    <!-- Q&A 질문 테이블 -->
    <h3 class="ssstit">Q&amp;A 문의</h3>
    <div class="table_layout t_tal">
        <table>
            <caption>Q&amp;A 질문 테이블</caption>
            <colgroup>
                <col style="width: 150px;">
                <col style="width: auto;">
            </colgroup>
            <tbody>
            <tr>
                <th scope="row">등록일</th>
                <td th:text="${#temporals.format(QnaPost.regDt, 'yyyy-MM-dd')}"></td>
            </tr>
            <tr>
                <th scope="row">제목</th>
                <td th:text="${QnaPost.qnaTtl}"></td>
            </tr>
            <tr>
                <th scope="row">내용</th>
                <td class="post-content" th:utext="${QnaPost.ntcCn}"></td>
            </tr>
            <tr>
                <th scope="row">첨부파일</th>
                <td>
                    <span th:if="${#lists.isEmpty(QnaPost.attachments)}">첨부파일이 없습니다.</span>
                    <ul th:if="${QnaPost.attachments != null and !#lists.isEmpty(QnaPost.attachments)}">
                        <li th:each="file : ${QnaPost.attachments}">
                            <a th:href="@{|${basicFilePath}${file.strgFilePath}/${file.strgFileNm}|}" class="file_link" th:attr="download=${file.orgnlFileNm}">
                                <i class="ico_file">첨부아이콘</i>
                                <span th:text="${file.orgnlFileNm}"></span>
                            </a>
                        </li>
                    </ul>
                </td>
            </tr>
            </tbody>
        </table>
        <span class="scroll_img">스크롤</span>
    </div>

    <!-- Q&A 답변 테이블 -->
    <h3 class="ssstit">Q&amp;A 답변</h3>
    <div class="table_layout t_tal">
        <table>
            <caption>Q&amp;A 답변 테이블</caption>
            <colgroup>
                <col style="width: 150px;">
                <col style="width: auto;">
            </colgroup>
            <tbody>
            <!-- 답변이 있는 경우 -->
            <th:block th:if="${QnaPost.ansYn == 'Y' and !#lists.isEmpty(QnaPost.answers)}">
                <tr>
                    <th scope="row">등록일</th>
                    <td th:text="${#temporals.format(QnaPost.answers[0].regDt, 'yyyy-MM-dd')}"></td>
                </tr>
                <tr>
                    <th scope="row">답변</th>
                    <td class="post-content" th:utext="${QnaPost.answers[0].ntcCn}"></td>
                </tr>
                <tr>
                    <th scope="row">첨부파일</th>
                    <td>
                        <span th:if="${#lists.isEmpty(QnaPost.answers[0].attachments)}">첨부파일이 없습니다.</span>
                        <ul th:if="${QnaPost.answers[0].attachments != null and !#lists.isEmpty(QnaPost.answers[0].attachments)}">
                            <li th:each="file : ${QnaPost.answers[0].attachments}">
                                <a th:href="@{|${basicFilePath}${file.strgFilePath}/${file.strgFileNm}|}" class="file_link" th:attr="download=${file.orgnlFileNm}">
                                    <i class="ico_file">첨부아이콘</i>
                                    <span th:text="${file.orgnlFileNm}"></span>
                                </a>
                            </li>
                        </ul>
                    </td>
                </tr>
            </th:block>
            <!-- 답변이 없는 경우 -->
            <th:block th:unless="${QnaPost.ansYn == 'Y' and !#lists.isEmpty(QnaPost.answers)}">
                <tr>
                    <th scope="row">답변</th>
                    <td>답변 대기 중입니다.</td>
                </tr>
            </th:block>
            </tbody>
        </table>
        <span class="scroll_img">스크롤</span>
    </div>

    <div class="btn_wrap mt20">
    	<a href="javascript:;" id="qnaPostUpdBtn" class="btn_basic">수정하기</a>
        <a th:href="@{/board/qna(category=${QnaPost.ctgry})}" class="btn_basic">목록으로</a>
    </div>

	<div class="rate" th:if="${QnaPost.prvtPstYn == 'Y' and QnaPost.ansYn == 'Y'}">
	    <div class="rate-form-wrap">
	        <fieldset>
	            <p class="tac"><strong>이 페이지에서 제공하는 정보에 대하여 만족하십니까?</strong></p>
	            <div class="rate-row" role="radiogroup" aria-label="만족도 선택">
	                <div class="rate-list">
	                    <label><input type="radio" name="rate" value="LIKE">만족</label>
	                    <label><input type="radio" name="rate" value="DISLIKE">불만족</label>
	                </div>
	                <button type="button" id="btn_submit_rate" class="rate-btn">제출하기</button>
	            </div>
	        </fieldset>
	    </div>
	</div>
</div>
<th:block layout:fragment="main_modal">
    <th:block th:replace="~{portal/modal/qna_secret :: qna_secret}"></th:block>
</th:block>
<script layout:fragment="main_scripts" th:inline="javascript" type="text/javascript">
	const qna_post = {
			
	        /**
	         * 상태
	         */
	        state : {
	        	qnaOid: null,
	        	prvtPstYn: /*[[${QnaPost.prvtPstYn}]]*/ {}, //질문의 비밀글 타입
	        	ctgry : /*[[${QnaPost.ctgry}]]*/ null
	        },
	        
	        init: function(){
	        	const _this = this;
	        	
	            const urlParams = new URLSearchParams(window.location.search);
	            const qnaOid = urlParams.get('qnaOid');
	            _this.state.qnaOid = qnaOid;
	            
	        	_this.initEvent();
	        },
	        
	        /**
	         * 이벤트 바인딩
	         */
	        initEvent: function () {
	        	const _this = this;
	        	
	        	const submitRate = document.querySelector('#btn_submit_rate');
	        	if(submitRate){
		        	submitRate.addEventListener('click', async function(e){
		        		e.preventDefault();
		        		await _this.submitRate();
		        	});
	        	}
	        	
	        	const qnaPostUpd = document.querySelector('#qnaPostUpdBtn');
	        	if(qnaPostUpd){
	        		qnaPostUpd.addEventListener('click', async function(e){
		        		e.preventDefault();
		        		
		        		_this.fnGoToUpdate(_this.state.qnaOid);
		        	});
	        	}
	        },
	        
	        /**
	         * Q&A 수정 페이지 이동
	         */
	        fnGoToUpdate: async function (qnaOid) {
	            try {
	                // Q&A 읽기 권한 체크
	                const response = await API.get('/api/common/portal/qna/post/verify-access/' + qnaOid + '?mode=upd', {}, {
	                    handleAuthError: false,
	                    showLoading: false
	                });
	                
	                // 권한 있음 / 비밀번호 요구 모두 200이지만
	                // 비밀번호 요구는 action에 행위 값이 담겨있음 (REQUIRED_PASSWORD)
	                if(response && response.action){
	                    qna_secret.initModal(qnaOid, null, 'qna', null , 'upd', null, this.state.ctgry);
	                }else{
	                    // 200 : 권한 있음 (공개글, 관리자, 본인, 세션인증[비밀번호 입력후 성공시 5분간 세션])
	                    window.location.href = contextPath + '/board/qna/write?qnaOid=' + qnaOid+ '&category=' + this.state.ctgry;
	                }
	                
	            } catch (error) {
	                if (error.stts === 403) {
	                    // 403 Forbidden -> 회원 글 (접근 불가)
	                    // (타인이 회원 비밀글을 클릭한 경우)
	                    uiCommon.fnShowAlertModal('비밀글에 접근할 권한이 없습니다.');
	                    
	                } else if (error.stts === 404) {
	                    uiCommon.fnShowAlertModal('게시글이 존재하지 않습니다.');
	                } else {
	                    console.error(error);
	                    uiCommon.fnShowAlertModal('오류가 발생했습니다.');
	                }
	            }
	        },   	        
	        
	        /**
	         * 만족도 제출 로직
	         */
	        submitRate: async function() {
	            const selectedRate = document.querySelector('input[name="rate"]:checked');
	            if (!selectedRate) {
	            	uiCommon.fnShowAlertModal('만족 또는 불만족을 선택해주세요.');
	                return;
	            }

	            const params = {
	                qnaOid: this.state.qnaOid,
	                choice: selectedRate.value
	            };

	            try {
	                const response = await API.patch('/api/common/portal/qna/satisfaction', params);

	                	uiCommon.fnShowAlertModal('소중한 의견 감사합니다.', function(){
		                	window.location.href = contextPath + `/board/qna`;
	                	});

	            } catch (error) {
	                console.error('저장 실패:', error);
	                uiCommon.fnShowAlertModal(error.details || error.message || '저장에 실패했습니다.');
	            }
	        }
	}
	
    document.addEventListener("DOMContentLoaded", function() {
    	qna_post.init();
    });
</script>
</body>
</html>
