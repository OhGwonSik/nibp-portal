<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/main_layout}">
<head>
    <meta charset="UTF-8">
    <title th:text="${boardInfo.bbsNm}">사용자 게시판</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div layout:fragment="main_content" class="content_wrap">
    <h3 class="stit" th:text="${boardInfo.bbsNm}">사용자 게시판</h3>

    <div class="board_search mb10" th:if="${boardInfo.srchUseYn == 'Y'}">
        <p class="count">총 <strong class="color_01" id="user_total_count" th:text="${boardPostList.total}">0</strong> 건</p>
        <fieldset>
            <legend>게시판 검색</legend>
            <select th:if="${boardInfo.ctgryYn == 'Y' and boardInfo.ctgryList != null}" id="search_category" title="검색분류 선택">
                <option value="">전체 분류</option>
                <option th:each="cat : ${#strings.arraySplit(#strings.replace(#strings.replace(#strings.replace(boardInfo.ctgryList, '(', ''), ')', ''), '''', ''), ',')}" 
                        th:value="${#strings.trim(cat)}" th:text="${#strings.trim(cat)}"></option>
            </select>

            <select id="board_search_type" title="검색 옵션 선택">
                <option value="all">전체</option>
                <option value="title">제목</option>
                <option value="content">내용</option>
            </select>
            <input type="text" id="board_keyword" title="검색어를 입력해주세요." class="wp200">
            <button id="board_btn_search" class="btn_basic_ss">검색</button>
            <button type="button" class="btn_basic_s" 
			        onclick="user_board.fnGoWrite();" 
			        th:if="${boardInfo.mbrWrtYn != 'Y' or #authorization.expression('isAuthenticated()')}">
			    글쓰기
			</button>
        </fieldset>
    </div>

    <div class="table_layout">
        <table>
            <caption th:text="${boardInfo.bbsNm} + ' 리스트'">리스트</caption>
            
            <colgroup>
                <col th:if="${boardInfo.pstOidExpsrYn == 'Y'}" style="width: 60px;"> 
                <col th:if="${boardInfo.ctgryYn == 'Y'}" style="width: 100px;"> 
                <col style="width: auto;"> 
                <col th:if="${boardInfo.wrtrExpsrYn == 'Y'}" style="width: 100px;"> 
                <col th:if="${boardInfo.wrtDtExpsrYn == 'Y'}" style="width: 100px;"> 
                <col th:if="${boardInfo.inqCntExpsrYn == 'Y'}" style="width: 80px;"> 
            </colgroup>

            <thead>
            <tr>
                <th scope="col" th:if="${boardInfo.pstOidExpsrYn == 'Y'}">번호</th>
                <th scope="col" th:if="${boardInfo.ctgryYn == 'Y'}">분류</th>
                <th scope="col">제목</th>
                <th scope="col" th:if="${boardInfo.wrtrExpsrYn == 'Y'}">작성자</th>
                <th scope="col" th:if="${boardInfo.wrtDtExpsrYn == 'Y'}">작성일</th>
                <th scope="col" th:if="${boardInfo.inqCntExpsrYn == 'Y'}">조회수</th>
            </tr>
            </thead>

            <tbody id="board_tbody">
                <tr th:if="${boardPostList == null or boardPostList.list == null or boardPostList.list.isEmpty()}">
                    <td class="tac" th:colspan="${1 
                        + (boardInfo.pstOidExpsrYn == 'Y' ? 1 : 0)
                        + (boardInfo.ctgryYn == 'Y' ? 1 : 0)
                        + (boardInfo.wrtrExpsrYn == 'Y' ? 1 : 0)
                        + (boardInfo.wrtDtExpsrYn == 'Y' ? 1 : 0)
                        + (boardInfo.inqCntExpsrYn == 'Y' ? 1 : 0)
                    }">조회된 결과가 없습니다.</td>
                </tr>

                <th:block th:if="${boardPostList != null and boardPostList.list != null}">
                    <tr th:each="item : ${boardPostList.list}">
                        <td th:if="${boardInfo.pstOidExpsrYn == 'Y'}" th:text="${item.bbsPstOid}"></td>
                        <td th:if="${boardInfo.ctgryYn == 'Y'}" th:text="${item.ctgry}"></td>
                        
                        <td class="tal">
                            <a href="javascript:" class="link post_link" th:data-id="${item.bbsPstOid}">
                                <i th:if="${item.prvtPstYn == 'Y'}" class="px_lock">잠금</i>
                                <span th:text="${item.bbsPstTtl}"></span>
                            </a>
                        </td>

                        <td th:if="${boardInfo.wrtrExpsrYn == 'Y'}" th:text="${item.wrtrNm}"></td>
                        <td th:if="${boardInfo.wrtDtExpsrYn == 'Y'}" th:text="${#temporals.format(item.regDt, 'yyyy-MM-dd')}"></td>
                        <td th:if="${boardInfo.inqCntExpsrYn == 'Y'}" th:text="${item.inqCnt}"></td>
                    </tr>
                </th:block>
            </tbody>
        </table>
        <span class="scroll_img">스크롤</span>
    </div>

    <div id="paging_wrap" class="paging_wrap">
        <a href="javascript:" class="first page_first">첫 페이지</a>
        <a href="javascript:" class="previous page_prev">전 페이지</a>
        <div class="namber pagination_container"></div>
        <a href="javascript:" class="next page_next">다음 페이지</a>
        <a href="javascript:" class="last page_last">끝 페이지</a>
    </div>
</div>

<th:block layout:fragment="main_modal">
    <th:block th:replace="~{portal/modal/qna_secret :: qna_secret}"></th:block>
</th:block>

<script layout:fragment="main_scripts" th:inline="javascript" type="text/javascript">
    const user_board = {
        state: {
            all: /*[[${boardPostList}]]*/ {}, 
            config: /*[[${boardInfo}]]*/ {}, 
            reqDto: /*[[${boardRequestDto}]]*/ {},
            pageIndex: 1,
            pageCnt: /*[[${boardInfo.pageCnt}]]*/ 10,
            pagingCnt: /*[[${boardInfo.pagingCnt}]]*/ 5,
            isLogin: /*[[${#authorization.expression('isAuthenticated()')}]]*/ false
        },

        getSearchStateId: function() {
            return 'portal_user_board_' + this.state.config.bbsOid;
        },

        init: function () {
            this.initEvent();

            // 검색조건 복원
            this.fnRestoreState();

            this.renderPagination();
        },

        initEvent: function () {
            const _this = this;
            
            const searchBtn = document.getElementById("board_btn_search");
            if(searchBtn) {
                searchBtn.addEventListener('click', function () {
                    _this.state.pageIndex = 1;
                    _this.getListData();
                });
            }

            document.querySelector("#board_tbody").addEventListener("click", function (e) {
                const link = e.target.closest(".post_link");
                if (!link) return;
                e.preventDefault();
                _this.fnGoToDetail(Number(link.dataset.id));
            });
        },

        renderPagination: function () {
            const _this = this;
            if (!_this.state.all) return;

            uiCommon.pagination.render({
                currentPage: _this.state.pageIndex,
                totalPages: _this.state.all.pages || 1,
                blockSize: _this.state.pagingCnt,
                onPageChange: function(page) {
                    _this.state.pageIndex = page;
                    _this.getListData();
                }
            });
        },

        getListData: async function () {
            SearchState.saveForm(this.getSearchStateId(), '.board_search', { pageIndex: this.state.pageIndex });

            const param = new URLSearchParams({
                bbsOid: this.state.config.bbsOid,
                menuCd: this.state.reqDto.menuCd,
                page: this.state.pageIndex,
                size: this.state.pageCnt,
                keyword: document.getElementById('board_keyword').value.trim() || '',
                searchType: document.getElementById('board_search_type').value.trim() || '',
                ctgry: document.getElementById('search_category') ? document.getElementById('search_category').value : ''
            });

            SearchState.updateUrl(param);

            try {
                const response = await API.get('/api/common/board/list/filter?' + param);
                this.state.all = response;
                this.renderTable();
                this.renderPagination();
            } catch (error) {
                console.error('목록 조회 실패:', error);
            }
        },

        renderTable: function () {
            const _this = this;
            const tbody = document.getElementById("board_tbody");
            tbody.innerHTML = '';

            // 총 건수 업데이트
            const totalCountEl = document.getElementById('user_total_count');
            if (totalCountEl) {
                totalCountEl.textContent = _this.state.all ? _this.state.all.total : 0;
            }

            const list = _this.state.all ? _this.state.all.list : [];
            const cfg = _this.state.config;

            if (!list || list.length === 0) {
                let colCount = 1; 
                if(cfg.pstOidExpsrYn === 'Y') colCount++;
                if(cfg.ctgryYn === 'Y') colCount++;
                if(cfg.wrtrExpsrYn === 'Y') colCount++;
                if(cfg.wrtDtExpsrYn === 'Y') colCount++;
                if(cfg.inqCntExpsrYn === 'Y') colCount++;

                tbody.innerHTML = `<tr><td class="tac" colspan="${colCount}">조회된 결과가 없습니다.</td></tr>`;
                return;
            }

            let html = '';
            list.forEach(function (item) {
                let rowHtml = '<tr>';

                if (cfg.pstOidExpsrYn === 'Y') {
                    rowHtml += `<td>${item.bbsPstOid}</td>`;
                }
                if (cfg.ctgryYn === 'Y') {
                    rowHtml += `<td>${item.categoryNm || '-'}</td>`;
                }

                // 자물쇠 아이콘 처리
                let lockIcon = '';
                if (item.prvtPstYn === 'Y') {
                    lockIcon = '<i class="px_lock">잠금</i> ';
                }

                rowHtml += `<td class="tal">
                                <a href="javascript:" class="link post_link" data-id="${item.bbsPstOid}">
                                    ${lockIcon}${item.bbsPstTtl}
                                </a>
                            </td>`;

                if (cfg.wrtrExpsrYn === 'Y') {
                    rowHtml += `<td>${item.wrtrNm}</td>`;
                }
                if (cfg.wrtDtExpsrYn === 'Y') {
                    rowHtml += `<td>${common.formatDate(item.regDt)}</td>`;
                }
                if (cfg.inqCntExpsrYn === 'Y') {
                    rowHtml += `<td>${item.inqCnt || 0}</td>`;
                }

                rowHtml += '</tr>';
                html += rowHtml;
            });
            tbody.innerHTML = html;
        },
        /**
         * 글쓰기
         */
        fnGoWrite: function () {
            SearchState.clear(this.getSearchStateId());
            const menuCd = this.state.reqDto.menuCd;

            window.location.href = contextPath + `/board/write?menuCd=${menuCd}&bbsOid=${this.state.config.bbsOid}`;
        },        

        /**
         * 상세 이동
         */
        fnGoToDetail: async function (bbsPstOid) {
            const _this = this;

        	const menuCd = _this.state.reqDto.menuCd;
            try {
                // 조회수 증가
                await this.updateViewCount(bbsPstOid);

                // Q&A 읽기 권한 체크
                const response = await API.get(`/api/common/board/post/verify-access/${bbsPstOid}/${menuCd}`, {}, {
                    handleAuthError: false,
                    showLoading: false
                });

                // 권한 있음 / 비밀번호 요구 모두 200이지만
                // 비밀번호 요구는 action에 행위 값이 담겨있음 (REQUIRED_PASSWORD)
                if(response && response.action){
                    qna_secret.initModal(bbsPstOid, null, 'board');
                }else{
                    // 200 : 권한 있음 (공개글, 관리자, 본인, 세션인증[비밀번호 입력후 성공시 5분간 세션])
                    window.location.href = contextPath + `/board/post?menuCd=${menuCd}&bbsOid=${_this.state.config.bbsOid}&bbsPstOid=${bbsPstOid}`;
                }
            } catch (error) {
                if (error.stts === 403) {
                    // 403 Forbidden -> 회원 글 (접근 불가)
                    // (타인이 회원 비밀글을 클릭한 경우)
                    uiCommon.fnShowAlertModal('비밀글에 접근할 권한이 없습니다.');
                } else if (error.stts === 404) {
                    uiCommon.fnShowAlertModal('게시글이 존재하지 않습니다.');
                } else {
                    console.error(error);
                    uiCommon.fnShowAlertModal('오류가 발생했습니다.');
                }
            }
        },
        
        /**
         * 조회수 증가
         */
        updateViewCount: async function (bbsPstOid) {
        	const _this = this;
            try {
            	const param = {
            			bbsPstOid: bbsPstOid,
            			menuCd: _this.state.reqDto.menuCd
            	}
            	
                await API.patch('/api/common/board/view-count', param);
            } catch (error) {
                console.error('조회수 증가 실패:', error);
            }
        },

        /**
         * 검색조건 복원
         */
        fnRestoreState: function () {
            const _this = this;

            // 1. URL 파라미터로 복원
            const _fieldMap = { keyword: 'board_keyword', searchType: 'board_search_type', ctgry: 'search_category' };
            const urlPage = SearchState.restoreFromUrl(_fieldMap);
            if (urlPage !== null) {
                _this.state.pageIndex = urlPage;
            } else {
                // 2. sessionStorage 로 복원
                const saved = SearchState.restoreForm(_this.getSearchStateId(), '.board_search');
                if (saved) {
                    _this.state.pageIndex = saved._extra.pageIndex || 1;
                }
            }

            // 3. 뒤로가기 / 앞으로가기 시
            SearchState.handlePopState(_fieldMap, 'page', function(page) {
                _this.state.pageIndex = page;
                _this.getListData();
            });
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        user_board.init();
    });
</script>
</body>
</html>
