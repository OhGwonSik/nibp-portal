<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/main_layout}">
<head>
    <meta charset="UTF-8">
    <title th:text="${boardInfo.bbsNm}">게시판</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style layout:fragment="main_style">
        @media screen and (max-width: 1280px) {
            .sub_tab_menu {padding-right: 52px;}
        }
    </style>
</head>
<body>
<div layout:fragment="main_content" class="content_wrap">
    <h3 class="stit" th:text="${boardInfo.bbsNm}">게시판</h3>
    <th:block th:if="${boardType != null and boardType.shouldShowRecruitmentNotice()}">
        <!--채용공고 게시판일 경우 s-->
        <div class="bg_box mb20">
            ※ 채용 관련 문의 : <b class="color_01">02-737-8331, 9445 / employ@nibp.kr</b>
        </div>
        <!--채용공고 게시판일 경우 e-->
    </th:block>

    <th:block th:if="${boardType != null and boardType.shouldShowCategoryTab()}">
        <!--해외 언론동향 게시판일 경우 s-->
        <div id="common_category" class="sub_tab_menu">
            <ul>
                <li class="on"><a href="javascript:;" data-category="">전체</a></li>
                <li th:each="ctgry : ${mediaCategoryList}">
                    <a href="javascript:;" th:data-ctgry="${ctgry.cdVal}" th:text="${ctgry.cdNm}"></a>
                </li>
            </ul>
        </div>
        <!--해외 언론동향 게시판일 경우 e-->
    </th:block>

    <div class="board_search mb10">
        <p class="count">총 <strong id="commonBoardTotal" class="color_01" th:text="${boardPostList.total}">0</strong> 건</p>
        <div class="board_search mb10" th:if="${boardInfo.srchUseYn == 'Y'}">
            <fieldset>
                <legend>게시판 검색</legend>
                <select th:if="${boardInfo.ctgryYn == 'Y' and boardInfo.ctgryList != null and !boardType.shouldShowCategoryTab()}" id="search_category" class="wp100" title="검색분류 선택">
                    <option value="">전체 분류</option>
                    <option th:each="cat : ${#strings.arraySplit(#strings.replace(#strings.replace(#strings.replace(boardInfo.ctgryList, '(', ''), ')', ''), '''', ''), ',')}"
                            th:value="${#strings.trim(cat)}" th:text="${#strings.trim(cat)}"></option>
                </select>

                <select id="board_search_type" title="검색 옵션 선택" class="wp100">
                    <option value="all">전체</option>
                    <option value="title">제목</option>
                    <option value="content">내용</option>
                </select>
                <input type="text" id="board_keyword" title="검색어를 입력해주세요." class="wp200">
                <button id="board_btn_search" class="btn_basic_ss">검색</button>
            </fieldset>
        </div>
    </div>

    <div class="table_layout" th:if="${boardInfo.listCnExpsrYn != 'Y'}">
        <table>
            <caption th:text="${boardInfo.bbsNm} + ' 리스트'">리스트</caption>

            <colgroup>
                <col th:if="${boardInfo.pstOidExpsrYn == 'Y'}" style="width: 60px;">
                <col th:if="${boardInfo.ctgryYn == 'Y'}" style="width: 120px;">
                <col style="width: auto;">
                <col th:if="${boardInfo.wrtrExpsrYn == 'Y'}" style="width: 100px;">
                <col th:if="${boardInfo.prgrsSttsExpsrYn == 'Y'}" style="width: 100px;">
                <col th:if="${boardInfo.wrtDtExpsrYn == 'Y'}" style="width: 100px;">
                <col th:if="${boardInfo.ddlnDtExpsrYn == 'Y'}" style="width: 100px;">
                <col th:if="${boardInfo.inqCntExpsrYn == 'Y'}" style="width: 80px;">
                <col th:if="${boardInfo.atchFileEnYn == 'Y'}" style="width: 90px;">
            </colgroup>

            <thead>
            <tr>
                <th scope="col" th:if="${boardInfo.pstOidExpsrYn == 'Y'}">번호</th>
                <th scope="col" th:if="${boardInfo.ctgryYn == 'Y'}">분류</th>
                <th scope="col">제목</th>
                <th scope="col" th:if="${boardInfo.wrtrExpsrYn == 'Y'}">작성자</th>
                <th scope="col" th:if="${boardInfo.ddlnDtExpsrYn == 'Y'}">마감일</th>
                <th scope="col" th:if="${boardInfo.prgrsSttsExpsrYn == 'Y'}">진행상태</th>
                <th scope="col" th:if="${boardInfo.wrtDtExpsrYn == 'Y'}">등록일</th>
                <th scope="col" th:if="${boardInfo.inqCntExpsrYn == 'Y'}">조회수</th>
                <th scope="col" th:if="${boardInfo.atchFileEnYn == 'Y'}">첨부파일</th>
            </tr>
            </thead>

            <tbody id="board_tbody">
            <tr th:if="${boardPostList == null or boardPostList.list == null or boardPostList.list.isEmpty()}">
                <td class="tac" th:colspan="${1
                        + (boardInfo.pstOidExpsrYn == 'Y' ? 1 : 0)
                        + (boardInfo.ctgryYn == 'Y' ? 1 : 0)
                        + (boardInfo.wrtrExpsrYn == 'Y' ? 1 : 0)
                        + (boardInfo.wrtDtExpsrYn == 'Y' ? 1 : 0)
                        + (boardInfo.ddlnDtExpsrYn == 'Y' ? 1 : 0)
                        + (boardInfo.prgrsSttsExpsrYn == 'Y' ? 1 : 0)
                        + (boardInfo.atchFileEnYn == 'Y' ? 1 : 0)
                        + (boardInfo.inqCntExpsrYn == 'Y' ? 1 : 0)
                    }">조회된 결과가 없습니다.</td>
            </tr>

            <th:block th:if="${boardPostList != null and boardPostList.list != null}">
                <tr th:each="item : ${boardPostList.list}">
                    <td th:if="${boardInfo.pstOidExpsrYn == 'Y'}">
                        <span th:if="${item.upendFixYn == 'Y'}" class="notice">공지</span>
                        <span th:if="${item.upendFixYn != 'Y'}" th:text="${item.bbsPstOid}"></span>
                    </td>
                    <td th:if="${boardInfo.ctgryYn == 'Y'}" th:text="${item.ctgry}"></td>

                    <td class="tal">
                        <a href="javascript:" class="link post_link" th:data-id="${item.bbsPstOid}" th:text="${item.bbsPstTtl}"></a>
                    </td>

                    <td th:if="${boardInfo.wrtrExpsrYn == 'Y'}" th:text="${item.wrtrNm}"></td>
                    <td th:if="${boardInfo.ddlnDtExpsrYn == 'Y'}" th:switch="${boardInfo.bbsSubSeCd}">
                        <th:block th:case="'RECRUITMENT'">
                            <span th:text="${#temporals.format(item.endDt, 'yyyy-MM-dd')}"></span>
                        </th:block>
                        <th:block th:case="'BID_ANNOUNCEMENT'">
                            <span th:text="${#temporals.format(item.endDt, 'yyyy-MM-dd')}"></span>
                        </th:block>
                        <th:block th:case="*">
                            <span th:text="${item.ddlnDt != null ? #temporals.format(item.ddlnDt, 'yyyy-MM-dd') : '-'}"></span>
                        </th:block>
                    </td>
                    <td th:if="${boardInfo.prgrsSttsExpsrYn == 'Y'}"
                        th:text="${boardType.isDynamicBoard ? (item.stts ?: '-') : (item.statusNm ?: '-')}">
                    </td>
                    <td th:if="${boardInfo.wrtDtExpsrYn == 'Y'}" th:text="${#temporals.format(item.regDt, 'yyyy-MM-dd')}"></td>

                    <td th:if="${boardInfo.inqCntExpsrYn == 'Y'}" th:text="${item.inqCnt}"></td>

                    <td th:if="${boardInfo.atchFileEnYn == 'Y'}">
                        <!-- 첨부파일이 없으면 - 표시 -->
                        <span th:if="${item.attachments == null or #lists.isEmpty(item.attachments)}">-</span>

                        <!-- 첨부파일이 있으면 확장자별 아이콘 표시 (종류별 1개씩만) -->
                        <th:block th:if="${item.attachments != null and !#lists.isEmpty(item.attachments)}"
                                  th:with="exts=${item.attachments.![#strings.toLowerCase(fileTypeNm)]},
                                           hasImage=${#lists.contains(exts, 'jpg') or #lists.contains(exts, 'jpeg') or #lists.contains(exts, 'png') or #lists.contains(exts, 'gif') or #lists.contains(exts, 'bmp')},
                                           hasHwp=${#lists.contains(exts, 'hwp') or #lists.contains(exts, 'hwpx')},
                                           hasExcel=${#lists.contains(exts, 'xls') or #lists.contains(exts, 'xlsx')},
                                           hasWord=${#lists.contains(exts, 'doc') or #lists.contains(exts, 'docx')},
                                           hasPdf=${#lists.contains(exts, 'pdf')}">
                            <!-- 이미지 파일 -->
                            <i th:if="${hasImage}" class="ico_file img">이미지</i>
                            <!-- HWP 파일 -->
                            <i th:if="${hasHwp}" class="ico_file hwp">한글</i>
                            <!-- Excel 파일 -->
                            <i th:if="${hasExcel}" class="ico_file exel">엑셀</i>
                            <!-- Word 파일 -->
                            <i th:if="${hasWord}" class="ico_file word">워드</i>
                            <!-- PDF 파일 -->
                            <i th:if="${hasPdf}" class="ico_file pdf">PDF</i>
                            <!-- 기타 파일: 알려진 확장자가 전혀 없을 때만 표시 -->
                            <i th:if="${!hasImage and !hasHwp and !hasExcel and !hasWord and !hasPdf}" class="ico_file">파일</i>
                        </th:block>
                    </td>
                </tr>
            </th:block>
            </tbody>
        </table>
        <span class="scroll_img">스크롤</span>
    </div>

    <div class="news_list_wrap" th:if="${boardInfo.listCnExpsrYn == 'Y'}">
        <ul id="board_ul">
            <li th:if="${boardPostList == null or boardPostList.list == null or boardPostList.list.isEmpty()}" class="w100">
                <div style="text-align:center; padding:50px 0;">조회된 결과가 없습니다.</div>
            </li>

            <th:block th:if="${boardPostList != null and boardPostList.list != null}">
                <li th:each="item : ${boardPostList.list}">
                    <a href="javascript:;" class="post_link" th:data-id="${item.bbsPstOid}">
                        <span th:if="${boardInfo.ctgryYn == 'Y' and item.ctgry != null and !boardType.shouldShowCategoryTab()}"
                              th:text="'[' + ${item.ctgry} + ']'"></span>

                        <strong th:text="${item.bbsPstTtl}">제목</strong>

                        <p th:text="${item.bbsPstCn != null ? #strings.abbreviate(item.bbsPstCn.replaceAll('<[^>]*>', ''), 200) : ''}">
                            내용 요약
                        </p>

                        <div class="desc_wrap">
                            <em th:if="${boardInfo.wrtDtExpsrYn == 'Y'}"
                                th:text="${#temporals.format(item.regDt, 'yyyy.MM.dd')}">DATE</em>

                            <em th:if="${boardInfo.inqCntExpsrYn == 'Y'}"
                                th:text="'조회수: ' + ${item.inqCnt}">VIEW</em>
                        </div>
                    </a>
                </li>
            </th:block>
        </ul>
    </div>

    <div id="paging_wrap" class="paging_wrap">
        <a href="javascript:" class="first page_first">첫 페이지</a>
        <a href="javascript:" class="previous page_prev">전 페이지</a>
        <div class="namber pagination_container"></div>
        <a href="javascript:" class="next page_next">다음 페이지</a>
        <a href="javascript:" class="last page_last">끝 페이지</a>
    </div>

    <div class="btn_wrap mt30">
        <th:block th:if="${boardType != null and boardType.shouldShowDisclosureLink()}">
            <!--추가공개 게시판일 경우 s-->
            <a th:href="@{/page/portal401}" class="btn_basic bg_gray">경영공시 바로가기</a>
            <!--추가공개 게시판일 경우 e-->
        </th:block>
        <!--<a href="javascript:;" class="btn_basic">등록</a>-->
    </div>
</div>
<script layout:fragment="main_scripts" th:inline="javascript" type="text/javascript">
    const common_board = {
        state: {
            all: /*[[${boardPostList}]]*/ {},
            config: /*[[${boardInfo}]]*/ {},
            reqDto: /*[[${boardRequestDto}]]*/ {},
            pageIndex: 1,
            pageCnt: /*[[${boardInfo.pageCnt}]]*/ 10,
            pagingCnt: /*[[${boardInfo.pagingCnt}]]*/ 5,
            ctgry: /*[[${param.ctgry}]]*/ '' || ''
        },
        common: {
            mediaTrendsOverseas: /*[[${T(egovframework.common.board.enums.BoardType).MEDIA_TRENDS_OVERSEAS_BOARD.getBbsSubSeCd()}]]*/ 'MEDIA_TRENDS_OVERSEAS'
        },

        getSearchStateId: function() {
            return 'portal_common_board_' + this.state.config.bbsOid;
        },

        init: function () {
            this.initEvent();

            const raw = this.state.ctgry;
            const category = Array.isArray(raw) ? (raw[0] || '') : (raw || '');
            this.state.ctgry = category;

            document.querySelectorAll('#common_category li').forEach(li => li.classList.remove('on'));
            const target = document.querySelector(`#common_category a[data-ctgry="${this.state.ctgry}"]`);
            if (target) target.closest('li').classList.add('on');
            else document.querySelector('#common_category li')?.classList.add('on'); // fallback: 전체

            // 검색조건 복원
            this.fnRestoreState();

            this.getListData();
        },

        initEvent: function () {
            const _this = this;

            // 카테고리 탭 클릭
            document.querySelectorAll('#common_category a').forEach(function (link) {
                link.addEventListener('click', function (e) {
                    e.preventDefault();

                    const ctgry = this.dataset.ctgry || '';

                    // 1. 현재 URL의 파라미터 가져오기
                    const urlParams = new URLSearchParams(window.location.search);

                    // 2. category 파라미터 설정 (값이 없으면 삭제, 있으면 업데이트)
                    if (ctgry) {
                        urlParams.set('ctgry', ctgry);
                    } else {
                        urlParams.delete('ctgry');
                    }

                    // 3. 새로운 URL 생성 및 이동
                    window.location.href = window.location.pathname + '?' + urlParams.toString();
                });
            });

            // 검색 버튼
            const searchBtn = document.getElementById("board_btn_search");
            if(searchBtn) {
                searchBtn.addEventListener('click', function () {
                    _this.state.pageIndex = 1;
                    _this.getListData();
                });
            }

            // 검색어 입력 시 엔터키 이벤트
            const keywordInput = document.getElementById('board_keyword');
            if (keywordInput) {
                keywordInput.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        _this.state.pageIndex = 1;
                        _this.getListData();
                    }
                });
            }

            // 클릭 이벤트 위임 (테이블용 tbody, 리스트용 ul 둘 다)
            const tbody = document.getElementById("board_tbody");
            const ul = document.getElementById("board_ul");

            if(tbody) tbody.addEventListener("click", (e) => _this.fnHandleClick(e));
            if(ul) ul.addEventListener("click", (e) => _this.fnHandleClick(e));
        },

        fnHandleClick: function(e) {
            const link = e.target.closest(".post_link");
            if (!link) return;
            e.preventDefault();
            this.fnGoToDetail(Number(link.dataset.id));
        },

        renderPagination: function () {
            const _this = this;
            if (!_this.state.all) return;

            uiCommon.pagination.render({
                currentPage: _this.state.pageIndex,
                totalPages: _this.state.all.pages,
                blockSize: _this.state.pagingCnt,
                onPageChange: function(page) {
                    _this.state.pageIndex = page;
                    _this.getListData();
                }
            });
        },

        getListData: async function () {
            SearchState.saveForm(this.getSearchStateId(), '.board_search', { pageIndex: this.state.pageIndex });

            const param = new URLSearchParams({
                bbsOid: this.state.config.bbsOid,
                page: this.state.pageIndex,
                size: this.state.pageCnt,
                menuCd: this.state.reqDto.menuCd,
                keyword: (document.getElementById('board_keyword') ? document.getElementById('board_keyword').value.trim() : ''),
                searchType: (document.getElementById('board_search_type') ? document.getElementById('board_search_type').value.trim() : '')
            });

            // 카테고리 필터 추가
            if (this.state.ctgry) {
                // 언론동향 카테고리 리스트
                const mediaCategories = /*[[${mediaCategoryList}]]*/ [];

                // 매핑 객체로 변환
                const categoryMap = {};
                if (Array.isArray(mediaCategories)) {
                    mediaCategories.forEach(item => {
                        categoryMap[item.cdVal] = item.cdNm;
                    });
                }

                // 카테고리명 값이 있으면 필터 추가
                const categoryName = categoryMap[this.state.ctgry] || '';
                if (categoryName) {
                    param.append('ctgry', categoryName);
                }
            } else {
                param.append('ctgry', document.getElementById('search_category') ? document.getElementById('search_category').value : '');
            }

            SearchState.updateUrl(param);

            try {
                const response = await API.get('/api/common/board/list/filter?' + param);
                this.state.all = response;
                this.renderBody(); // 통합 렌더링 호출
                this.renderPagination();
            } catch (error) {
                console.error('목록 조회 실패:', error);
            }
        },

        /**
         * [분기] 설정에 따라 테이블형(N) 또는 뉴스형(Y) 렌더링
         */
        renderBody: function () {
            if (this.state.config.listCnExpsrYn === 'Y') {
                this.renderNewsList(); // 신규
            } else {
                this.renderTableList(); // 기존
            }
        },

        /**
         * 1. 기존 테이블형 렌더링 (listImageYn != 'Y')
         */
        renderTableList: function () {
            const _this = this;
            const tbody = document.getElementById("board_tbody");
            if (!tbody) return;

            tbody.innerHTML = '';

            const list = _this.state.all ? _this.state.all.list : [];
            const cfg = _this.state.config;

            if (!list || list.length === 0) {
                // 기존 colspan 계산 로직 복구
                let colCount = 1;
                if(cfg.pstOidExpsrYn === 'Y') colCount++;
                if(cfg.ctgryYn === 'Y') colCount++;
                if(cfg.wrtrExpsrYn === 'Y') colCount++;
                if(cfg.wrtDtExpsrYn === 'Y') colCount++;
                if(cfg.ddlnDtExpsrYn === 'Y') colCount++;
                if(cfg.prgrsSttsExpsrYn === 'Y') colCount++;
                if(cfg.inqCntExpsrYn === 'Y') colCount++;
                if(cfg.atchFileEnYn === 'Y') colCount++;

                tbody.innerHTML = `<tr><td class="tac" colspan="${colCount}">조회된 결과가 없습니다.</td></tr>`;
                document.querySelector('#commonBoardTotal').innerHTML = _this.state.all.total;
                return;
            }

            let tableHtml = '';
            list.forEach(function (item) {
                let rowHtml = '<tr>';

                // 번호
                if (cfg.pstOidExpsrYn === 'Y') {
                    const num = (item.upendFixYn === 'Y') ? '<span class="notice">공지</span>' : item.bbsPstOid;
                    rowHtml += `<td>${num}</td>`;
                }
                // 분류
                if (cfg.ctgryYn === 'Y') {
                    rowHtml += `<td>${item.ctgry || '-'}</td>`;
                }
                // 제목
                rowHtml += `<td class="tal">
                                <a href="javascript:" class="link post_link" data-id="${item.bbsPstOid}">
                                    ${item.bbsPstTtl}
                                </a>
                            </td>`;
                // 작성자
                if (cfg.wrtrExpsrYn === 'Y') rowHtml += `<td>${item.wrtrNm}</td>`;
                // 마감일
                if (cfg.ddlnDtExpsrYn === 'Y') {
                    let deadlineValue = '-';
                    if (cfg.bbsSubSeCd === 'RECRUITMENT' || cfg.bbsSubSeCd === 'BID_ANNOUNCEMENT') {
                        deadlineValue = item.endDt ? common.formatDate(item.endDt) : '-';
                    } else {
                        deadlineValue = item.ddlnDt ? common.formatDate(item.ddlnDt) : '-';
                    }
                    rowHtml += `<td>${deadlineValue}</td>`;
                }
                // 상태
                if (cfg.prgrsSttsExpsrYn === 'Y') {
                    const statusValue = (cfg.boardTypeCd === 'DYNAMIC' || cfg.bbsSubSeCd != null) ? (item.stts || '-') : (item.statusNm || '-');
                    rowHtml += `<td>${statusValue}</td>`;
                }
                // 등록일
                if (cfg.wrtDtExpsrYn === 'Y') rowHtml += `<td>${common.formatDate(item.regDt)}</td>`;
                // 조회수
                if (cfg.inqCntExpsrYn === 'Y') rowHtml += `<td>${item.inqCnt || 0}</td>`;
                // 첨부파일 (파일 종류별로 아이콘 1개씩만 표시)
                if (cfg.atchFileEnYn === 'Y') {
                    let attachmentIcons = '-';
                    if (item.attachments && item.attachments.length > 0) {
                        const iconSet = new Set();
                        item.attachments.forEach(file => {
                            const ext = (file.fileTypeNm || '').toLowerCase();
                            if (['jpg', 'jpeg', 'png', 'gif', 'bmp'].includes(ext)) {
                                iconSet.add('img');
                            } else if (['hwp', 'hwpx'].includes(ext)) {
                                iconSet.add('hwp');
                            } else if (['xls', 'xlsx'].includes(ext)) {
                                iconSet.add('exel');
                            } else if (['doc', 'docx'].includes(ext)) {
                                iconSet.add('word');
                            } else if (ext === 'pdf') {
                                iconSet.add('pdf');
                            } else {
                                iconSet.add('etc');
                            }
                        });
                        const iconMap = {
                            'img': '<i class="ico_file img">이미지</i>',
                            'hwp': '<i class="ico_file hwp">한글</i>',
                            'exel': '<i class="ico_file exel">엑셀</i>',
                            'word': '<i class="ico_file word">워드</i>',
                            'pdf': '<i class="ico_file pdf">PDF</i>',
                            'etc': '<i class="ico_file">파일</i>'
                        };
                        attachmentIcons = Array.from(iconSet).map(type => iconMap[type]).join(' ');
                    }
                    rowHtml += `<td>${attachmentIcons}</td>`;
                }

                rowHtml += '</tr>';
                tableHtml += rowHtml;
            });
            tbody.innerHTML = tableHtml;

            document.querySelector('#commonBoardTotal').innerHTML = _this.state.all.total;
        },

        /**
         * 2. [신규] 텍스트/뉴스 리스트형 렌더링 (listImageYn == 'Y')
         */
        renderNewsList: function() {
            const _this = this;
            const ul = document.getElementById("board_ul");
            if (!ul) return;

            ul.innerHTML = '';
            const list = _this.state.all ? _this.state.all.list : [];
            const cfg = _this.state.config;
            const shouldHideCategoryText = (cfg.bbsSubSeCd === _this.common.mediaTrendsOverseas);

            if (!list || list.length === 0) {
                ul.innerHTML = '<div class="no_data_msg" style="width:100%; text-align:center; padding:50px 0;">조회된 결과가 없습니다.</div>';
                document.querySelector('#commonBoardTotal').innerHTML = _this.state.all.total;
                return;
            }

            let listHtml = '';
            list.forEach(function (item) {
                // 분류
                let categoryHtml = '';
                if (cfg.ctgryYn === 'Y' && item.ctgry && !shouldHideCategoryText) {
                    categoryHtml = `<span>[${item.ctgry}]</span>`;
                }

                // 내용 요약 (태그 제거)
                let contentText = item.bbsPstCn ? item.bbsPstCn.replace(/<[^>]*>?/gm, '') : '';
                contentText = contentText.replace(/\s+/g, ' ').trim();
                if (contentText.length > 200) contentText = contentText.substring(0, 200) + '...';

                // 날짜
                let dateHtml = '';
                if (cfg.wrtDtExpsrYn === 'Y') {
                    const dateStr = common.formatDate(item.regDt).replaceAll('-', '.');
                    dateHtml = `<em>${dateStr}</em>`;
                }

                // 조회수
                let viewHtml = '';
                if (cfg.inqCntExpsrYn === 'Y') {
                    viewHtml = `<em>조회수: ${item.inqCnt}</em>`;
                }

                listHtml += `
                    <li>
                        <a href="javascript:;" class="post_link" data-id="${item.bbsPstOid}">
                            ${categoryHtml}
                            <strong>${item.bbsPstTtl}</strong>
                            <p>${contentText}</p>
                            <div class="desc_wrap">
                                ${dateHtml}
                                ${viewHtml}
                            </div>
                        </a>
                    </li>
                `;
            });
            ul.innerHTML = listHtml;
            document.querySelector('#commonBoardTotal').innerHTML = _this.state.all.total;
        },

        fnGoToDetail: async function (bbsPstOid) {
            const _this = this;
            await _this.updateViewCount(bbsPstOid);
            const menuCd = _this.state.reqDto.menuCd;
            location.href = `${contextPath}/board/post?menuCd=${menuCd}&bbsOid=${_this.state.config.bbsOid}&bbsPstOid=${bbsPstOid}`;
        },

        updateViewCount: async function (bbsPstOid) {
            if(!bbsPstOid) return;
            const _this = this;

            try {
                const param = {
                    bbsPstOid: bbsPstOid,
                    menuCd: _this.state.reqDto.menuCd
                }

                await API.patch('/api/common/board/view-count', param);
            } catch (error) {
                console.error('조회수 증가 실패:', error);
            }
        },

        /**
         * 검색조건 복원
         */
        fnRestoreState: function () {
            const _this = this;

            // 1. URL 파라미터로 복원
            const _fieldMap = { keyword: 'board_keyword', searchType: 'board_search_type', ctgry: 'search_category' };
            const urlPage = SearchState.restoreFromUrl(_fieldMap);
            if (urlPage !== null) {
                _this.state.pageIndex = urlPage;
            } else {
                // 2. sessionStorage 로 복원
                const saved = SearchState.restoreForm(this.getSearchStateId(), '.board_search');
                if (saved) {
                    _this.state.pageIndex = saved._extra.pageIndex || 1;
                }
            }

            // 3. 뒤로가기 / 앞으로가기 시
            SearchState.handlePopState(_fieldMap, 'page', function(page) {
                _this.state.pageIndex = page;
                _this.getListData();
            });
        }
    }
    document.addEventListener("DOMContentLoaded", function() {
        common_board.init();
    });
</script>
</body>
</html>
