<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin_layout}">
<head>
    <meta charset="UTF-8">
    <title th:text="${boardInfo.bbsNm}">썸네일 게시판 관리</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div layout:fragment="admin_content" class="right_wrap">

    <div class="search_wrap" th:if="${boardInfo.srchUseYn == 'Y'}">
        <ul>
            <li th:if="${boardInfo.ctgryYn == 'Y' and boardInfo.ctgryList != null}">
                <label for="searchCategory">분류</label>
                <select id="searchCategory" class="w30" title="분류 선택">
                    <option value="">전체 분류</option>
                    <option th:each="cat : ${#strings.arraySplit(#strings.replace(#strings.replace(#strings.replace(boardInfo.ctgryList, '(', ''), ')', ''), '''', ''), ',')}"
                            th:value="${#strings.trim(cat)}"
                            th:text="${#strings.trim(cat)}"
                            th:selected="${boardRequestDto.ctgry == #strings.trim(cat)}">
                    </option>
                </select>
            </li>
            <li>
                <label for="searchType">검색</label>
                <select id="searchType" title="검색 옵션 선택">
                    <option value="all" th:selected="${boardRequestDto.searchType == 'all'}">전체</option>
                    <option value="title" th:selected="${boardRequestDto.searchType == 'title'}">제목</option>
                    <option value="content" th:selected="${boardRequestDto.searchType == 'ntcCn'}">내용</option>
                </select>
                <input type="text" id="keyword" th:value="${boardRequestDto.keyword}" title="검색어를 입력해주세요." placeholder="검색어 입력">
            </li>
            <li>
                <label>공개여부</label>
                <span class="radio-box"><input type="radio" id="option1" value="" name="radio_01" checked><label for="option1">전체</label></span>
                <span class="radio-box"><input type="radio" id="option2" value="Y" name="radio_01"><label for="option2">공개</label></span>
                <span class="radio-box"><input type="radio" id="option3" value="N" name="radio_01"><label for="option3">비공개</label></span>
            </li>
            <li>
                <label for="boardPostRegStartDt">등록일</label>
                <div class="flex_col"><span class="datepicker"><input type="text" value="시작일" id="boardPostRegStartDt" class="datepick"><img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="선택" title="선택"></span> ~ <span class="datepicker"><input type="text" value="종료일" id="boardPostRegEndDt" class="datepick"><img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="선택" title="선택"></span></div>
            </li>              
        </ul>
        <div class="s_wrap"><a id="thumbnailSearchBtn" class="btn_search" href="javascript:;"><span>검색</span></a></div>
    </div>

    <hr class="h_bg_type">

    <div class="sub_cont_wrap">
        <div class="table_desc">
            <p>총 <strong id="total_count" th:text="${boardPostList != null ? boardPostList.total : 0}">0</strong>건</p>
            <div class="btn_wrap">
                <a href="javascript:;" id="btn_register_post" class="btn_basic bg_type01"
                   th:href="@{/admin/board/write(bbsOid=${boardInfo.bbsOid}, menuCd=${boardRequestDto.menuCd})}">등록</a>
            </div>
        </div>

        <div class="table_layout02 list_type mb20">
            <table>
                <caption th:text="${boardInfo.bbsNm} + ' 리스트'">리스트</caption>
                <colgroup>
                    <col style="width: 80px;">
                    <col style="width: 100px;">
                    <col style="width: auto;">
                    <col style="width: 120px;">
                    <col style="width: 100px;">
                    <col style="width: 100px;">
                    <col style="width: 100px;">
                </colgroup>
                <thead>
                <tr>
                    <th scope="col">번호</th>
                    <th scope="col">이미지</th>
                    <th scope="col">제목</th>
                    <th scope="col">등록일</th>
                    <th scope="col">조회수</th>
                    <th scope="col">공개여부</th>
                    <th scope="col">사용여부</th>
                </tr>
                </thead>
                <tbody id="board_tbody">
                <tr th:if="${boardPostList == null or boardPostList.list == null or boardPostList.list.isEmpty()}">
                    <td class="tac" colspan="7">조회된 결과가 없습니다.</td>
                </tr>

                <th:block th:if="${boardPostList != null and boardPostList.list != null}">
                    <tr th:each="item : ${boardPostList.list}">
                        <td th:text="${item.bbsPstOid}"></td>
                        <td>
                            <img th:if="${item.thmbPath != null and item.thmbPath != ''}"
                                 th:src="@{|${basicFilePath}${item.thmbPath}|}"
                                 th:attr="onerror=|this.src='@{/admin/images/Thumbnail_img.png}'|"
                                 alt="썸네일" style="width: 60px; height: 40px; object-fit: cover; border: 1px solid #eee;">
                            <span th:unless="${item.thmbPath != null and item.thmbPath != ''}">-</span>
                        </td>
                        <td class="tal">
                            <a href="javascript:" class="a_link post_link" th:data-id="${item.bbsPstOid}" th:text="${item.bbsPstTtl}"></a>
                        </td>
                        <td th:text="${#temporals.format(item.regDt, 'yyyy-MM-dd')}"></td>
                        <td th:text="${item.inqCnt}">0</td>
                        <td th:text="${item.openYn == 'Y' ? '공개': '비공개'}"></td>
                        <td th:text="${item.delYn == 'N' ? '사용': '삭제'}"></td>
                    </tr>
                </th:block>
                </tbody>
            </table>
        </div>

        <div id="paging_wrap" class="paging_wrap">
            <a href="javascript:" class="first page_first">첫 페이지</a>
            <a href="javascript:" class="previous page_prev">전 페이지</a>
            <div class="namber pagination_container"></div>
            <a href="javascript:" class="next page_next">다음 페이지</a>
            <a href="javascript:" class="last page_last">끝 페이지</a>
        </div>
    </div>
</div>

<script layout:fragment="scripts" th:inline="javascript" type="text/javascript">
    const admin_thumbnail_board = {
        state: {
            strgFilePath: /*[[${basicFilePath}]]*/ '',
            DEFAULT_IMG: /*[[@{/admin/images/Thumbnail_img.png}]]*/ contextPath + '/admin/images/Thumbnail_img.png',
            all: /*[[${boardPostList}]]*/ {},
            config: /*[[${boardInfo}]]*/ {},
            reqDto: /*[[${boardRequestDto}]]*/ {},
            pageIndex: 1,
            pageCnt: /*[[${boardInfo.pageCnt}]]*/ 10,
            pagingCnt: /*[[${boardInfo.pagingCnt}]]*/ 5
        },

        init: function() {
        	const _this = this;
        	
        	uiCommon.datepicker.init('#boardPostRegStartDt', {
                onSelect: function(selectedDate, inst) {
                    const startDate = $(this).datepicker('getDate');
                    const endDatePicker = $('#boardPostRegEndDt');
                    
                    // 종료일의 최소 선택 가능 날짜를 시작일로 설정
                    endDatePicker.datepicker('option', 'minDate', startDate);
                    
                    const currentEndDate = endDatePicker.datepicker('getDate');
                    // 시작일이 종료일보다 미래일 경우, 종료일을 시작일로 강제 변경
                    if (currentEndDate && startDate && startDate.getTime() > currentEndDate.getTime()) {
                        endDatePicker.datepicker('setDate', startDate);
                    }
                    
                    // 날짜 변경 시 자동 검색
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });

            uiCommon.datepicker.init('#boardPostRegEndDt', {
                onSelect: function(selectedDate, inst) {
                    const endDate = $(this).datepicker('getDate');
                    const startDatePicker = $('#boardPostRegStartDt');
                    
                    // 시작일의 최대 선택 가능 날짜를 종료일로 설정
                    startDatePicker.datepicker('option', 'maxDate', endDate);
                    
                    const currentStartDate = startDatePicker.datepicker('getDate');
                    // 종료일이 시작일보다 과거일 경우, 시작일을 종료일로 강제 변경
                    if (currentStartDate && endDate && endDate.getTime() < currentStartDate.getTime()) {
                        startDatePicker.datepicker('setDate', endDate);
                    }
                    
                    // 날짜 변경 시 자동 검색
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });

            // 초기 날짜값 설정
            const today = new Date();
            const weekAgo = new Date();
            weekAgo.setDate(today.getDate() - 7);
            $('#boardPostRegStartDt').datepicker('setDate', weekAgo);
            $('#boardPostRegEndDt').datepicker('setDate', today);

            // 저장된 검색조건 복원
            const saved = SearchState.restoreForm('thumbnail_board_' + _this.state.config.bbsOid, '.search_wrap');
            if (saved) {
                _this.state.pageIndex = saved._extra.pageIndex || 1;
            }

        	_this.initEvent();
        	_this.renderPagination();
        },

        initEvent: function(){
            const _this = this;
            
         	// 공개여부 라디오 버튼 변경 시 자동 검색
            const radioButtons = document.querySelectorAll('input[name="radio_01"]');
            radioButtons.forEach(radio => {
                radio.addEventListener('change', function () {
                    _this.state.pageIndex = 1;
                    _this.getListData();
                });
            });

            // 검색 버튼
            const searchBtn = document.getElementById('thumbnailSearchBtn');
            if(searchBtn) {
                searchBtn.addEventListener('click', function(e){
                    e.preventDefault();
                    _this.state.pageIndex = 1;
                    _this.getListData();
                });
            }

            // 엔터키 검색
            const keywordInput = document.getElementById('keyword');
            if(keywordInput) {
                keywordInput.addEventListener("keydown", (e) => {
                    if (e.key === "Enter") {
                        _this.state.pageIndex = 1;
                        _this.getListData();
                    }
                });
            }

            // 분류 변경 시 검색
            const categorySelect = document.getElementById("searchCategory");
            if(categorySelect) {
                categorySelect.addEventListener('change', function () {
                    _this.state.pageIndex = 1;
                    _this.getListData();
                });
            }

            // 클릭 이벤트 위임
            const tbody = document.getElementById("board_tbody");
            if(tbody) {
                tbody.addEventListener("click", (e) => _this.fnHandleClick(e));
            }
        },

        fnHandleClick: function(e) {
            const link = e.target.closest(".post_link");
            if (!link) return;
            e.preventDefault();
            this.fnGoToDetail(Number(link.dataset.id));
        },

        renderPagination: function() {
            const _this = this;
            if (!_this.state.all) return;

            uiCommon.pagination.render({
                currentPage: _this.state.pageIndex,
                totalPages: _this.state.all.pages || 1,
                blockSize: _this.state.pagingCnt,
                onPageChange: function(page) {
                    _this.state.pageIndex = page;
                    _this.getListData();
                }
            });
        },

        getListData: async function () {
            SearchState.saveForm('thumbnail_board_' + this.state.config.bbsOid, '.search_wrap', { pageIndex: this.state.pageIndex });

            const params = new URLSearchParams({
                bbsOid: this.state.config.bbsOid,
                page: this.state.pageIndex,
                size: this.state.pageCnt,
                menuCd: this.state.reqDto.menuCd,
                keyword: document.getElementById('keyword')?.value.trim() || '',
                searchType: document.getElementById('searchType')?.value || '',
                ctgry: document.getElementById('searchCategory') ? document.getElementById('searchCategory').value : '',
          		regStartDt: document.getElementById('boardPostRegStartDt').value || '',
                regEndDt: document.getElementById('boardPostRegEndDt').value || '',
                openYn: document.querySelector('input[name="radio_01"]:checked').value || '',
                isAdmin: 'Y'
            });

            try {
                const response = await API.get('/api/admin/board/list/filter?' + params);
                this.state.all = response;
                this.renderTableList();
                this.renderPagination();

                // 총 건수 업데이트
                const totalCountEl = document.getElementById('total_count');
                if (totalCountEl) {
                    totalCountEl.textContent = response.total || 0;
                }
            } catch (error) {
                console.error('목록 조회 실패:', error);
            }
        },

        renderTableList: function () {
            const tbody = document.getElementById("board_tbody");
            if (!tbody) return;

            tbody.innerHTML = '';

            const list = this.state.all ? this.state.all.list : [];

            if (!list || list.length === 0) {
                tbody.innerHTML = '<tr><td class="tac" colspan="7">조회된 결과가 없습니다.</td></tr>';
                return;
            }

            let html = '';
            list.forEach((item) => {
                let imgHtml = '-';
                if (item.thmbPath) {
                    const base = this.state.strgFilePath;
                    const path = item.thmbPath;
                    const cleanBase = base.endsWith('/') ? base.slice(0, -1) : base;
                    const cleanPath = path.startsWith('/') ? path : '/' + path;
                    const imgSrc = cleanBase + cleanPath;
                    imgHtml = `<img src="${imgSrc}" alt="썸네일" style="width: 60px; height: 40px; object-fit: cover; border: 1px solid #eee;" onerror="this.src='${this.state.DEFAULT_IMG}';">`;
                }

                const regDate = common.formatDate(item.regDt);

                html += `
                    <tr>
                        <td>${item.bbsPstOid}</td>
                        <td>${imgHtml}</td>
                        <td class="tal">
                            <a href="javascript:" class="a_link post_link" data-id="${item.bbsPstOid}">${item.bbsPstTtl}</a>
                        </td>
                        <td>${regDate}</td>
                        <td>${item.inqCnt || 0}</td>
                        <td>${item.openYn == 'Y'? '공개' : '비공개' || ''}</td>
                        <td>${item.delYn == 'N'? '사용' : '삭제' || ''}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        },

        fnGoToDetail: async function (bbsPstOid) {
            await this.updateViewCount(bbsPstOid);
            const menuCd = this.state.reqDto.menuCd;
            location.href = `${contextPath}/admin/board/post?menuCd=${menuCd}&bbsOid=${this.state.config.bbsOid}&bbsPstOid=${bbsPstOid}`;
        },

        updateViewCount: async function (bbsPstOid) {
            if(!bbsPstOid) return;

            try {
                const param = {
                    bbsPstOid: bbsPstOid,
                    menuCd: this.state.reqDto.menuCd
                }

                await API.patch('/api/admin/board/view-count', param);
            } catch (error) {
                console.error('조회수 증가 실패:', error);
            }
        }
    };

    $(document).ready(function () {
        admin_thumbnail_board.init();
    });
</script>

</body>
</html>
