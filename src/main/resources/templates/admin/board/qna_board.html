<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin_layout}">
<head>
    <meta charset="UTF-8">
    <title th:text="${boardInfo.bbsNm}">Q&A 관리</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div layout:fragment="admin_content" class="right_wrap">

    <div class="search_wrap" th:if="${boardInfo.srchUseYn == 'Y'}">
        <ul>
            <li th:if="${boardInfo.ctgryYn == 'Y' and boardInfo.ctgryList != null}">
                <label for="search_category" >분류</label>
                <select id="search_category" class="w30" title="검색분류 선택">
                    <option value="">전체 분류</option>
                    <option th:each="cat : ${#strings.arraySplit(#strings.replace(#strings.replace(#strings.replace(boardInfo.ctgryList, '(', ''), ')', ''), '''', ''), ',')}"
                            th:value="${#strings.trim(cat)}"
                            th:text="${#strings.trim(cat)}"
                            th:selected="${#strings.trim(cat) == param.ctgry}"></option>
                </select>
            </li>
            <li>
                <label for="qna_search_type">검색</label>
                <select id="qna_search_type" title="검색 옵션 선택" class="wp300">
                    <option value="all">제목+내용</option>
                    <option value="title">제목</option>
                    <option value="content">내용</option>
                </select>
                <input type="text" id="qna_keyword" placeholder="검색어를 입력하세요" title="검색어를 입력해주세요.">
            </li>
            <li>
                <label>비밀글여부</label>
                <span class="radio-box"><input type="radio" id="option1" value="" name="radio_01" checked><label for="option1">전체</label></span>
                <span class="radio-box"><input type="radio" id="option2" value="N" name="radio_01"><label for="option2">공개</label></span>
                <span class="radio-box"><input type="radio" id="option3" value="Y" name="radio_01"><label for="option3">비공개</label></span>
            </li>
            <li>
                <label for="boardPostRegStartDt">등록일</label>
                <div class="flex_col"><span class="datepicker"><input type="text" value="시작일" id="boardPostRegStartDt" class="datepick"><img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="선택" title="선택"></span> ~ <span class="datepicker"><input type="text" value="종료일" id="boardPostRegEndDt" class="datepick"><img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="선택" title="선택"></span></div>
            </li>            
        </ul>
        <div class="s_wrap"><a id="qna_btn_search" class="btn_search" href="javascript:;"><span>검색</span></a></div>
    </div>

    <hr class="h_bg_type">

    <div class="sub_cont_wrap">
        <div class="table_desc">
            <p>총 <strong id="total_count" th:text="${boardPostList != null ? boardPostList.total : 0}">0</strong>건</p>
            <div class="table_top_btn">
            	<a href="javascript:;" id="qnaBoardAdminexlDownBtn" class="s_btn_basic download"><span>엑셀 다운로드</span></a>
            </div>
        </div>

        <div class="table_layout02 list_type mb20">
            <table>
                <caption th:text="${boardInfo.bbsNm} + ' 리스트'">리스트</caption>
                <colgroup>
                    <col style="width: 80px;">
                    <col th:if="${boardInfo.ctgryYn == 'Y'}" style="width: 120px;">
                    <col style="width: auto;">
                    <col style="width: 100px;">
                    <col style="width: 120px;">
                    <col style="width: 100px;">
                    <col style="width: 100px;">
                </colgroup>
                <thead>
                <tr>
                    <th scope="col">번호</th>
                    <th scope="col" th:if="${boardInfo.ctgryYn == 'Y'}">분류</th>
                    <th scope="col">제목</th>
                    <th scope="col">답변상태</th>
                    <th scope="col">등록일</th>
                    <th scope="col">조회수</th>
                    <th scope="col">사용여부</th>
                </tr>
                </thead>
                <tbody id="qna_board_tbody">
                <tr th:if="${boardPostList == null or boardPostList.list == null or boardPostList.list.isEmpty()}">
                    <td class="tac" th:colspan="${boardInfo.ctgryYn == 'Y' ? 7 : 6}">조회된 결과가 없습니다.</td>
                </tr>

                <th:block th:if="${boardPostList != null and boardPostList.list != null}">
                    <tr th:each="item : ${boardPostList.list}">
                        <td th:text="${item.bbsPstOid}"></td>
                        <td th:if="${boardInfo.ctgryYn == 'Y'}" th:text="${item.ctgry}"></td>
                        <td class="tal">
                            <a href="javascript:" class="a_link qna_link" th:data-id="${item.bbsPstOid}">
                                <i th:if="${item.prvtPstYn == 'Y'}" class="px_lock">잠금</i>
                                <span th:text="${item.bbsPstTtl}"></span>
                            </a>
                        </td>
                        <td>
							<span th:class="${(item.answers != null && item.answers.answerStatus == '완료') or (item.answers == null and item.qnaStatus == '완료') ? 'status_end' : 'status_ing'}"
							          th:text="${item.answers != null && item.answers.answerStatus != null ? item.answers.answerStatus : (item.qnaStatus != null ? item.qnaStatus : (item.answerYn == 'Y' ? '완료' : '대기'))}">
						    </span>
                        </td>
                        <td th:text="${#temporals.format(item.regDt, 'yyyy-MM-dd')}"></td>
                        <td th:text="${item.inqCnt}">0</td>
                        <td th:text="${item.delYn == 'N' ? '사용': '삭제'}">0</td>
                    </tr>
                </th:block>
                </tbody>
            </table>
        </div>

        <div id="paging_wrap" class="paging_wrap">
            <a href="javascript:" class="first page_first">첫 페이지</a>
            <a href="javascript:" class="previous page_prev">전 페이지</a>
            <div class="namber pagination_container"></div>
            <a href="javascript:" class="next page_next">다음 페이지</a>
            <a href="javascript:" class="last page_last">끝 페이지</a>
        </div>
    </div>
</div>

<th:block layout:fragment="main_modal">
    <th:block th:replace="~{portal/modal/qna_secret :: qna_secret}"></th:block>
</th:block>

<script layout:fragment="scripts" th:inline="javascript" type="text/javascript">
    const admin_qna_board = {
        state: {
            all: /*[[${boardPostList}]]*/ {},
            config: /*[[${boardInfo}]]*/ {},
            reqDto: /*[[${boardRequestDto}]]*/ {},
            pageIndex: 1,
            pageCnt: /*[[${boardInfo.pageCnt}]]*/ 10,
            pagingCnt: /*[[${boardInfo.pagingCnt}]]*/ 5
        },

        /**
         * 검색조건 저장 키 (bbsOid별로 구분)
         */
        getSearchStateId: function () {
            return 'qna_board_' + this.state.config.bbsOid;
        },

        init: function () {
        	const _this = this;
        	
        	uiCommon.datepicker.init('#boardPostRegStartDt', {
                onSelect: function(selectedDate, inst) {
                    const startDate = $(this).datepicker('getDate');
                    const endDatePicker = $('#boardPostRegEndDt');
                    
                    // 종료일의 최소 선택 가능 날짜를 시작일로 설정
                    endDatePicker.datepicker('option', 'minDate', startDate);
                    
                    const currentEndDate = endDatePicker.datepicker('getDate');
                    // 시작일이 종료일보다 미래일 경우, 종료일을 시작일로 강제 변경
                    if (currentEndDate && startDate && startDate.getTime() > currentEndDate.getTime()) {
                        endDatePicker.datepicker('setDate', startDate);
                    }
                    
                    // 날짜 변경 시 자동 검색
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });

            uiCommon.datepicker.init('#boardPostRegEndDt', {
                onSelect: function(selectedDate, inst) {
                    const endDate = $(this).datepicker('getDate');
                    const startDatePicker = $('#boardPostRegStartDt');
                    
                    // 시작일의 최대 선택 가능 날짜를 종료일로 설정
                    startDatePicker.datepicker('option', 'maxDate', endDate);
                    
                    const currentStartDate = startDatePicker.datepicker('getDate');
                    // 종료일이 시작일보다 과거일 경우, 시작일을 종료일로 강제 변경
                    if (currentStartDate && endDate && endDate.getTime() < currentStartDate.getTime()) {
                        startDatePicker.datepicker('setDate', endDate);
                    }
                    
                    // 날짜 변경 시 자동 검색
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });

            // 저장된 검색조건 복원 또는 기본값 설정
            const saved = SearchState.restoreForm(this.getSearchStateId(), '.search_wrap');
            if (saved) {
                this.state.pageIndex = saved._extra.pageIndex || 1;
            } else {
                const today = new Date();
                const weekAgo = new Date();
                weekAgo.setDate(today.getDate() - 7);
                $('#boardPostRegStartDt').datepicker('setDate', weekAgo);
                $('#boardPostRegEndDt').datepicker('setDate', today);
            }

            this.initEvent();
            this.getListData();
        },

        initEvent: function () {
            const _this = this;
            
         	// 공개여부 라디오 버튼 변경 시 자동 검색
            const radioButtons = document.querySelectorAll('input[name="radio_01"]');
            radioButtons.forEach(radio => {
                radio.addEventListener('change', function () {
                    _this.state.pageIndex = 1;
                    _this.getListData();
                });
            });

            // 검색 버튼
            document.getElementById('qna_btn_search').addEventListener('click', function () {
                _this.state.pageIndex = 1;
                _this.getListData();
            });

            // 엔터키 검색
            document.getElementById('qna_keyword').addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });

            // 분류 변경 시 검색
            const categorySelect = document.getElementById("search_category");
            if(categorySelect) {
                categorySelect.addEventListener('change', function () {
                    _this.state.pageIndex = 1;
                    _this.getListData();
                });
            }

            // 상세 이동 (이벤트 위임)
            document.getElementById('qna_board_tbody').addEventListener('click', function(e) {
                const link = e.target.closest('.qna_link');
                if(link) {
                    _this.fnGoToDetail(link.dataset.id);
                }
            });
            
         	// 엑셀 다운로드 버튼 클릭
            $("#qnaBoardAdminexlDownBtn").off("click").on("click", async function (e) {
                e.preventDefault();
                
                const reason = await uiCommon.fnShowPromptModal('엑셀 다운로드 받으시겠습니까?', {
                    title: '엑셀 다운로드 요청',
                    defaultValue: '',
                    placeholder: '사유 입력',
                });

                
                // 취소 시 조용히 종료
                if (reason === null) {
                    return;
                }

                // 빈 값 체크
                if (reason.trim() === '') {
                    uiCommon.fnShowAlertModal('사유는 필수 입니다.');
                    return;
                }

                // 2자 미만 체크
                if (reason.trim().length < 2) {
                    uiCommon.fnShowAlertModal('사유는 2자 이상 입력해주세요.');
                    return;
                }
                const params = {
                    pageId: 'boardQna',
                    bbsOid: _this.state.config.bbsOid,
                    menuCd: _this.state.reqDto.menuCd,
                    page: _this.state.pageIndex,
                    size: _this.state.pageCnt,
                    keyword: document.getElementById('qna_keyword').value.trim(),
                    searchType: document.getElementById('qna_search_type').value,
                    ctgry: document.getElementById('search_category') ? document.getElementById('search_category').value : '',
              		regStartDt: document.getElementById('boardPostRegStartDt').value || '',
                    regEndDt: document.getElementById('boardPostRegEndDt').value || '',
                    prvtPstYn: document.querySelector('input[name="radio_01"]:checked').value || '',
                    isAdmin: 'Y',
                    reason: reason
                };

                try{
                    await API.excelDownload('/api/common/board/excel/export', params);
                } catch(err) {
                    console.error(err);
                    uiCommon.fnShowAlertModal("[error] : " + err, () => uiCommon.fnHideAlertModal());
                }
            });
        },

        getListData: async function () {
            const _this = this;

            // 검색조건 저장
            SearchState.saveForm(_this.getSearchStateId(), '.search_wrap', { pageIndex: _this.state.pageIndex });

            const param = new URLSearchParams({
                bbsOid: _this.state.config.bbsOid,
                menuCd: _this.state.reqDto.menuCd,
                page: _this.state.pageIndex,
                size: _this.state.pageCnt,
                keyword: document.getElementById('qna_keyword').value.trim(),
                searchType: document.getElementById('qna_search_type').value,
                ctgry: document.getElementById('search_category') ? document.getElementById('search_category').value : '',
                regStartDt: document.getElementById('boardPostRegStartDt').value || '',
                regEndDt: document.getElementById('boardPostRegEndDt').value || '',
                prvtPstYn: document.querySelector('input[name="radio_01"]:checked').value || '',
                isAdmin: 'Y'
            });

            try {
                const response = await API.get('/api/admin/board/list/filter?' + param);
                _this.state.all = response;
                _this.renderQnaList();
                _this.renderPagination();
                document.getElementById('total_count').innerText = response.total || 0;
            } catch (error) {
                console.error('Q&A 목록 조회 실패:', error);
            }
        },

        renderQnaList: function () {
            const _this = this;
            const tbody = document.getElementById('qna_board_tbody');
            tbody.innerHTML = '';

            const list = _this.state.all.list || [];
            if (list.length === 0) {
                const colSpan = _this.state.config.ctgryYn === 'Y' ? 7 : 6;
                tbody.innerHTML = `<tr><td class="tac" colspan="${colSpan}">조회된 결과가 없습니다.</td></tr>`;
                return;
            }

            let html = '';
            list.forEach(item => {
                const categoryTd = _this.state.config.ctgryYn === 'Y' ? `<td>${item.ctgry || '-'}</td>` : '';
                const lockIcon = item.prvtPstYn === 'Y' ? '<i class="px_lock">잠금</i> ' : '';
                const regDate = common.formatDate(item.regDt);

                let displayStatus = "";

                if (item.answers && item.answers.answerStatus) {
                    displayStatus = item.answers.answerStatus;
                } else {
                    displayStatus = item.qnaStatus;
                }

                const statusClass = (displayStatus === '완료') ? 'status_end' : 'status_ing';

                html += `
                    <tr>
                        <td>${item.bbsPstOid}</td>
                        ${categoryTd}
                        <td class="tal">
                            <a href="javascript:;" class="a_link qna_link" data-id="${item.bbsPstOid}">
                                ${lockIcon}${item.bbsPstTtl}
                            </a>
                        </td>
                        <td><span class="${statusClass}">${displayStatus}</span></td>
                        <td>${regDate}</td>
                        <td>${item.inqCnt || 0}</td>
                        <td>${item.delYn == 'N' ? '사용': '삭제' || 0}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        },

        renderPagination: function () {
            const _this = this;
            if (!_this.state.all) return;

            uiCommon.pagination.render({
                currentPage: _this.state.pageIndex,
                totalPages: _this.state.all.pages || 1,
                onPageChange: function(page) {
                    _this.state.pageIndex = page;
                    _this.getListData();
                }
            });
        },

        fnGoToDetail: async function (bbsPstOid) {
            const menuCd = this.state.reqDto.menuCd;
            await this.updateViewCount(bbsPstOid);

            // 관리자 페이지이므로 상세 이동 시 비밀번호 체크 로직을 생략하거나 간소화할 수 있습니다.
            // 여기서는 기존 본인/세션 체크 API를 호출하되, 관리자 권한이므로 컨트롤러에서 통과될 것입니다.
            location.href = `${contextPath}/admin/board/post?menuCd=${menuCd}&bbsOid=${this.state.config.bbsOid}&bbsPstOid=${bbsPstOid}`;
        },

        fnGoToWrite: function () {
            const menuCd = this.state.reqDto.menuCd;
            location.href = `${contextPath}/admin/board/write?menuCd=${menuCd}&bbsOid=${this.state.config.bbsOid}`;
        },

        updateViewCount: async function (bbsPstOid) {
            if(!bbsPstOid) return;

            try {
                const param = {
                    bbsPstOid: bbsPstOid,
                    menuCd: this.state.reqDto.menuCd
                }

                await API.patch('/api/admin/board/view-count', param);
            } catch (error) {
                console.error('조회수 증가 실패:', error);
            }
        }
    }

    $(document).ready(function () {
        admin_qna_board.init();
    });
</script>
</body>
</html>
