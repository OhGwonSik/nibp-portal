<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin_layout}">
<head>
    <meta charset="UTF-8">
    <title>Q&A 상세</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div layout:fragment="admin_content" class="right_wrap">
    <div class="sub_cont_wrap">
        <h3 class="stit">Q&amp;A</h3>

        <!-- Q&A 질문 테이블 -->
        <h3 class="ssstit">Q&amp;A 문의</h3>
        <div class="table_layout02 has_editor">
            <table>
                <caption>Q&amp;A 질문 테이블</caption>
                <colgroup>
                    <col style="width: 150px;">
                    <col style="width: auto;">
                </colgroup>
                <tbody>
                <tr>
                    <th scope="row">등록일</th>
                    <td th:text="${#temporals.format(post?.regDt, 'yyyy-MM-dd')}">-</td>
                </tr>
				<tr>
				    <th scope="row">문의 구분</th>
				    <td>
				        <select id="qna_category" class="w50" title="분류 선택">
				            <option value="">미지정</option>
				            <option th:each="cat : ${#strings.arraySplit(boardInfo?.ctgryList, ',')}"
				                    th:value="${#strings.trim(cat)}" 
				                    th:text="${#strings.trim(cat)}"
				                    th:selected="${#strings.trim(cat) == post?.ctgry}">
				            </option>
				        </select>
				    </td>
				</tr>
                <tr>
                    <th scope="row">제목</th>
                    <td th:text="${post?.bbsPstTtl}">-</td>
                </tr>
                <tr>
                    <th scope="row">내용</th>
                    <td class="post-content" th:utext="${post?.bbsPstCn}">-</td>
                </tr>
                </tbody>
            </table>
            <span class="scroll_img">스크롤</span>
        </div>

        <!-- Q&A 답변 작성 영역 -->
        <h3 class="stit mt30">Q&amp;A 답변</h3>
        <div class="table_layout02">
            <table>
                <caption>Q&amp;A 답변 테이블</caption>
                <colgroup>
                    <col style="width: 150px;">
                    <col style="width: auto;">
                </colgroup>
                <tbody>
                <tr>
                    <th scope="row"><label for="qna_answer_editor">답변내용</label></th>
                    <td>
                        <textarea name="qna_answer_editor" id="qna_answer_editor" rows="30"></textarea>
                    </td>
                </tr>
                <tr>
                    <th scope="row">답변일시</th>
                    <td id="admin_qna_answer_upd_dt">-</td>
                </tr>
                <tr>
                    <th scope="row">파일첨부</th>
                    <td>
                        <div id="admin_qna_answer_file_list" class="flex_col file_list"></div>
                        <div class="file_upload">
                            <label for="admin_qna_answer_file"><span>파일찾기</span></label>
                            <input type="file" id="admin_qna_answer_file" multiple>
                            <span id="admin_qna_answer_file_text" class="file_txt">파일을 첨부해주세요</span>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
            <span class="scroll_img">스크롤</span>
        </div>

        <div class="btn_wrap mt20">
            <a href="javascript:;" id="btn_qna_list" class="btn_basic bg_type01">목록</a>
            <a href="javascript:;" id="btn_qna_answer_tmp_save" class="btn_basic bg_type01">답변 초안 저장</a>
            <a href="javascript:;" id="btn_qna_answer_save" class="btn_basic bg_type01">답변 저장</a>
            <a href="javascript:;" id="btn_qna_delete" class="btn_basic line_type02">삭제</a>
        </div>
    </div>
</div>
<script layout:fragment="scripts" th:inline="javascript" type="text/javascript">
    const admin_qna_board_post = {
        state: {
            post: /*[[${post}]]*/ {},
            boardInfo: /*[[${boardInfo}]]*/ {},
            reqDto: /*[[${boardRequestDto}]]*/ {},
            targetBoardMenu: /*[[${targetBoardMenu}]]*/ {},
            answerFiles: [],
            existingAnswerFiles: /*[[${fileList}]]*/ [],
            deletedAnswerFiles: [],
            editorFiles: [],
            maxFileSize: /*[[${maxFileSize}]]*/ 10,
            allowedExtensions: /*[[${allowedExtensions}]]*/ '',
            strgFilePath: /*[[${basicFilePath}]]*/ ''
        },

        init: async function () {
            await this.initCkEditor();
            this.initEvent();
            this.loadAnswerData();
        },

        initEvent: function () {
            const _this = this;

            // 목록 버튼
            $('#btn_qna_list').on('click', function (e) {
                e.preventDefault();
                _this.fnGoToListPage();
            });

            // 삭제 버튼
            $('#btn_qna_delete').on('click', function (e) {
                e.preventDefault();
                _this.fnDeleteQuestion();
            });
            
            // 답변 초안 저장 버튼
            $('#btn_qna_answer_tmp_save').on('click', function (e) {
                e.preventDefault();
                _this.fnSaveAnswer('Y'); // 임시저장
            });

            // 답변 저장 버튼
            $('#btn_qna_answer_save').on('click', function (e) {
                e.preventDefault();
                _this.fnSaveAnswer('N'); // 최종저장
            });

            // 답변 파일 선택
            $('#admin_qna_answer_file').off('change').on('change', function (e) {
                _this.fnHandleFileSelect(e);
            });

            // 파일 삭제 (이벤트 위임)
            $('#admin_qna_answer_file_list').on('click', '.icon_del', function (e) {
                e.preventDefault();
                const $p = $(this).closest('p');
                const fileType = $p.data('file-type');
                if (fileType === 'existing') {
                    _this.fnDeleteExistingFile($p.data('file-attach-no'));
                } else {
                    _this.fnDeleteFile($p.data('file-index'));
                }
            });
        },

        initCkEditor: function () {
            CommonCKEditor.destroy('qna_answer_editor');
            $('#qna_answer_editor').show().css('visibility', 'visible');
            return CommonCKEditor.init({
                editorId: 'qna_answer_editor',
                content: '',
                chunkUpload: {
                    enabled: true,
                    chunkUrl: '/api/common/file/tmp/ck-image/chunk',
                    chunkSize: 2 * 1024 * 1024,
                    onUploadComplete: (payload) => {
                        this.handleEditorUploadComplete(payload);
                    }
                },
                config: {
                    height: 300
                }
            });
        },

        loadAnswerData: function () {
            const post = this.state.post;
            if (post && post.answers) {
                const answer = Array.isArray(post.answers) ? post.answers[0] : post.answers;
                
                if (answer && answer.bbsPstOid) {
                    CommonCKEditor.setContent('qna_answer_editor', answer.bbsPstCn || '');
                    $('#admin_qna_answer_upd_dt').text(answer.mdfcnDt ? common.formatDateTime(answer.mdfcnDt) : '-');

                    if (this.state.existingAnswerFiles && this.state.existingAnswerFiles.length > 0) {
                        this.fnRenderAnswerFiles();
                    }
                }
            }
        },

        fnDeleteQuestion: function () {
            const _this = this;
            uiCommon.fnShowConfirmModal('해당 Q&A 문의를 삭제하시겠습니까?', async function () {
                uiCommon.fnHideConfirmModal();
                try {
                    const param = {
                        bbsOid: _this.state.boardInfo.bbsOid,
                        bbsPstOid: _this.state.post.bbsPstOid
                    };
                    await API.patch('/api/admin/board/delete', [param]);
                    uiCommon.fnShowAlertModal('삭제되었습니다.', () => _this.fnGoToListPage());
                } catch (error) {
                    console.error('삭제 실패:', error);
                    uiCommon.fnShowAlertModal('삭제에 실패했습니다.');
                }
            });
        },

        fnSaveAnswer: async function (tempSaveYn) {
            const _this = this;
            const answerTitle = '답변';
            const answerContent = CommonCKEditor.getContent('qna_answer_editor');

            if (!answerContent) {
                uiCommon.fnShowAlertModal('답변 내용을 입력해 주세요.');
                return;
            }
            
            tempSaveYn = tempSaveYn || 'N';
            
            const formData = new FormData();

            // 기존 답변이 있는 경우 답변 번호 포함
            let answerBbsPstOid = null;
            if (_this.state.post.answers) {
                answerBbsPstOid = _this.state.post.answers.bbsPstOid;
            }
            const menuCd= this.state.targetBoardMenu.menuCd;
            
            const data = {
                bbsPstOid: answerBbsPstOid,
                upBbsPstOid: _this.state.post.bbsPstOid,
                bbsOid: _this.state.boardInfo.bbsOid,
                bbsPstTtl: answerTitle,
                bbsPstCn: answerContent,
                ctgry: document.getElementById('qna_category').value || '',
                deleteAttachNos : _this.state.deletedAnswerFiles,
                editorFiles: _this.state.editorFiles,
                menuCd: menuCd,
                tempSaveYn: tempSaveYn
            };

            formData.append('data', new Blob([JSON.stringify(data)], { type: 'application/json' }));

            if (_this.state.answerFiles.length > 0) {
                _this.state.answerFiles.forEach(file => {
                    formData.append('files', file);
                });
            }
			const apiUrl = answerBbsPstOid ? '/api/admin/board/post/update/qna' : '/api/admin/board/post/insert/qna';
            try {
                await API.upload(apiUrl, formData);
                uiCommon.fnShowAlertModal('답변이 저장되었습니다.', () => window.location.href = `${contextPath}/admin/board?menuCd=${menuCd}&bbsOid=${this.state.boardInfo.bbsOid}`);
            } catch (error) {
                console.error('답변 저장 실패:', error);
                uiCommon.fnShowAlertModal('답변 저장에 실패했습니다.');
            }
        },

        fnHandleFileSelect: function (e) {
            const _this = this;
            const fileInput = e.target;
            const files = Array.from(fileInput.files);

            if (files.length === 0) return;

            const maxMb = _this.state.maxFileSize;
            const maxSize = maxMb * 1024 * 1024;
            const rawExtensions = _this.state.allowedExtensions;
            const allowedExtensions = rawExtensions.toLowerCase().split(',').map(ext => ext.trim());

            const validFiles = [];
            const rejectedFiles = [];

            files.forEach(file => {
                const fileExt = _this.extractFileExtension(file.name).toLowerCase();
                let reason = "";

                if (rawExtensions && !allowedExtensions.includes(fileExt)) {
                    reason = "허용되지 않는 확장자입니다.";
                } else if (file.size > maxSize) {
                    reason = "최대 " + maxMb + "MB까지만 업로드 가능합니다.";
                }

                if (reason) {
                    rejectedFiles.push(reason);
                } else {
                    validFiles.push(file);
                }
            });

            if (rejectedFiles.length > 0) {
                const errorMsg = rejectedFiles.join('\n');
                uiCommon.fnShowAlertModal(errorMsg, function() {
                    if (validFiles.length > 0) {
                        _this.fnApplyValidFiles(validFiles);
                    }
                });
            } else {
                this.fnApplyValidFiles(validFiles);
            }

            fileInput.value = '';
        },

        fnApplyValidFiles: function (validFiles) {
            validFiles.forEach(file => {
                this.state.answerFiles.push(file);
            });
            this.fnRenderAnswerFiles();
        },

        fnRenderAnswerFiles: function () {
            const fileListContainer = $('#admin_qna_answer_file_list');
            const existingFiles = this.state.existingAnswerFiles || [];
            let html = '';

            existingFiles.forEach((file, index) => {
                html += `<p data-file-type="existing" data-file-attach-no="${file.fileOid}">${file.orgnlFileNm || file.strgFileNm || '파일'} <a class="icon_del" href="javascript:;">파일삭제</a></p>`;
            });

            this.state.answerFiles.forEach((file, index) => {
                html += `<p data-file-type="new" data-file-index="${index}">${file.name} <a class="icon_del" href="javascript:;">파일삭제</a></p>`;
            });

            fileListContainer.html(html);
        },

        fnDeleteExistingFile: function (attachNo) {
            const _this = this;
            if (!attachNo) return;
            uiCommon.fnShowConfirmModal('해당 파일을 삭제하시겠습니까?', function(){
                uiCommon.fnHideConfirmModal();
                if (!_this.state.deletedAnswerFiles.includes(attachNo)) {
                    _this.state.deletedAnswerFiles.push(attachNo);
                }
                _this.state.existingAnswerFiles = _this.state.existingAnswerFiles.filter(file => file.fileOid !== attachNo);
                _this.fnRenderAnswerFiles();
            });
        },

        fnDeleteFile: function (index) {
            const _this = this;
            uiCommon.fnShowConfirmModal('해당 파일을 삭제하시겠습니까?', function(){
                uiCommon.fnHideConfirmModal();
                _this.state.answerFiles.splice(index, 1);
                _this.fnRenderAnswerFiles();
            });
        },

        extractFileExtension: function (fileName) {
            if (!fileName) return '';
            const pos = fileName.lastIndexOf('.');
            return pos > -1 ? fileName.substring(pos + 1).toLowerCase() : '';
        },

        handleEditorUploadComplete: function (payload) {
            if (!payload || !payload.strgFilePath || !payload.strgFileNm) {
                return;
            }
            const meta = {
                originalStrgFileNm: payload.originalStrgFileNm || payload.strgFileNm,
                storedStrgFileNm: payload.strgFileNm,
                strgFilePath: payload.strgFilePath,
                strgFileCpct: payload.strgFileCpct || null,
                fileTypeNm: payload.fileTypeNm || this.extractFileExtension(payload.originalStrgFileNm || payload.strgFileNm)
            };
            this.upsertEditorFile(meta);
        },

        upsertEditorFile: function (fileMeta) {
            if (!fileMeta || !fileMeta.strgFilePath || !fileMeta.storedStrgFileNm) {
                return;
            }
            const key = `${fileMeta.strgFilePath}__${fileMeta.storedStrgFileNm}`;
            const idx = this.state.editorFiles.findIndex(item => `${item.strgFilePath}__${item.storedStrgFileNm}` === key);
            if (idx > -1) {
                this.state.editorFiles[idx] = fileMeta;
            } else {
                this.state.editorFiles.push(fileMeta);
            }
        },

        fnGoToListPage: function () {
            const bbsOid = this.state.boardInfo.bbsOid;
            const menuCd = this.state.reqDto.menuCd;
            window.location.href = `${contextPath}/admin/board?bbsOid=${bbsOid}&menuCd=${menuCd}`;
        }
    };

    $(document).ready(function () {
        admin_qna_board_post.init();
    });
</script>
</body>
</html>
