<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin_layout}">
<head>
    <meta charset="UTF-8">
    <title>관리자정보수정</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style layout:fragment="style">
        .location {display: none;}
    </style>
</head>
<body>
<div layout:fragment="admin_content" class="right_wrap">
    <div class="sub_cont_wrap">
        <h3 class="stit">관리자정보수정</h3>
        <div id="mypageViewTable" class="table_layout02">
            <table>
                <caption>관리자정보수정</caption>
                <colgroup>
                    <col style="width: 150px;">
                    <col style="width: auto;">
                    <col style="width: 150px;">
                    <col style="width: auto;">
                </colgroup>
                <tbody id="mypageTbodyView"></tbody>
            </table>
        </div>
        <div id="mypageEditTable" class="table_layout02">
            <table>
                <caption>관리자정보수정</caption>
                <colgroup>
                    <col style="width: 150px;">
                    <col style="width: auto;">
                    <col style="width: 150px;">
                    <col style="width: auto;">
                </colgroup>
                <tbody id="mypageTbodyEdit">
                <tr>
                    <th scope="row"><label for="mypageUserNmKorn">성명(한글)</label></th>
                    <td><input type="text" name="" id="mypageUserNmKorn" value="" class="w100" minlength="1" maxlength="50"></td>
                    <th scope="row" class="point bl"><label for="mypageUserNmEn">성명(영문)</label></th>
                    <td><input type="text" name="" id="mypageUserNmEn" value="" class="w100" minlength="1" maxlength="50"></td>
                </tr>
                <tr>
                    <th scope="row" class="point"><label for="mypageUserBrdt">생년월일</label></th>
                    <td colspan="3">
                        <div class="flex_col "><input type="text" name="" id="mypageUserBrdt" value="" minlength="8" maxlength="8" pattern="^\d{8}$"> <p class="c_red">※ '-' 는 포함하지 않습니다.</p><p>예시)1981년 01월 01일 → 19810101</p></div>
                    </td>
                </tr>
                <tr>
                    <th scope="row" class="point"><label for="mypageUserId">아이디</label></th>
                    <td colspan="3">
                        <div class="flex_col "><input type="text" name="" id="mypageUserId" value="" disabled="" minlength="6" maxlength="10" pattern="^[a-zA-Z0-9]{6,10}$"> <p class="c_red">※ 6자 이상 10자 이하의 영문 또는 영문/숫자 조합</p></div>
                    </td>
                </tr>
                <tr>
                    <th scope="row" class="point"><label for="mypageEmlLocal">이메일</label></th>
                    <td colspan="3">
                        <div class="flex_col "><input type="text" name="" id="mypageEmlLocal" value=""> @ <input type="text" name="" id="mypageEmlDmn" value="">
                            <select id="mypageEmlInpTyp" title="">
                                <option value="직접입력" selected>직접입력</option>
                                <option value="gmail.com">gmail.com</option>
                                <option value="naver.com">naver.com</option>
                                <option value="hanmail.net">hanmail.net</option>
                                <option value="daum.net">daum.net</option>
                            </select>
                            <a href="javascript:;" id="mypageEmlDuplicationCheck" class="s_btn_basic bg_type02">중복확인</a>
                        </div>
                    </td>
                </tr>
                <tr>
                    <th scope="row" class="point"><label for="mypageMpnoPfx">휴대폰</label></th>
                    <td colspan="3">
                        <div class="flex_col ">
                            <input type="text" name="" id="mypageMpnoPfx" value="" minlength="3" maxlength="3" pattern="^[0-9]{3}$"> -
                            <input type="text" name="" id="mypageMpnoMid" value="" minlength="4" maxlength="4" pattern="^[0-9]{4}$"> -
                            <input type="text" name="" id="mypageMpnoSfx" value="" minlength="4" maxlength="4" pattern="^[0-9]{4}$">
                            <a href="javascript:;" id="mypageMpnoDuplicationCheck" class="s_btn_basic bg_type02">중복확인</a>
                        </div>
                    </td>
                </tr>
                <tr>
                    <th scope="row"><label for="mypageDeptNm">부서</label></th>
                    <td><input type="text" name="" id="mypageDeptNm" value="" class="w100"></td>
                    <th scope="row" class="bl"><label for="mypagePstnNm">직위</label></th>
                    <td><input type="text" name="" id="mypagePstnNm" value="" class="w100"></td>
                </tr>
                <tr>
                    <th scope="row"><label for="mypageUseYn">상태</label></th>
                    <td><input type="text" name="" id="mypageUseYn" value="" disabled="" class="w100"></td>
                    <th scope="row" class="bl"><label for="mypagePrivacyYn">개인정보취급권한</label></th>
                    <td><input type="text" name="" id="mypagePrivacyYn" value="" disabled="" class="w100"></td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="btn_wrap">
            <a href="javascript:;" id="mypageChangePwd" class="btn_basic bg_type01" style="display: none;">비밀번호변경</a>
            <a href="javascript:;" id="mypageUpdate" class="btn_basic bg_type01" style="display: none;">저장</a>
            <a href="javascript:;" id="mypageCancel" class="btn_basic bg_type02" style="display: none;">취소</a>
            <a href="javascript:;" id="mypageEdit" class="btn_basic bg_type02">수정</a>
        </div>
    </div>
</div>
<th:block layout:fragment="admin_modal">
    <th:block th:replace="~{admin/modal/change_pwd :: change_pwd}"></th:block>
</th:block>
<script layout:fragment="scripts" th:inline="javascript">
    const mypage = {
        state:{
          userInfo: {},
          isEditMode: false, // 수정 모드 여부
        },

        infoSelectors : {
            userNmKorn : "mypageUserNmKorn",
            userNmEng : "mypageUserNmEn",
            userBrdt : "mypageUserBrdt",
            userId : "mypageUserId",
            emlLocal : "mypageEmlLocal",
            emlDmn : "mypageEmlDmn",
            emlInpTyp : "mypageEmlInpTyp",
            mpnoPfx : "mypageMpnoPfx",
            mpnoMid : "mypageMpnoMid",
            mpnoSfx : "mypageMpnoSfx",
            deptNm : "mypageDeptNm",
            pstnNm : "mypagePstnNm",
            useYn : "mypageUseYn",
            privacyYn : "mypagePrivacyYn"
        },

        eventSelectors : {
            mypageEmlDuplicationCheck : "mypageEmlDuplicationCheck",
            mypageMpnoDuplicationCheck : "mypageMpnoDuplicationCheck",
            mypageChangePwd : "mypageChangePwd",
            mypageEdit : "mypageEdit",
            mypageUpdate : "mypageUpdate",
            mypageCancel : "mypageCancel",
            mypageUserBrdt : "mypageUserBrdt",
            mypageMpnoPfx : "mypageMpnoPfx",
            mypageMpnoMid : "mypageMpnoMid",
            mypageMpnoSfx : "mypageMpnoSfx",
            mypageEmlInpTyp : "mypageEmlInpTyp",
            mypageCurrentPwd : "mypageCurrentPwd",
            mypageNewPwd : "mypageNewPwd",
            mypageNewPwdConfirm : "mypageNewPwdConfirm"
        },

        init: async function() {
            try {
                const me = await this.fetchDetail();
                this.setInformations(me);
                this.setViewMode();
            } catch(e) {
                console.error("mypage init error", e);
                this.state.userInfo = {};
            }

            this.initEvent();
        },

        fetchDetail: async function() {
            const response = await API.get("/api/admin/mypage/select")
            this.state.userInfo = response;
            return response;
        },

        fetchUpdate: async function() {
            const _this = this;
            const data = {
                userNmKorn : document.getElementById(this.infoSelectors.userNmKorn).value,
                userNmEng : document.getElementById(this.infoSelectors.userNmEng).value,
                brdt : document.getElementById(this.infoSelectors.userBrdt).value,
                userId : document.getElementById(this.infoSelectors.userId).value,
                emlLocal : document.getElementById(this.infoSelectors.emlLocal).value,
                emlDmn : document.getElementById(this.infoSelectors.emlDmn).value,
                emlInpTyp : '직접입력' === document.getElementById(this.infoSelectors.emlInpTyp).value ? '직접입력' : '선택',
                mpnoPfx : document.getElementById(this.infoSelectors.mpnoPfx).value,
                mpnoMid : document.getElementById(this.infoSelectors.mpnoMid).value,
                mpnoSfx : document.getElementById(this.infoSelectors.mpnoSfx).value,
                deptNm : document.getElementById(this.infoSelectors.deptNm).value,
                pstnNm : document.getElementById(this.infoSelectors.pstnNm).value,
            };

            if(!this.validateUpdateData(data)) {
                return;
            }

            await uiCommon.fnShowConfirmModal("수정하시겠습니까?", async () => {
                uiCommon.fnHideConfirmModal();
                try {
                    const result = await API.put("/api/admin/mypage/update", data);
                    this.setInformations(result);
                    uiCommon.fnShowAlertModal("수정이 완료되었습니다.", () => _this.setViewMode());
                } catch(e) {
                    console.error("mypage fetchUpdate error", e);
                }
            });
        },

        checkEmailEvent: async function() {
            const _this = this;
            const emlLocal = document.getElementById(this.infoSelectors.emlLocal).value.trim();
            const emlDmn = document.getElementById(this.infoSelectors.emlDmn).value.trim();
            if (!emlLocal) {
                uiCommon.fnShowAlertModal("이메일을 입력하세요.");
                document.getElementById(this.infoSelectors.emlLocal).focus();
                return;
            }
            if (!emlDmn) {
                uiCommon.fnShowAlertModal("이메일을 입력하세요.");
                document.getElementById(this.infoSelectors.emlDmn).focus();
                return;
            }
            const data = {
                emlLcal : emlLocal,
                emlDmn : emlDmn,
                userOid : this.state.userInfo.userOid
            };

            const response = await API.post("/auth/admin/checkEmail", data);

            const message = response ? "이미 사용 중인 이메일입니다."
                    : "사용 가능한 이메일입니다.";

            const callback = async () => {
                _this.state.emailChecked = !response;
            };

            uiCommon.fnShowAlertModal(message, callback);
        },

        checkPhoneEvent: async function() {
            const _this = this;
            const mpnoPfx = document.getElementById(this.infoSelectors.mpnoPfx).value.trim();
            const mpnoMid = document.getElementById(this.infoSelectors.mpnoMid).value.trim();
            const mpnoSfx = document.getElementById(this.infoSelectors.mpnoSfx).value.trim();
            if (!mpnoPfx || !mpnoMid || !mpnoSfx) {
                uiCommon.fnShowAlertModal("휴대폰 번호를 입력하세요.");
                document.getElementById(this.infoSelectors.mpnoPfx).focus();
                return;
            }
            const data = {
                mpnoPfx : mpnoPfx,
                mpnoMid : mpnoMid,
                mpnoSfx : mpnoSfx,
                userOid : this.state.userInfo.userOid
            };

            const response = await API.post("/auth/admin/checkPhone", data);

            const message = response ? "이미 사용 중인 휴대폰 번호입니다."
                                     : "사용 가능한 휴대폰 번호입니다.";

            const callback = async () => {
                _this.state.phoneChecked = !response;
            };

            uiCommon.fnShowAlertModal(message, callback);
        },

        setInformations: function(data) {
            const _this = this;
            this.state.userInfo = data; // 리스트 저장
            const infoSelectors = _this.infoSelectors;

            document.getElementById(infoSelectors.userNmKorn).value = data.userNmKorn;
            document.getElementById(infoSelectors.userNmEng).value = data.userNmEng;
            document.getElementById(infoSelectors.userBrdt).value = data.brdt;
            document.getElementById(infoSelectors.userId).value = data.userId;
            document.getElementById(infoSelectors.emlLocal).value = data.emlLcal;
            document.getElementById(infoSelectors.emlDmn).value = data.emlDmn;
            if("직접입력" === data.emlInpTyp) {
                document.getElementById(infoSelectors.emlInpTyp).value = "직접입력";
            } else {
                document.getElementById(infoSelectors.emlInpTyp).value = data.emlDmn;
            }
            document.getElementById(infoSelectors.mpnoPfx).value = data.mpnoPfx;
            document.getElementById(infoSelectors.mpnoMid).value = data.mpnoMid;
            document.getElementById(infoSelectors.mpnoSfx).value = data.mpnoSfx;
            document.getElementById(infoSelectors.deptNm).value = data.deptNm;
            document.getElementById(infoSelectors.pstnNm).value = data.jbpsNm;
            
            if("Y" === data.useYn) {
                document.getElementById(infoSelectors.useYn).value = '활성';
            } else if("N" === data.useYn) {
                document.getElementById(infoSelectors.useYn).value = '비활성';
            } else {
                document.getElementById(infoSelectors.useYn).value = '';
            }

            if("Y" === data.prvcUseYn) {
                document.getElementById(infoSelectors.privacyYn).value = '활성';
            } else if("N" === data.prvcUseYn) {
                document.getElementById(infoSelectors.privacyYn).value = '비활성';
            } else {
                document.getElementById(infoSelectors.privacyYn).value = '';
            }
        },

        emailComboEvent: function() {
            const _this = this;
            const value = document.getElementById(_this.eventSelectors.mypageEmlInpTyp).value;

            if("직접입력" === value) {
                document.getElementById(_this.infoSelectors.emlDmn).value = "";
                document.getElementById(_this.infoSelectors.emlDmn).readOnly = false;
                document.getElementById(_this.infoSelectors.emlDmn).removeAttribute("disabled");
            } else {
                document.getElementById(_this.infoSelectors.emlDmn).value = value;
                document.getElementById(_this.infoSelectors.emlDmn).readOnly = true;
                document.getElementById(_this.infoSelectors.emlDmn).setAttribute("disabled", "disabled");
            }
        },

        initEvent: function() {
            const _this = this;
            const eventSelectors = _this.eventSelectors;
            const infoSelectors = _this.infoSelectors;

            // 수정 모드 전환 버튼
            document.getElementById(eventSelectors.mypageEdit).addEventListener("click", function(e){
                e.preventDefault();
                _this.setEditMode();
            });

            document.getElementById(eventSelectors.mypageEmlDuplicationCheck).addEventListener("click", function(e){
                e.preventDefault();
                _this.checkEmailEvent();
            }); // 이메일 중복체크
            document.getElementById(eventSelectors.mypageMpnoDuplicationCheck).addEventListener("click", function(e){
                e.preventDefault();
                _this.checkPhoneEvent();
            }); // 휴대폰 중복체크
            document.getElementById(eventSelectors.mypageChangePwd).addEventListener("click", function(e){
                e.preventDefault();
                _this.changePwdEvent();
            }); // 비밀번호 변경 버튼
            document.getElementById(eventSelectors.mypageUpdate).addEventListener("click", function(e){
                e.preventDefault();
                _this.saveBntEvent();
            }); // 저장 버튼
            document.getElementById(eventSelectors.mypageCancel).addEventListener("click", function(e){
                e.preventDefault();
                _this.cancelBntEvent();
            }); // 취소 버튼
            document.getElementById(eventSelectors.mypageEmlInpTyp).addEventListener("change", function(e){
                e.preventDefault();
                _this.emailComboEvent();
            }); // 이메일 입력 타입 변경
        },

        validateUpdateData: function(data) {
            // 필수값 체크
            const requiredFields = {
                "userNmKorn" : "이름(한글)",
                "userNmEng" : "이름(영어)",
                "brdt" : "생년월일",
                "userId" : "아이디",
                "emlLocal" : "이메일(이메일)",
                "emlDmn" : "이메일(도메인)",
                "emlInpTyp" : "이메일(입력타입)",
                "mpnoPfx" : "휴대폰(앞자리)",
                "mpnoMid" : "휴대폰(중간자리)",
                "mpnoSfx" : "휴대폰(마지막자리)"
            };

            for (const [key, value] of Object.entries(requiredFields)) {
                if (!data[key]) {
                    uiCommon.fnShowAlertModal(`${value}은(는) 필수 입력값입니다.`);
                    return false;
                }
            }

            if(!common.checkMinString(data.userNmKorn, 2) && !common.checkMaxString(data.userNmKorn, 50)) {
                uiCommon.fnShowAlertModal("이름은 2자리 이상 50자리 이하로 입력해주세요.");
                return false;
            }
            if(!common.checkMinString(data.userNmEng, 2) && !common.checkMaxString(data.userNmEng, 50)) {
                uiCommon.fnShowAlertModal("이름은 2자리 이상 50자리 이하로 입력해주세요.");
                return false;
            }

            if(!common.regBirth(data.brdt)) {
                uiCommon.fnShowAlertModal("생년월일은 YYYYMMDD 형식으로 입력해주세요.");
                return false;
            }

            if(!common.regEmail(data.emlLcal + "@" + data.emlDmn)) {
                uiCommon.fnShowAlertModal("올바르지 않는 이메일 입니다.");
                return false;
            }

            if(!common.regMobileNumber(data.mpnoPfx, data.mpnoMid, data.mpnoSfx)) {
                uiCommon.fnShowAlertModal("올바르지 않는 휴대폰 번호 입니다.");
                return false;
            }

            return true;
        },

        /**
         * 상세보기 모드 설정 (텍스트 렌더링)
         */
        setViewMode: function() {
            const _this = this;
            this.state.isEditMode = false;
            const data = this.state.userInfo;
            const table = document.getElementById('mypageViewTable');
            const tableEdit = document.getElementById('mypageEditTable');
            const tbody = document.getElementById('mypageTbodyView');
            table.style.display = 'block';
            tableEdit.style.display = 'none';

            // 1. mypageTbody 비우기
            tbody.innerHTML = '';

            // 2. 상세보기 모드 HTML 렌더링
            tbody.innerHTML = `
                <tr>
                    <th scope="row"><label for="mypageUserNmKorn">성명(한글)</label></th>
                    <td>${data.userNmKorn}</td>
                    <th scope="row" class="point bl"><label for="mypageUserNmEn">성명(영문)</label></th>
                    <td>${data.userNmEng}</td>
                </tr>
                <tr>
                    <th scope="row" class="point"><label for="mypageUserBrdt">생년월일</label></th>
                    <td colspan="3">
                        <div class="flex_col ">${data.brdt || ''}</div>
                    </td>
                </tr>
                <tr>
                    <th scope="row" class="point"><label for="mypageUserId">아이디</label></th>
                    <td colspan="3">
                        <div class="flex_col ">${data.userId}</div>
                    </td>
                </tr>
                <tr>
                    <th scope="row" class="point"><label for="mypageEmlLocal">이메일</label></th>
                    <td colspan="3">
                        <div class="flex_col ">${common.joinEmail(data.emlLcal, data.emlDmn) ?? ''}</div>
                    </td>
                </tr>
                <tr>
                    <th scope="row" class="point"><label for="mypageMpnoPfx">휴대폰</label></th>
                    <td colspan="3">
                        <div class="flex_col ">${common.joinPhoneNumber(data.mpnoPfx, data.mpnoMid, data.mpnoSfx)}</div>
                    </td>
                </tr>
                <tr>
                    <th scope="row"><label for="mypageDeptNm">부서</label></th>
                    <td>${data.deptNm}</td>
                    <th scope="row" class="bl"><label for="mypagePstnNm">직위</label></th>
                    <td>${data.jbpsNm}</td>
                </tr>
                <tr>
                    <th scope="row"><label for="mypageUseYn">상태</label></th>
                    <td>${data.useYn}</td>
                    <th scope="row" class="bl"><label for="mypagePrivacyYn">개인정보취급권한</label></th>
                    <td>${data.prvcUseYn}</td>
                </tr>
            `;

            // 3. 버튼 표시 전환
            document.getElementById(_this.eventSelectors.mypageEdit).style.display = 'inline-block';
            document.getElementById(_this.eventSelectors.mypageUpdate).style.display = 'none';
            document.getElementById(_this.eventSelectors.mypageCancel).style.display = 'none';
            document.getElementById(_this.eventSelectors.mypageChangePwd).style.display = 'none'; // 비밀번호 변경 버튼 숨김
        },

        /**
         * 수정 모드 설정
         */
        setEditMode: function() {
            const _this = this;
            this.state.isEditMode = true;
            const table = document.getElementById('mypageEditTable');
            const tableView = document.getElementById('mypageViewTable');
            table.style.display = 'block';
            tableView.style.display = 'none';

            // 중복확인 버튼 표시
            document.getElementById(_this.eventSelectors.mypageEmlDuplicationCheck).style.display = 'inline-block';
            document.getElementById(_this.eventSelectors.mypageMpnoDuplicationCheck).style.display = 'inline-block';

            // 버튼 표시 전환
            document.getElementById(_this.eventSelectors.mypageEdit).style.display = 'none';
            document.getElementById(_this.eventSelectors.mypageUpdate).style.display = 'inline-block';
            document.getElementById(_this.eventSelectors.mypageCancel).style.display = 'inline-block';
            document.getElementById(_this.eventSelectors.mypageChangePwd).style.display = 'inline-block';
        },

        cancelBntEvent: function(){
            this.setInformations(this.state.userInfo);
            this.setViewMode(); // 취소 시 상세보기 모드로 전환
        },
        saveBntEvent: async function(){
            await this.fetchUpdate();
        },
        changePwdEvent: function(){
            change_pwd.initModal();
        }
    };

    document.addEventListener("DOMContentLoaded", function() {
       mypage.init(); 
    });
</script>
</body>
</html>
