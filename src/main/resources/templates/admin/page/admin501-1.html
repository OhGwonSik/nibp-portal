<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin_layout}">
<head>
    <meta charset="UTF-8">
    <title>만족도 조사 > 설문 > 설문등록/수정</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div layout:fragment="admin_content" class="right_wrap">
    <div class="sub_cont_wrap">
        <div class="table_layout02 mb10">
            <table>
                <caption>설문등록</caption>
                <colgroup>
                    <col style="width: 170px;">
                    <col style="width: auto;">
                </colgroup>
                <tbody>
	                <tr>
	                    <th scope="row"><label for="lab_01">설문 제목</label></th>
	                    <td>
	                        <input type="text" id="lab_01" title="설문 제목" class="w100">
	                    </td>
	                </tr>
	                <tr>
	                    <th scope="row"><label for="admin5011EduOrgStartDt">설문 기간</label></th>
	                    <td>
	                        <div class="flex_col"><span class="datepicker"><input type="text" value="시작일"
	                                                                              id="admin5011EduOrgStartDt"
	                                                                              class="datepick"><img
	                                class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="선택"
	                                title="선택"></span> ~ <span class="datepicker"><input type="text" value="종료일"
	                                                                                     id="admin5011EduOrgEndDt"
	                                                                                     class="datepick"><img
	                                class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="선택"
	                                title="선택"></span></div>
	                    </td>
	                </tr>
	                <tr>
	                    <th scope="row"><label>설문 유형</label></th>
	                    <td>
	                        <span class="radio-box"><input type="radio" id="survey_type_01" name="survey_type"
	                                                       value="COMMON" checked><label for="survey_type_01">일반
	                            설문 </label></span>
	                    </td>
	                </tr>
	                <tr>
	                    <th scope="row"><label>설문 대상</label></th>
	                    <td>
	                        <span class="radio-box"><input type="radio" id="radio_01_01" name="radio_01" value="ALL"
	                                                       checked><label for="radio_01_01">비회원 (로그인 불필요)</label></span>
	                    </td>
	                </tr>
	                <tr>
	                    <th scope="row"><label>추가 수집 정보</label></th>
	                    <td>
	                        <span class="radio-box"><input type="checkbox" id="chec_01"><label
	                                for="chec_01">성명</label></span>
	                        <span class="radio-box ml10"><input type="checkbox" id="chec_02"><label for="chec_02">성별</label></span>
	                        <span class="radio-box ml10"><input type="checkbox" id="chec_03"><label
	                                for="chec_03">소속기관</label></span>
	                        <span class="radio-box ml10"><input type="checkbox" id="chec_04"><label
	                                for="chec_04">휴대폰번호</label></span>
	                        <span class="radio-box ml10"><input type="checkbox" id="chec_05"><label
	                                for="chec_05">이메일</label></span>
	                        <span class="radio-box ml10"><input type="checkbox" id="chec_06"><label for="chec_06">주소</label></span>
	                    </td>
	                </tr>
	                <tr>
	                    <th scope="row"><label for="sur_editor">설문 안내</label></th>
	                    <td>
	                        <textarea name="sur_editor" id="sur_editor" rows="30"></textarea>
	                    </td>
	                </tr>
	  				<tr id="shareTableRow" style="display:none;">
					    <th scope="row">공유하기</th>
					    <td>
					        <div style="display:flex; align-items:center; gap:5px; margin-bottom:10px;">
					            <input type="text" id="survey_url" class="w60" readonly>
					            <button type="button" id="copyUrlBtn" class="btn_basic line_type02">URL 복사</button>
					            <button type="button" id="viewQrBtn" class="btn_basic line_type02">QR 보기</button>
					        </div>
					
					        <div id="qr_code_area" style="display:none; margin-top:10px; padding:10px; border:1px solid #ddd; width:fit-content;">
					            <div id="qrcode"></div>
					        </div>
					    </td>
					</tr>
                </tbody>
            </table>
        </div>
        <div class="table_layout02">
            <table>
                <caption>설문등록</caption>
                <colgroup>
                    <col style="width: 170px;">
                    <col style="width: auto;">
                </colgroup>
                <tbody>
                <tr>
                    <th scope="row"><label for="chapter_01">챕터 관리</label></th>
                    <td>
                        <p><span class="radio-box"><input type="checkbox" id="chapter_01"><label for="chapter_01">챕터
                            사용</label></span></p>
                        <div class="chapter_wrap">
                            <div class="option-row">
                                <label>챕터 1</label>
                                <input type="text">
                                <p>
                                    <button type="button">추가</button>
                                    <button type="button" class="del">삭제</button>
                                </p>
                            </div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="question_wrap">
            <div class="question_inner">
                <div class="tit_wrap">
                    <strong>문항 관리</strong>
                    <select title="구분" class="chapter-select">
                        <option value="">챕터 선택</option>
                    </select>
                </div>
                <div class="question_con">
                    <div class="question_row">
                        <ul>
                            <li>
                                <label>설문유형</label>
                                <select class="qst_type_select" title="설문유형">
                                    <option value="MULTI">객관식</option>
                                    <option value="SHORT">주관식 단답</option>
                                    <option value="LONG">주관식 서술</option>
                                    <option value="LIKERT">리커트 척도</option>
                                    <option value="RANK">순위</option>
                                    <option value="IMG_SEL">이미지 선택형</option>
                                    <option value="IMG_RESP">이미지 응답형</option>
                                    <option value="RATIO">비율</option>
                                </select>
                            </li>
							<li>
					            <label>필수여부</label>
					            <select class="required-type" title="필수여부">
					                <option value="Y">필수</option>
					                <option value="N">선택</option>
					            </select>
					        </li>
                            <!-- 객관식에만 쓰이는 영역 -->
                            <li class="qst-type-multi-setting">
                                <span class="radio-box"><input type="checkbox" id="chec_07"><label
                                        for="chec_07">복수선택</label></span>
                                <select class="multi-limit-type" title="복수선택" style="display:none">
                                    <option value="NONE">제한 없음</option>
                                    <option value="LIMIT">개수 제한</option>
                                </select>
								<input type="text" 
								       class="multi-limit-count chec_07 wp50" 
								       style="display:none" 
								       value="1" 
								       placeholder="개수"
								       oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                            </li>

                            <!-- 단답형 옵션 -->
                            <li class="qst-type-short-setting" style="display:none">
                                <label>답변 최대 글자수</label>
                                <input type="text" maxlength="100" class="wp50" placeholder="100"> (100자 이하)
                            </li>

                            <!-- 서술형 옵션 -->
                            <li class="qst-type-long-setting" style="display:none">
                                <label>답변 최대 글자수</label>
                                <input type="text" maxlength="2000" class="wp50" placeholder="2000"> (2000자 이하)
                            </li>

                            <!-- 리커트 옵션 -->
                            <li class="qst-type-likert-setting" style="display:none">
                                <label for="likertCount">척도 수</label>
                                <select id="likertCount" title="척도 수 선택">
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10">10</option>
                                </select>
                            </li>
                            <!-- 비율(점수단계) 설정 -->
                            <li class="qst-type-ratio-setting" style="display:none">
                                <label>점수 단계</label>
                                <select class="ratio-step">
                                    <option value="1">1점</option>
                                    <option value="2">2점</option>
                                    <option value="3">3점</option>
                                    <option value="4">4점</option>
                                    <option value="5">5점</option>
                                    <option value="6">6점</option>
                                    <option value="7">7점</option>
                                    <option value="8">8점</option>
                                    <option value="9">9점</option>
                                    <option value="10">10점</option>
                                </select>
                            </li>
                        </ul>
                        <button type="button" class="del_btn">문항삭제</button>
                    </div>

                    <!-- 공통 질문 입력 -->
                    <div class="list_row qst-common-row">
                        <input type="text" value="1" class="wp50 list_first">
                        <textarea placeholder="질문 입력" class="w100"></textarea>
                        <div class="file_wrap list_last">
                            <label for="fileInput1" class="file_label">파일 선택</label>
                            <span class="fileName">첨부 파일 선택</span>
                            <input type="file" id="fileInput1" class="fileInput" style="display:none;"
                                   th:accept="${#strings.substringBefore(allowedExtensions, ',') == allowedExtensions ? '.' + allowedExtensions : '.' + #strings.replace(allowedExtensions, ',', ',.')}"
                                   th:attr="data-allowed-ext=${allowedExtensions}">
                            <div class="file_list"></div>
                        </div>
                    </div>

                    <!-- 리커트 항목 렌더링 위치 -->
                    <div class="qst-type-likert-items" style="display:none;">
                        <div class="list_row likert-template" style="display:none;">
                            <label class="list_first"></label>
                            <input type="text" class="w100" placeholder="">
                        </div>
                    </div>

                    <!-- 객관식 옵션 목록 -->
                    <div class="list_row qst-type-multi">
                        <label class="list_first">항목1</label>
                        <input type="text" placeholder="항목 입력" class="w100">
                        <div class="list_last">
                            <button type="button" class="del">삭제</button>
                        </div>
                    </div>

                    <!-- 기타 -->
                    <div class="list_row qst-type-multi-etc" style="display:none;">
                        <label class="list_first">기타</label>
                        <input type="text" class="w100" value="기타" placeholder="기타 입력">
                        <div class="list_last">
                            <button type="button" class="del">삭제</button>
                        </div>
                    </div>

                    <!-- 단답형 -->
                    <div class="list_row qst-type-short" style="display:none;">
                        <label class="list_first">항목</label>
                        <input type="text" class="w100" placeholder="100자 이내로 작성해 주세요." disabled>
                        <div class="list_last">
                            <span class="radio-box"><input type="checkbox" id="chec_08"><label for="chec_08">숫자만
                                입력</label></span>
                        </div>
                    </div>

                    <!-- 서술형 -->
                    <div class="list_row qst-type-long" style="display:none;">
                        <label class="list_first">항목</label>
                        <input type="text" class="w100" placeholder="2,000자 이내로 작성해 주세요." disabled>
                    </div>

                    <!-- 이미지 선택형 -->
                    <div class="list_row qst-type-img-sel" style="display:none;">
                        <label class="list_first">항목</label>
                        <input type="text" class="w100" placeholder="">
                        <div class="list_last">
                            <div class="file_wrap">
                                <label for="fileInput2" class="file_label">파일 선택</label>
                                <span class="fileName">첨부 파일 선택</span>
                                <input type="file" id="fileInput2" class="fileInput" style="display:none;"
                                       accept="image/jpeg, image/png, image/gif, image/bmp"
                                       th:attr="data-allowed-ext=${allowedExtensions}"
                                >
                                <div class="file_list"></div>
                                <button type="button" class="del">삭제</button>
                            </div>
                        </div>
                    </div>

                    <!-- 이미지 응답형 -->
                    <div class="list_row qst-type-img-resp" style="display:none;">
                        <label class="list_first">항목</label>
                        <span class="radio-box"><input type="radio" name="radio_02_01"><label> 파일만 업로드</label></span>
                        <span class="radio-box">
                            <input type="radio" name="radio_02_01">
                            <label> 파일 업로드 + 글 입력 (답변 최대 글자수
                                <input type="text" class="wp100 tar" placeholder="2,000"> (2,000자 이하))
                            </label>
                        </span>
                    </div>

                    <!-- 버튼 -->
                    <div class="question_btn_bottom">
                        <div class="bottom_bnt">
                            <a href="javascript:;" class="btn-add-option">+항목 추가</a>
                            <a href="javascript:;" class="btn-add-etc">기타 추가</a>
                        </div>
                        <div class="bottom_bnt">
                            <a href="javascript:;" class="btn-sub-question">하위 질문</a>
                            <a href="javascript:;">문항 복사</a>
                        </div>
                    </div>

                </div>
            </div>
            <p class="question_btn"><a href="javascript:;">+ 문항추가</a></p>
        </div>
        <div class="btn_wrap mt20">
        	<a href="javascript:;" id="admin5011SurveyPreview" class="btn_basic bg_type01" style="display:none;">미리보기</a>
            <a href="javascript:;" id="admin5011SurveyTmpSave" class="btn_basic bg_type01">임시저장</a>
            <a href="javascript:;" id="admin5011SurveySave" class="btn_basic bg_type01">등록</a>
            <a href="javascript:;" id="admin501_1_btn_survey_cancel" class="btn_basic line_type02">취소</a>
        </div>
    </div>
</div>
<script layout:fragment="scripts" th:inline="javascript" type="text/javascript">
    // admin501 전용으로 파일칩 높이/정렬만 조정 (공용 CSS는 그대로 유지)
    (() => {
        const style = document.createElement("style");
        style.textContent = `
            .question_wrap .file_wrap {
            	align-items: center;
            	gap: 8px;
			}
            .question_wrap .file_wrap .file_list {
				margin-bottom: 0px;
            }
            .question_wrap .file_wrap .file_list p {
                align-items: center;
                gap: 8px;
                margin: 0;
                padding: 6px 60px 6px 12px;
                background: #ddebff;
                position: relative;
                max-width: 160px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .question_wrap .file_wrap .file_list p a {
                position: absolute;
                top: 50%;
                right: 15px;
                margin-top: -10px;
            }
        `;
        document.head.appendChild(style);
    })();
    let admin501_1 = {

        /**
         * 상태
         */
        state: {
            all: null,        // 조회한 데이터
            chapters: [],
            mode: 'insert',
            srvyOid: null,
            deletedQstList: [],
            deletedOptList: [],
            deletedQstAttachList: [], // 조회된 문항 첨부파일 삭제 대상
            fileInputSeq: 1,
            editorFiles: [],            // 에디터에 새로 추가된 이미지 메타데이터
            existingEditorFileKeys: [], // (수정 시) 에디터에 있던 기존 이미지 키
            deleteEditorAttachNos: [],   // 에디터에서 삭제된 이미지 번호들
            maxFileSize: /*[[${maxFileSize}]]*/ 10,
            allowedExtensions: /*[[${allowedExtensions}]]*/ '',
        },

        /**
         * 조회되어 있는 문항 첨부파일을 삭제할 때 호출한다.
         * - 동일 파일번호가 중복해서 들어가지 않도록 한 번만 push
         * - 등록(PUT/POST) 시 deletedQstAttachList로 서버에 전달되어 use_yn=N 처리/삭제된다.
         */
        fnMarkDeletedAttach: function (attachNo) {
            if (!attachNo) return;
            if (!this.state.deletedQstAttachList.includes(attachNo)) {
                this.state.deletedQstAttachList.push(attachNo);
            }
        },

        /**
         * 파일 UI를 초기 상태로 되돌린다.
         * - file input 값 비우기
         * - 안내 문구 복원
         * - 첨부칩 영역 비우기
         * 문항별 첨부를 교체/삭제할 때 공통으로 호출한다.
         */
        fnResetFileUI: function (wrap) {
            if (!wrap) return;
            const input = wrap.querySelector(".fileInput");
            if (input) {
                input.value = "";
            }
            const nameSpan = wrap.querySelector(".fileName");
            if (nameSpan) {
                nameSpan.textContent = "첨부 파일 선택";
                nameSpan.style.display = ""; // 안내 문구 다시 노출
            }
            const fileListBox = wrap.querySelector(".file_list");
            if (fileListBox) {
                fileListBox.innerHTML = "";
            }
        },

        /**
         * 초기 로드
         */
        init: async function () {
            const _this = this;
            const queryParams = new URLSearchParams(location.search);
            this.state.srvyOid = queryParams.get('srvyOid'); // 있으면 수정모드

            this.initEvent();
            this.fnRefreshFileInputs(document.querySelector(".question_inner"));

            // CKEditor 초기화
            CommonCKEditor.destroy('sur_editor');

            const surEditor = document.querySelector('#sur_editor');
            if (surEditor) {
                surEditor.style.display = 'block';
                surEditor.style.visibility = 'visible';
            }

            // CKEditor 생성
            await CommonCKEditor.init({
                editorId: 'sur_editor',
                content: '',
                onReady: function (editor) {
                    console.log('CKEditor 준비 완료', editor);
                },
                chunkUpload: {
                    enabled: true,
                    chunkUrl: '/api/common/file/tmp/ck-image/chunk', // 에디터용 청크 URL
                    chunkSize: this.state.chunkSize,
                    thresholdBytes: 5 * 1024 * 1024,
                    // 에디터 내 이미지 업로드 완료 시 메타데이터 저장
                    onUploadComplete: (payload) => {
                        _this.handleEditorUploadComplete(payload);
                    }
                }
            });

            uiCommon.datepicker.init('#admin5011EduOrgStartDt', {
                onSelect: function (selectedDate) {
                    // 시작일 선택 시 종료일의 최소 날짜를 시작일로 설정
                    $('#admin5011EduOrgEndDt').datepicker('option', 'minDate', selectedDate);

                    // 종료일이 이미 선택되어 있고 시작일보다 빠른 경우 경고
                    const endDate = $('#admin5011EduOrgEndDt').val();
                    if (endDate && selectedDate > endDate) {
                        uiCommon.fnShowAlertModal('시작일은 종료일보다 빨라야 합니다.', function () {
                            $('#admin5011EduOrgStartDt').val('');
                        });
                    }
                }
            });

            // 종료일 datepicker 초기화
            uiCommon.datepicker.init('#admin5011EduOrgEndDt', {
                onSelect: function (selectedDate) {
                    // 종료일 선택 시 시작일의 최대 날짜를 종료일로 설정
                    $('#admin5011EduOrgStartDt').datepicker('option', 'maxDate', selectedDate);

                    // 시작일이 이미 선택되어 있고 종료일보다 늦은 경우 경고
                    const startDate = $('#admin5011EduOrgStartDt').val();
                    if (startDate && startDate > selectedDate) {
                        uiCommon.fnShowAlertModal('종료일은 시작일보다 늦어야 합니다.', function () {
                            $('#admin5011EduOrgEndDt').val('');
                        });
                    }
                }
            });

            const today = new Date();
            const weekAgo = new Date();
            weekAgo.setDate(today.getDate() - 30);

            $('#admin5011EduOrgStartDt').datepicker('setDate', weekAgo);
            $('#admin5011EduOrgEndDt').datepicker('setDate', today);

            if (this.state.srvyOid) {
                // 수정 모드: 상세 조회 후 폼 바인딩
                this.state.mode = 'update';
            
            	const btnSurveyPreview = document.getElementById("admin5011SurveyPreview");
            	if(btnSurveyPreview){
            		btnSurveyPreview.style.display = "inline";
            	}

            	// 공유하기 tr 보이게
            	const shareRow = document.getElementById("shareTableRow");
                if (shareRow) {
                    shareRow.style.display = "table-row";
                    
                    // 설문 URL 생성
                    const domain = window.location.origin;
                    const surveyPath = "/page/portal602-1"; 
                    const fullUrl = `${domain}${contextPath}${surveyPath}?srvyOid=${this.state.srvyOid}`;
                    
                    document.getElementById("survey_url").value = fullUrl;
                }
                
                await admin501_1.searchSurveyDetail();
            } else {
                this.state.mode = 'insert';
            }
        },

        fnGenerateFileInputId: function () {
            return `fileInput${this.state.fileInputSeq++}`;
        },

        fnRefreshFileInputs: function (target) {
            if (!target) return;
            const wraps = target.querySelectorAll(".file_wrap");
            wraps.forEach(wrap => {
                const fileInput = wrap.querySelector("input[type='file']");

                        }
                    } else {
                        // 일반 문항 첨부는 서버 허용 확장자 기준

                        }

                    // 2. 용량 체크

                const isSub = original.classList.contains("sub-question");

                    if (insertTarget && insertTarget.parentNode) {
                        insertTarget.after(clone);

                    // 상위 문항 복사: insertTarget 뒤에 삽입
                    if (insertTarget && insertTarget.parentNode) {
                        insertTarget.after(clone);

                    }
                }

                // 이벤트 재바인딩
                admin501_1.fnBindQuestionTypeEvents();
                admin501_1.fnRenderChapterSelectForAllQuestions();
            });

            // 객관식 기타 추가
            document.addEventListener("click", function (e) {
                if (!e.target.classList.contains("btn-add-etc")) return;

                const qBlock = e.target.closest(".question_inner");
                if (!qBlock) return;

                // 이미 기타가 있으면 추가 금지
                const existEtc = qBlock.querySelector(".qst-type-multi-etc");
                if (existEtc && existEtc.style.display !== "none") return;

                // 기타 row 보이게
                const etcRow = qBlock.querySelector(".qst-type-multi-etc");
                if (etcRow) {
                    etcRow.style.display = "";
                }

                // 기타 추가 버튼 숨기기
                e.target.style.display = "none";
            });

            // 객관식 기타 삭제 버튼 처리
            document.addEventListener("click", function (e) {
                if (!e.target.classList.contains("btn-add-option")) return;

                const qInner = e.target.closest(".question_inner");
                const qCon = qInner.querySelector(".question_con");
                const type = qInner.querySelector(".qst_type_select").value;

                // 항목 추가 가능한 유형
                const allowedTypes = ["MULTI", "RANK", "IMG_SEL", "RATIO"];
                if (!allowedTypes.includes(type)) return;

                // 객관식(MULTI)
                if (type === "MULTI") {
                    const multiRows = qCon.querySelectorAll(".qst-type-multi");
                    const newIndex = multiRows.length + 1;

                    const newRow = document.createElement("div");
                    newRow.classList.add("list_row", "qst-type-multi");
                    newRow.innerHTML = `
			            <label class="list_first">항목${newIndex}</label>
			            <input type="text" class="w100">
			            <div class="list_last"><button type="button" class="del">삭제</button></div>
			        `;

                    const etcRow = qCon.querySelector(".qst-type-multi-etc");
                    if (etcRow && etcRow.style.display !== "none") {
                        etcRow.before(newRow);
                    } else {
                        // 항목이 하나도 없을 경우 대비
                        if (multiRows.length > 0) {
                            multiRows[multiRows.length - 1].after(newRow);
                        } else {
                            qCon.querySelector(".qst-common-row").after(newRow);
                        }
                    }
                    return;
                }

                //순위형(RANK)
                if (type === "RANK") {
                    const rankRows = qCon.querySelectorAll(".qst-type-multi");
                    const newIndex = rankRows.length + 1;

                    const newRow = document.createElement("div");
                    newRow.classList.add("list_row", "qst-type-multi");
                    newRow.innerHTML = `
			            <label class="list_first">항목${newIndex}</label>
			            <input type="text" class="w100">
			            <div class="list_last"><button type="button" class="del">삭제</button></div>
			        `;

                    // 항목이 하나도 없을 경우 대비
                    if (rankRows.length > 0) {
                        rankRows[rankRows.length - 1].after(newRow);
                    } else {
                        qCon.querySelector(".qst-common-row").after(newRow);
                    }
                    return;
                }

                // 이미지 선택형(IMG_SEL)
                if (type === "IMG_SEL") {
                    const imgRows = qCon.querySelectorAll(".qst-type-img-sel");
                    const newIndex = imgRows.length + 1; // 인덱스 계산 추가
                    const newRow = document.createElement("div");

                    newRow.classList.add("list_row", "qst-type-img-sel");
                    newRow.innerHTML = `
			            <label class="list_first">항목${newIndex}</label>
			            <input type="text" class="w100" placeholder="">
			            <div class="list_last">
			                <div class="file_wrap">
			                    <label class="file_label">파일 선택</label>
			                    <span class="fileName">첨부 파일 선택</span>
			                    <input type="file" class="fileInput" style="display:none;">
			                    <div class="file_list"></div>
			                    <button type="button" class="del">삭제</button>
			                </div>
			            </div>
			        `;

                    // 항목이 하나도 없을 경우 대비
                    if (imgRows.length > 0) {
                        imgRows[imgRows.length - 1].after(newRow);
                    } else {
                        qCon.querySelector(".qst-common-row").after(newRow);
                    }
                    admin501_1.fnRefreshFileInputs(newRow);
                    return;
                }

                // 비율(RATIO) - 여기가 에러 나던 부분입니다
                if (type === "RATIO") {
                    const ratioRows = qCon.querySelectorAll(".qst-type-multi");
                    const newIndex = ratioRows.length + 1;

                    const newRow = document.createElement("div");
                    newRow.classList.add("list_row", "qst-type-multi");
                    newRow.innerHTML = `
			            <label class="list_first">항목${newIndex}</label>
			            <input type="text" class="w100" placeholder="">
			            <div class="list_last"><button type="button" class="del">삭제</button></div>
			        `;

                    // 항목이 0개일 때 에러 방지 로직 추가
                    if (ratioRows.length > 0) {
                        ratioRows[ratioRows.length - 1].after(newRow);
                    } else {
                        // 기존 항목이 없으면 공통 질문 로우 바로 뒤에 추가
                        qCon.querySelector(".qst-common-row").after(newRow);
                    }
                    return;
                }
            });

            // 항목 삭제 공통 처리
            document.addEventListener("click", function (e) {
                if (!e.target.classList.contains("del")) return;

                const row = e.target.closest(".list_row");
                if (!row) return;

                const qInner = row.closest(".question_inner");
                const qCon = qInner.querySelector(".question_con");
                const type = qInner.querySelector(".qst_type_select").value;

                // 리커트는 항목 삭제 없음
                if (type === "LIKERT") return;

                // 기타 삭제이면 숨기기만 처리
                if (row.classList.contains("qst-type-multi-etc")) {
                    row.style.display = "none";

                    // 기타 추가 버튼 다시 활성화
                    const etcBtn = qInner.querySelector(".btn-add-etc");
                    if (etcBtn) etcBtn.style.display = "";

                    // UPDATE 모드 처리: DB에 존재하는 기타 옵션을 삭제 리스트에 추가
                    if (admin501_1.state.mode === 'update') {
                        const optNo = row.getAttribute("data-opt-no"); // data-opt-no 속성은 .list_row에 있어야 함

                        if (optNo) {
                            const numOptNo = Number(optNo);
                            // 이미 삭제 리스트에 없으면 추가
                            if (!admin501_1.state.deletedOptList.includes(numOptNo)) {
                                admin501_1.state.deletedOptList.push(numOptNo);
                            }

                            // 삭제 후 다시 추가될 경우 신규 항목으로 등록되도록 data-opt-no 속성을 제거합니다.
                            row.removeAttribute("data-opt-no");
                        }
                    }
                    return;
                }

                // 최소 1개 보호 처리 (MULTI / RANK / IMG_SEL / RATIO)
                const removableTypes = {
                    "MULTI": ".qst-type-multi",
                    "RANK": ".qst-type-multi",
                    "RATIO": ".qst-type-multi",
                    "IMG_SEL": ".qst-type-img-sel"
                };

                const selector = removableTypes[type];
                if (selector) {
                    const items = qCon.querySelectorAll(selector);

                    // 항목이 1개뿐이면 삭제 금지
                    if (items.length <= 1) {
                        uiCommon.fnShowAlertModal("항목은 최소 1개 이상 필요합니다.");
                        return;
                    }
                }

                // UPDATE 모드 처리: DB에 존재하는 옵션을 삭제 리스트에 추가
                if (admin501_1.state.mode === 'update') {
                    const optNo = row.getAttribute("data-opt-no"); // data-opt-no 속성은 .list_row에 있어야 함

                    if (optNo) {
                        const numOptNo = Number(optNo);
                        if (!admin501_1.state.deletedOptList.includes(numOptNo)) {
                            admin501_1.state.deletedOptList.push(numOptNo);
                        }
                    }
                }

                // 정상 삭제
                row.remove();

                // 삭제 후 번호 재정렬
                if (["MULTI", "RANK", "RATIO"].includes(type)) {
                    // .qst-type-multi 항목만 선택하되, 기타 항목은 제외하고 순번을 매김
                    const rows = qCon.querySelectorAll(".qst-type-multi:not(.qst-type-multi-etc)");
                    rows.forEach((r, idx) => {
                        const label = r.querySelector(".list_first");
                        if (label) label.textContent = `항목${idx + 1}`;
                    });
                }

                if (type === "IMG_SEL") {
                    const rows = qCon.querySelectorAll(".qst-type-img-sel");
                    rows.forEach((r, idx) => {
                        const label = r.querySelector(".list_first");
                        if (label) label.textContent = `항목${idx + 1}`;
                    });
                }
            });

            // 하위 질문 생성
            document.addEventListener("click", function (e) {
                if (!e.target.classList.contains("btn-sub-question")) return;

                const parent = e.target.closest(".question_inner");
                if (!parent) return;

                const parentNo = parent.querySelector(".list_first").value.trim();

                // 1단계 제한
                if (parentNo.includes("-")) {
                    uiCommon.fnShowAlertModal("하위 질문은 1단계까지만 생성 가능합니다.");
                    return;
                }

                // 부모 다음 위치에 container 확보
                let container = parent.nextElementSibling;
                if (!container || !container.classList.contains("sub-question-container")) {
                    container = document.createElement("div");
                    container.classList.add("sub-question-container");
                    parent.after(container);
                }

                // 번호 고정 (번호 채번 없음)
                const newNo = parentNo + "-";

                // 템플릿 기반 복제
                const template = document.querySelector(".question_wrap > .question_inner");
                const clone = template.cloneNode(true);
                clone.style.display = "flex";
                // 입력 초기화
                clone.querySelectorAll("input[type='text']").forEach(i => i.value = "");
                clone.querySelectorAll("input[type='file']").forEach(f => {
                    f.value = "";
                    const span = f.closest(".file_wrap")?.querySelector(".fileName");
                    if (span) {
                        span.textContent = "첨부 파일 선택";
                        span.style.display = ""; // 안내 문구 노출 상태로 초기화
                    }
                    const listBox = f.closest(".file_wrap")?.querySelector(".file_list");
                    if (listBox) listBox.innerHTML = ""; // 파일 표시 영역 초기화
                });

                // 하위 버튼 제거
                const subBtn = clone.querySelector(".btn-sub-question");
                if (subBtn) subBtn.remove();

                // 들여쓰기
                clone.classList.add("sub-question");

                // 하위 질문은 항상 객관식으로 고정
                const defaultType = "MULTI";
                clone.querySelector(".qst_type_select").value = defaultType;
                admin501_1.fnToggleQuestionTypeUI(clone.querySelector(".question_con"), defaultType);
                admin501_1.fnRefreshFileInputs(clone);

                // 챕터 유지
                const parentChapter = parent.querySelector(".chapter-select").value || "";
                clone.querySelector(".chapter-select").value = parentChapter;

                // append 후 번호 적용
                container.appendChild(clone);
                clone.querySelector(".list_first").value = newNo;

                admin501_1.fnBindQuestionTypeEvents();
            });

            _this.fnToggleChapter();
            _this.fnInitChapterEvents();
            _this.fnBindQuestionTypeEvents();
        },

        /**
         * 챕터 사용 토글
         */
        fnToggleChapter: function () {
            const chapterUseChk = document.querySelector("#chapter_01");
            const chapterWrap = document.querySelector(".chapter_wrap");
            if (!chapterUseChk || !chapterWrap) return;

            chapterWrap.style.display = chapterUseChk.checked ? "block" : "none";

            chapterUseChk.addEventListener("change", function () {
                const isOn = chapterUseChk.checked;

                if (!isOn) {
                    // OFF 상태
                    chapterWrap.style.display = "none";

                    // update 모드라면 기존 챕터 srvyQitemOid를 삭제 리스트에 추가
                    if (admin501_1.state.mode === "update") {
                        const rows = document.querySelectorAll(".chapter_wrap .option-row");
                        rows.forEach(row => {
                            const srvyQitemOid = row.getAttribute("data-qst-no");
                            if (srvyQitemOid && !admin501_1.state.deletedQstList.includes(Number(srvyQitemOid))) {
                                admin501_1.state.deletedQstList.push(Number(srvyQitemOid));
                            }
                        });
                    }

                    // 챕터 상태 초기화
                    admin501_1.state.chapters = [];

                    // 문항관리 select 옵션만 초기화 (disable 금지)
                    document.querySelectorAll(".chapter-select").forEach(select => {
                        select.innerHTML = `<option value="">챕터 선택</option>`;
                    });
                } else {
                    // ON 상태
                    chapterWrap.style.display = "block";

                    // 삭제 리스트에서 level=0 챕터 제거 (복원)
                    if (admin501_1.state.mode === "update") {
                        const rows = document.querySelectorAll(".chapter_wrap .option-row");
                        rows.forEach(row => {
                            const srvyQitemOid = row.getAttribute("data-qst-no");
                            if (srvyQitemOid) {
                                admin501_1.state.deletedQstList = admin501_1.state.deletedQstList.filter(
                                        no => no !== Number(srvyQitemOid)
                                );
                            }
                        });
                    }

                    // 챕터 상태 갱신 + 문항 select 옵션 복원
                    admin501_1.fnRefreshChapterState();
                    admin501_1.fnRenderChapterSelectForAllQuestions();
                }
            });
        },

        /**
         * 챕터 관련 이벤트 초기화
         */
        fnInitChapterEvents: function () {
            this.fnRebindChapterRowEvents();
            this.fnRefreshChapterState();
        },

        fnRebindChapterRowEvents: function () {
            const _this = this;
            const rows = document.querySelectorAll(".chapter_wrap .option-row");

            rows.forEach((row, index) => {
                const addBtn = row.querySelector("button:not(.del)");
                const delBtn = row.querySelector("button.del");
                const input = row.querySelector("input");

                row.querySelector("label").textContent = `챕터 ${index + 1}`;

                if (input) {
                    input.oninput = () => {
                        _this.fnRefreshChapterState();
                        _this.fnRenderChapterSelectForAllQuestions();
                    };
                }

                if (addBtn) addBtn.onclick = () => _this.fnAddChapterRow(index);
                if (delBtn) delBtn.onclick = () => _this.fnDeleteChapterRow(row);
            });
        },

        fnAddChapterRow: function (index) {
            const chapterWrap = document.querySelector(".chapter_wrap");
            if (!chapterWrap) return;

            const newRow = document.createElement("div");
            newRow.classList.add("option-row");
            newRow.innerHTML = `
                 <label>챕터</label>
                 <input type="text">
                 <p><button type="button">추가</button> <button type="button" class="del">삭제</button></p>
             `;

            const rows = chapterWrap.querySelectorAll(".option-row");
            if (rows[index]) rows[index].after(newRow);
            else chapterWrap.appendChild(newRow);

            this.fnRebindChapterRowEvents();
            this.fnRefreshChapterState();
            this.fnRenderChapterSelectForAllQuestions();
        },

        fnDeleteChapterRow: function (rowElement) {
            const rows = document.querySelectorAll(".chapter_wrap .option-row");

            if (rows.length <= 1) {
                uiCommon.fnShowAlertModal("최소 1개의 챕터가 필요합니다.");
                return;
            }

            // 삭제 대상 챕터의 인덱스 및 ID 획득 (UI 갱신용)
            const index = [...rows].findIndex(r => r === rowElement);
            const deletedChapterId = index + 1; // 챕터 ID (1-based)

            // DB delete tracking (srvyQitemOid 획득)
            const srvyQitemOid = rowElement.getAttribute("data-qst-no");
            if (this.state.mode === "update" && srvyQitemOid) {
                this.state.deletedQstList.push(Number(srvyQitemOid));
            }

            // 삭제된 챕터에 할당된 문항들의 매핑 해제
            document.querySelectorAll(".question_inner").forEach(qEl => {
                const chapterSelect = qEl.querySelector(".chapter-select");

                // 해당 챕터 ID로 매핑된 문항을 찾음 (select.value == deletedChapterId)
                if (chapterSelect && chapterSelect.value == deletedChapterId) {

                    // 챕터 선택을 "챕터 선택"으로 초기화
                    chapterSelect.value = "";

                    // Level 1 문항의 parentSrvyQitemOid를 NULL로 정리 (Level 1은 챕터에 종속)
                    if (qEl.dataset.level === '1') {
                        qEl.dataset.upSrvyQitemOid = null;
                    }
                }
            });

            // DOM 제거
            rowElement.remove();

            // 재정렬 + state 갱신 + 문항 셀렉트 갱신
            this.fnRebindChapterRowEvents();
            this.fnRefreshChapterState();
            this.fnRenderChapterSelectForAllQuestions();
        },

        fnRefreshChapterState: function () {
            const rows = document.querySelectorAll(".chapter_wrap .option-row");
            this.state.chapters = [...rows].map((row, index) => ({
                id: index + 1,
                val: `CH${index + 1}`,
                title: row.querySelector("input").value.trim() || `챕터 ${index + 1}`
            }));
        },

        /**
         * 설문유형 변경 이벤트 등록
         */
        fnBindQuestionTypeEvents: function () {
            const _this = this; // this scope 확보

            // 기존 이벤트 제거 후 재바인딩
            document.querySelectorAll(".qst_type_select").forEach(select => {
                // 기존 이벤트 핸들러 복제 방지를 위해 새로 생성
                const newSelect = select.cloneNode(true);

                // 복제 시 스크립트로 변경된 value는 따라오지 않으므로 명시적으로 주입
                newSelect.value = select.value;

                select.parentNode.replaceChild(newSelect, select);

                newSelect.onchange = function () {
                    const block = this.closest(".question_con");
                    const qInner = this.closest(".question_inner");

                    // UPDATE 모드: 기존 타입의 옵션들을 삭제 리스트에 추가
                    if (_this.state.mode === 'update') {
                        const srvyQitemOid = qInner.getAttribute("data-qst-no");

                        if (srvyQitemOid) {
                            // 현재 문항의 모든 옵션을 삭제 리스트에 추가
                            qInner.querySelectorAll('[data-opt-no]').forEach(optEl => {
                                const optNo = optEl.getAttribute("data-opt-no");
                                if (optNo) {
                                    const numOptNo = Number(optNo);
                                    if (!_this.state.deletedOptList.includes(numOptNo)) {
                                        _this.state.deletedOptList.push(numOptNo);
                                    }
                                }
                            });
                        }
                    }

                    // 현재 타입 저장
                    const oldType = block.getAttribute("data-current-type");
                    const newType = this.value;

                    // 타입이 실제로 변경되었을 때만 리셋
                    const shouldReset = oldType !== newType;

                    // UI 토글 (타입 변경 시에만 skipReset=false)
                    _this.fnToggleQuestionTypeUI(block, newType, !shouldReset);

                    // 현재 타입 저장
                    block.setAttribute("data-current-type", newType);
                };
            });
        },

        /**
         * 공통 항목 초기화 (리커트 제외)
         */
        fnResetAllQuestionItems: function (block) {

            // 객관식 옵션 초기화 (항목1 값 초기화 후 나머지 제거)
            const multiRows = block.querySelectorAll(".qst-type-multi");

            // 첫 번째 항목의 입력값 초기화
            if (multiRows.length > 0) {
                const firstInput = multiRows[0].querySelector("input[type='text']");
                if (firstInput) {
                    firstInput.value = "";
                }
            }

            // 나머지 항목 제거 (항목1 제외)
            multiRows.forEach((row, idx) => {
                if (idx > 0) row.remove();
            });

            // 기타 숨기기
            const etc = block.querySelector(".qst-type-multi-etc");
            if (etc) etc.style.display = "none";

            // short / long / img 계열 모두 첫 항목만 유지
            [
                ".qst-type-short",
                ".qst-type-long",
                ".qst-type-img-sel",
                ".qst-type-img-resp"
            ].forEach(sel => {
                const rows = block.querySelectorAll(sel);
                rows.forEach((row, idx) => {
                    // 단답/서술/이미지선택 항목의 입력값도 초기화
                    if (idx === 0) {
                        const input = row.querySelector("input[type='text']");
                        if (input) input.value = "";
                    }
                    if (idx > 0) row.remove();
                });
            });
        },

        /**
         * 객관식 기본 항목 세팅
         */
        fnInitMultiItems: function (block) {
            const first = block.querySelector(".qst-type-multi");
            if (first) {
                const label = first.querySelector(".list_first");
                if (label) label.textContent = "항목1";
            }
        },

        /**
         * 설문유형에 따른 UI 표시
         */
        fnToggleQuestionTypeUI: function (block, type, skipReset) {

            const allSelectors = [
                '.qst-type-multi',
                '.qst-type-multi-setting',
                '.qst-type-multi-etc',
                '.qst-type-short',
                '.qst-type-short-setting',
                '.qst-type-long',
                '.qst-type-long-setting',
                '.qst-type-likert-setting',
                '.qst-type-img-sel',
                '.qst-type-img-resp',
                '.qst-type-ratio-setting'
            ];

            // 모든 영역 숨김

       	                    <label> 파일 업로드 + 글 입력 (답변 최대 글자수
