        /**
         * 리커트 항목 동적 생성
         */
        fnRenderLikertItems: function (block, count) {
            const container = block.querySelector(".qst-type-likert-items");
            if (!container) return;

            container.innerHTML = "";
            for (let i = 1; i <= count; i++) {
                const row = document.createElement("div");
                row.classList.add("list_row");
                row.innerHTML = `
                     <label class="list_first">응답 ${i}</label>
                     <input type="text" class="w100" placeholder="응답 ${i}">
                 `;
                container.appendChild(row);
            }
            container.style.display = "";
        },

        /**
         * 문항 추가
         */
        fnAddQuestion: function (newNo, insertTarget) {

            const wrap = document.querySelector(".question_wrap");

            // question_inner 전체를 템플릿으로 가져옴
            const template = wrap.querySelector(".question_inner");

            if (!template) {
                console.error("문항 템플릿(.question_inner)을 찾을 수 없습니다.");
                return;
            }

            const clone = template.cloneNode(true);

            // 템플릿이 display:none 상태일 수 있으므로 보이게 처리
            clone.style.display = "flex";

            // 하위 문항 스타일 제거 (복사로 인한 잠재적 오류 방지)
            clone.classList.remove("sub-question");

            // 텍스트 입력값 초기화 및 data 속성 제거
            clone.querySelectorAll("input[type='text']").forEach(inp => inp.value = "");
            clone.querySelectorAll("textarea").forEach(ta => ta.value = "");
            clone.removeAttribute("data-qst-no"); // 신규 문항으로 처리
            clone.removeAttribute("data-parent-qst-no");

            // 기본 설문유형 MULTI로 세팅
            const typeSelect = clone.querySelector(".qst_type_select");
            if (typeSelect) typeSelect.value = "MULTI";

            // 챕터 select 초기화
            const chSelect = clone.querySelector(".chapter-select");
            if (chSelect) chSelect.value = "";

            // 문항 번호 적용
            const qNoInput = clone.querySelector(".qst-common-row .list_first");
            if (qNoInput) {
                qNoInput.value = String(newNo || (document.querySelectorAll(".question_inner[style*='flex']:not(.sub-question)").length + 1));
            }

            // UI 초기화(항목1만 보이도록) 및 모든 설정값 초기화
            // fnToggleQuestionTypeUI 내부에서 항목 목록과 설정값이 모두 초기화됩니다.
            this.fnToggleQuestionTypeUI(clone.querySelector(".question_con"), "MULTI", false);
            this.fnRefreshFileInputs(clone);

            // 삽입 위치 설정
            if (insertTarget && insertTarget.parentNode === wrap) {
                // 마지막 문항 뒤에 삽입
                insertTarget.after(clone);
            } else {
                // 기준점이 없거나 부적절하면, 문항추가 버튼 위에 삽입
                const btnRow = wrap.querySelector(".question_btn");
                wrap.insertBefore(clone, btnRow);
            }

            // 새로 추가된 문항 select 이벤트 다시 바인딩 (리커트 척도 포함)
            this.fnBindQuestionTypeEvents();
            // 챕터 셀렉트 다시 렌더링
            this.fnRenderChapterSelectForAllQuestions();
        },

        /**
         * 문항의 모든 옵션 데이터를 추출
         */
        fnGetQuestionOptions: function (q, type) {
            const qCon = q.querySelector(".question_con");
            const data = {};

         	// 공통 속성인 필수여부 백업
       	    data.esntlYn = q.querySelector(".required-type")?.value || "N";
         
            // MULTI, RANK, RATIO 항목 추출
            if (["MULTI", "RANK", "RATIO"].includes(type)) {
                data.items = [];
                qCon.querySelectorAll(".qst-type-multi").forEach(row => {
                    if (!row.classList.contains("qst-type-multi-etc")) {
                        const text = row.querySelector("input")?.value || "";
                        data.items.push({text: text, isEtc: false});
                    }
                });
                const etcRow = qCon.querySelector(".qst-type-multi-etc");
                data.hasEtc = (etcRow && etcRow.style.display !== "none");
                if (data.hasEtc) {
                    const etcText = etcRow.querySelector("input")?.value || "기타";
                    data.items.push({text: etcText, isEtc: true});
                }
            }

            // LIKERT 항목 추출
            if (type === "LIKERT") {
                data.count = Number(qCon.querySelector("#likertCount")?.value || 5);
                data.labels = [];
                qCon.querySelectorAll(".qst-type-likert-items .list_row:not(.likert-template) input").forEach(inp => {
                    data.labels.push(inp.value || "");
                });
            }

            // IMG_SEL 항목 추출
            if (type === "IMG_SEL") {
                data.items = [];
                qCon.querySelectorAll(".qst-type-img-sel").forEach(row => {
                    const text = row.querySelector("input[type='text']")?.value || "";
                    data.items.push({text: text});
                });
            }

            // 기타 설정값 추출
            if (type === "MULTI") {
                data.multiChk = qCon.querySelector("#chec_07")?.checked || false;
                data.limitType = qCon.querySelector(".multi-limit-type")?.value || "NONE";
                data.limitCnt = qCon.querySelector(".multi-limit-count")?.value || "1";
            }
            if (type === "SHORT") {
                data.limitVal = qCon.querySelector(".qst-type-short-setting input")?.value || "";
                data.numChk = qCon.querySelector("#chec_08")?.checked || false;
            }
            if (type === "LONG") {
                data.limitVal = qCon.querySelector(".qst-type-long-setting input")?.value || "";
            }
            if (type === "RATIO") {
                data.limitVal = qCon.querySelector(".ratio-step")?.value || "5";
            }
            if (type === "IMG_RESP") {
                data.limitVal = qCon.querySelector(".qst-type-img-resp input.wp100")?.value || "";
                data.radioIdx = [...qCon.querySelectorAll(".qst-type-img-resp input[type='radio']")].findIndex(r => r.checked);
            }

            return data;
        },

        /**
         * 복사된 문항에 옵션 데이터를 다시 렌더링
         */
        fnRenderClonedOptions: function (clone, type, data) {
            const qCon = clone.querySelector(".question_con");
            const commonRow = qCon.querySelector(".qst-common-row");

       	    // 필수여부 값 복원
			const reqSel = clone.querySelector(".required-type");
			if (reqSel && data.esntlYn) {
			    reqSel.value = data.esntlYn;
			}
			
            // 복사 시 UI 토글로 인해 생성된 기본 항목들을 제거
            qCon.querySelectorAll(".qst-type-multi:not(.qst-type-multi-etc)").forEach(e => e.remove());
            qCon.querySelectorAll(".qst-type-img-sel").forEach(e => e.remove());

            // MULTI, RANK, RATIO 옵션 렌더링
            if (["MULTI", "RANK", "RATIO"].includes(type) && data.items && data.items.length > 0) {
                let lastInserted = commonRow;

                data.items.filter(item => !item.isEtc).forEach((item, idx) => {
                    const newRow = document.createElement("div");
                    newRow.classList.add("list_row", "qst-type-multi");
                    newRow.innerHTML = `
       	                <label class="list_first">항목${idx + 1}</label>
       	                <input type="text" class="w100" value="${item.text || ''}">
       	                <div class="list_last"><button type="button" class="del">삭제</button></div>
       	            `;
                    lastInserted.after(newRow);
                    lastInserted = newRow;
                });

                // 기타 항목 복구
                const etcRow = qCon.querySelector(".qst-type-multi-etc");
                const etcBtn = qCon.querySelector(".btn-add-etc");
                const etcOpt = data.items.find(item => item.isEtc);

                if (etcOpt) {
                    if (etcRow) {
                        etcRow.style.display = "";
                        etcRow.querySelector("input").value = etcOpt.text || '기타';
                    }
                    if (etcBtn) etcBtn.style.display = "none";
                } else {
                    if (etcRow) etcRow.style.display = "none";
                    if (etcBtn) etcBtn.style.display = "";
                }

            }

            // MULTI 설정 복구
            if (type === "MULTI") {
                const multiChk = qCon.querySelector("#chec_07");
                const limitTypeSel = qCon.querySelector(".multi-limit-type");
                const limitCountSel = qCon.querySelector(".multi-limit-count");

                if (multiChk) multiChk.checked = data.multiChk;
                if (limitTypeSel) {
                    limitTypeSel.value = data.limitType || 'NONE';
                    limitTypeSel.style.display = data.multiChk ? "" : "none";
                }
                if (limitCountSel) {
                    limitCountSel.value = data.limitCnt || '1';
                    limitCountSel.style.display = (data.multiChk && data.limitType === 'LIMIT') ? "" : "none";
                }
            }

            // LIKERT 옵션 렌더링 및 값 채우기
            if (type === "LIKERT" && data.labels) {
                const likertSelect = qCon.querySelector("#likertCount");
                if (likertSelect) likertSelect.value = data.count;

                // fnRenderLikertItems를 호출하여 항목 재생성
                admin501_1.fnRenderLikertItems(qCon, data.count);

                // 값 채우기
                const likertInputs = qCon.querySelectorAll(".qst-type-likert-items .list_row:not(.likert-template) input");
                likertInputs.forEach((inp, idx) => {
                    inp.value = data.labels[idx] || '';
                });
            }

            // IMG_SEL 옵션 렌더링
            if (type === "IMG_SEL" && data.items && data.items.length > 0) {
                let lastInserted = commonRow;

                data.items.forEach((item, idx) => {
                    const newRow = document.createElement("div");
                    newRow.classList.add("list_row", "qst-type-img-sel");
                    newRow.innerHTML = `
       	                <label class="list_first">항목${idx + 1}</label>
       	                <input type="text" class="w100" value="${item.text || ''}" placeholder="">
       	                <div class="list_last">
       	                    <div class="file_wrap">
       	                        <label class="file_label">파일 선택</label>
       	                        <span class="fileName">첨부 파일 선택</span>
       	                        <input type="file" class="fileInput" style="display:none;">
        	                        <div class="file_list"></div>
       	                        <button type="button" class="del">삭제</button>
       	                    </div>
       	                </div>
       	            `;
                    lastInserted.after(newRow);
                    lastInserted = newRow;
                });

            }

            // SHORT/LONG/IMG_RESP/RATIO 설정 복구
            if (type === "SHORT") {
                const maxInput = qCon.querySelector(".qst-type-short-setting input");
                if (maxInput) maxInput.value = data.limitVal || '';
                const numChk = qCon.querySelector("#chec_08");
                if (numChk) numChk.checked = data.numChk;
            }
            if (type === "LONG") {
                const maxInput = qCon.querySelector(".qst-type-long-setting input");
                if (maxInput) maxInput.value = data.limitVal || '';
            }
            if (type === "RATIO") {
                const stepSel = qCon.querySelector(".ratio-step");
                if (stepSel) stepSel.value = data.limitVal || '5';
            }
            if (type === "IMG_RESP") {
                const textInput = qCon.querySelector(".qst-type-img-resp input.wp100");
                if (textInput) textInput.value = data.limitVal || '';
                const radios = qCon.querySelectorAll(".qst-type-img-resp input[type='radio']");
                if (radios[data.radioIdx]) radios[data.radioIdx].checked = true;
            }

        },

        /**
         * 모든 문항의 챕터 select 옵션을 다시 렌더링
         */
        fnRenderChapterSelectForAllQuestions: function () {
            const chapterUseChk = document.querySelector("#chapter_01");
            const selects = document.querySelectorAll(".chapter-select");

            selects.forEach(select => {

                // 챕터 사용 OFF
                if (!chapterUseChk.checked) {
                    // disable만 처리하고 기존 value는 유지
                    return;
                }

                // 기존 value 저장
                const prevValue = select.value;

                // 현재 옵션 개수
                const needCount = this.state.chapters.length;

                // option 개수 비슷하게 맞추기
                const opts = select.querySelectorAll("option:not([value=''])");

                // 옵션이 부족하면 추가
                if (opts.length < needCount) {
                    for (let i = opts.length; i < needCount; i++) {
                        const ch = this.state.chapters[i];
                        const opt = document.createElement("option");
                        opt.value = String(ch.id);
                        opt.textContent = `챕터 ${ch.id}`;
                        select.appendChild(opt);
                    }
                }

                // 옵션이 많으면 제거
                if (opts.length > needCount) {
                    for (let i = opts.length - 1; i >= needCount; i--) {
                        opts[i].remove();
                    }
                }

                // 기존 선택값 복구
                if ([...select.options].some(o => o.value == prevValue)) {
                    select.value = prevValue;
                }
            });
        },

        /**
         * 저장 로직
         */
        fnSaveSurvey: async function (surveyStat) {

            // 1. 반환값에 optionFiles 추가됨
            const {survey, questionFiles, optionFiles} = this.serializeSurvey();
            
            // qstLimit 유효성 검사
            for (const qst of survey.qstList) {
                if (qst.srvyQitemType === "SHORT" && qst.srvyQitemLmt > 100) {
                    uiCommon.fnShowAlertModal("주관식 단답의 최대 글자수는 100자를 초과할 수 없습니다.");
                    return;
                }
                if (qst.srvyQitemType === "LONG" && qst.srvyQitemLmt > 2000) {
                    uiCommon.fnShowAlertModal("주관식 서술의 최대 글자수는 2000자를 초과할 수 없습니다.");
                    return;
                }
            }
            
            survey.srvyStts = surveyStat;

            // UPDATE 모드라면 srvy_oid 포함
            if (this.state.srvyOid) {
                survey.srvyOid = this.state.srvyOid;

                // DELETE LIST 관리
                survey.deletedQstList = this.state.deletedQstList;
                survey.deletedOptList = this.state.deletedOptList;
                survey.deletedQstAttachList = this.state.deletedQstAttachList;
            }

            const formData = new FormData();
            formData.append('survey', new Blob([JSON.stringify(survey)], {type: 'application/json'}));

            // 문항 첨부파일
            questionFiles.forEach(file => formData.append('questionFiles', file));

            // 옵션 첨부파일 (IMG_SEL용)
            if (optionFiles && optionFiles.length > 0) {
                optionFiles.forEach(file => formData.append('optionFiles', file));
            }

            let result = '';
            const msg = surveyStat === 'REG' ? '임시 저장하시겠습니까?' : '저장하시겠습니까?';
            const comMsg = surveyStat === 'REG' ? '임시 저장되었습니다.' : '저장되었습니다.';

            uiCommon.fnShowConfirmModal(msg, async () => {
                uiCommon.fnHideConfirmModal();

                try {
                    const isInsert = admin501_1.state.mode === 'insert';
                    // REST API 경로 및 메소드 설정
                    const requestUrl = isInsert ? "/api/admin/admin501/survey/insert" : "/api/admin/admin501/survey/upsert";
                    const method = isInsert ? "PUT" : "POST";

                    result = await API.upload(requestUrl, formData, {method});

                    uiCommon.fnShowAlertModal(comMsg, () => {
                        if (surveyStat === 'REG') {
                            location.href = `/admin/page/admin501-1?srvyOid=${result}`;
                        } else {
                            location.href = `/admin/page/admin501`;
                        }
                    });

                } catch (e) {
                    uiCommon.fnShowAlertModal("저장 중 오류 발생: " + e);
                }
            });
        },

        /**
         * param 수집
         */
        serializeSurvey: function () {
            // questionFiles: 문항 자체의 첨부파일
            // optionFiles: 옵션(선택지)의 첨부파일
            const questionFiles = [];
            const optionFiles = [];

            const survey = {
                srvyTtl: document.querySelector("#lab_01").value.trim(),
                srvyBgngDt: document.querySelector("#admin5011EduOrgStartDt").value.trim(),
                srvyEndDt: document.querySelector("#admin5011EduOrgEndDt").value.trim(),
                srvyTrgt: document.querySelector("input[name='radio_01']:checked").value,
                srvyCn: CommonCKEditor.getContent("sur_editor"),
                srvyType: document.querySelector("input[name='survey_type']:checked").value,

                nmClctYn: document.querySelector("#chec_01").checked ? "Y" : "N",
                gndrClctYn: document.querySelector("#chec_02").checked ? "Y" : "N",
                instClctYn: document.querySelector("#chec_03").checked ? "Y" : "N",
                mpnoClctYn: document.querySelector("#chec_04").checked ? "Y" : "N",
                emlClctYn: document.querySelector("#chec_05")?.checked ? "Y" : "N",
                addrClctYn: document.querySelector("#chec_06")?.checked ? "Y" : "N",

                qstList: [],
                editorFiles: this.state.editorFiles
            };

            // 챕터 수집
            const useChapter = document.querySelector("#chapter_01")?.checked;
            if (useChapter) {
                document.querySelectorAll(".chapter_wrap .option-row")
                        .forEach((row, idx) => {
                            const text = row.querySelector("input").value.trim() || `챕터 ${idx + 1}`;
                            const displayQNo = `CH${idx + 1}`;
                            const srvyQitemOid = row.getAttribute("data-qst-no");

                            survey.qstList.push({
                                displayQNo,
                                parentDisplayQNo: null,
                                level: 0,
                                srvyQitemOid: srvyQitemOid ? Number(srvyQitemOid) : null,
                                srvyQitemSeq: survey.qstList.length + 1,
                                srvyQitemTtl: text,
                                srvyQitemType: null,
                                esntlYn: "N",
                                plrlChcYn: "N",
                                lmtYn: "N",
                                etcAddYn: "N",
                                likertMin: null,
                                likertMax: null,
                                likertMinLbl: null,
                                likertMaxLbl: null,
                                srvyQitemLmt: null,
                                optList: []
                            });
                        });
            }

            // 문항 + 하위문항 수집
            const questions = document.querySelectorAll(".question_inner:not([style*='none'])");

            questions.forEach(q => {
                const qstCon = q.querySelector(".question_con");

                // 기본 정보
                const displayQNo = q.querySelector(".qst-common-row .list_first")?.value.trim() || `Q${survey.qstList.length + 1}`;
                const type = q.querySelector(".qst_type_select")?.value || null;
                const title = q.querySelector(".qst-common-row textarea.w100")?.value.trim() || "";
                const chapterIdx = q.querySelector(".chapter-select")?.value;
                const isSubQ = displayQNo.includes("-");
                const isChapter = displayQNo && displayQNo.startsWith("CH");

                // 챕터 display QNo
                let chapterDisplayQNo = null;
                if (chapterIdx && this.state.chapters.length > 0) {
                    const cObj = this.state.chapters.find(c => String(c.id) === String(chapterIdx));
                    chapterDisplayQNo = cObj ? cObj.val : null;
                }

                // parentDisplayQNo 설정
                let parentDisplayQNo = null;
                if (isChapter) {
                    parentDisplayQNo = null;
                } else if (isSubQ) {
                    parentDisplayQNo = displayQNo.split("-")[0];
                } else {
                    parentDisplayQNo = chapterDisplayQNo || null;
                }

                // level 계산
                const level = isChapter ? 0 : (isSubQ ? 2 : 1);

                // DB 키 수집
                const srvyQitemOid = q.getAttribute("data-qst-no");

                // ParentSrvyQitemOid 계산
                let parentSrvyQitemOid = null;
                if (level === 2) {
                    const parentQ = [...questions].find(p =>
                            p.querySelector(".list_first")?.value.trim() === parentDisplayQNo &&
                            p.getAttribute("data-qst-no")
                    );
                    const pSrvyQitemOid = parentQ?.getAttribute("data-qst-no");
                    if (pSrvyQitemOid) parentSrvyQitemOid = Number(pSrvyQitemOid);
                } else if (level === 1) {
                    if (parentDisplayQNo?.startsWith("CH")) {
                        const chIndex = Number(parentDisplayQNo.replace("CH", ""));
                        const chRow = document.querySelector(`.chapter_wrap .option-row:nth-child(${chIndex})`);
                        const chSrvyQitemOid = chRow?.getAttribute("data-qst-no");
                        if (chSrvyQitemOid) parentSrvyQitemOid = Number(chSrvyQitemOid);
                    }
                }

                const qstRow = {
                    displayQNo,
                    parentDisplayQNo,
                    level,
                    srvyQitemOid: srvyQitemOid ? Number(srvyQitemOid) : null,
                    upSrvyQitemOid: parentSrvyQitemOid,
                    srvyQitemSeq: survey.qstList.length + 1,
                    srvyQitemTtl: title,
                    srvyQitemType: type,
                    esntlYn: q.querySelector(".required-type")?.value || "N",
                    plrlChcYn: "N",
                    lmtYn: "N",
                    etcAddYn: "N",
                    likertMin: null,
                    likertMax: null,
                    likertMinLbl: null,
                    likertMaxLbl: null,
                    srvyQitemLmt: null,
                    optList: []
                };

                // MULTI (객관식)
                if (type === "MULTI") {
                    const multiSelect = q.querySelector("#chec_07")?.checked || false;
                    const limitType = q.querySelector(".multi-limit-type")?.value || "NONE";
                    const limitCount = Number(q.querySelector(".multi-limit-count")?.value || 0);

                    qstRow.plrlChcYn = multiSelect ? "Y" : "N";
                    qstRow.lmtYn = (limitType === "LIMIT") ? "Y" : "N";
                    qstRow.srvyQitemLmt = (limitType === "LIMIT") ? limitCount : null;

                    const normalOptElements = qstCon.querySelectorAll(".qst-type-multi:not(.qst-type-multi-etc)");
                    normalOptElements.forEach((optElement, idx) => {
                        const val = optElement.querySelector("input")?.value.trim();
                        if (val) {
                            const optNo = optElement.getAttribute("data-opt-no");
                            qstRow.optList.push({
                                srvyQitemOptOid: optNo ? Number(optNo) : null,
                                srvyQitemOptSeq: qstRow.optList.length + 1,
                                srvyQitemOptTxt: val,
                                etcOptYn: "N",
                                srvyQitemOptImgFileNo: null
                            });
                        }
                    });

                    const etcElement = qstCon.querySelector(".qst-type-multi-etc");
                    if (etcElement) {
                        const isVisible = etcElement.style.display !== "none" &&
                                window.getComputedStyle(etcElement).display !== "none";
                        const etcOptNo = etcElement.getAttribute("data-opt-no");
                        const isDeleted = etcOptNo && this.state.deletedOptList.includes(Number(etcOptNo));

                        if (isVisible && !isDeleted) {
                            const val = etcElement.querySelector("input")?.value.trim();
                            qstRow.optList.push({
                                srvyQitemOptOid: etcOptNo ? Number(etcOptNo) : null,
                                srvyQitemOptSeq: qstRow.optList.length + 1,
                                srvyQitemOptTxt: val || "기타",
                                etcOptYn: "Y",
                                srvyQitemOptImgFileNo: null
                            });
                            qstRow.etcAddYn = "Y";
                        }
                    }
                }

                // LIKERT
                if (type === "LIKERT") {
                    const count = Number(q.querySelector("#likertCount")?.value || 5);
                    const likertRows = qstCon.querySelectorAll(".qst-type-likert-items .list_row:not(.likert-template)");

                    qstRow.srvyQitemLmt = count;
                    qstRow.likertMin = 1;
                    qstRow.likertMax = count;

                    likertRows.forEach((row, idx) => {
                        const txt = row.querySelector("input")?.value.trim();
                        const optNo = row.getAttribute("data-opt-no");
                        if (idx === 0) qstRow.likertMinLbl = txt || null;
                        if (idx === count - 1) qstRow.likertMaxLbl = txt || null;

                        qstRow.optList.push({
                            srvyQitemOptOid: optNo ? Number(optNo) : null,
                            srvyQitemOptSeq: idx + 1,
                            srvyQitemOptTxt: txt,
                            etcOptYn: "N",
                            srvyQitemOptImgFileNo: null
                        });
                    });
                }

                // RANK / RATIO
                if (["RANK", "RATIO"].includes(type)) {
                    if (type === "RATIO") {
                        const step = Number(q.querySelector(".ratio-step")?.value || 5);
                        qstRow.srvyQitemLmt = step;
                    }
                    const multiRows = qstCon.querySelectorAll(".qst-type-multi");
                    multiRows.forEach((row, idx) => {
                        const txt = row.querySelector("input")?.value.trim();
                        if (txt) {
                            const optNo = row.getAttribute("data-opt-no");
                            qstRow.optList.push({
                                srvyQitemOptOid: optNo ? Number(optNo) : null,
                                srvyQitemOptSeq: idx + 1,
                                srvyQitemOptTxt: txt,
                                etcOptYn: "N",
                                srvyQitemOptImgFileNo: null
                            });
                        }
                    });
                }

                // IMG_SEL (이미지 선택형 - 수정됨)
                if (type === "IMG_SEL") {
                    const imgSelRows = qstCon.querySelectorAll(".qst-type-img-sel");
                    imgSelRows.forEach((row, idx) => {
                        const txt = row.querySelector("input[type='text']")?.value.trim();
                        const optNo = row.getAttribute("data-opt-no");

                        // [추가] 옵션 파일 처리 로직
                        // 파일이 있으면 optionFiles 배열에 넣고, 그 인덱스를 attachFileIndex에 저장
                        let fileIndex = null;
                        const fileInput = row.querySelector(".fileInput");
                        if (fileInput && fileInput.files && fileInput.files.length > 0) {
                            fileIndex = optionFiles.length; // 현재 파일 배열의 길이 = 새 파일의 인덱스
                            optionFiles.push(fileInput.files[0]);
                        }

                        qstRow.optList.push({
                            srvyQitemOptOid: optNo ? Number(optNo) : null,
                            srvyQitemOptSeq: idx + 1,
                            srvyQitemOptTxt: txt,
                            etcOptYn: "N",
                            srvyQitemOptImgFileNo: null,
                            attachFileIndex: fileIndex // 백엔드가 이 값을 보고 파일을 찾음
                        });
                    });
                }

                // SHORT / LONG / IMG_RESP
                if (type === "SHORT") {
                    qstRow.srvyQitemLmt = Number(q.querySelector(".qst-type-short-setting input")?.value || 0);
                    const numOnlyChk = q.querySelector("#chec_08");
                    if (numOnlyChk) {
                        qstRow.lmtYn = numOnlyChk.checked ? "Y" : "N";
                    } else {
                        qstRow.lmtYn = "N";
                    }
                }
                if (type === "LONG") {
                    qstRow.srvyQitemLmt = Number(q.querySelector(".qst-type-long-setting input")?.value || 0);
                }
                if (type === "IMG_RESP") {
                    const maxLength = q.querySelector(".qst-type-img-resp input.wp100")?.value;
                    qstRow.srvyQitemLmt = maxLength ? Number(maxLength) : null;
                }

                // 공통 영역 문항 첨부파일 처리
                const questionFileInput = q.querySelector(".qst-common-row .fileInput");
                if (questionFileInput && questionFileInput.files && questionFileInput.files.length > 0) {
                    const fileIndex = questionFiles.length;
                    questionFiles.push(questionFileInput.files[0]);
                    qstRow.attachFileIndex = fileIndex;
                } else {
                    qstRow.attachFileIndex = null;
                }

                survey.qstList.push(qstRow);
            });

            // questionFiles와 함께 optionFiles도 반환
            return {survey, questionFiles, optionFiles};
        },

        /**
         * 페이지 이동 - 설문 목록
         */
        fnGoToListPage: function () {
            window.location.href = contextPath + '/admin/page/admin501';
            admin501.init();
        },

        /**
         * 설문 상세 조회
         */
        searchSurveyDetail: async function () {
            const srvyOid = this.state.srvyOid;

            const data = await API.get(`/api/admin/admin501/survey/detail?srvyOid=${srvyOid}`);
            this.state.all = data;

            // 설문 기본정보 바인딩
            this.fnBindSurveyInfo(data);

            // 챕터 바인딩
            const chapters = data.qstList.filter(q => q.level === 0);
            this.fnRenderChapters(chapters);

            // 문항 바인딩
            this.fnRenderQuestions(data.qstList);

            // 삭제 리스트 초기화
            this.state.deletedQstList = [];
            this.state.deletedOptList = [];
            this.state.deletedQstAttachList = []; // 기존 첨부 삭제 리스트도 초기화
        },

        /**
         * 설문 기본 정보 채우기
         */
        fnBindSurveyInfo: function (data) {

            document.querySelector("#lab_01").value = data.srvyTtl || "";

            document.querySelector("#admin5011EduOrgStartDt").value = data.srvyBgngDt || "";
            document.querySelector("#admin5011EduOrgEndDt").value = data.srvyEndDt || "";

            const tgtRadio = document.querySelector(`input[name='radio_01'][value='${data.srvyTrgt}']`);
            if (tgtRadio) {
                tgtRadio.checked = true;
            } else {
                const allRadio = document.querySelector(`input[name='radio_01'][value='ALL']`);
                if (allRadio) allRadio.checked = true;
            }
            const typeRadio = document.querySelector(`input[name='survey_type'][value='${data.srvyType}']`);
            if (typeRadio) {
                typeRadio.checked = true;
            } else {
                const commonRadio = document.querySelector(`input[name='survey_type'][value='COMMON']`);
                if (commonRadio) commonRadio.checked = true;
            }

            // CKEditor
            if (window.CommonCKEditor) {
                CommonCKEditor.setContent("sur_editor", data.srvyCn || "");
            }

            // 개인정보 수집 항목
            document.querySelector("#chec_01").checked = data.nmClctYn === "Y";
            document.querySelector("#chec_02").checked = data.gndrClctYn === "Y";
            document.querySelector("#chec_03").checked = data.instClctYn === "Y";
            document.querySelector("#chec_04").checked = data.mpnoClctYn === "Y";
            document.querySelector("#chec_05").checked = data.emlClctYn === "Y";
            document.querySelector("#chec_06").checked = data.addrClctYn === "Y";
        },

        /**
         * 챕터 행 렌더링
         */
        fnRenderChapters: function (chapters) {

            const chapterWrap = document.querySelector(".chapter_wrap");
            chapterWrap.innerHTML = "";

            if (!chapters || chapters.length === 0) {
                document.querySelector("#chapter_01").checked = false;
                chapterWrap.style.display = "none";
                return;
            }

            document.querySelector("#chapter_01").checked = true;
            chapterWrap.style.display = "block";

            chapters.forEach((ch, idx) => {
                const row = document.createElement("div");
                row.classList.add("option-row");

                // 챕터의 srvyQitemOid, level 보관 (update / delete 판단 필요)
                row.setAttribute("data-qst-no", ch.srvyQitemOid);
                row.setAttribute("data-level", "0");

                row.innerHTML = `
                    <label>챕터 ${idx + 1}</label>
                    <input type="text" class="chapter-title" value="${ch.srvyQitemTtl}">
                    <p>
                        <button type="button" class="chapter add">추가</button>
                        <button type="button" class="chapter del">삭제</button>
                    </p>
                `;
                chapterWrap.appendChild(row);
            });

            // 이벤트 재부착 + state.chapters 갱신 + 문항의 챕터 select 갱신
            this.fnRebindChapterRowEvents();
            this.fnRefreshChapterState();
            this.fnRenderChapterSelectForAllQuestions();
        },

        /**
         * 문항 + 하위문항 + 옵션 렌더링
         */
        fnRenderQuestions: function (qList) {

            const isInsertMode = !qList || qList.length === 0 ? true : false;

            const container = document.querySelector(".question_wrap");
            if (!container) return;

            const template = container.querySelector(".question_inner");
            if (!template) return;

            // Insert 모드 → 템플릿 보여줌
            // Update 모드 → 템플릿만 숨긴다 (절대 삭제 X)
            template.style.display = isInsertMode ? "flex" : "none";

            // 기존 문항 모두 제거 (템플릿만 남김)
            container.querySelectorAll(".question_inner").forEach((el, idx) => {
                if (idx > 0) el.remove();
            });

            container.querySelectorAll(".sub-question-container").forEach(el => el.remove());

            // Insert 모드는 템플릿만 보여주면 끝
            if (isInsertMode) return;

            // 상위 문항만 필터링 (level = 1)
            const parents = qList.filter(q => q.level === 1);

            // 하위 문항을 parentSrvyQitemOid로 빠르게 조회할 수 있도록 미리 분류
            const childrenByParent = {};
            qList.filter(q => q.level === 2).forEach(child => {
                if (!childrenByParent[child.upSrvyQitemOid]) {
                    childrenByParent[child.upSrvyQitemOid] = [];
                }
                childrenByParent[child.upSrvyQitemOid].push(child);
            });

            // 삽입 기준점 (문항추가 버튼)
            const questionBtn = container.querySelector(".question_btn");

            parents.forEach(parent => {
                // 렌더링 전 옵션 목록 정규화 및 정렬
                if (parent.optList && parent.optList.length > 0) {
                    const uniqueOptions = new Map();

                    parent.optList.forEach(opt => {
                        if (!uniqueOptions.has(opt.srvyQitemOptTxt) || uniqueOptions.get(opt.srvyQitemOptTxt).srvyQitemOptOid < opt.srvyQitemOptOid) {
                            uniqueOptions.set(opt.srvyQitemOptTxt, opt);
                        }
                    });

                    parent.optList = Array.from(uniqueOptions.values()).sort((a, b) => a.srvyQitemOptSeq - b.srvyQitemOptSeq);
                }

                // 상위 문항 렌더링 (문항추가 버튼 바로 위에)
                const pDOM = this.fnCreateQuestionDOM(parent, false, template);
                questionBtn.parentNode.insertBefore(pDOM, questionBtn);

                // 해당 상위 문항의 하위 문항들 렌더링
                const children = childrenByParent[parent.srvyQitemOid] || [];

                if (children.length > 0) {
                    const wrap = document.createElement("div");
                    wrap.classList.add("sub-question-container");

                    children.forEach(ch => {
                        // 하위 문항 옵션도 정규화
                        if (ch.optList && ch.optList.length > 0) {
                            const uniqueOptions = new Map();
                            ch.optList.forEach(opt => {
                                if (!uniqueOptions.has(opt.srvyQitemOptTxt) || uniqueOptions.get(opt.srvyQitemOptTxt).srvyQitemOptOid < opt.srvyQitemOptOid) {
                                    uniqueOptions.set(opt.srvyQitemOptTxt, opt);
                                }
                            });
                            ch.optList = Array.from(uniqueOptions.values()).sort((a, b) => a.srvyQitemOptSeq - b.srvyQitemOptSeq);
                        }

                        const cDOM = this.fnCreateQuestionDOM(ch, true, template);
                        wrap.appendChild(cDOM);
                    });

                    // 하위문항 컨테이너를 문항추가 버튼 바로 위에 삽입 (상위 문항 바로 다음)
                    questionBtn.parentNode.insertBefore(wrap, questionBtn);
                }
            });

            this.fnRenderChapterSelectForAllQuestions();
            this.fnBindQuestionTypeEvents();

            document.querySelectorAll(".question_con").forEach(con => {
                const typeSelect = con.querySelector(".qst_type_select");
                if (typeSelect) {
                    con.setAttribute("data-current-type", typeSelect.value);
                }
            });
        },

        /**
         * 문항 DOM 템플릿 구성
         */
        fnCreateQuestionDOM: function (q, isSub, templateRef) {
            const template = templateRef || document.querySelector(".question_inner");
            if (!template) return null;

            const el = template.cloneNode(true);
            el.style.display = "flex";

            // 공통 속성
            if (q.srvyQitemOid) el.setAttribute("data-qst-no", q.srvyQitemOid);
            el.dataset.upSrvyQitemOid = q.upSrvyQitemOid;
            el.dataset.level = q.level;

            // 문항 번호 + 제목
            el.querySelector(".list_first").value = q.displayQNo ?? "";
            el.querySelector(".qst-common-row textarea.w100").value = q.srvyQitemTtl ?? "";

            // 설문 유형 설정
            const typeSel = el.querySelector(".qst_type_select");
            const qstType = q.srvyQitemType ?? "MULTI";
            typeSel.value = qstType;
            
       	    // 필수 여부 설정
			const reqSel = el.querySelector(".required-type");
			if (reqSel) {
			    reqSel.value = q.esntlYn || "N";
			}

            // cloneNode 문제 방지를 위해 속성에도 selected 명시
            Array.from(typeSel.options).forEach(opt => {
                if (opt.value === qstType) opt.setAttribute("selected", "selected");
                else opt.removeAttribute("selected");
            });

            // 챕터 SELECT
            const chSelect = el.querySelector(".chapter-select");
            if (chSelect) {
                let chapterVal = "";
                if (isSub && q.upSrvyQitemOid) {
                    const parentQ = this.state.all?.qstList?.find(item => item.srvyQitemOid === q.upSrvyQitemOid);
                    if (parentQ && parentQ.parentDisplayQNo && parentQ.parentDisplayQNo.startsWith("CH")) {
                        chapterVal = parentQ.parentDisplayQNo.replace("CH", "");
                    }
                } else if (!isSub && q.parentDisplayQNo && q.parentDisplayQNo.startsWith("CH")) {
                    chapterVal = q.parentDisplayQNo.replace("CH", "");
                }
                chSelect.value = chapterVal;
            }

            const qCon = el.querySelector(".question_con");
            const commonRow = qCon.querySelector(".qst-common-row");

            // UI 영역 초기화 (모두 숨김)
            qCon.querySelectorAll(".qst-type-multi, .qst-type-multi-setting, .qst-type-multi-etc, .qst-type-short, .qst-type-short-setting, .qst-type-long, .qst-type-long-setting, .qst-type-likert-setting, .qst-type-img-sel, .qst-type-img-resp, .qst-type-ratio-setting, .qst-type-likert-items").forEach(el => {
                el.style.display = "none";
            });

            // 기존 템플릿의 잔여 항목(기본 항목) 제거
            //    DB 데이터를 바인딩할 것이므로 템플릿에 있던 껍데기 항목들은 모두 삭제
            qCon.querySelectorAll(".list_row.qst-type-multi, .list_row.qst-type-short, .list_row.qst-type-long, .list_row.qst-type-img-sel, .list_row.qst-type-img-resp").forEach(row => {
                // 설정영역(.setting)이나 기타(.etc)가 아닌 순수 항목 로우만 제거
                if (!row.className.includes("-setting") && !row.className.includes("-etc")) {
                    row.remove();
                }
            });

            // LIKERT 내부 항목 초기화
            const likertBox = qCon.querySelector(".qst-type-likert-items");
            if (likertBox) {
                likertBox.querySelectorAll(".list_row:not(.likert-template)").forEach(e => e.remove());
            }

            // 해당 유형의 UI 설정값 영역(Setting Box)만 표시
            this.fnToggleQuestionTypeUI(qCon, qstType, true);

            //유형별 데이터 바인딩 및 항목 생성

            // [MULTI / RANK / RATIO] - 공통적으로 qst-type-multi 클래스 사용
            if (["MULTI", "RANK", "RATIO"].includes(qstType)) {

                // MULTI 설정값
                if (qstType === "MULTI") {
                    const multiChk = qCon.querySelector("#chec_07");
                    const limitTypeSel = qCon.querySelector(".multi-limit-type");
                    const limitCountSel = qCon.querySelector(".multi-limit-count");

                    if (q.plrlChcYn === "Y" || q.lmtYn === "Y") {
                        if (multiChk) multiChk.checked = true;
                        if (limitTypeSel) {
                            limitTypeSel.style.display = "";
                            if (q.lmtYn === "Y") {
                                limitTypeSel.value = "LIMIT";
                                if (limitCountSel) {
                                    limitCountSel.style.display = "";
                                    limitCountSel.value = q.srvyQitemLmt || "1";
                                }
                            } else {
                                limitTypeSel.value = "NONE";
                            }
                        }
                    }
                }
                // RATIO 설정값
                else if (qstType === "RATIO") {
                    const ratioStep = qCon.querySelector(".ratio-step");
                    if (ratioStep) ratioStep.value = q.srvyQitemLmt || "5";
                }

                // 항목 생성
                if (q.optList && q.optList.length > 0) {
                    const normalOpts = q.optList.filter(opt => opt.etcOptYn === "N");
                    let lastInserted = commonRow;

                    normalOpts.forEach((opt, idx) => {
                        const row = document.createElement("div");
                        row.classList.add("list_row", "qst-type-multi", "dynamic-opt");
                        row.setAttribute("data-opt-no", opt.srvyQitemOptOid || "");
                        row.style.display = "";

                        const labelTxt = `항목${idx + 1}`;

                        row.innerHTML = `
       	                    <label class="list_first">${labelTxt}</label>
       	                    <input type="text" class="w100" value="${opt.srvyQitemOptTxt}">
       	                    <div class="list_last"><button type="button" class="del">삭제</button></div>
       	                `;
                        lastInserted.after(row);
                        lastInserted = row;
                    });

                    // 기타 옵션 (MULTI만 해당)
                    if (qstType === "MULTI") {
                        const etcOpt = q.optList.find(o => o.etcOptYn === "Y");
                        const etcTemplate = qCon.querySelector(".qst-type-multi-etc");
                        const etcBtn = el.querySelector(".btn-add-etc");

                        if (etcTemplate) {
                            if (etcOpt) {
                                etcTemplate.setAttribute("data-opt-no", etcOpt.srvyQitemOptOid || "");
                                etcTemplate.style.display = "";
                                etcTemplate.querySelector("input").value = etcOpt.srvyQitemOptTxt;
                                if (etcBtn) etcBtn.style.display = "none";
                            } else {
                                etcTemplate.style.display = "none";
                                etcTemplate.querySelector("input").value = "기타";
                                if (etcBtn) etcBtn.style.display = "";
                            }
                        }
                    }
                }
            }

            // [SHORT]
            else if (qstType === "SHORT") {
                const maxInput = qCon.querySelector(".qst-type-short-setting input");
                if (maxInput) maxInput.value = q.srvyQitemLmt !== null && q.srvyQitemLmt !== undefined ? q.srvyQitemLmt : "";

                const numChk = qCon.querySelector("#chec_08");
                if (numChk && q.lmtYn === "Y") numChk.checked = true;

                // 단답형은 항목이 1개 고정
                const row = document.createElement("div");
                row.classList.add("list_row", "qst-type-short", "dynamic-opt");
                row.style.display = "";
                row.innerHTML = `
       	            <label class="list_first">항목</label>
       	            <input type="text" class="w100" placeholder="100자 이내로 작성해 주세요." disabled>
       	            <div class="list_last">
       	                <span class="radio-box"><input type="checkbox" id="chec_08" ${q.lmtYn === 'Y' ? 'checked' : ''}><label for="chec_08">숫자만 입력</label></span>
       	            </div>
       	        `;
                commonRow.after(row);
            }

            // [LONG]
            else if (qstType === "LONG") {
                const maxInput = qCon.querySelector(".qst-type-long-setting input");
                if (maxInput) maxInput.value = q.srvyQitemLmt !== null && q.srvyQitemLmt !== undefined ? q.srvyQitemLmt : "";

                const row = document.createElement("div");
                row.classList.add("list_row", "qst-type-long", "dynamic-opt");
                row.style.display = "";
                row.innerHTML = `
       	            <label class="list_first">항목</label>
       	            <input type="text" class="w100" placeholder="2,000자 이내로 작성해 주세요." disabled>
       	        `;
                commonRow.after(row);
            }

            // [LIKERT]
            else if (qstType === "LIKERT") {
                const likertCountSel = qCon.querySelector("#likertCount");
                if (likertCountSel) likertCountSel.value = q.likertMax || "5";

                if (likertBox) {
                    const itemCount = q.likertMax || (q.optList ? q.optList.length : 5);
                    likertBox.style.display = "block";

                    for (let i = 0; i < itemCount; i++) {
                        const opt = q.optList && q.optList[i];
                        const row = document.createElement("div");
                        row.classList.add("list_row"); // dynamic-opt 불필요 (리커트는 고정)
                        if (opt) row.setAttribute("data-opt-no", opt.srvyQitemOptOid || "");

                        row.innerHTML = `
       	                     <label class="list_first">응답 ${i + 1}</label>
       	                     <input type="text" class="w100" placeholder="응답 ${i + 1}" value="${opt ? opt.srvyQitemOptTxt : ''}">
       	                `;
                        likertBox.appendChild(row);
                    }
                }
            }

            // [IMG_SEL]
            else if (qstType === "IMG_SEL") {
                if (q.optList && q.optList.length > 0) {
                    let lastInserted = commonRow;

                    q.optList.forEach((opt, idx) => {
                        const row = document.createElement("div");
                        row.classList.add("list_row", "qst-type-img-sel", "dynamic-opt");
                        row.setAttribute("data-opt-no", opt.srvyQitemOptOid || "");
                        row.style.display = "";

                        // [추가] 기존 파일이 있는지 확인 (백엔드에서 optionAttach로 내려줌)
                        let fileHtml = "";
                        let fileNameStyle = "";

                        // 옵션에 첨부파일이 존재하면 칩 생성
                        if (opt.optionAttach && opt.optionAttach.length > 0) {
                            const file = opt.optionAttach[0]; // 옵션당 파일 1개라고 가정
                            fileHtml = `
                                <p data-file-type="existing" data-attach-no="${file.fileOid}">
                                    ${file.originFileName}
                                    <a class="icon_del" href="javascript:;">파일삭제</a>
                                </p>
                            `;
                            fileNameStyle = "display:none;"; // 파일이 있으니 '첨부 파일 선택' 문구 숨김
                        }

                        row.innerHTML = `
       	                    <label class="list_first">항목${idx + 1}</label>
       	                    <input type="text" class="w100" value="${opt.srvyQitemOptTxt}">
       	                    <div class="list_last">
       	                        <div class="file_wrap">
       	                            <label class="file_label">파일 선택</label>
       	                            <span class="fileName" style="${fileNameStyle}">첨부 파일 선택</span>
       	                            <input type="file" class="fileInput" style="display:none;">
        	                            <div class="file_list">${fileHtml}</div>
       	                            <button type="button" class="del">삭제</button>
       	                        </div>
       	                    </div>
       	                `;
                        lastInserted.after(row);
                        lastInserted = row;
                    });
                }
            }

            // [IMG_RESP]
            else if (qstType === "IMG_RESP") {
                const row = document.createElement("div");
                row.classList.add("list_row", "qst-type-img-resp", "dynamic-opt");
                row.style.display = "";

                const uniqueId = q.srvyQitemOid || Math.random().toString(36).substr(2, 9);
                const isWithText = !!q.srvyQitemLmt;

                row.innerHTML = `
       	            <label class="list_first">항목</label>
       	            <span class="radio-box">
       	                <input type="radio" name="radio_02_${uniqueId}" ${!isWithText ? 'checked' : ''}>
       	                <label> 파일만 업로드</label>
       	            </span>
       	            <span class="radio-box">
       	                <input type="radio" name="radio_02_${uniqueId}" ${isWithText ? 'checked' : ''}>
       	                <label> 파일 업로드 + 글 입력 (답변 최대 글자수 
       	                    <input type="text" class="wp100 tar" placeholder="2,000" value="${q.srvyQitemLmt || ''}"> (2,000자 이하))
       	                </label>
       	            </span>
       	        `;
                commonRow.after(row);
            }

            // ------------------------------------------------------------
            // 기존 첨부파일 표시 (surveyQstAttach) - 조회 시에도 칩 UI로 보여준다.
            // ------------------------------------------------------------
            const fileWrap = el.querySelector(".qst-common-row .file_wrap");
            const fileListBox = fileWrap?.querySelector(".file_list");
            const nameSpan = fileWrap?.querySelector(".fileName");
            const fileInput = fileWrap?.querySelector(".fileInput");

            // 문항 당 파일 한 개 기준. 다건으로 확장할 때는 배열 순회로 렌더링한다.
            const attach = q.surveyQstAttach[0];
            if (attach && fileListBox) {
                // 기존 첨부칩 렌더링 (data-file-type/existing, data-attach-no로 삭제 대상 식별)
                fileListBox.innerHTML = `
                    <p data-file-type="existing" data-attach-no="${attach.fileOid}">
                        ${attach.originFileName}
                        <a class="icon_del" href="javascript:;">파일삭제</a>
                    </p>
                `;
                // 안내 문구 감추고 파일 입력값은 비워둔다 (새 선택 시 교체)
                if (nameSpan) {
                    nameSpan.textContent = "";
                    nameSpan.style.display = "none";
                }
                if (fileInput) {
                    fileInput.value = "";
                }
            }

            // 버튼 표시 설정 (항목추가, 기타추가)
            const etcBtn = el.querySelector(".btn-add-etc");
            if (etcBtn) {
                const etcOptVisible = q.optList?.some(o => o.etcOptYn === "Y");
                etcBtn.style.display = (qstType === "MULTI" && !etcOptVisible) ? "" : "none";
            }

            const addOptionBtn = el.querySelector(".btn-add-option");
            if (addOptionBtn) {
                const allowed = ["MULTI", "RANK", "IMG_SEL", "RATIO"];
                addOptionBtn.style.display = allowed.includes(qstType) ? "" : "none";
            }

            // 하위문항 표시
            if (isSub) {
                el.classList.add("sub-question");
                if (q.upSrvyQitemOid) el.setAttribute("data-parent-qst-no", q.upSrvyQitemOid);
                const subBtn = el.querySelector(".btn-sub-question");
                if (subBtn) subBtn.remove();
            }

            this.fnRefreshFileInputs(el);
            return el;
        },

        /**
         * 문항의 옵션들 채우기
         */
        fnFillOptions: function (el, q) {

            // MULTI
            if (q.srvyQitemType === "MULTI") {
                q.optList.forEach((opt, idx) => {
                    if (idx === 0) {
                        el.querySelector(".qst-type-multi input").value = opt.srvyQitemOptTxt;
                    } else {
                        const row = document.createElement("div");
                        row.classList.add("list_row", "qst-type-multi");
                        row.innerHTML = `
                            <label class="list_first">항목${idx + 1}</label>
                            <input type="text" class="w100" value="${opt.srvyQitemOptTxt}">
                            <div class="list_last"><button type="button" class="del">삭제</button></div>
                        `;
                        el.querySelector(".question_con").appendChild(row);
                    }
                });
            }
            // SHORT
            if (q.srvyQitemType === "SHORT") {
                el.querySelector(".qst-type-short-setting input").value = q.srvyQitemLmt;
            }

            // LONG
            if (q.srvyQitemType === "LONG") {
                el.querySelector(".qst-type-long-setting input").value = q.srvyQitemLmt;
            }

            // LIKERT
            if (q.srvyQitemType === "LIKERT") {
                el.querySelector("#likertCount").value = q.likertMax;
                this.fnRenderLikertItems(el.querySelector(".question_con"), q.likertMax);

                const likertInputs = el.querySelectorAll(".qst-type-likert-items input");
                likertInputs.forEach((inp, idx) => {
                    inp.value = q.optList[idx]?.srvyQitemOptTxt || "";
                });
            }

            if (q.srvyQitemType === "RANK") {
                q.optList.forEach((opt, idx) => {
                    if (idx === 0) {
                        el.querySelector(".qst-type-multi input").value = opt.srvyQitemOptTxt;
                    } else {
                        const row = document.createElement("div");
                        row.classList.add("list_row", "qst-type-multi");
                        row.innerHTML = `
                            <label class="list_first">항목${idx + 1}</label>
                            <input type="text" class="w100" value="${opt.srvyQitemOptTxt}">
                            <div class="list_last"><button type="button" class="del">삭제</button></div>
                        `;
                        el.querySelector(".question_con").appendChild(row);
                    }
                });
            }
            if (q.srvyQitemType === "RATIO") {
                el.querySelector(".ratio-step").value = q.srvyQitemLmt;

                // 항목 채우기
                q.optList.forEach((opt, idx) => {
                    if (idx === 0) {
                        el.querySelector(".qst-type-multi input").value = opt.srvyQitemOptTxt;
                    } else {
                        const row = document.createElement("div");
                        row.classList.add("list_row", "qst-type-multi");
                        row.innerHTML = `
                            <label class="list_first">항목${idx + 1}</label>
                            <input type="text" class="w100" value="${opt.srvyQitemOptTxt}">
                            <div class="list_last"><button type="button" class="del">삭제</button></div>
                        `;
                        el.querySelector(".question_con").appendChild(row);
                    }
                });
            }
            if (q.srvyQitemType === "IMG_SEL") {
                q.optList.forEach((opt, idx) => {
                    if (idx === 0) {
                        el.querySelector(".qst-type-img-sel input[type='text']").value = opt.srvyQitemOptTxt;
                    } else {
                        const row = document.createElement("div");
                        row.classList.add("list_row", "qst-type-img-sel");
                        row.innerHTML = `
                            <label class="list_first">항목${idx + 1}</label>
                            <input type="text" class="w100" value="${opt.srvyQitemOptTxt}">
                            <div class="list_last">
                                <div class="file_wrap">
                                    <label class="file_label">파일 선택</label>
                                    <span class="fileName">첨부 파일 선택</span>
                                    <input type="file" class="fileInput" style="display:none;">
                                    <div class="file_list"></div>
                                    <button type="button" class="del">삭제</button>
                                </div>
                            </div>
                        `;
                        el.querySelector(".question_con").appendChild(row);
                    }
                });
            }
            if (q.srvyQitemType === "IMG_RESP") {
                const textInput = el.querySelector(".qst-type-img-resp input.wp100");
                if (textInput) textInput.value = q.srvyQitemLmt || "";
            }

        },
        // 에디터 이미지 (Chunk Upload & Sync)
        handleEditorUploadComplete: function (payload) {
            if (!payload || !payload.filePath) return;
            const meta = {
                originalStrgFileNm: payload.originalStrgFileNm || payload.strgFileNm,
                storedStrgFileNm: payload.strgFileNm,
                strgFilePath: payload.strgFilePath,
                strgFileCpct: payload.strgFileCpct || null,
                fileTypeNm: payload.fileTypeNm || ''
            };
            // 중복 방지
            const key = `${meta.filePath}__${meta.storedStrgFileNm}`;
            const idx = this.state.editorFiles.findIndex(item => `${item.filePath}__${item.storedStrgFileNm}` === key);
            if (idx > -1) this.state.editorFiles[idx] = meta;
            else this.state.editorFiles.push(meta);
        },
    };

    $(document).ready(function () {
        admin501_1.init();
    });
</script>
