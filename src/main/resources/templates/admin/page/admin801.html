<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin_layout}">
<head>
    <meta charset="UTF-8">
    <title>시스템관리 > 관리자관리</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div layout:fragment="admin_content" class="right_wrap">
    <div id="admin801SearchWrap" class="search_wrap">
        <ul>
            <li>
                <label for="admin801_user_nm_and_id">성명/아이디</label>
                <input type="text" id="admin801_user_nm_and_id" placeholder="성명 또는 아이디를 입력해주세요.">
            </li>
            <li>
                <label>상태</label>
                <span class="radio-box"><input type="radio" id="admin801_use_yn" name="admin801_use_yn" value="" checked><label for="admin801_use_yn">전체</label></span>
                <span class="radio-box"><input type="radio" id="admin801_use_y" name="admin801_use_yn" value="Y"><label for="admin801_use_y">활성</label></span>
                <span class="radio-box"><input type="radio" id="admin801_use_n" name="admin801_use_yn" value="N"><label for="admin801_use_n">비활성</label></span>
            </li>
            <li>
                <label for="admin801_reg_dt_st">등록일</label>
                <div class="flex_col">
                    <span class="datepicker">
                        <input type="text" id="admin801_reg_dt_st" class="datepick" placeholder="시작일">
                        <img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="선택" title="선택">
                    </span>
                    ~
                    <span class="datepicker">
                        <input type="text" id="admin801_reg_dt_ed" class="datepick" placeholder="종료일">
                        <img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="선택" title="선택">
                    </span>
                </div>
            </li>
            <li>
                <label for="admin801_mpno">휴대폰</label>
                <input type="text" id="admin801_mpno" placeholder="숫자만 입력해주세요." maxlength="11">
            </li>
            <li>
                <label for="admin801_eml_local">이메일</label>
                <input type="text" id="admin801_eml_local" name="admin801_eml" style="width:100px"> @
                <input type="text" id="admin801_eml_dmn" name="admin801_eml" style="width:150px">
                <select id="admin801_eml_dmn_select" class="select" style="width:130px">
                    <option value="">직접입력</option>
                    <option value="naver.com">naver.com</option>
                    <option value="gmail.com">gmail.com</option>
                    <option value="daum.net">daum.net</option>
                    <option value="nate.com">nate.com</option>
                    <option value="nibp.kr">nibp.kr</option>
                </select>
            </li>
            <li>
                <label>개인정보취급권한</label>
                <span class="radio-box"><input type="radio" id="admin801_privacy_yn" name="admin801_privacy_yn" value="" checked><label for="admin801_privacy_yn">전체</label></span>
                <span class="radio-box"><input type="radio" id="admin801_privacy_y" name="admin801_privacy_yn" value="Y"><label for="admin801_privacy_y">활성</label></span>
                <span class="radio-box"><input type="radio" id="admin801_privacy_n" name="admin801_privacy_yn" value="N"><label for="admin801_privacy_n">비활성</label></span>
            </li>
        </ul>

        <div class="s_wrap">
            <a id="admin801_btn_search" class="btn_search" href="javascript:;"><span>검색</span></a>
        </div>
    </div>

    <hr class="h_bg_type">

    <div class="sub_cont_wrap">
        <div class="table_desc">
            <p>총 <strong id="admin801_total_count">0</strong>건</p>
            <!-- 우측 등록 버튼 -->
            <div class="btn_wrap r_type">
                <a href="javascript:;" id="admin801_btn_register_admin" class="btn_basic bg_type01">등록</a>
            </div>
        </div>

        <div class="table_layout02 list_type mb20">
            <table>
                <caption>회원 목록</caption>
                <colgroup>
                    <col style="width:60px;">
                    <col style="width:6%;">
                    <col style="width:6%;">
                    <col style="width:14%;">
                    <col style="width:10%;">
                    <col style="width:auto;">
                    <col style="width:auto;">
                    <col style="width:auto;">
                    <col style="width:auto;">
                    <col style="width:6%;">
                    <col style="width:160px;">
                <thead>
                <tr>
                    <th>번호</th>
                    <th>아이디</th>
                    <th>성명</th>
                    <th>부서</th>
                    <th>휴대폰</th>
                    <th>이메일</th>
                    <th>개인정보<br>취급권한</th>
                    <th>개인정보취급권한<br>시작일시</th>
                    <th>개인정보취급권한<br>종료일시</th>
                    <th>상태</th>
                    <th>등록일시</th>
                </tr>
                </thead>
                <tbody id="admin801_user_list_container"></tbody>
            </table>
            <span class="scroll_img">스크롤</span>
        </div>

        <!-- 페이지네이션 -->
        <div id="paging_wrap" class="paging_wrap">
            <a href="javascript:" class="first page_first">첫 페이지</a>
            <a href="javascript:" class="previous page_prev">전 페이지</a>
            <div class="namber pagination_container"></div>
            <a href="javascript:" class="next page_next">다음 페이지</a>
            <a href="javascript:" class="last page_last">끝 페이지</a>
        </div>
    </div>

</div>

<script layout:fragment="scripts" th:inline="javascript">
    let admin801 = {

        /**
         * 상태
         */
        state: {
            all: null,  // 조회한 데이터
            pageIndex: 1,
            pageCnt: 10,
            loading: false,
        },

        /**
         * 초기 로드
         */
        init: function () {
            // 이벤트 바인딩
            this.initEvent();
            this.fnSetDefaultDate();

            // 저장된 검색조건 복원
            const saved = SearchState.restoreForm('admin801', '.search_wrap');
            if (saved) {
                this.state.pageIndex = saved._extra.pageIndex || 1;
            }

            // 데이터 조회
            this.getListData();
        },

        /**
         * 이벤트 바인딩
         */
        initEvent: function () {
            const _this = this;

            // 등록 시작일
            uiCommon.datepicker.init('#admin801_reg_dt_st', {
                onSelect: function (selectedDate) {
                    $('#admin801_reg_dt_ed').datepicker('option', 'minDate', selectedDate);
                    _this.state.page = 1;
                    _this.getListData();
                }
            });

            // 등록 종료일
            uiCommon.datepicker.init('#admin801_reg_dt_ed', {
                onSelect: function (selectedDate) {
                    $('#admin801_reg_dt_st').datepicker('option', 'maxDate', selectedDate);
                    _this.state.page = 1;
                    _this.getListData();
                }
            });

            // 휴대폰 숫자만 입력
            common.bindNumericOnly('admin801_mpno');

            // 검색 버튼 클릭
            document.querySelector("#admin801_btn_search").addEventListener("click", function (e) {
                e.preventDefault();

                // 검색하면 첫 페이지로 이동
                _this.state.pageIndex = 1;
                _this.getListData();
            });

            // 검색영역 전체 엔터 이벤트
            document.getElementById("admin801SearchWrap").addEventListener('keydown', e => {
                if(e.key !== 'Enter') {
                    return;
                }
                if (e.target.matches('input[type="text"], select')) {
                    e.preventDefault();
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });


            // 검색영역 변경 이벤트
            document.getElementById("admin801SearchWrap").addEventListener('change', e => {
                if (e.target.matches('select, input[type="radio"]')) {
                    e.preventDefault();
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });

            // 등록 버튼 클릭
            document.getElementById("admin801_btn_register_admin").addEventListener("click", function (e) {
                e.preventDefault();
                SearchState.clear('admin801');
                window.location.href = contextPath + "/admin/page/admin801-1";
            });

            // 이메일 도메인 셀렉트 동작
            document.getElementById("admin801_eml_dmn_select").addEventListener("change", function () {
                const val = this.value;
                const emailDomainInput = document.getElementById("admin801_eml_dmn");

                if (val) {
                    // 선택한 도메인을 domain input에 세팅하고 직접 수정 못 하게
                    emailDomainInput.value = val;
                    emailDomainInput.readOnly = true;
                } else {
                    // '직접입력' 선택 시 직접 입력 가능
                    emailDomainInput.value = "";
                    emailDomainInput.readOnly = false;
                    emailDomainInput.focus();
                }
            });
        },

        /**
         * 페이지네이션 렌더링
         */
        renderPagination: function () {
            const _this = this;

            if (!_this.state.all) {
                return;
            }

            const totalPages = _this.state.all.pages;

            // 공통 페이지네이션 함수 호출
            uiCommon.pagination.render({
                currentPage: _this.state.pageIndex,
                totalPages: totalPages,
                onPageChange: function(page) {
                    _this.state.pageIndex = page;
                    _this.getListData();
                }
            });
        },

        /**
         * 메인 테이블 렌더링
         */
        renderTable: function () {
            const tbody = document.getElementById("admin801_user_list_container");
            tbody.innerHTML = "";

            if (!this.state.all || !this.state.all.list || this.state.all.list.length === 0) {
                tbody.innerHTML = `<tr><td class="tac" colspan="11">조회된 결과가 없습니다.</td></tr>`;
                document.getElementById('admin801_total_count').textContent = 0;
                return;
            }

            let html = '';
            this.state.all.list.forEach(function (item) {
                const detailUrl = '/admin/page/admin801-2?userOid=' + encodeURIComponent(item.userOid);

                html += `
                    <tr>
                        <td class="tac">${item.userOid ?? ''}</td>
                        <td class="tac">
                            <a href="${detailUrl}" class="a_link">${item.userId ?? ''}</a>
                        </td>
                        <td class="tac">
                            <a href="${detailUrl}" class="a_link">${item.userNmKorn ?? ''}</a>
                        </td>
                        <td class="tac">${item.instNm ?? ''}</td>
                        <td class="tac">${common.formatPhoneNumber(item.mpnoPfx + item.mpnoMid + item.mpnoSfx) ?? ''}</td>
                        <td class="tac">${common.joinEmail(item.emlLcal, item.emlDmn) ?? ''}</td>
                        <td class="tac">${item.prvcUseYn === 'Y' ? '활성' : '비활성'}</td>
                        <td class="tac">${common.formatDate(item.prvcStartDt) ?? '-'}</td>
                        <td class="tac">${common.formatDate(item.prvcEndDt) ?? '-'}</td>
                        <td class="tac">${common.formatActiveYn(item.useYn)}</td>
                        <td class="tac">${common.formatDateTime(item.regDt) ?? ''}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;

            document.getElementById('admin801_total_count').textContent = this.state.all.total;
        },

        /**
         * 등록일 기본값 설정
         */
        fnSetDefaultDate: function () {
            const today = new Date();
            const fromDt = new Date(today);
            fromDt.setDate(today.getDate() - 15);
            const toDt = new Date(today);
            toDt.setDate(today.getDate());

            const start = fromDt.toISOString().slice(0, 10);
            const end = toDt.toISOString().slice(0, 10);

            $("#admin801_reg_dt_st").val(start);
            $("#admin801_reg_dt_ed").val(end);

            this.state.fromDate = start;
            this.state.toDate = end;
        },

        /**
         * 목록 데이터 조회
         */
        getListData: async function () {
            const _this = this;
            SearchState.saveForm('admin801', '.search_wrap', { pageIndex: _this.state.pageIndex });

            const param = {
                page: _this.state.pageIndex,
                size: _this.state.pageCnt,
                keyword: document.getElementById("admin801_user_nm_and_id").value.trim(),
                useYn: document.querySelector('input[name="admin801_use_yn"]:checked').value,
                regDtFrom: document.getElementById('admin801_reg_dt_st').value,
                regDtTo: document.getElementById('admin801_reg_dt_ed').value,
                mpno: document.getElementById('admin801_mpno').value.trim(),
                emlLcal: document.getElementById('admin801_eml_local').value.trim(),
                emlDmn: document.getElementById('admin801_eml_dmn').value.trim(),
                prvcUseYn: document.querySelector('input[name="admin801_privacy_yn"]:checked').value,
            }

            _this.state.loading = true;
            try {
                const response = await API.post('/api/admin/admin801/users/filter', param);
                _this.state.loading = false
                // 페이지 데이터에 저장
                this.state.all = response;
                this.renderTable();
                this.renderPagination();
            } catch (error) {
                _this.state.loading = false
                console.error('관리자 목록 조회 실패:', error);
                // uiCommon.fnShowAlertModal('관리자 목록 조회에 실패했습니다.');
            }
        }
    };

    $(document).ready(function () {
        admin801.init();
    });
</script>
</body>
</html>
