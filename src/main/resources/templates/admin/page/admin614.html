<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin_layout}">
<head>
    <meta charset="UTF-8">
    <title>알림관리 > 안내(팝업)관리</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div layout:fragment="admin_content" class="right_wrap">
    <div id="admin614SearchWrap" class="search_wrap">
        <ul>
            <li>
                <label for="admin614_keyword">검색어</label>
                <input type="text" id="admin614_keyword" placeholder="번호 또는 제목을 입력해주세요." title="검색어 입력">
            </li>
            <li>
                <label>공개상태</label>
                <span class="radio-box"><input type="radio" id="admin614_open_state_wait" name="admin614_open_state" value="대기"><label for="admin614_open_state_wait">대기</label></span>
                <span class="radio-box"><input type="radio" id="admin614_open_state_on" name="admin614_open_state" value="게재" checked><label for="admin614_open_state_on">게재</label></span>
                <span class="radio-box"><input type="radio" id="admin614_open_state_off" name="admin614_open_state" value="게재종료"><label for="admin614_open_state_off">게재종료</label></span>
            </li>
            <li>
                <label for="admin614_start_dt">등록일</label>
                <div class="flex_col">
                    <span class="datepicker">
                        <input type="text" id="admin614_start_dt" class="datepick">
                        <img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="시작일 선택" title="시작일 선택">
                    </span>
                    ~
                    <span class="datepicker">
                        <input type="text" id="admin614_end_dt" class="datepick">
                        <img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="종료일 선택" title="종료일 선택">
                    </span>
                </div>
            </li>
        </ul>
        <div class="s_wrap"><a id="admin614_btn_search" class="btn_search" href="javascript:;"><span>검색</span></a></div>
    </div>
    <hr class="h_bg_type">
    <div class="sub_cont_wrap">
        <div class="table_desc">
            <p>총 <strong id="admin614_total_count"></strong>건</p>
            <div class="table_top_btn">
                <a href="javascript:;" id="admin614_btn_register_popup" class="btn_basic bg_type01">등록</a>
                <a href="javascript:;" id="admin614_btn_delete" class="btn_basic bg_type02">삭제</a>
                <a href="javascript:;" id="admin614_btn_exl_down" class="s_btn_basic download"><span>엑셀 다운로드</span></a>
            </div>
        </div>
        <div class="table_layout02 list_type mb20">
            <table>
                <caption>안내(팝업)목록</caption>
                <colgroup>
                    <col style="width: 80px;">
                    <col style="width: 80px;">
                    <col style="width: auto;">
                    <col style="width: 15%;">
                    <col style="width: 15%;">
                    <col style="width: 10%;">
                    <col style="width: 10%;">
                </colgroup>
                <thead>
                <tr>
                    <th scope="col">번호</th>
                    <th scope="col"><input type="checkbox"></th>
                    <th scope="col">제목</th>
                    <th scope="col">등록일시</th>
                    <th scope="col">공개기간</th>
                    <th scope="col">공개상태</th>
                    <th scope="col">사용여부</th>
                </tr>
                </thead>
                <tbody id="popup_list_container"></tbody>
            </table>
            <span class="scroll_img">스크롤</span>
        </div>
        <div id="paging_wrap" class="paging_wrap">
            <a href="javascript:" class="first page_first">첫 페이지</a>
            <a href="javascript:" class="previous page_prev">전 페이지</a>
            <div class="namber pagination_container"></div>
            <a href="javascript:" class="next page_next">다음 페이지</a>
            <a href="javascript:" class="last page_last">끝 페이지</a>
        </div>
    </div>
</div>
<th:block layout:fragment="admin_modal">
    <th:block th:replace="~{admin/modal/register_popup :: register_popup}"></th:block>
</th:block>
<script layout:fragment="scripts" th:inline="javascript" type="text/javascript">
    let admin614 = {

        /**
         * 상태
         */
        state: {
            all: null,  // 조회한 데이터
            pageIndex: 1,
            pageCnt: 10
        },

        /**
         * 초기 로드
         */
        init: function () {
            // 이벤트 바인딩
            this.initEvent();

            // 저장된 검색조건 복원
            const saved = SearchState.restoreForm('admin614', '.search_wrap');
            if (saved) {
                this.state.pageIndex = saved._extra.pageIndex || 1;
            }

            // 데이터 조회
            this.getListData();
        },

        /**
         * 이벤트 바인딩
         */
        initEvent: function () {
            const _this = this;

            uiCommon.datepicker.init('#admin614_start_dt', {
                onSelect: async function(selectedDate, inst) {
                    const startDate = $(this).datepicker('getDate');
                    const endDatePicker = $('#admin614_end_dt');
                    endDatePicker.datepicker('option', 'minDate', startDate);

                    const currentEndDate = endDatePicker.datepicker('getDate');
                    if (currentEndDate && startDate && startDate.getTime() > currentEndDate.getTime()) {
                        endDatePicker.datepicker('setDate', startDate);
                    }

                    // 검색
                    _this.state.pageIndex = 1;
                    await _this.getListData();
                }
            });
            uiCommon.datepicker.init('#admin614_end_dt', {
                onSelect: async function(selectedDate, inst) {
                    const endDate = $(this).datepicker('getDate');
                    const startDatePicker = $('#admin614_start_dt');
                    startDatePicker.datepicker('option', 'maxDate', endDate);

                    const currentStartDate = startDatePicker.datepicker('getDate');
                    if (currentStartDate && endDate && endDate.getTime() < currentStartDate.getTime()) {
                        startDatePicker.datepicker('setDate', endDate);
                    }
                    // 검색
                    _this.state.pageIndex = 1;
                    await _this.getListData();
                }
            });

            // 오늘 기준으로 시작일 : -14일, 종료일 : +14일 설정
            document.getElementById("admin614_start_dt").value = common.formatDateOffset(-14);
            document.getElementById("admin614_end_dt").value = common.formatDateOffset(14);

            // 전체 체크박스 클릭
            document.querySelector("thead input[type='checkbox']").addEventListener("change", function (e) {
                const checkboxes = document.querySelectorAll(".row_check");
                checkboxes.forEach(function(checkbox) {
                    checkbox.checked = e.target.checked;
                });
            });

            // 개별 체크박스 클릭 시 전체 체크박스 상태 업데이트
            document.querySelector("#popup_list_container").addEventListener("change", function (e) {
                if (e.target.classList.contains("row_check")) {
                    const allCheckboxes = document.querySelectorAll(".row_check");
                    const checkedCheckboxes = document.querySelectorAll(".row_check:checked");
                    const headerCheckbox = document.querySelector("thead input[type='checkbox']");

                    headerCheckbox.checked = allCheckboxes.length === checkedCheckboxes.length && allCheckboxes.length > 0;
                }
            });

            // 검색 버튼 클릭
            document.getElementById("admin614_btn_search").addEventListener("click", function (e) {
                e.preventDefault();

                // 검색하면 첫 페이지로 이동
                _this.state.pageIndex = 1;
                _this.getListData();
            });

            // 등록 버튼 클릭
            document.getElementById("admin614_btn_register_popup").addEventListener("click", function (e) {
                e.preventDefault();
                _this.fnRegister();
            });

            // 삭제 버튼 클릭
            document.getElementById("admin614_btn_delete").addEventListener("click", function (e) {
                e.preventDefault();
                _this.fnDelete();
            });

            // 엑셀 다운로드 버튼 클릭
            document.getElementById("admin614_btn_exl_down").addEventListener("click", async function (e) {
                e.preventDefault();

                const reason = await uiCommon.fnShowPromptModal('엑셀 다운로드 받으시겠습니까?', {
                    title: '엑셀 다운로드 요청',
                    defaultValue: '',
                    placeholder: '사유 입력',
                });

                
                // 취소 시 조용히 종료
                if (reason === null) {
                    return;
                }

                // 빈 값 체크
                if (reason.trim() === '') {
                    uiCommon.fnShowAlertModal('사유는 필수 입니다.');
                    return;
                }

                // 2자 미만 체크
                if (reason.trim().length < 2) {
                    uiCommon.fnShowAlertModal('사유는 2자 이상 입력해주세요.');
                    return;
                }
				
                const params = {
                    pageId: 'admin614',
                    keyword: document.getElementById('admin614_keyword').value.trim(),
                    openState: document.querySelector('input[name="admin614_open_state"]:checked')?.value || '',
                    popupBgngDt: document.getElementById('admin614_start_dt').value.trim() || '',
                    popupEndDt: document.getElementById('admin614_end_dt').value.trim() || '',
                    reason: reason.trim()
                };

                // 빈 값 필터링
                const filteredParams = Object.fromEntries(
                        Object.entries(params).filter(([_, v]) => v && v !== '')
                );

                try{
                    await API.excelDownload('/api/admin/admin614/list/excel/export', filteredParams);
                } catch(err) {
                    console.error(err);
                    uiCommon.fnShowAlertModal("[error] : " + err, () => uiCommon.fnHideAlertModal());
                }
            });

            // 제목 클릭
            document.querySelector("#popup_list_container").addEventListener("click", function (e) {
                const link = e.target.closest(".popup_link");
                if (!link) return;
                e.preventDefault();

                const id = Number(link.dataset.id);
                _this.fnGoToDetail(id);
            });

            // 검색영역 전체 엔터 이벤트
            document.getElementById("admin614SearchWrap").addEventListener('keydown', e => {
                if(e.key !== 'Enter') {
                    return;
                }
                if (e.target.matches('input[type="text"], select')) {
                    e.preventDefault();
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });
            // 검색영역 변경 이벤트
            document.getElementById("admin614SearchWrap").addEventListener('change', e => {
                if (e.target.matches('select, input[type="radio"]')) {
                    e.preventDefault();
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });
        },

        /**
         * 페이지네이션 렌더링
         */
        renderPagination: function () {
            const _this = this;

            if (!_this.state.all) {
                return;
            }

            const totalPages = _this.state.all.pages;

            // 공통 페이지네이션 함수 호출
            uiCommon.pagination.render({
                currentPage: _this.state.pageIndex,
                totalPages: totalPages,
                onPageChange: function(page) {
                    _this.state.pageIndex = page;
                    _this.getListData();
                }
            });
        },

        /**
         * 메인 테이블 렌더링
         */
        renderTable: function () {
            const tbody = document.getElementById("popup_list_container");
            tbody.innerHTML = '';

            if (!this.state.all || !this.state.all.list || this.state.all.list.length === 0) {
                tbody.innerHTML = '<tr><td class="tac" colspan="7">조회된 결과가 없습니다.</td></tr>';
                document.getElementById('admin614_total_count').textContent = '';
                return;
            }

            const list = this.state.all.list;

            let html = '';
            list.forEach(function(item) {
                html += `
                <tr>
                    <td class="tac">${item.popupOid || ''}</td>
                    <td class="tac">
                        <input type="checkbox" class="row_check" value="${item.popupOid || ''}">
                    </td>
                    <td class="tal"><a href="javascript:" class="a_link popup_link" data-id="${item.popupOid}">${item.popupTtl || ''}</a></td>
                    <td class="tac">${common.formatDateTime(item.regDt)}</td>
                    <td class="tac">${item.popupBgngDt} ~ ${item.popupEndDt || ''}</td>
                    <td class="tac">${item.openState || ''}</td>
                    <td class="tac">${item.useYn === 'Y' ? '사용' : '미사용' || ''}</td>
                </tr>
            `;
            });
            tbody.innerHTML = html;

            document.getElementById('admin614_total_count').textContent = this.state.all.total;
        },

        /**
         * 목록 데이터 조회
         */
        getListData: async function () {
            SearchState.saveForm('admin614', '.search_wrap', { pageIndex: this.state.pageIndex });

            const param = {
                page: this.state.pageIndex,
                size: this.state.pageCnt,
                keyword: document.getElementById('admin614_keyword').value.trim() || '',
                openState: document.querySelector('input[name="admin614_open_state"]:checked')?.value || '',
                popupBgngDt: document.getElementById('admin614_start_dt').value.trim() || '',
                popupEndDt: document.getElementById('admin614_end_dt').value.trim() || ''
            };

            try {
                const response = await API.post('/api/admin/admin614/list/filter', param);

                // 페이지 데이터에 저장
                this.state.all = response;
                this.renderTable();
                this.renderPagination();
            } catch (error) {
                console.error('목록 조회 실패:', error);
                // uiCommon.fnShowAlertModal('목록 조회에 실패했습니다.');
            }
        },

        /**
         * 팝업 등록
         */
        fnRegister: function () {
            SearchState.clear('admin614');
            window.location.href = contextPath + '/admin/page/admin614-1';
        },

        /**
         * 팝업 수정
         */
        fnUpdate: function () {
            // 체크된 항목 찾기
            const checkedItems = document.querySelectorAll(".row_check:checked");
            if (checkedItems.length === 0) {
                uiCommon.fnShowAlertModal('수정할 항목을 선택해주세요.');
                return;
            }

            if (checkedItems.length > 1) {
                uiCommon.fnShowAlertModal('한 개의 항목만 선택해주세요.');
                return;
            }

            // 선택된 팝업 번호로 수정 페이지 이동
            const popupOid = checkedItems[0].value;
            window.location.href = contextPath + '/admin/page/admin614-1?popupOid=' + popupOid;
        },

        /**
         * 팝업 삭제
         */
        fnDelete: function () {
            const _this = this;

            // 체크된 항목 찾기
            const checkedItems = document.querySelectorAll(".row_check:checked");
            if (checkedItems.length === 0) {
                uiCommon.fnShowAlertModal('삭제할 항목을 선택해주세요.');
                return;
            }

            // 선택된 ID 배열 생성
            const ids = [];
            checkedItems.forEach(function(item) {
                ids.push(item.value);
            });

            uiCommon.fnShowConfirmModal(`선택한 ${ids.length}개의 항목을 삭제하시겠습니까?`, async function () {
                uiCommon.fnHideConfirmModal();
                try {
                    // 일괄 삭제 API 호출
                    await API.patch('/api/admin/admin614/delete', { popupOids: ids });
                    uiCommon.fnShowAlertModal('삭제되었습니다.');
                    // 목록 새로고침
                    await _this.getListData();
                } catch (error) {
                    console.error('삭제 실패:', error);
                    uiCommon.fnShowAlertModal('삭제에 실패했습니다.');
                }
            });
        },

        /**
         * 페이지 이동 - 안내(팝업) 상세
         */
        fnGoToDetail: function (popId) {
            const targetPop = this.state.all.list.find(item => item.popupOid === popId);
            if (!targetPop) {
                uiCommon.fnShowAlertModal('상세 정보를 찾을 수 없습니다.');
                return;
            }
            // 상세 페이지로 이동
            window.location.href = contextPath + '/admin/page/admin614-2?popupOid=' + targetPop.popupOid;
        }
    };

    $(document).ready(function () {
        admin614.init();
    });
</script>
</body>
</html>
