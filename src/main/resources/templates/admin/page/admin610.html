<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin_layout}">
<head>
    <meta charset="UTF-8">
    <title>알림관리 > Q&A</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div layout:fragment="admin_content" class="right_wrap">
    <div id="admin610SearchWrap" class="search_wrap">
        <ul>
            <li>
                <label for="lab_01">분류</label>
                <select id="lab_01" title="분류 선택">
                    <option value="">전체</option>
                    <option th:each="category : ${ctgryList}"
                            th:value="${ctgry.cdVal}"
                            th:text="${ctgry.cdNm}"></option>
                </select>
            </li>
            <li>
                <label for="admin610_keyword">검색어</label>
                <input type="text" id="admin610_keyword" placeholder="번호 또는 제목을 입력해주세요." title="검색어 입력">
            </li>
            <li>
                <label>답변여부</label>
                <span class="radio-box"><input type="radio" id="admin610_answer_yn" name="admin610_answer_yn" value="" checked><label for="admin610_answer_yn">전체</label></span>
                <span class="radio-box"><input type="radio" id="admin610_answer_y" name="admin610_answer_yn" value="Y"><label for="admin610_answer_y">Y</label></span>
                <span class="radio-box"><input type="radio" id="admin610_answer_n" name="admin610_answer_yn" value="N"><label for="admin610_answer_n">N</label></span>
            </li>
            <li>
                <label for="admin610_reg_dt_st">등록일</label>
                <div class="flex_col">
                    <span class="datepicker">
                        <input type="text" id="admin610_reg_dt_st" class="datepick">
                        <img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="시작일 선택" title="시작일 선택">
                    </span>

                    ~
                    <span class="datepicker">
                        <input type="text" id="admin610_reg_dt_ed" class="datepick">
                        <img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="종료일 선택" title="종료일 선택">
                    </span>
                </div>
            </li>
        </ul>
        <div class="s_wrap"><a id="admin610_btn_search" class="btn_search" href="javascript:;"><span>검색</span></a></div>
    </div>
    <hr class="h_bg_type">
    <div class="sub_cont_wrap">
        <div class="table_desc">
            <p>총 <strong id="admin610_total_count"></strong>건</p>
            <div class="table_top_btn">
                <a href="javascript:;" id="admin610_btn_exl_down" class="s_btn_basic download"><span>엑셀 다운로드</span></a>
            </div>
        </div>
        <div class="table_layout02 list_type mb20">
            <table>
                <caption>Q&amp;A</caption>
                <colgroup>
                    <col style="width: 60px;">
                    <col style="width: 200px;">
                    <col style="width: auto;">
                    <col style="width: 160px;">
                    <col style="width: 160px;">
                    <col style="width: 80px;">
                    <col style="width: 90px;">
                    <col style="width: 80px;">
                    <col style="width: 80px;">
                    <col style="width: 80px;">
                </colgroup>
                <thead>
                <tr>
                    <th scope="col">번호</th>
                    <th scope="col">분류</th>
                    <th scope="col">제목</th>
                    <th scope="col">등록일시</th>
                    <th scope="col">답변일시</th>
                    <th scope="col">답변여부</th>
                    <th scope="col">답변자</th>
                    <th scope="col">공개여부</th>
                    <th scope="col">조회수</th>
                    <th scope="col">사용여부</th>
                </tr>
                </thead>
                <tbody id="qna_list_container"></tbody>
            </table>
            <span class="scroll_img">스크롤</span>
        </div>
        <div id="paging_wrap" class="paging_wrap">
            <a href="javascript:" class="first page_first">첫 페이지</a>
            <a href="javascript:" class="previous page_prev">전 페이지</a>
            <div class="namber pagination_container"></div>
            <a href="javascript:" class="next page_next">다음 페이지</a>
            <a href="javascript:" class="last page_last">끝 페이지</a>
        </div>
    </div>
</div>
<script layout:fragment="scripts" th:inline="javascript" type="text/javascript">
    let admin610 = {

        /**
         * 상태
         */
        state: {
            all: null,  // 조회한 데이터
            pageIndex: 1,
            pageCnt: 10
        },

        /**
         * 초기 로드
         */
        init: function () {
            // 이벤트 바인딩
            this.initEvent();

            // 저장된 검색조건 복원
            const saved = SearchState.restoreForm('admin610', '.search_wrap');
            if (saved) {
                this.state.pageIndex = saved._extra.pageIndex || 1;
            }

            // 데이터 조회
            this.getListData();
        },

        /**
         * 이벤트 바인딩
         */
        initEvent: function () {
            const _this = this;

            uiCommon.datepicker.init('#admin610_reg_dt_st', {
                onSelect: function(selectedDate, inst) {
                    const startDate = $(this).datepicker('getDate');
                    const endDatePicker = $('#admin610_reg_dt_ed');
                    endDatePicker.datepicker('option', 'minDate', startDate);

                    const currentEndDate = endDatePicker.datepicker('getDate');
                    if (currentEndDate && startDate && startDate.getTime() > currentEndDate.getTime()) {
                        endDatePicker.datepicker('setDate', startDate);
                    }
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });
            uiCommon.datepicker.init('#admin610_reg_dt_ed', {
                onSelect: function(selectedDate, inst) {
                    const endDate = $(this).datepicker('getDate');
                    const startDatePicker = $('#admin610_reg_dt_st');
                    startDatePicker.datepicker('option', 'maxDate', endDate);

                    const currentStartDate = startDatePicker.datepicker('getDate');
                    if (currentStartDate && endDate && endDate.getTime() < currentStartDate.getTime()) {
                        startDatePicker.datepicker('setDate', endDate);
                    }
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });

            // 오늘 기준으로 시작일 : -30일, 종료일 : 오늘 설정
            document.getElementById("admin610_reg_dt_st").value = common.formatDateOffset(-30);
            document.getElementById("admin610_reg_dt_ed").value = common.formatDateOffset();

            // 검색 버튼 클릭
            document.getElementById("admin610_btn_search").addEventListener("click", function (e) {
                e.preventDefault();

                // 검색하면 첫 페이지로 이동
                _this.state.pageIndex = 1;
                _this.getListData();
            });

            // 엑셀 다운로드 버튼 클릭
            document.getElementById("admin610_btn_exl_down").addEventListener("click", async function (e) {
                e.preventDefault();

                const reason = await uiCommon.fnShowPromptModal('엑셀 다운로드 받으시겠습니까?', {
                    title: '엑셀 다운로드 요청',
                    defaultValue: '',
                    placeholder: '사유 입력',
                });

                
                // 취소 시 조용히 종료
                if (reason === null) {
                    return;
                }

                // 빈 값 체크
                if (reason.trim() === '') {
                    uiCommon.fnShowAlertModal('사유는 필수 입니다.');
                    return;
                }

                // 2자 미만 체크
                if (reason.trim().length < 2) {
                    uiCommon.fnShowAlertModal('사유는 2자 이상 입력해주세요.');
                    return;
                }

                const params = {
                    pageId: 'admin610',
                    keyword: document.getElementById('admin610_keyword').value.trim(),
                    answerYn: document.querySelector('input[name="admin610_answer_yn"]:checked')?.value || '',
                    ctgry: document.querySelector('#lab_01').value || '',
                    regDtSt: document.getElementById('admin610_reg_dt_st').value.trim(),
                    regDtEd: document.getElementById('admin610_reg_dt_ed').value.trim(),
                    reason: reason.trim()
                };

                // 빈 값 필터링
                const filteredParams = Object.fromEntries(
                        Object.entries(params).filter(([_, v]) => v && v !== '')
                );

                try{
                    await API.excelDownload('/api/admin/admin610/list/excel/export', filteredParams);
                } catch(err) {
                    console.error(err);
                    uiCommon.fnShowAlertModal("[error] : " + err, () => uiCommon.fnHideAlertModal());
                }
            });

            // 제목 클릭
            document.querySelector("#qna_list_container").addEventListener("click", function (e) {
                const link = e.target.closest(".qna_link");
                if (!link) return;
                e.preventDefault();

                const id = Number(link.dataset.id);
                _this.fnAnswer(id);
            });

            // 검색영역 전체 엔터 이벤트
            document.getElementById("admin610SearchWrap").addEventListener('keydown', e => {
                if(e.key !== 'Enter') {
                    return;
                }
                if (e.target.matches('input[type="text"], select')) {
                    e.preventDefault();
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });
            // 검색영역 변경 이벤트
            document.getElementById("admin610SearchWrap").addEventListener('change', e => {
                if (e.target.matches('select, input[type="radio"]')) {
                    e.preventDefault();
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });
        },

        /**
         * 페이지네이션 렌더링
         */
        renderPagination: function () {
            const _this = this;

            if (!_this.state.all) {
                return;
            }

            const totalPages = _this.state.all.pages;

            // 공통 페이지네이션 함수 호출
            uiCommon.pagination.render({
                currentPage: _this.state.pageIndex,
                totalPages: totalPages,
                onPageChange: function(page) {
                    _this.state.pageIndex = page;
                    _this.getListData();
                }
            });
        },

        /**
         * 메인 테이블 렌더링
         */
        renderTable: function () {
            const tbody = document.getElementById("qna_list_container");
            tbody.innerHTML = '';

            if (!this.state.all || !this.state.all.list || this.state.all.list.length === 0) {
                tbody.innerHTML = '<tr><td class="tac" colspan="9">조회된 결과가 없습니다.</td></tr>';
                document.getElementById('admin610_total_count').textContent = '';
                return;
            }

            const list = this.state.all.list;
            let html = '';
            list.forEach(function (item) {

                html += `
                <tr>
                    <td class="tac">${item.qnaOid || ''}</td>
                    <td class="tac">${item.categoryNm || ''}</td>
                    <td class="tal"><a href="javascript:" class="a_link qna_link" data-id="${item.qnaOid}">${item.title || ''}</a></td>
                    <td class="tac">${common.formatDateTime(item.regDt)}</td>
                    <td class="tac">${common.formatDateTime(item.answers?.[0]?.regDt) || '-'}</td>
                    <td class="tac">${item.answerYn || ''}</td>
                    <td class="tac">${item.answers?.[0]?.wrtrNm || '-'}</td>
                    <td class="tac">${item.prvtPstYn === 'Y' ? '비공개' : '공개' || ''}</td>
                    <td class="tac">${item.inqCnt}</td>
                    <td class="tac">${item.useYn === 'Y' ? '사용' : '미사용' || ''}</td>
                </tr>
            `;
            });
            tbody.innerHTML = html;

            document.getElementById('admin610_total_count').textContent = this.state.all.total;
        },

        /**
         * 목록 데이터 조회
         */
        getListData: async function () {
            SearchState.saveForm('admin610', '.search_wrap', { pageIndex: this.state.pageIndex });

            const param = {
                page: this.state.pageIndex,
                size: this.state.pageCnt,
                keyword: document.getElementById('admin610_keyword').value.trim() || '',
                answerYn: document.querySelector('input[name="admin610_answer_yn"]:checked')?.value || '',
                regDtSt: document.getElementById('admin610_reg_dt_st').value.trim() || '',
                regDtEd: document.getElementById('admin610_reg_dt_ed').value.trim() || '',
                ctgry: document.querySelector('#lab_01').value || '',
            };

            try {
                const response = await API.post('/api/admin/admin610/list/filter', param);

                // 페이지 데이터에 저장
                this.state.all = response;
                this.renderTable();
                this.renderPagination();
            } catch (error) {
                console.error('목록 조회 실패:', error);
                // uiCommon.fnShowAlertModal('목록 조회에 실패했습니다.');
            }
        },

        /**
         * Q&A 답변
         */
        fnAnswer: function (qnaId) {
            const targetQna = this.state.all.list.find(item => item.qnaOid === qnaId);
            if (!targetQna) {
                uiCommon.fnShowAlertModal('상세 정보를 찾을 수 없습니다.');
                return;
            }
            window.location.href = contextPath + '/admin/page/admin610-1?qnaOid=' + targetQna.qnaOid;
        }
    };

    $(document).ready(function () {
        admin610.init();
    });
</script>
</body>
</html>
