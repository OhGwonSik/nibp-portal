<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin_layout}">
<head>
    <meta charset="UTF-8">
    <title>통계 > 만족도 통계</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div layout:fragment="admin_content" class="right_wrap">
    <div class="search_wrap s_type">
        <ul>
            <li>
                <label for="datepicker1">기간</label>
                <span class="datepicker"><input type="text" value="시작일" id="admin708TargetYear"><img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="선택" title="선택"></span>
            </li>
        </ul>
        <div class="s_wrap"><a id="admin708SearchBtn" class="btn_search" href="javascript:;"><span>검색</span></a></div>
    </div>
    <hr class="h_bg_type">
    <div class="sub_cont_wrap">
        <div class="table_top_btn">
            <a href="javascript:;" id="admin708ExcelDownloadBtn" class="s_btn_basic download"><span>엑셀 다운로드</span></a>
        </div>
        <div class="table_layout02 list_type mt10 mb20">
            <table>
                <caption>만족도 통계 테이블</caption>
                <colgroup>
                    <col style="width: auto;">
                    <col style="width: 7%;">
                    <col style="width: 7%;">
                    <col style="width: 7%;">
                    <col style="width: 7%;">
                    <col style="width: 7%;">
                    <col style="width: 7%;">
                    <col style="width: 7%;">
                    <col style="width: 7%;">
                    <col style="width: 7%;">
                    <col style="width: 7%;">
                    <col style="width: 7%;">
                    <col style="width: 7%;">
                    <col style="width: 7%;">
                </colgroup>
                <thead id="admin708TableThead">
                </thead>
                <tbody id="admin708TableTbody">
                </tbody>
            </table>
            <span class="scroll_img">스크롤</span>
        </div>
    </div>
</div>
<script layout:fragment="scripts" th:inline="javascript" type="text/javascript">
    const admin708 = {

        /**
         * 상태
         */
        state: {
            all: []
        },

        /**
         * 초기 로드
         */
        init: function () {
            const _this = this;
            _this.initEvent();
            
         	// 연도별 Datepicker 초기화
            _this.initDatePickers();
        },

        /**
         * 초기화 이벤트 바인딩
         */
        initEvent: function () {
            const _this = this;
            // 달력 초기값
            document.getElementById('admin708TargetYear').value = new Date().getFullYear();
            // 검색 클릭이벤트
            document.getElementById('admin708SearchBtn').addEventListener('click', function(e){
                e.preventDefault();
                _this.fnGetQnaSatisfactionStatistics();
            });

            // 엑셀 다운로드 클릭이벤트
            document.getElementById('admin708ExcelDownloadBtn').addEventListener('click', function(e){
                e.preventDefault();
                _this.fnExcelDownload();
            });

            // 데이터 로딩
            _this.fnGetQnaSatisfactionStatistics();
        },
        
        /**
         * Datepicker 초기화
         */
        initDatePickers: function() {
            const _this = this;
            
            // 'year' 옵션 가져오기
            const yearOptions = uiCommon.monthpicker.getDefaultOptions('year');
            
            // 현재 입력된 값(또는 올해)으로 시작 날짜 설정
            let currentVal = document.getElementById('admin708TargetYear').value;
            if (!currentVal || isNaN(currentVal)) {
                currentVal = new Date().getFullYear();
            }
            
            yearOptions.startDate = new Date(currentVal, 0, 1);
            yearOptions.selectedDates = [new Date(currentVal, 0, 1)];

            // 날짜 선택 시 값 설정 후 조회 함수 호출
            yearOptions.onSelect = function({date, formattedDate}) {
                document.getElementById('admin708TargetYear').value = formattedDate;
                // 연도 변경 시 자동 조회
                _this.fnGetQnaSatisfactionStatistics(); 
            };
            
            // Datepicker 적용
            uiCommon.monthpicker.init('#admin708TargetYear', yearOptions);
        },        

        // 테이블 랜더링
        renderTable: function(){
            const _this = this;
            const targetYear = document.getElementById('admin708TargetYear').value;
            if(!targetYear) {
                return;
            }

            // 테이블 초기화
            const thead = document.getElementById('admin708TableThead');
            const tbody = document.getElementById('admin708TableTbody');
            thead.innerHTML = '';
            tbody.innerHTML = '';

            // 구분컬럼
            const headerRow = document.createElement('tr');
            const thGuBun = document.createElement('th');
            thGuBun.setAttribute('scope', 'col');
            thGuBun.textContent = '구분';
            headerRow.appendChild(thGuBun);

            // 년도별 생성
            const yearPrefix = targetYear.substring(2) + '년 ';
            for (let i = 1; i <= 12; i++) {
                const thMonth = document.createElement('th');
                thMonth.setAttribute('scope', 'col');
                thMonth.textContent = yearPrefix + i + '월';
                headerRow.appendChild(thMonth);
            }

            // 합계 컬럼
            const thTotal = document.createElement('th');
            thTotal.setAttribute('scope', 'col');
            thTotal.className = 'bg_red';
            thTotal.textContent = '합계';
            headerRow.appendChild(thTotal);
            thead.appendChild(headerRow);

            // 데이터 없으면
            if (!_this.state.all || _this.state.all.length === 0) {
                const tr = document.createElement('tr');
                const td = document.createElement('td');
                td.setAttribute('colspan', '14');
                td.textContent = '';
                td.style.textAlign = 'center';
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }

            // 데이터 컬럼명 매핑
            const rowCategories = {
                'publicPost': '공개',
                'privatePost': '비공개',
                'satisfied': '만족',
                'unsatisfied': '불만족',
                'noResponse': '미응답',
                'total': '합계',
                'publicPostRate': '공개율(%)',
                'privatePostRate': '비공개율(%)'
            };

            const pivotedData = {};
            // 합계 데이터 0 세팅
            Object.keys(rowCategories).forEach(key => {
                pivotedData[key] = { 
                    total: 0 
                };
            });

            const totalData = _this.state.all.find(item => item.monthGrp === '(전체누적)');
            const monthlyData = _this.state.all.filter(item => item.monthGrp !== '(전체누적)');

            if (totalData) {
                Object.keys(rowCategories).forEach(key => {
                    pivotedData[key].total = totalData[key] !== undefined && totalData[key] !== null ? totalData[key] : 0;
                });
            }

            // 변환해서 매핑(ex. 2025-01 -> 25년01월)
            monthlyData.forEach(item => {
                if (item.monthGrp) {
                    const month = item.monthGrp.split('-')[1];
                    if (month) {
                        Object.keys(rowCategories).forEach(key => {
                            pivotedData[key][month] = item[key] !== undefined && item[key] !== null ? item[key] : 0;
                        });
                    }
                }
            });

            // 본문 생성
            Object.keys(rowCategories).forEach(catKey => {
                // tr
                const tr = document.createElement('tr');
                // 구분 col
                const tdCat = document.createElement('td');
                // 비율 row인지
                const isRate = catKey.endsWith('Rate');
                // 합계 row인지
                const isTotal = catKey === 'total';

                if(!isTotal){
                    tdCat.className = 'bg_blue';
                } else {
                    tdCat.className = 'bg_red';
                }
                tdCat.textContent = rowCategories[catKey];
                tr.appendChild(tdCat);

                // 월별 데이터
                for (let i = 1; i <= 12; i++) {
                    const monthKey = i < 10 ? '0' + i : String(i);
                    const td = document.createElement('td');
                    let value = pivotedData[catKey][monthKey] || '0';
                    if (isRate && value !== '-') {
                        value += '%';
                    }
                    if(isTotal){
                        td.className = 'bg_red';
                    }
                    td.textContent = value;
                    tr.appendChild(td);
                }

                // 합계 col
                const tdTotal = document.createElement('td');
                tdTotal.className = 'bg_red';
                let totalValue = pivotedData[catKey].total;
                if (isRate && totalValue !== '-') {
                    totalValue += '%';
                }
                tdTotal.textContent = totalValue;
                tr.appendChild(tdTotal);

                tbody.appendChild(tr);
            });
        },

        // 만족도 통계 데이터 조회
        fnGetQnaSatisfactionStatistics: async function(){
            const _this = this;
            const targetYear = document.getElementById('admin708TargetYear').value;
            if(!targetYear){
                uiCommon.fnShowAlertModal('연도를 선택해주세요.');
                return;
            }
            const params = {
                targetYear: targetYear
            };

            const response = await API.get('/api/admin/admin708/qna-satisfaction-statistics', params, {showLoading: true});
            _this.state.all = response || [];
            _this.renderTable();
            
        },

        // 엑셀다운로드
        fnExcelDownload: async function(){
            const _this = this;

            // 컨펌창
            const reason = await uiCommon.fnShowPromptModal('엑셀 다운로드 받으시겠습니까?', {
                qnaTtl: '엑셀 다운로드 요청',
                defaultValue: '',
                placeholder: '사유 입력',
            });

            // 취소 시 조용히 종료
            if (reason === null) {
                return;
            }

            // 빈 값 체크
            if (reason.trim() === '') {
                uiCommon.fnShowAlertModal('사유는 필수 입니다.');
                return;
            }

            // 2자 미만 체크
            if (reason.trim().length < 2) {
                uiCommon.fnShowAlertModal('사유는 2자 이상 입력해주세요.');
                return;
            }
            const params = {
                targetYear: document.getElementById('admin708TargetYear').value,
                reason: reason.trim()
            };
            const response = await API.excelDownload('/api/admin/admin708/excel/export', params, {showLoading: true});
        }
    }
    document.addEventListener("DOMContentLoaded", function() {
        admin708.init();
    });
</script>
</body>
</html>
