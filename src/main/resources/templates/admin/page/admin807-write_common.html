<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin_board_layout}">
<head>
    <meta charset="UTF-8">
    <title th:text="${boardInfo.bbsNm} + ' 관리'">게시글 관리</title>
</head>
<body>
<div layout:fragment="admin_board_content" class="sub_cont_wrap">

    <div class="board_tit mb20">
        <h3 class="sub_tit" th:text="${boardInfo.bbsNm} + ' ' + (${post != null} ? '수정' : '등록')">게시글 등록</h3>
    </div>

    <div class="table_layout02 mb10">
        <table>
            <caption>게시글 입력</caption>
            <colgroup>
                <col style="width: 150px;">
                <col style="width: auto;">
            </colgroup>
            <tbody>
            <tr th:if="${boardInfo.ctgryYn == 'Y' and boardInfo.ctgryList != null}">
                <th scope="row">분류 <span class="chk_txt">*</span></th>
                <td>
                    <select id="category" class="w200">
                        <option value="">선택하세요</option>
                        <option th:each="cat : ${#strings.arraySplit(boardInfo.ctgryList, ',')}"
                                th:value="${#strings.trim(cat)}"
                                th:text="${#strings.trim(cat)}">
                        </option>
                    </select>
                </td>
            </tr>

            <tr th:if="${boardInfo.bbsSeCd == 'COMMON' or boardInfo.bbsSeCd == 'FAQ'}">
                <th scope="row"><label for="startDt">상단고정 기간</label></th>
                <td>
                    <div class="flex_col">
                        <span class="datepicker">
                            <input type="text" id="startDt" class="datepick">
                            <img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="선택" title="선택">
                        </span>
                        ~
                        <span class="datepicker">
                            <input type="text" id="endDt" class="datepick">
                            <img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="선택" title="선택">
                        </span>
                    </div>
                </td>
            </tr>

            <tr th:if="${boardInfo.bbsSeCd == 'USER' or boardInfo.bbsSeCd == 'QNA'}">
                <th scope="row">비밀글</th>
                <td>
                    <span class="chk-box">
                        <input type="checkbox" id="secretYn" name="prvtPstYn" value="Y">
                        <label for="secretYn">비밀글 설정</label>
                    </span>
                </td>
            </tr>

            <tr>
                <th scope="row">
                    <label for="postTitle">
                        <span th:text="${boardInfo.bbsSeCd == 'FAQ' ? '질문' : '제목'}">제목</span>
                        <span class="chk_txt">*</span>
                    </label>
                </th>
                <td>
                    <input type="text" id="postTitle" class="w100"
                           th:placeholder="${boardInfo.bbsSeCd == 'FAQ' ? '질문을 입력하세요' : '제목을 입력하세요'}">
                </td>
            </tr>

            <tr>
                <th scope="row">
                    <label for="boardEditor">
                        <span th:text="${boardInfo.bbsSeCd == 'FAQ' ? '답변' : '내용'}">내용</span>
                    </label>
                </th>
                <td>
                        <textarea class="bor1ddd" name="boardEditor" id="boardEditor" rows="15"
                                  placeholder="내용을 입력하세요"></textarea>
                </td>
            </tr>

            <tr th:if="${boardInfo.bbsSeCd != 'FAQ' and boardInfo.fileUldCnt > 0}">
                <th scope="row">첨부파일</th>
                <td>
                    <div id="file_list" class="flex_col file_list"></div>

                    <div class="file_upload mt10">
                        <label for="attachFile"><span>파일찾기</span></label>
                        <input type="file" id="attachFile" multiple>
                        <span id="file_txt" class="file_txt">
                            파일을 첨부해주세요 (최대 <span th:text="${boardInfo.fileUldCnt}"></span>개)
                        </span>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="btn_wrap mt20">
        <a id="btnSave" href="javascript:;" class="btn_basic bg_type01">저장</a>
        <a id="btnCancel" href="javascript:;" class="btn_basic line_type02">취소</a>
    </div>
</div>

<script layout:fragment="board_scripts" th:inline="javascript" type="text/javascript">
    const admin807_write_common = {
        state: {
            boardInfo: /*[[${boardInfo}]]*/ {},
            postList: /*[[${post}]]*/ null,      // 수정 시 게시글 데이터
            fileList: /*[[${fileList}]]*/ [],    // 수정 시 기존 파일 데이터
            menuCd: '',
            isEdit: false,          // 수정 모드 여부
            files: [],              // 신규 첨부파일 배열
            deletedAttachNos: [],   // 삭제된 기존 파일 번호

            // chunk 업로드 관련 설정
            uploaderStorageKey: 'tempUploadKey_admin807',
            uploadTargetId: null,
            chunkSize: 2 * 1024 * 1024,
            uploadUrl: '/api/common/file/chunk',
            tempDeleteUrl: '/api/common/file/chunk/temp-file',
            rfrncSeCd: 'BOARD_POST',
            isUploading: false
        },

        init: async function () {

           	const params = new URLSearchParams(window.location.search);
        	const menuCd = params.get("menuCd");
        	this.state.menuCd = menuCd;
        	
            // post 데이터가 있으면 수정 모드로 설정
            if (this.state.postList && this.state.postList.bbsPstOid) {
                this.state.isEdit = true;
            }

            this.initUploaderTarget();
            await this.initEditor();

            // 수정 모드라면 데이터 로드
            if (this.state.isEdit) {
                this.loadData();
            }

            this.initEvent();
        },

        initEditor: function() {
            if(typeof CommonCKEditor !== 'undefined') {
                return CommonCKEditor.init({ editorId: 'boardEditor' });
            }
        },

        initUploaderTarget: function () {
            if (this.state.isEdit && this.state.postList && this.state.postList.bbsPstOid) {
                this.state.uploadTargetId = this.state.postList.bbsPstOid;
            } else {
                const storageKey = this.state.uploaderStorageKey;
                let tempId = sessionStorage.getItem(storageKey);
                if (!tempId) {
                    tempId = `temp-${Date.now()}-${Math.random().toString(36).substring(2, 8)}`;
                    sessionStorage.setItem(storageKey, tempId);
                }
                this.state.uploadTargetId = tempId;
            }
        },

        initEvent: function () {
            const _this = this;

            // 저장
            document.getElementById("btnSave").addEventListener("click", (e) => {
                e.preventDefault();
                _this.fnSave();
            });

            // 취소
            document.getElementById("btnCancel").addEventListener("click", (e) => {
                e.preventDefault();
                uiCommon.fnShowConfirmModal('목록으로 이동하시겠습니까?', async () => {
                    uiCommon.fnHideConfirmModal();
                    await _this.cleanupTempFiles();
                    _this.fnGoList();
                });
            });

            // 첨부파일 선택 (FAQ 제외 시 요소가 없을 수 있으므로 체크)
            const attachFile = document.getElementById("attachFile");
            if(attachFile) {
                attachFile.addEventListener("change", (e) => {
                    _this.fnHandleFiles(e);
                });
            }
        },

        /**
         * 수정 모드 데이터 로드
         */
        loadData: function() {
            const post = this.state.postList;
            const files = this.state.fileList || [];

            // 1. 기본 정보 (제목, 작성자)
            document.getElementById("postTitle").value = post.bbsPstTtl || '';
            const writerEl = document.getElementById("writerNm");
            if(writerEl) writerEl.value = post.wrtrNm || '';

            // 2. 분류
            const categoryEl = document.getElementById("category");
            if (categoryEl && post.ctgry) {
                categoryEl.value = post.ctgry;
            }

            // 3. 상단고정 기간 (일반, FAQ)
            const startDtEl = document.getElementById("startDt");
            const endDtEl = document.getElementById("endDt");
            if (startDtEl && post.bgngDt) {
                startDtEl.value = this.formatDate(post.bgngDt);
            }
            if (endDtEl && post.endDt) {
                endDtEl.value = this.formatDate(post.endDt);
            }

            // 4. 비밀글 (사용자게시판)
            const secretEl = document.getElementById("secretYn");
            if (secretEl) {
                secretEl.checked = (post.prvtPstYn === 'Y');
            }

            // 5. 내용 (에디터)
            if (post.bbsPstCn) {
                document.getElementById("boardEditor").value = post.bbsPstCn;
                if(typeof CommonCKEditor !== 'undefined') {
                    CommonCKEditor.setContent('boardEditor', post.bbsPstCn);
                }
            }

            // 6. 기존 파일 렌더링
            if (files.length > 0) {
                this.renderExistingFiles(files);
            }
        },

        formatDate: function(date) {
            if (!date) return '';
            if (typeof date === 'string') {
                return date.substring(0, 10);
            }
            return date;
        },

        // 기존 첨부파일 표시
        renderExistingFiles: function(files) {
            const container = document.getElementById("file_list");
            if (!container) return;

            files.forEach(file => {
                const p = document.createElement('p');
                p.innerHTML = `${file.originFileName} <a class="icon_del" href="javascript:;" onclick="admin807_write_common.deleteExistingFile(${file.fileOid}, this)">삭제</a>`;
                container.appendChild(p);
            });
        },

        // 기존 파일 삭제 (화면 제거 + 삭제 목록 추가)
        deleteExistingFile: function(fileOid, btnElement) {

            this.state.deletedAttachNos.push(fileOid);
            btnElement.parentElement.remove();
        },

        // 신규 파일 선택 핸들러 (chunk 업로드 적용)
        fnHandleFiles: async function(e) {
            const newFiles = Array.from(e.target.files);
            if (newFiles.length === 0) return;

            if (!this.state.uploadTargetId) {
                uiCommon.fnShowAlertModal('업로드 대상 ID를 확인할 수 없습니다.');
                return;
            }

            if (this.state.isUploading) {
                this.updateUploadGuide('다른 파일이 업로드 중입니다.', true);
                return;
            }

            const maxCnt = this.state.boardInfo.fileUldCnt || 0;
            const maxSizeMB = this.state.boardInfo.fileUldSize || 50;
            const maxSizeBytes = maxSizeMB * 1024 * 1024;

            // 현재 파일 개수 체크
            const currentCount = document.getElementById("file_list").childElementCount;
            if (currentCount + newFiles.length > maxCnt) {
                uiCommon.fnShowAlertModal(`첨부파일은 최대 ${maxCnt}개까지만 등록 가능합니다.`);
                e.target.value = '';
                return;
            }

            // 용량 체크
            for (let i = 0; i < newFiles.length; i++) {
                if (newFiles[i].size > maxSizeBytes) {
                    uiCommon.fnShowAlertModal(`파일 '${newFiles[i].name}'의 용량이 ${maxSizeMB}MB를 초과합니다.`);
                    e.target.value = '';
                    return;
                }
            }

            this.setUploading(true, '업로드를 준비 중입니다.');
            for (const file of newFiles) {
                try {
                    const uploadedInfo = await this.uploadChunkedFile(file);
                    if (uploadedInfo) {
                        this.state.files.push(uploadedInfo);
                    }
                } catch (err) {
                    console.error(err);
                    this.setUploading(false);
                    uiCommon.fnShowAlertModal('파일 업로드 중 오류가 발생했습니다.');
                    e.target.value = '';
                    return;
                }
            }
            this.setUploading(false, '');
            this.renderNewFileList();
            const maxFiles = this.state.boardInfo.fileUldCnt || 0;
            this.updateUploadGuide(`파일을 첨부해주세요 (최대 ${maxFiles}개)`);
            e.target.value = '';
        },

        // 신규 파일 렌더링
        renderNewFileList: function() {
            const container = document.getElementById("file_list");

            const newFileEls = container.querySelectorAll('.new_file');
            newFileEls.forEach(el => el.remove());

            this.state.files.forEach((file, idx) => {
                const p = document.createElement('p');
                p.className = 'new_file';
                const fileName = file.originalStrgFileNm || file.name || '알 수 없는 파일';
                const fileSize = file.fileSize ? ` (${this.formatFileSize(file.fileSize)})` : '';
                p.innerHTML = `[신규] ${fileName}${fileSize} <a class="icon_del" href="javascript:;" onclick="admin807_write_common.deleteNewFile(${idx})">삭제</a>`;
                container.appendChild(p);
            });
        },

        deleteNewFile: function(idx) {
            const fileInfo = this.state.files[idx];
            if (!fileInfo) return;
            if (!confirm('해당 파일을 삭제하시겠습니까?')) return;
            this.deleteTempUploadedFile(fileInfo)
                    .then(() => {
                        this.state.files.splice(idx, 1);
                        this.renderNewFileList();
                    })
                    .catch((error) => {
                        console.error(error);
                        this.updateUploadGuide(error.message || '파일 삭제 중 오류가 발생했습니다.', true);
                    });
        },

        uploadChunkedFile: async function (file) {
            if (!file || file.size === 0) {
                throw new Error('비어있는 파일은 업로드할 수 없습니다.');
            }
            const chunkSize = this.state.chunkSize;
            const totalChunks = Math.max(Math.ceil(file.size / chunkSize), 1);
            const identifier = `${this.state.uploadTargetId}-${file.name}-${file.size}-${file.lastModified}`;
            let uploadedInfo = null;

            for (let chunkNumber = 1; chunkNumber <= totalChunks; chunkNumber++) {
                const start = (chunkNumber - 1) * chunkSize;
                const end = Math.min(file.size, start + chunkSize);
                const chunk = file.slice(start, end);

                const formData = new FormData();
                formData.append('file', chunk, file.name);
                formData.append('resumableChunkNumber', chunkNumber);
                formData.append('resumableTotalChunks', totalChunks);
                formData.append('resumableIdentifier', identifier);
                formData.append('resumableFilename', file.name);
                formData.append('strgFileCpct', file.size);
                formData.append('targetId', this.state.uploadTargetId);
                formData.append('rfrncSeCd', this.state.rfrncSeCd);

                const response = await API.upload(this.state.uploadUrl, formData);

                if (chunkNumber === totalChunks) {
                    uploadedInfo = response;
                }

                this.updateUploadGuide(`${file.name} 업로드 중... (${chunkNumber}/${totalChunks})`);
            }

            return uploadedInfo;
        },

        setUploading: function (uploading, message) {
            this.state.isUploading = uploading;
            if (message) {
                this.updateUploadGuide(message);
            }
            const attachFile = document.getElementById("attachFile");
            if (attachFile) {
                attachFile.disabled = uploading;
            }
        },

        updateUploadGuide: function (message, isError) {
            const guideEl = document.getElementById('file_txt');
            if (!guideEl) return;
            guideEl.textContent = message || '';
            if (isError) {
                guideEl.style.color = 'red';
            } else {
                guideEl.style.color = '';
            }
        },

        deleteTempUploadedFile: function (fileInfo, useBeacon) {
            if (!fileInfo) return Promise.resolve();
            return fetch(this.state.tempDeleteUrl, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    filePath: fileInfo.filePath,
                    storedStrgFileNm: fileInfo.storedStrgFileNm
                }),
                keepalive: !!useBeacon
            }).then(res => {
                if (!res.ok) {
                    throw new Error('파일 삭제에 실패했습니다.');
                }
            });
        },

        cleanupTempFiles: function (useBeacon) {
            if (!this.state.files.length) {
                return Promise.resolve();
            }
            const deletions = this.state.files.map(fileInfo =>
                    this.deleteTempUploadedFile(fileInfo, useBeacon).catch((err) => {
                        console.error(err);
                    })
            );
            this.state.files = [];
            return Promise.allSettled(deletions);
        },

        formatFileSize: function (bytes) {
            if (!bytes) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return `${(bytes / Math.pow(1024, i)).toFixed(2)} ${units[i]}`;
        },

        // 저장 (등록/수정)
        fnSave: async function() {
            // 1. 분류 체크
            if (this.state.boardInfo.ctgryYn === 'Y') {
                const categoryEl = document.getElementById("category");
                if (categoryEl && !categoryEl.value) {
                    return uiCommon.fnShowAlertModal("분류를 선택해주세요.");
                }
            }

            // 2. 제목/내용 체크
            const title = document.getElementById("postTitle").value;
            if(!title.trim()) return uiCommon.fnShowAlertModal("제목을 입력해주세요.");

            const content = typeof CommonCKEditor !== 'undefined'
                    ? CommonCKEditor.getContent('boardEditor')
                    : document.getElementById("boardEditor").value;

            // 3. 옵션 값 수집
            // 상단고정 기간 (일반, FAQ)
            let startDt = null;
            let endDt = null;
            const startDtEl = document.getElementById("startDt");
            const endDtEl = document.getElementById("endDt");
            if (startDtEl) startDt = startDtEl.value || null;
            if (endDtEl) endDt = endDtEl.value || null;

            // 비밀글 (사용자게시판)
            let secretYn = 'N';
            const secretEl = document.getElementById("secretYn");
            if (secretEl && secretEl.checked) secretYn = 'Y';

            const menuCd = this.state.menuCd;

            // 5. Payload 구성
            const payload = {
                bbsOid: this.state.boardInfo.bbsOid,
                bbsPstTtl: title,
                bbsPstCn: content,
                ctgry: document.getElementById("category") ? document.getElementById("category").value : null,
                bgngDt: startDt,
                endDt: endDt,
                prvtPstYn: secretYn,
                menuCd: menuCd,

                // 삭제된 파일 번호들 전송
                deleteAttachNos: this.state.deletedAttachNos,

                // chunk 업로드된 파일 정보 전송 (FAQ는 제외)
                attachedFiles: this.state.boardInfo.bbsSeCd !== 'FAQ' ? this.state.files : []
            };

            // 수정 시 글 번호 추가
            if (this.state.isEdit) {
                payload.bbsPstOid = this.state.postList.bbsPstOid;
            }

            // 6. FormData 생성
            const formData = new FormData();
            formData.append("data", new Blob([JSON.stringify(payload)], {type: "application/json"}));

            // 7. API 호출
            const url = this.state.isEdit
                    ? '/api/common/board/post/update'
                    : '/api/common/board/post/insert';

            try {
                await API.upload(url, formData);

                const msg = this.state.isEdit ? "수정되었습니다." : "등록되었습니다.";
                uiCommon.fnShowAlertModal(msg, () => {
                    uiCommon.fnHideAlertModal();
                    this.fnGoList();
                });
            } catch(e) {
                console.error(e);
                uiCommon.fnShowAlertModal("저장 중 오류가 발생했습니다.");
            }
        },

        fnGoList: function() {
            const menuCd = this.state.menuCd;
            location.href = `${contextPath}/admin/board/admin807-list1?menuCd=${menuCd}&bbsOid=${this.state.boardInfo.bbsOid}`;
        }
    };

    document.addEventListener("DOMContentLoaded", function() {
        admin807_write_common.init();
    });

    window.addEventListener('beforeunload', function () {
        admin807_write_common.cleanupTempFiles(true);
    });
</script>
</body>
</html>
