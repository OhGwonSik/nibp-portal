<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{layout/admin_layout}">
<head>
    <title>만족도 조사 결과 인쇄</title>
	<style layout:fragment="style">
        .left_wrap, .header, .location {display: none;}
        .contents_layout {background: #fff}
        
       /* [1. 팝업 기본 레이아웃 - 불필요한 요소 숨김] */
        #header, .left_menu, .footer { display: none !important; }
        
        /* body 기본 여백 제거 */
        body { margin: 0 !important; padding: 0 !important; background: #fff !important; }

        /* 컨텐츠 영역 여백 제어 */
        .right_wrap { 
            margin: 0 !important; 
            width: 100% !important;
            padding: 0 !important; 
            box-sizing: border-box !important; 
        }
		.sub_cont_wrap { 
            width: 100% !important; 
            max-width: 100% !important;
            margin: 0 !important; 
            background: #fff !important; 
            padding: 20px !important;
            box-shadow: none !important; 
        }

        /* 타이틀 상단 여백 강제 제거 */
        .table_desc { margin-top: 20px !important; } /* 팝업 상단과 간격 조정 */
        h3.stit { margin-top: 0 !important; padding-top: 0 !important; }

        /* [2. 인쇄 전용 설정 - 종이 여백 0으로 맞춤] */
        @media print {
            @page { 
                size: A4; 
                margin: 0;
            }
            
            /* 인쇄 시 버튼 숨김 */
            .table_top_btn, .btn_wrap { display: none !important; }
            
            /* 화면 여백 모두 제거 */
            .right_wrap { padding: 0 !important; margin: 0 !important; }
            .sub_cont_wrap { padding: 0 !important; margin: 0 !important; max-width: 100% !important; width: 100%; }
            .table_desc { margin-top: 0 !important; } /* 인쇄물 맨 위 여백 제거 */
            
            /* 배경색 출력 강제 */
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            tr { page-break-inside: avoid; }
        }

        /* [상세 결과 테이블 레이아웃 강제 고정] */
        .result-table {
            width: 100% !important;
            table-layout: fixed !important;
            border-collapse: collapse !important;
            border-top: 2px solid #333 !important;
            margin-top: 10px;
        }
        
        .result-table td {
            vertical-align: top !important;
            padding: 5px !important;
            border-bottom: 1px solid #ccc !important;
        }

        /* 차트와 표 영역 50:50 강제 분할 */
        .col-half { width: 50% !important; max-width: 50% !important; }
        .col-border { border-right: 1px solid #eee !important; }
        
		/* 100% 풀 사이즈 셀 (순위형/주관식용) */
        .col-full { width: 100% !important; vertical-align: top; padding: 10px; border-bottom: 1px solid #ccc; }        

        /* 차트 컨테이너 */
        .chart-wrapper { width: 100% !important; height: 300px !important; overflow: hidden !important; position: relative; }
        .graph_area { width: 100% !important; height: 300px !important; }

        /* 내부 미니 테이블 스타일 */
        .mini-table { 
            width: 100% !important; 
            table-layout: fixed !important;
            border-collapse: collapse !important; 
            font-size: 11px; 
            border: 1px solid #eee; 
        }
        .mini-table th { background: #f9f9f9; padding: 6px; border-bottom: 1px solid #ccc; text-align: center; }
        .mini-table td { padding: 6px; border-bottom: 1px solid #eee; word-break: break-all; }
        
		/* 질문 제목 및 내부 텍스트 왼쪽 정렬 */
        .statistics_inner { text-align: left !important; }
        .qst-title { font-weight: bold; font-size: 15px; margin-bottom: 10px; background: #f4f4f4; padding: 8px; border-bottom: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>

<div layout:fragment="admin_content" class="right_wrap">
    <div class="sub_cont_wrap">
        
        <div class="table_desc">
            <h3 class="stit mb0">만족도조사 결과</h3>
            <div class="table_top_btn">
                <a href="javascript:window.print()" class="s_btn_basic print"><span>인쇄</span></a>
                <a href="javascript:window.close()" class="btn_basic bg_type02">닫기</a>
            </div>
        </div>

        <div class="table_layout02 t_print">
            <table style="table-layout: fixed;">
                <caption>투입인력 정보</caption>
                <colgroup>
                    <col style="width: 15%;">
                    <col style="width: 35%;">
                    <col style="width: 15%;">
                    <col style="width: 35%;">
                </colgroup>
                <tbody>
                <tr>
                    <th scope="row">설문지명</th>
                    <td colspan="3" id="admin5022SurveyTitle"></td>
                </tr>
                <tr>
                    <th scope="row">조사기간</th>
                    <td id="admin5022Period"></td>
                   	<th scope="row">조사참여자수</th>
                    <td id="admin5022ParticipantCount"></td>

                </tr>
                </tbody>
            </table>
        </div>

        <h3 class="stit">상세 결과</h3>
        
        <table class="result-table">
            <caption>설문 응답 테이블</caption>
            <colgroup>
                <col style="width: 50%;">
                <col style="width: 50%;">
            </colgroup>
            <tbody id="admin5022GraphList"></tbody>
        </table>

        <div class="btn_wrap mt30" style="text-align: center;">
            <a href="javascript:window.close()" class="btn_basic bg_type02">닫기</a>
        </div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/6.0.0/echarts.min.js"></script>

<script layout:fragment="scripts" th:inline="javascript">
    const admin502_2 = {
        state: {
        	all: {},
        	filePath: /*[[${basicFilePath}]]*/ ''
    	},

        init: async function () {
            const params = new URLSearchParams(window.location.search);
            const srvyOid = params.get("srvyOid");

            if (!srvyOid) {
                uiCommon.fnShowAlertModal('잘못된 접근입니다.', function(){
                	window.close();
                });
                return;
            }

            try {
                const param = { srvyOid: srvyOid };
                const response = await API.post('/api/admin/admin502/survey/detail', param);
                if (response) {
                    this.state.all = response;
                    this.renderBasicInfo();
                    this.renderSurveyTable();
                }
            } catch (error) {
                console.error("데이터 로드 실패", error);
            }
        },

        renderBasicInfo: function() {
            const data = this.state.all;
            
            // document.querySelector 방식으로 값 바인딩
            document.querySelector('#admin5022SurveyTitle').textContent = data.srvyTtl || '-';
            document.querySelector('#admin5022Period').textContent = data.surveyPeriod || '-';
            document.querySelector('#admin5022ParticipantCount').textContent = (data.participantCount || 0) + '명';

        },

        renderSurveyTable: function () {
            const container = document.getElementById('admin5022GraphList');
            container.innerHTML = '';

            const data = this.state.all.questions || [];

            data.forEach((qst) => {
                // 문항 제목 행
                const titleRow = `
                    <tr>
                        <td colspan="2" class="qst-title">
                            ${qst.displayQNo}. ${qst.srvyQitemTtl}
                        </td>
                    </tr>
                `;
                container.insertAdjacentHTML('beforeend', titleRow);

                switch(qst.srvyQitemType) {
                    case 'MULTI':
                    case 'IMG_SEL':
                        this.renderMultiChart(qst);
                        break;
                    case 'LIKERT':
                        this.renderLikertChart(qst);
                        break;
                    case 'SHORT':
                    case 'LONG':
                        this.renderTextResponses(qst);
                        break;
                    case 'RANK':
                        this.renderRankChart(qst);
                        break;
                    case 'RATIO':
                        this.renderRatioChart(qst);
                        break;    
                    case 'IMG_RESP':
                        this.renderImageResponses(qst);
                        break;                        
                }
            });
        },

        renderMultiChart: function(qstData) {
            const container = document.getElementById('admin5022GraphList');
            const chartId = `print-chart-${qstData.srvyQitemOid}`;

            const totalCount = qstData.options.reduce((sum, opt) => sum + (opt.respCount || 0), 0);
            let resultTableRows = '';
            
            // 미니 테이블 인라인 스타일 (인쇄 안전성 확보)
            const tdStyleLeft = 'text-align:left; padding-left:5px;';
            const tdStyleCenter = 'text-align:center;';

            qstData.options.forEach(opt => {
                const count = opt.respCount || 0;
                const percentage = totalCount > 0 ? ((count / totalCount) * 100).toFixed(1) : 0;
                resultTableRows += `
                    <tr>
                        <td style="${tdStyleLeft}">${opt.srvyQitemOptTxt}</td>
                        <td style="${tdStyleCenter}">${count}</td>
                        <td style="${tdStyleCenter}">${percentage}%</td>
                    </tr>
                `;
            });

            let guideText = '';
            if (qstData.srvyQitemType === 'MULTI' && qstData.plrlChcYn === 'Y') {
                guideText = qstData.srvyQitemLmt > 1 ? `※ 최대 ${qstData.srvyQitemLmt}개 중복 선택` : `※ 중복 선택 가능`;
            }

            // 차트(col-border)와 표(col-half)를 td로 나눔. width: 50%는 CSS에서 강제됨.
            const contentRow = `
                <tr>
                    <td class="col-half col-border">
                        <div class="chart-wrapper">
                            <div id="${chartId}" class="graph_area"></div>
                        </div>
                    </td>
                    <td class="col-half">
                        <table class="mini-table">
                            <colgroup>
                                <col style="width:60%"> <col style="width:20%"> <col style="width:20%">
                            </colgroup>
                            <thead>
                                <tr>
                                    <th>항목</th>
                                    <th>No</th>
                                    <th>%</th>
                                </tr>
                            </thead>
                            <tbody>${resultTableRows}</tbody>
                        </table>
                        ${guideText ? `<div style="margin-top:10px; color:#888; font-size:12px; text-align:left;">${guideText}</div>` : ''}
                    </td>
                </tr>
            `;
            container.insertAdjacentHTML('beforeend', contentRow);

            setTimeout(() => {
                const chartDom = document.getElementById(chartId);
                const myChart = echarts.init(chartDom);
                
                const option = {
                    color: ['#00286E', '#327ACC', '#A6C4E8', '#D8E1EA'],
                    tooltip: {
                        trigger: 'item',
                        formatter: '{b}: {c}명 ({d}%)'
                    },
                    legend: {
                        orient: 'horizontal',
                        left: 'center',
                        bottom: 0
                    },
                    // 그리드 설정으로 차트가 잘리지 않게 함
                    grid: { containLabel: true, left: '5%', right: '5%' },
                    series: [{
                        name: '응답수',
                        type: 'pie',
                        radius: '55%', /* 반지름 조절 */
                        center: ['50%', '45%'],
                        data: qstData.options.map(opt => ({
                            value: opt.respCount,
                            name: opt.srvyQitemOptTxt
                        })),
                        emphasis: {
                            itemStyle: {
                                shadowBlur: 10,
                                shadowOffsetX: 0,
                                shadowColor: 'rgba(0, 0, 0, 0.5)'
                            }
                        }
                    }]
                };

                myChart.setOption(option);
                // [중요] 렌더링 직후 리사이징하여 컨테이너 너비에 맞춤
                myChart.resize();
            }, 100); // 딜레이를 조금 주어 DOM 렌더링 보장
        },

        renderLikertChart: function(qstData) {
            const container = document.getElementById('admin5022GraphList');
            const chartId = `print-chart-${qstData.srvyQitemOid}`;
            const totalCount = qstData.options.reduce((sum, item) => sum + (item.respCount || 0), 0);
            
            let resultTableRows = '';
            const tdStyleLeft = 'text-align:left; padding-left:5px;';
            const tdStyleCenter = 'text-align:center;';

            qstData.options.forEach(item => {
                const count = item.respCount || 0;
                const percentage = totalCount > 0 ? ((count / totalCount) * 100).toFixed(1) : 0;
                resultTableRows += `
                    <tr>
                        <td style="${tdStyleLeft}">${item.scaleValue}점</td>
                        <td style="${tdStyleCenter}">${count}</td>
                        <td style="${tdStyleCenter}">${percentage}%</td>
                    </tr>
                `;
            });

            const contentRow = `
                <tr>
                    <td class="col-half col-border">
                        <div class="chart-wrapper">
                            <div id="${chartId}" class="graph_area"></div>
                        </div>
                    </td>
                    <td class="col-half">
                        <table class="mini-table">
                            <colgroup><col style="width:60%"><col style="width:20%"><col style="width:20%"></colgroup>
                            <thead>
                                <tr>
                                    <th>점수</th><th>No</th><th>%</th>
                                </tr>
                            </thead>
                            <tbody>${resultTableRows}</tbody>
                        </table>
                    </td>
                </tr>
            `;
            container.insertAdjacentHTML('beforeend', contentRow);

            setTimeout(() => {
                const chartDom = document.getElementById(chartId);
                const myChart = echarts.init(chartDom);
                const option = {
                    color: ['#00286E', '#327ACC', '#A6C4E8', '#D8E1EA'],
                    tooltip: { trigger: 'item', formatter: '{b}: {c}명 ({d}%)' },
                    legend: { orient: 'horizontal', left: 'center', bottom: 0 },
                    grid: { containLabel: true, left: '5%', right: '5%' },
                    series: [{
                        name: '응답수',
                        type: 'pie',
                        radius: '55%',
                        center: ['50%', '45%'],
                        data: qstData.options.map(item => ({
                            value: item.respCount,
                            name: item.scaleValue + '점'
                        })),
                        emphasis: { itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0, 0, 0, 0.5)' } }
                    }]
                };
                myChart.setOption(option);
                myChart.resize();
            }, 100);
        },

        renderTextResponses: function(qstData) {
            const container = document.getElementById('admin5022GraphList');
            let rows = '';
            
            if (qstData.responses && qstData.responses.length > 0) {
                qstData.responses.forEach(res => {
                    rows += `<div style="padding:8px 0; border-bottom:1px dashed #eee; font-size:13px;">
                                ${res.srvyRspnsTxt} <span style="color:#999; font-size:11px;">(${res.regDt || ''}${res.srvyRspdntNm ? '- ' + res.srvyRspdntNm : ''})</span>
                             </div>`;
                });
            } else {
                rows = `<div style="padding:20px; color:#999; text-align:center;">응답이 없습니다.</div>`;
            }

            const contentRow = `
                <tr>
                    <td colspan="2" style="padding:10px;">
                        <div style="height:300px; overflow-y:auto; border:1px solid #eee; padding:10px;">
                            ${rows}
                        </div>
                    </td>
                </tr>
            `;
            container.insertAdjacentHTML('beforeend', contentRow);
        },

        renderRankChart: function(qstData) {
            const container = document.getElementById('admin5022GraphList');
            
            if (!qstData.responses || qstData.responses.length === 0) {
                const noDataRow = `
                    <tr>
                        <td colspan="2" style="padding:50px; text-align:center; color:#999; background:#f9f9f9;">응답 데이터가 없습니다.</td>
                    </tr>
                `;
                container.insertAdjacentHTML('beforeend', noDataRow);
                return;
            }

            const chartId = `print-chart-${qstData.srvyQitemOid}`;
            const ranks = [...new Set(qstData.responses.map(r => r.srvyRspnsRank))].sort((a, b) => a - b);
            const options = [...new Set(qstData.responses.map(r => r.srvyQitemOptTxt))];
            
            const theadCols = ranks.map(rank => `<th>${rank}위</th>`).join('');
            let resultTableRows = '';
            const tdStyle = 'text-align:center;';
            const tdStyleLeft = 'text-align:left; padding-left:5px;';

            options.forEach(opt => {
                const rankCells = ranks.map(rank => {
                    const found = qstData.responses.find(r => r.srvyRspnsRank === rank && r.srvyQitemOptTxt === opt);
                    return `<td style="${tdStyle}">${found ? found.respCount : 0}</td>`;
                }).join('');
                resultTableRows += `<tr><td style="${tdStyleLeft}">${opt}</td>${rankCells}</tr>`;
            });

            const colCount = ranks.length + 1;
            const colWidth = Math.floor(100 / colCount);
            const colgroups = `<col style="width: ${colWidth}%;">`.repeat(colCount);

            const contentRow = `
                <tr>
                    <td class="col-half col-border">
                        <div class="chart-wrapper">
                            <div id="${chartId}" class="graph_area"></div>
                        </div>
                    </td>
                    <td class="col-half">
                        <table class="mini-table">
                            <colgroup>${colgroups}</colgroup>
                            <thead>
                                <tr>
                                    <th>항목</th>
                                    ${theadCols}
                                </tr>
                            </thead>
                            <tbody>${resultTableRows}</tbody>
                        </table>
                    </td>
                </tr>
            `;
            container.insertAdjacentHTML('beforeend', contentRow);

            setTimeout(() => {
                const chartDom = document.getElementById(chartId);
                const myChart = echarts.init(chartDom);
                const series = ranks.map(rank => ({
                    name: `${rank}순위`,
                    type: 'bar',
                    data: options.map(opt => {
                        const found = qstData.responses.find(r => r.srvyRspnsRank === rank && r.srvyQitemOptTxt === opt);
                        return found ? found.respCount : 0;
                    })
                }));
                const option = {
                    color: ['#00286E', '#327ACC', '#A6C4E8', '#D8E1EA'],
                    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                    legend: { data: ranks.map(r => `${r}순위`), bottom: 0 },
                    grid: { left: '3%', right: '4%', bottom: '15%', containLabel: true },
                    xAxis: { type: 'category', data: options },
                    yAxis: { type: 'value' },
                    series: series
                };
                myChart.setOption(option);
                myChart.resize();
            }, 100);
        },
        
        /**
         * 비율(RATIO) - 방사형 차트
         */
        renderRatioChart: function(qstData) {
            const container = document.getElementById('admin5022GraphList');
            
            // 데이터 없음 처리
            if (!qstData.options || qstData.options.length === 0) {
                const noDataRow = `
                    <tr><td colspan="2" style="padding:50px; text-align:center; color:#999; background:#f9f9f9;">데이터가 없습니다.</td></tr>
                `;
                container.insertAdjacentHTML('beforeend', noDataRow);
                return;
            }

            const chartId = `print-chart-${qstData.srvyQitemOid}`;
            
            // 데이터 가공
            let resultTableRows = '';
            const indicatorData = [];
            const seriesData = [];
            let maxScore = 5; // 기본 5점 만점 (데이터에 따라 자동 증가)

            // 인쇄용 인라인 스타일
            const tdStyleLeft = 'text-align:left; padding-left:5px;';
            const tdStyleCenter = 'text-align:center;';

            qstData.options.forEach(opt => {
                const avg = opt.averageValue || 0;
                if(avg > maxScore) maxScore = Math.ceil(avg);

                // 우측 미니 테이블 행 생성
                resultTableRows += `
                    <tr>
                        <td style="${tdStyleLeft}">${opt.srvyQitemOptTxt}</td>
                        <td style="${tdStyleCenter}"><strong>${avg.toFixed(2)}</strong> 점</td>
                    </tr>
                `;
                
                // 차트 데이터 적재
                indicatorData.push({ name: opt.srvyQitemOptTxt, max: maxScore });
                seriesData.push(avg);
            });

            // HTML 구조 생성 (좌측 차트 / 우측 테이블)
            const contentRow = `
                <tr>
                    <td class="col-half col-border">
                        <div class="chart-wrapper">
                            <div id="${chartId}" class="graph_area"></div>
                        </div>
                    </td>
                    <td class="col-half">
                        <table class="mini-table">
                            <colgroup>
                                <col style="width:70%"> <col style="width:30%">
                            </colgroup>
                            <thead>
                                <tr>
                                    <th>평가 항목</th>
                                    <th>평균 점수</th>
                                </tr>
                            </thead>
                            <tbody>${resultTableRows}</tbody>
                        </table>
                    </td>
                </tr>
            `;
            container.insertAdjacentHTML('beforeend', contentRow);

            // 차트 렌더링
            setTimeout(() => {
                const chartDom = document.getElementById(chartId);
                const myChart = echarts.init(chartDom);
                
                const option = {
                    animation: false, // 인쇄용이므로 애니메이션 끔
                    radar: {
                        indicator: indicatorData,
                        radius: '65%', // 차트 크기 적절히 조절
                        center: ['50%', '50%'],
                        splitArea: {
                            areaStyle: {
                                color: ['#fff', '#f9f9f9', '#fff', '#f9f9f9']
                            }
                        }
                    },
                    series: [{
                        name: '평균 점수',
                        type: 'radar',
                        data: [
                            {
                                value: seriesData,
                                name: '평균 점수',
                                areaStyle: {
                                    color: 'rgba(50, 122, 204, 0.3)'
                                },
                                lineStyle: {
                                    color: '#327ACC'
                                },
                                itemStyle: {
                                    color: '#327ACC'
                                }
                            }
                        ]
                    }]
                };

                myChart.setOption(option);
                myChart.resize();
            }, 100);
        },
        
        /**
         * 이미지 응답형(IMG_RESP) - 인쇄용 렌더링
         */
        renderImageResponses: function(qstData) {
            const container = document.getElementById('admin5022GraphList');
            const basePath = this.state.filePath || ''; 
            
            let rows = '';

            // 1. 응답 데이터가 있는 경우
            if (qstData.responses && qstData.responses.length > 0) {
                qstData.responses.forEach(res => {
                    let imgHtml = '';
                    
                    // 파일 정보가 있으면 이미지 태그 생성
                    if (res.respFilePath && res.respFileName) {
                        const fileUrl = `${basePath}${res.respFilePath}/${res.respFileName}`;
                        // 인쇄 시 이미지가 너무 크면 잘릴 수 있으므로 max-width 설정
                        imgHtml = `
                            <div style="margin-bottom:10px;">
                                <img src="${fileUrl}" alt="${res.respFileName}" 
                                     style="max-width: 400px; max-height: 400px; border: 1px solid #ddd; padding: 2px;"
                                     onerror="this.style.display='none';">
                            </div>
                        `;
                    }

                    rows += `
                        <div style="padding: 15px 0; border-bottom: 1px dashed #eee; text-align: left;">
                            ${imgHtml}
                            <div style="font-size: 13px; white-space: pre-wrap;">${res.srvyRspnsTxt || ''}</div>
                            <div style="color: #999; font-size: 11px; margin-top: 5px;">
                                (${res.regDt || ''} ${res.srvyRspdntNm ? '- ' + res.srvyRspdntNm : ''})
                            </div>
                        </div>
                    `;
                });
            } else {
                // 2. 응답이 없는 경우
                rows = `<div style="padding: 20px; color: #999; text-align: center;">응답이 없습니다.</div>`;
            }

            // HTML 생성 (인쇄 페이지라 높이 제한 없이 내용만큼 늘어나게 div 구성)
            const contentRow = `
                <tr>
                    <td colspan="2" style="padding: 10px;">
                        <div style="border: 1px solid #eee; padding: 10px;">
                            ${rows}
                        </div>
                    </td>
                </tr>
            `;
            container.insertAdjacentHTML('beforeend', contentRow);
        },        
    };

    $(document).ready(function () {
        admin502_2.init();
    });
</script>
</body>
</html>
