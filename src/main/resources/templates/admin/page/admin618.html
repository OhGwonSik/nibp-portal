<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin_layout}">
<head>
    <meta charset="UTF-8">
    <title>알림관리 > 팝업존목록</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div layout:fragment="admin_content" class="right_wrap">
    <div class="location_wrap">
        <div class="search_wrap col30">
            <ul>
                <li>
                    <input type="text" id="admin618_keyword" placeholder="검색어를 입력하세요" title="검색어 입력">
                </li>
                <li>
                    <label>공개여부</label>
                    <span class="radio-box">
                        <input type="radio" id="admin618_open_yn" name="admin618_open_yn" value="" checked>
                        <label for="admin618_open_yn">전체</label>
                    </span>
                    <span class="radio-box">
                        <input type="radio" id="admin618_open_yn_y" name="admin618_open_yn" value="Y">
                        <label for="admin618_open_yn_y">공개</label>
                    </span>
                    <span class="radio-box">
                        <input type="radio" id="admin618_open_yn_n" name="admin618_open_yn" value="N">
                        <label for="admin618_open_yn_n">비공개</label>
                    </span>
                </li>
                <li>
                    <label for="admin618_start_dt">등록일</label>
                    <div class="flex_col">
                        <span class="datepicker">
                            <input type="text" value="시작일" id="admin618_start_dt" class="datepick">
                            <img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="선택" title="선택">
                        </span>
                        ~
                        <span class="datepicker">
                            <input type="text" value="종료일" id="admin618_end_dt" class="datepick">
                            <img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="선택" title="선택">
                        </span>
                    </div>
                </li>
            </ul>
            <div class="s_wrap">
                <a id="admin618_btn_search" class="btn_search" href="javascript:;"><span>검색</span></a>
            </div>
        </div>
    </div>
    <hr class="h_bg_type">
    <div class="sub_cont_wrap">
        <div class="table_desc">
            <p>총 <strong id="admin618_total_count"></strong>건</p>
            <div class="table_top_btn">
                <a id="admin618_btn_register_card" href="javascript:;" class="btn_basic bg_type01">등록</a>
                <a id="admin618_btn_delete" href="javascript:;" class="btn_basic bg_type02">삭제</a>
                <a id="admin618_btn_exl_down" href="javascript:;" class="s_btn_basic download"><span>엑셀 다운로드</span></a>
            </div>
        </div>
        <div class="table_layout02 list_type mb20">
            <table>
                <caption>팝업존목록</caption>
                <colgroup>
                    <col style="width: 60px;">
                    <col style="width: 60px;">
                    <col style="width: auto;">
                    <col style="width: 160px;">
                    <col style="width: 120px;">
                    <col style="width: 100px;">
                    <col style="width: 100px;">
                </colgroup>
                <thead>
                <tr>
                    <th scope="col">번호</th>
                    <th scope="col"><input type="checkbox" id="all_check"></th>
                    <th scope="col">제목</th>
                    <th scope="col">등록일시</th>
                    <th scope="col">공개여부</th>
                    <th scope="col">조회수</th>
                    <th scope="col">사용여부</th>
                </tr>
                </thead>
                <tbody id="card_list_container"></tbody>
            </table>
            <span class="scroll_img">스크롤</span>
        </div>
        <div id="paging_wrap" class="paging_wrap">
            <a href="javascript:" class="first page_first">첫 페이지</a>
            <a href="javascript:" class="previous page_prev">전 페이지</a>
            <div class="namber admin618_pagination_container"></div>
            <a href="javascript:" class="next page_next">다음 페이지</a>
            <a href="javascript:" class="last page_last">끝 페이지</a>
        </div>
    </div>
</div>
<script layout:fragment="scripts" th:inline="javascript" type="text/javascript">
    let admin618 = {

        /**
         * 상태
         */
        state: {
            all: null,  // 조회한 데이터
            pageIndex: 1,
            pageCnt: 10
        },

        /**
         * 초기 로드
         */
        init: function () {
            // 이벤트 바인딩
            this.initEvent();

            // 저장된 검색조건 복원
            const saved = SearchState.restoreForm('admin618', '.search_wrap');
            if (saved) {
                this.state.pageIndex = saved._extra.pageIndex || 1;
            }

            // 데이터 조회
            this.getListData();
        },

        /**
         * 이벤트 바인딩
         */
        initEvent: function () {
            const _this = this;

            uiCommon.datepicker.init('#admin618_start_dt', {
                onSelect: function(selectedDate, inst) {
                    const startDate = $(this).datepicker('getDate');
                    const endDatePicker = $('#admin618_end_dt');
                    endDatePicker.datepicker('option', 'minDate', startDate);

                    const currentEndDate = endDatePicker.datepicker('getDate');
                    if (currentEndDate && startDate && startDate.getTime() > currentEndDate.getTime()) {
                        endDatePicker.datepicker('setDate', startDate);
                    }
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });
            uiCommon.datepicker.init('#admin618_end_dt', {
                onSelect: function(selectedDate, inst) {
                    const endDate = $(this).datepicker('getDate');
                    const startDatePicker = $('#admin618_start_dt');
                    startDatePicker.datepicker('option', 'maxDate', endDate);

                    const currentStartDate = startDatePicker.datepicker('getDate');
                    if (currentStartDate && endDate && endDate.getTime() < currentStartDate.getTime()) {
                        startDatePicker.datepicker('setDate', endDate);
                    }
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });

            // 오늘 기준으로 시작일 : -30일, 종료일 : 오늘 설정
            document.getElementById("admin618_start_dt").value = common.formatDateOffset(-30);
            document.getElementById("admin618_end_dt").value = common.formatDateOffset();

            // 검색 버튼 클릭
            document.getElementById("admin618_btn_search").addEventListener("click", function (e) {
                e.preventDefault();
                _this.state.pageIndex = 1;
                _this.getListData();
            });

            // 키워드 엔터키 검색
            document.getElementById("admin618_keyword").addEventListener("keydown", function (e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });

            // 공개여부 라디오 변경 시 검색
            document.querySelectorAll('input[name="admin618_open_yn"]').forEach(function (radio) {
                radio.addEventListener("change", function () {
                    _this.state.pageIndex = 1;
                    _this.getListData();
                });
            });

            // 등록 버튼 클릭
            document.getElementById("admin618_btn_register_card").addEventListener("click", function (e) {
                e.preventDefault();
                _this.fnRegister();
            });

            // 삭제 버튼 클릭
            document.getElementById("admin618_btn_delete").addEventListener("click", function (e) {
                e.preventDefault();
                _this.fnDelete();
            });

            // 엑셀 다운로드 버튼 클릭
            document.getElementById("admin618_btn_exl_down").addEventListener("click", async function (e) {
                e.preventDefault();
                await _this.fnDownloadExcel();
            });

            // 전체 선택 체크박스
            document.getElementById("all_check").addEventListener("change", function () {
                const isChecked = this.checked;
                document.querySelectorAll(".row_check").forEach(function(checkbox) {
                    checkbox.checked = isChecked;
                });
            });

            // 개별 체크박스 클릭 시 전체 선택 체크박스 상태 업데이트
            document.addEventListener("change", function (e) {
                if (e.target.classList.contains("row_check")) {
                    const totalCheckboxes = document.querySelectorAll(".row_check").length;
                    const checkedCheckboxes = document.querySelectorAll(".row_check:checked").length;
                    document.getElementById("all_check").checked = totalCheckboxes === checkedCheckboxes;
                }
            });

            // 제목 클릭
            document.querySelector("#card_list_container").addEventListener("click", function (e) {
                const link = e.target.closest(".card_link");
                if (!link) return;
                e.preventDefault();

                const id = Number(link.dataset.id);
                _this.fnGoToDetail(id);
            });
        },

        /**
         * 페이지네이션 렌더링
         */
        renderPagination: function () {
            const _this = this;

            if (!_this.state.all) {
                return;
            }

            const totalPages = _this.state.all.pages;

            // 공통 페이지네이션 함수 호출
            uiCommon.pagination.render({
                currentPage: _this.state.pageIndex,
                totalPages: totalPages,
                onPageChange: function(page) {
                    _this.state.pageIndex = page;
                    _this.getListData();
                }
            });
        },

        /**
         * 메인 테이블 렌더링
         */
        renderTable: function () {
            const tbody = document.getElementById("card_list_container");
            tbody.innerHTML = '';

            if (!this.state.all || !this.state.all.list || this.state.all.list.length === 0) {
                tbody.innerHTML = '<tr><td class="tac" colspan="7">조회된 결과가 없습니다.</td></tr>';
                document.getElementById('admin618_total_count').textContent = '';
                return;
            }

            const list = this.state.all.list;

            let html = '';
            list.forEach(function(item) {
                html += `
                <tr>
                    <td class="tac">${item.popupZoneOid || ''}</td>
                    <td class="tac">
                        <input type="checkbox" class="row_check" value="${item.popupZoneOid || ''}">
                    </td>
                    <td class="tal"><a href="javascript:" class="a_link card_link" data-id="${item.popupZoneOid}">${item.popupZoneNm || ''}</a></td>
                    <td class="tac">${common.formatDateTime(item.regDt)}</td>
                    <td class="tac">${item.openYn === 'Y' ? '공개' : '비공개' || ''}</td>
                    <td class="tac">${item.inqCnt}</td>
                    <td class="tac">${item.useYn === 'Y' ? '사용' : '미사용' || ''}</td>
                </tr>
            `;
            });
            tbody.innerHTML = html;

            document.getElementById('admin618_total_count').textContent = this.state.all.total;
        },

        /**
         * 목록 데이터 조회
         */
        getListData: async function () {
            SearchState.saveForm('admin618', '.search_wrap', { pageIndex: this.state.pageIndex });

            const param = {
                page: this.state.pageIndex,
                size: this.state.pageCnt,
                keyword: document.getElementById('admin618_keyword').value.trim() || '',
                openYn: document.querySelector('input[name="admin618_open_yn"]:checked')?.value || '',
                regDtSt: document.getElementById('admin618_start_dt').value.trim() || '',
                regDtEd: document.getElementById('admin618_end_dt').value.trim() || ''
            };

            try {
                const response = await API.post('/api/admin/admin618/list/filter', param);

                // 페이지 데이터에 저장
                this.state.all = response;
                this.renderTable();
                this.renderPagination();
            } catch (error) {
                console.error('목록 조회 실패:', error);
                // uiCommon.fnShowAlertModal('목록 조회에 실패했습니다.');
            }
        },

        /**
         * 팝업존 등록
         */
        fnRegister: function () {
            SearchState.clear('admin618');
            window.location.href = contextPath + '/admin/page/admin618-1';
        },

        /**
         * 팝업존 삭제
         */
        fnDelete: function () {
            const _this = this;

            // 체크된 항목 찾기
            const checkedItems = document.querySelectorAll(".row_check:checked");
            if (checkedItems.length === 0) {
                uiCommon.fnShowAlertModal('삭제할 항목을 선택해주세요.');
                return;
            }

            // 선택된 ID 배열 생성
            const ids = [];
            checkedItems.forEach(function(item) {
                ids.push(item.value);
            });

            uiCommon.fnShowConfirmModal(`선택한 ${ids.length}개의 항목을 삭제하시겠습니까?`, async function () {
                uiCommon.fnHideConfirmModal();
                try {
                    // 일괄 삭제 API 호출
                    await API.patch('/api/admin/admin618/delete', { popupZoneOids: ids });
                    uiCommon.fnShowAlertModal('삭제되었습니다.');
                    // 목록 새로고침
                    await _this.getListData();
                } catch (error) {
                    console.error('삭제 실패:', error);
                    uiCommon.fnShowAlertModal('삭제에 실패했습니다.');
                }
            });
        },

        /**
         * 엑셀 다운로드
         */
        fnDownloadExcel: function () {
            uiCommon.fnShowConfirmModal('엑셀 파일을 다운로드 하시겠습니까?', async () => {
                uiCommon.fnHideConfirmModal();
                const reason = await uiCommon.fnShowPromptModal('엑셀 다운로드 받으시겠습니까?', {
                    title: '엑셀 다운로드 요청',
                    defaultValue: '',
                    placeholder: '사유 입력',
                });

                
                // 취소 시 조용히 종료
                if (reason === null) {
                    return;
                }

                // 빈 값 체크
                if (reason.trim() === '') {
                    uiCommon.fnShowAlertModal('사유는 필수 입니다.');
                    return;
                }

                // 2자 미만 체크
                if (reason.trim().length < 2) {
                    uiCommon.fnShowAlertModal('사유는 2자 이상 입력해주세요.');
                    return;
                }

                const params = {
                    pageId: 'admin618',
                    keyword: document.getElementById('admin618_keyword').value.trim(),
                    openState: document.querySelector('input[name="admin618_open_yn"]:checked')?.value || '',
                    startDt: document.getElementById('admin618_start_dt').value.trim() || '',
                    endDt: document.getElementById('admin618_end_dt').value.trim() || '',
                    reason: reason.trim()
                };

                // 빈 값 필터링
                const filteredParams = Object.fromEntries(
                        Object.entries(params).filter(([_, v]) => v && v !== '')
                );

                try{
                    await API.excelDownload('/api/admin/admin618/list/excel/export', filteredParams);
                } catch(err) {
                    console.error(err);
                    uiCommon.fnShowAlertModal("[error] : " + err);
                }
            });
        },

        /**
         * 페이지 이동 - 팝업존 상세
         */
        fnGoToDetail: function (id) {
            if (!id) {
                uiCommon.fnShowAlertModal("상세 정보를 찾을 수 없습니다.");
                return;
            }
            window.location.href = '/admin/page/admin618-2?popupZoneOid=' + encodeURIComponent(id);
        }
    };

    $(document).ready(function () {
        admin618.init();
    });
</script>
</body>
</html>
