<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin_layout}">
<head>
    <meta charset="UTF-8">
    <title>정기발간자료 > 상세정보</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div layout:fragment="admin_content" class="right_wrap">
    <div class="sub_cont_wrap">
        <h3 class="stit">정기발간자료 상세정보</h3>
        
        <!-- 메인 정보 -->
        <div class="table_layout02">
            <table>
                <caption>정기발간자료 상세</caption>
                <colgroup>
                    <col style="width: 150px;">
                    <col style="width: auto;">
                    <col style="width: 150px;">
                    <col style="width: auto;">
                </colgroup>
                <tbody>
                    <tr>
                        <th scope="row">등록일시</th>
                        <td id="reg_dt"></td>
                        <th scope="row" class="bl">조회수</th>
                        <td id="view_cnt"></td>
                    </tr>
                    <tr>
                        <th scope="row">총권 제목</th>
                        <td colspan="3" id="total_title"></td>
                    </tr>
                    <tr>
                        <th scope="row">저자</th>
                        <td id="author"></td>
                        <th scope="row" class="bl">페이지</th>
                        <td id="page_num"></td>
                    </tr>
                    <tr>
                        <th scope="row">발행일</th>
                        <td id="publish_dt"></td>
                        <th scope="row" class="bl">공개여부</th>
                        <td id="open_yn"></td>
                    </tr>
                    <tr>
                        <th scope="row">표지 이미지</th>
                        <td id="cover_file_td" colspan="3">
                            <div id="cover_file_preview"></div>
                        </td>
                    </tr>
                    <tr>
                        <th scope="row">총권 파일</th>
                        <td id="full_file_td" colspan="3">
                            <span id="full_file_name"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 섹션 정보 -->
        <div id="sections_container"></div>

        <div class="btn_wrap">
            <a href="javascript:;" id="btn_list" class="btn_basic bg_type02">목록</a>
            <a href="javascript:;" id="btn_update" class="btn_basic bg_type01">수정</a>
            <a href="javascript:;" id="btn_delete" class="btn_basic line_type02">삭제</a>
        </div>
    </div>
</div>

<script layout:fragment="scripts" th:inline="javascript" type="text/javascript">
    let admin1101Detail = {
        state: {
            fxtmPblsDataOid: null,
            data: null,
            strgFilePath: /*[[${basicFilePath}]]*/''
        },

        init: function() {
            this.initEvent();
            this.getData();
        },

        initEvent: function() {
            const _this = this;

            document.getElementById('btn_list').addEventListener('click', function() {
                window.location.href = contextPath + '/admin/page/admin1101';
            });

            document.getElementById('btn_update').addEventListener('click', function() {
                window.location.href = contextPath + '/admin/page/admin1101-1?fxtmPblsDataOid=' + _this.state.fxtmPblsDataOid;
            });

            document.getElementById('btn_delete').addEventListener('click', function() {
                _this.fnDelete();
            });
        },

        getData: async function() {
            const urlParams = new URLSearchParams(window.location.search);
            this.state.fxtmPblsDataOid = urlParams.get('fxtmPblsDataOid');

            if (!this.state.fxtmPblsDataOid) {
                uiCommon.fnShowAlertModal('잘못된 접근입니다.', function() {
                    window.location.href = contextPath + '/admin/page/admin1101';
                });
                return;
            }

            try {
                const response = await API.get('/api/admin/admin1101/select?fxtmPblsDataOid=' + this.state.fxtmPblsDataOid);
                this.state.data = response;
                this.renderData();
            } catch (error) {
                console.error('데이터 조회 실패:', error);
                uiCommon.fnShowAlertModal('데이터를 불러오는데 실패했습니다.');
            }
        },

        renderData: function() {
            const data = this.state.data;
            if (!data || !data.periodical) return;

            const p = data.periodical;

            document.getElementById('reg_dt').textContent = common.formatDateTime(p.regDt);
            document.getElementById('view_cnt').textContent = p.inqCnt || 0;
            document.getElementById('total_title').textContent = p.fxtmPblsDataTtl || '';
            document.getElementById('author').textContent = p.aut || '';
            document.getElementById('page_num').textContent = p.pageNum || '';
            document.getElementById('publish_dt').textContent = common.formatDate(p.pblcnDt);
            document.getElementById('open_yn').textContent = p.openYn === 'Y' ? '공개' : '비공개';
            
            // 표지 이미지 처리 - 이미지 미리보기
            const coverFilePreview = document.getElementById('cover_file_preview');
            const strgFilePath = this.state.strgFilePath;
            if (p.coverFile) {
                const fileUrl = `${strgFilePath}${p.coverFile.strgFilePath}/${p.coverFile.strgFileNm}`;
                coverFilePreview.innerHTML = `
                    <div style="margin-bottom: 10px;">
                        <img src="${fileUrl}" alt="표지 이미지" style="max-width: 300px; max-height: 400px; border: 1px solid #ddd; padding: 5px;">
                    </div>
                    <div>
                        <a href="${fileUrl}" class="a_link" download="${p.coverFile.orgnlFileNm}">${p.coverFile.orgnlFileNm}</a>
                    </div>
                `;
            } else {
                coverFilePreview.textContent = '없음';
            }

            // 총권 파일 처리 - 다운로드 링크
            const fullFileSpan = document.getElementById('full_file_name');
            if (p.fullFile) {
                const fileUrl = `${strgFilePath}${p.fullFile.strgFilePath}/${p.fullFile.strgFileNm}`;
                fullFileSpan.innerHTML = `<a href="${fileUrl}" class="a_link" download="${p.fullFile.orgnlFileNm}">${p.fullFile.orgnlFileNm}</a>`;
            } else {
                fullFileSpan.textContent = '없음';
            }

            this.renderSections(data.sections);
        },

        renderSections: function(sections) {
            const container = document.getElementById('sections_container');
            container.innerHTML = '';

            if (!sections || sections.length === 0) {
                return;
            }

            let allHtml = '';
            sections.forEach(section => {
                const sectionTitle = this.getSectionTitle(section.fxtmPblsSectType);
                let html = `<div class="table_desc"><h4 class="sstit">${sectionTitle}</h4>`;

                if (section.fxtmPblsSectTtl) {
                    html += `<p class="etc">주제: ${section.fxtmPblsSectTtl}</p>`;
                }

                html += `</div><div class="table_layout02"><table>
                        <caption>${sectionTitle} 목록</caption>
                        <colgroup>
                            <col style="width: auto;">
                            <col style="width: 200px;">
                            <col style="width: 150px;">
                            <col style="width: 200px;">
                        </colgroup>
                        <thead>
                            <tr>
                                <th scope="col">제목</th>
                                <th scope="col">저자</th>
                                <th scope="col">페이지</th>
                                <th scope="col">첨부파일</th>
                            </tr>
                        </thead>
                        <tbody>`;

                const strgFilePath = this.state.strgFilePath;
                if (section.items && section.items.length > 0) {
                    section.items.forEach(item => {
                        // 첨부파일 처리 - 다운로드 링크
                        let attachFileHtml = '없음';
                        if (item.attachments) {
                            const fileUrl = `${strgFilePath}${item.attachments.strgFilePath}/${item.attachments.strgFileNm}`;
                            attachFileHtml = `<a href="${fileUrl}" class="a_link" download="${item.attachments.orgnlFileNm}">${item.attachments.orgnlFileNm}</a>`;
                        }

                        html += `<tr>
                                <td class="tal">${item.fxtmPblsItemTtl || ''}</td>
                                <td class="tac">${item.aut || ''}</td>
                                <td class="tac">${item.pageNum || ''}</td>
                                <td class="tac">${attachFileHtml}</td>
                            </tr>`;
                    });
                } else {
                    html += `<tr><td colspan="4" class="tac">등록된 항목이 없습니다.</td></tr>`;
                }

                html += `</tbody></table></div>`;
                allHtml += html;
            });
            container.innerHTML = allHtml;
        },

        getSectionTitle: function(type) {
            switch(type) {
                case 'SPECIAL': return '특집 논문';
                case 'PAPER': return '논문';
                case 'APPENDIX': return '부록';
                default: return '기타';
            }
        },

        fnDelete: function() {
            const _this = this;
            
            uiCommon.fnShowConfirmModal('이 정기발간자료를 삭제하시겠습니까?', async function() {
                uiCommon.fnHideConfirmModal();
                try {
                    await API.post('/api/admin/admin1101/delete', {
                        fxtmPblsDataOids: [_this.state.fxtmPblsDataOid]
                    });
                    uiCommon.fnShowAlertModal('삭제되었습니다.', function() {
                        window.location.href = contextPath + '/admin/page/admin1101';
                    });
                } catch (error) {
                    console.error('삭제 실패:', error);
                    uiCommon.fnShowAlertModal('삭제에 실패했습니다.');
                }
            });
        }
    };

    $(document).ready(function() {
        admin1101Detail.init();
    });
</script>
</body>
</html>
