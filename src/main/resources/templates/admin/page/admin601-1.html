<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin_layout}">
<head>
    <meta charset="UTF-8">
    <title>알림관리 > 공지사항 > 공지사항 등록/수정</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div layout:fragment="admin_content" class="right_wrap">
    <div class="sub_cont_wrap">
        <div class="table_layout02">
            <table>
                <caption>공지사항 등록</caption>
                <colgroup>
                    <col style="width: 150px;">
                    <col style="width: auto;">
                    <col style="width: 150px;">
                    <col style="width: auto;">
                </colgroup>
                <tbody>
                <tr>
                    <th scope="row"><label for="notice_title_input">제목</label></th>
                    <td colspan="3"><input type="text" id="notice_title_input" title="제목입력" class="w100"></td>
                </tr>
                <!--<tr>
                    <th scope="row">상단고정</th>
                    <td colspan="3">
                        <span class="radio-box"><input type="radio" id="fixed" name="fixYn"><label for="fixed">고정</label></span>
                        <span class="radio-box"><input type="radio" id="unfixed" name="fixYn" checked=""><label for="unfixed">해제</label></span>
                    </td>
                </tr>-->
                <tr>
                    <th scope="row">공개여부</th>
                    <td>
                        <span class="radio-box"><input type="radio" id="public" name="publicYn" value="Y"><label for="public">공개</label></span>
                        <span class="radio-box"><input type="radio" id="private" name="publicYn" value="N" checked=""><label for="private">비공개</label></span>
                    </td>
                    <th scope="row" class="bl"><label for="notice_date_start">상단고정 기간</label></th>
                    <td>
                        <div class="flex_col"><span class="datepicker"><input type="text" id="notice_date_start" class="datepick"><img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="선택" title="선택"></span> ~ <span class="datepicker"><input type="text" id="notice_date_end" class="datepick"><img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="선택" title="선택"></span></div>
                    </td>
                </tr>
                <tr>
                    <th scope="row"><label for="notice_editor">내용</label></th>
                    <td colspan="3"><textarea class="bor1ddd" name="notice_editor" id="notice_editor" rows="30"></textarea></td>
                </tr>
                <tr>
                    <th scope="row">파일첨부</th>
                    <td colspan="3">
                        <div class="flex_col file_list" id="notice_file_list"></div>
                        <div class="file_upload" id="notice_file_upload_box">
                            <label for="notice_file_input"><span>파일찾기</span></label>
                            <input type="file" id="notice_file_input" multiple="multiple">
                            <span class="file_txt" id="file_upload_guide">파일을 첨부해주세요</span>
                        </div>
                        <div id="first_file_alt_text_container" style="display: none; margin-top: 10px;">
                            <label for="first_file_alt_text">첫 번째 이미지 대체 텍스트:</label>
                            <textarea id="first_file_alt_text" rows="2" style="width: 100%; margin-top: 5px;" placeholder="첫 번째 첨부 이미지의 대체 텍스트를 입력하세요"></textarea>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="btn_wrap">
            <a href="javascript:;" id="btn_notice_save" class="btn_basic bg_type01">저장</a>
            <a href="javascript:;" id="btn_notice_cancel" class="btn_basic line_type02">취소</a>
        </div>
    </div>
</div>
<script layout:fragment="scripts" th:inline="javascript" type="text/javascript">
    let admin601_1 = {
        state: {
            // temp 업로드 키/에디터 파일/삭제 대상 등 저장 요청을 구성하기 위한 러프 상태값.
            uploaderStorageKey: 'tempUploadKey_admin601',
            uploadTargetId: null,
            ntcOid: null,
            chunkSize: 2 * 1024 * 1024,
            uploadUrl: '/api/common/file/chunk',
            tempDeleteUrl: '/api/common/file/chunk/temp-file',
            rfrncSeCd: 'NOTICE',
            isUploading: false,
            existingFiles: [],
            newFiles: [],
            deleteAttachNos: [],
            // CKEditor 업로드 이미지를 임시 보관하는 영역
            editorFiles: [],
            existingEditorFileKeys: [],
            deleteEditorAttachNos: []
        },

        init: async function () {
            const urlParams = new URLSearchParams(window.location.search);
            this.state.ntcOid = urlParams.get('ntcOid');
            this.initUploaderTarget();
            this.initEvent();
            await this.initFormData();
            this.renderFileList();
            this.initEditor();
        },

        initEditor: function () {
            CommonCKEditor.destroy('notice_editor');
            $('#notice_editor').show().css('visibility', 'visible');
            CommonCKEditor.init({
                editorId: 'notice_editor',
                content: '',
                removePlugins: 'uploadimage,uploadfile,filebrowser',
                chunkUpload: {
                    enabled: true,
                    chunkUrl: '/api/common/file/tmp/ck-image/chunk',
                    chunkSize: this.state.chunkSize,
                    thresholdBytes: 5 * 1024 * 1024,
                    // 청크/기본 업로드 관계없이 서버 응답을 포착한다.
                    onUploadComplete: (payload) => {
                        this.handleEditorUploadComplete(payload);
                    }
                }
            });
        },

        initEvent: function () {
            const _this = this;

            $('#btn_notice_save').on('click', function (e) {
                e.preventDefault();
                const payload = _this.fnCollectFormData();
                _this.prepareEditorDeletionPayload(CommonCKEditor.getContent('notice_editor'));

                // if ($('#fixed').is(':checked')) payload.topFixYn = 'Y';
                // if ($('#unfixed').is(':checked')) payload.topFixYn = 'N';
                if ($('#public').is(':checked')) payload.openYn = 'Y';
                if ($('#private').is(':checked')) payload.openYn = 'N';

                // CommonCKEditor.saveWithFiles가 해당 객체를 multipart/form-data로 래핑한다.
                const requestData = {
                    ntcNm: payload.ntcNm,
                    openYn: payload.openYn,
                    // topFixYn: payload.topFixYn,
                    bgngDt: payload.bgngDt,
                    endDt: payload.endDt,
                    ntcCn: CommonCKEditor.getContent('notice_editor'),
                    attachedFiles: _this.state.newFiles,
                    deleteAttachNos: _this.state.deleteAttachNos,
                    editorFiles: _this.state.editorFiles,
                    deleteEditorAttachNos: _this.state.deleteEditorAttachNos,
                    firstFileAltText: $('#first_file_alt_text').val() || ''
                };

                const ntcOid = _this.state.ntcOid;
                if (ntcOid) {
                    requestData.ntcOid = ntcOid;
                }

                const requestConfig = {
                    url: ntcOid ? '/api/admin/admin601/notice/update' : '/api/admin/admin601/notice/save',
                    method: ntcOid ? 'PATCH' : 'POST',
                    editorId: 'notice_editor',
                    data: requestData,
                    sendDataAsJsonBlob: true,
                    onProgress: (p) => console.log('업로드 진행률:', p + '%'),
                    onSuccess: () => uiCommon.fnShowAlertModal('등록되었습니다.', () => _this.fnGoToListPage()),
                    onError: (xhr) => {
                        const message = (xhr.responseJSON && xhr.responseJSON.validationErrors && API.formatValidationErrors(xhr.responseJSON.validationErrors)) ||
                                (xhr.responseJSON && xhr.responseJSON.message) ||
                                '저장에 실패했습니다.';
                        uiCommon.fnShowAlertModal(message);
                    }
                };

                CommonCKEditor.saveWithFiles(requestConfig);
            });

            $('#btn_notice_cancel').on('click', function (e) {
                e.preventDefault();
                uiCommon.fnShowConfirmModal('목록으로 이동하시겠습니까?', async function () {
                    await _this.cleanupTempFiles();
                    _this.fnGoToListPage();
                })
            });

            $('#notice_file_input').on('change', function (e) {
                const files = Array.from(e.target.files || []);
                if (!files.length) return;
                _this.handleFileSelection(files);
                $(this).val('');
            });

            $('#notice_file_list').on('click', '.icon_del', function (e) {
                e.preventDefault();
                const $item = $(this).closest('p');
                const fileType = $item.data('file-type');
                if (fileType === 'existing') {
                    const attachNo = Number($item.data('file-attach-no'));
                    _this.removeExistingFile(attachNo);
                } else if (fileType === 'new') {
                    const index = Number($item.data('file-index'));
                    _this.removeNewFile(index);
                }
            });
        },

        initFormData: async function () {
            this.state.newFiles = [];
            this.state.deleteAttachNos = [];
            this.state.editorFiles = [];
            this.state.deleteEditorAttachNos = [];
            this.state.existingEditorFileKeys = [];

            if (this.state.ntcOid) {
                const response = await this.fetchNotice(this.state.ntcOid);
                this.state.existingFiles = response.noticeAttachList || [];
                this.renderFileList();

                // 첫 번째 파일의 alt text 설정
                if (this.state.existingFiles.length > 0 && this.state.existingFiles[0].imgSbstTxtCn) {
                    $('#first_file_alt_text').val(this.state.existingFiles[0].imgSbstTxtCn);
                }

                if (response.openYn === 'Y') {
                    $('#public').prop('checked', true);
                    $('#private').prop('checked', false);
                } else {
                    $('#private').prop('checked', true);
                    $('#public').prop('checked', false);
                }

                // if (response.topFixYn === 'Y') {
                //     $('#fixed').prop('checked', true);
                //     $('#unfixed').prop('checked', false);
                // } else {
                //     $('#fixed').prop('checked', false);
                //     $('#unfixed').prop('checked', true);
                // }

                $('#notice_title_input').val(response.ntcNm);
                $('#notice_date_start').val(common.formatDate(response.bgngDt));
                $('#notice_date_end').val(common.formatDate(response.endDt));
                CommonCKEditor.setContent('notice_editor', response.ntcCn);
                CommonCKEditor.destroy('notice_editor');
                // 인라인(CKEditor) 이미지의 fileNo를 매핑하기 위해 noticeCkEditorAttachList를 넘긴다.
                this.syncExistingEditorImages(response.ntcCn, response.noticeCkEditorAttachList || []);
            } else {
                this.state.existingFiles = [];
                $('#notice_title_input').val('');
                $('input[name="publicYn"]').prop('checked', false);
                // $('input[name="fixYn"]').prop('checked', false);
                $('#notice_date_start').val('');
                $('#notice_date_end').val('');
                CommonCKEditor.setContent('notice_editor', '');
                CommonCKEditor.destroy('notice_editor');
            }
        },

        fnCollectFormData: function () {
            const publicYn = $('input[name="publicYn"]:checked').val() || '';
            // const fixYn = $('input[name="fixYn"]:checked').val() || '';

            return {
                ntcNm: $('#notice_title_input').val() || '',
                openYn: publicYn,
                // topFixYn: fixYn,
                bgngDt: $('#notice_date_start').val() || '',
                endDt: $('#notice_date_end').val() || null
            };
        },

        fnGoToListPage: function () {
            window.location.href = contextPath + '/admin/page/admin601';
        },

        fetchNotice: async function (ntcOid) {
            return await API.get(`/api/admin/admin601/notice/${ntcOid}`);
        },

        initUploaderTarget: function () {
            if (this.state.ntcOid) {
                this.state.uploadTargetId = this.state.ntcOid;
            } else {
                const storageKey = this.state.uploaderStorageKey;
                let tempId = sessionStorage.getItem(storageKey);
                if (!tempId) {
                    tempId = `temp-${Date.now()}-${Math.random().toString(36).substring(2, 8)}`;
                    sessionStorage.setItem(storageKey, tempId);
                }
                this.state.uploadTargetId = tempId;
            }
        },

        // CKEditor 업로드 응답(payload)을 admin 저장용 포맷으로 축약한다.
        handleEditorUploadComplete: function (payload) {
            if (!payload || !payload.strgFilePath || !payload.strgFileNm) {
                return;
            }
            const meta = {
                originalStrgFileNm: payload.originalStrgFileNm || payload.strgFileNm,
                storedStrgFileNm: payload.strgFileNm,
                strgFilePath: payload.strgFilePath,
                strgFileCpct: payload.strgFileCpct || null,
                fileTypeNm: payload.fileTypeNm || this.extractFileExtension(payload.originalStrgFileNm || payload.strgFileNm)
            };
            this.upsertEditorFile(meta);
        },

        // 동일 경로/파일명은 덮어쓰고 나머지는 push한다.
        upsertEditorFile: function (fileMeta) {
            if (!fileMeta || !fileMeta.strgFilePath || !fileMeta.storedStrgFileNm) {
                return;
            }
            const key = `${fileMeta.strgFilePath}__${fileMeta.storedStrgFileNm}`;
            const idx = this.state.editorFiles.findIndex(item => `${item.strgFilePath}__${item.storedStrgFileNm}` === key);
            if (idx > -1) {
                this.state.editorFiles[idx] = fileMeta;
            } else {
                this.state.editorFiles.push(fileMeta);
            }
        },

        extractFileExtension: function (strgFileNm) {
            if (!strgFileNm) {
                return '';
            }
            const pos = strgFileNm.lastIndexOf('.');
            return pos > -1 ? strgFileNm.substring(pos + 1).toLowerCase() : '';
        },

        extractImageKeysFromHtml: function (html) {
            if (!html) {
                return [];
            }
            const container = document.createElement('div');
            container.innerHTML = html;
            const uniqueKeys = {};
            const results = [];
            Array.from(container.querySelectorAll('img[src]')).forEach(img => {
                const parsed = this.normalizeImageSrc(img.getAttribute('src'));
                if (!parsed || uniqueKeys[parsed.key]) {
                    return;
                }
                uniqueKeys[parsed.key] = true;
                results.push(parsed);
            });
            return results;
        },

        normalizeImageSrc: function (src) {
            if (!src || typeof src !== 'string') {
                return null;
            }
            let cleaned = src.trim();
            if (!cleaned || cleaned.indexOf('data:') === 0) {
                return null;
            }
            const qIdx = cleaned.indexOf('?');
            if (qIdx > -1) {
                cleaned = cleaned.substring(0, qIdx);
            }
            const hashIdx = cleaned.indexOf('#');
            if (hashIdx > -1) {
                cleaned = cleaned.substring(0, hashIdx);
            }
            const origin = window.location.origin;
            if (cleaned.startsWith(origin)) {
                cleaned = cleaned.substring(origin.length);
            }
            const uploadsIdx = cleaned.indexOf('/files/');
            if (uploadsIdx === -1) {
                return null;
            }
            const relative = cleaned.substring(uploadsIdx + '/files/'.length);
            const lastSlash = relative.lastIndexOf('/');
            if (lastSlash === -1) {
                return null;
            }
            const strgFilePath = relative.substring(0, lastSlash);
            const strgFileNm = relative.substring(lastSlash + 1);
            if (!strgFilePath || !strgFileNm) {
                return null;
            }
            return {
                strgFilePath: strgFilePath.replace(/^\/+/, '').replace(/\\/g, '/'),
                storedStrgFileNm: strgFileNm,
                key: this.buildEditorFileKey(strgFilePath, strgFileNm)
            };
        },

        buildEditorFileKey: function (strgFilePath, storedStrgFileNm) {
            const normalizedPath = (strgFilePath || '').replace(/^\/+/, '').replace(/\\/g, '/');
            return `${normalizedPath}__${storedStrgFileNm}`;
        },

        syncExistingEditorImages: function (ntcCn, attachments) {
            this.state.existingEditorFileKeys = [];
            if (!attachments || !attachments.length || !ntcCn) {
                return;
            }
            const attachMap = {};
            attachments.forEach(file => {
                if (!file || !file.strgFilePath || !file.strgFileNm) {
                    return;
                }
                const key = this.buildEditorFileKey(file.strgFilePath, file.strgFileNm);
                attachMap[key] = file.fileOid;
            });
            const keys = this.extractImageKeysFromHtml(ntcCn);
            keys.forEach(item => {
                const attachNo = attachMap[item.key];
                if (attachNo) {
                    this.state.existingEditorFileKeys.push({
                        key: item.key,
                        fileOid: attachNo
                    });
                }
            });
        },

        prepareEditorDeletionPayload: function (currentContent) {
            const currentKeys = this.extractImageKeysFromHtml(currentContent);
            const keySet = currentKeys.reduce((acc, item) => {
                acc[item.key] = true;
                return acc;
            }, {});
            const removed = this.state.existingEditorFileKeys
                    .filter(item => item && item.fileOid && !keySet[item.key])
                    .map(item => item.fileOid);
            this.state.deleteEditorAttachNos = removed;
        },

        handleFileSelection: async function (files) {
            const _this = this;
            if (this.state.isUploading) {
                uiCommon.fnShowAlertModal('현재 파일을 업로드 중입니다. 잠시만 기다려주세요.');
                return;
            }

            if (!files || files.length === 0) return;

            // 서버 설정값 가져오기
            const maxFileSizeMb = /*[[${maxFileSize}]]*/ 5120;
            const maxFileSizeBytes = maxFileSizeMb * 1024 * 1024;
            const maxFileCount = 20;
            const rawExtensions = /*[[${allowedExtensions}]]*/ 'pdf,hwp,hwpx,doc,docx,ppt,pptx,xls,xlsx,txt,zip,7z,rar,jpg,jpeg,png,gif,bmp';
            const allowedExtensions = rawExtensions.toLowerCase().split(',').map(ext => ext.trim());

            // 전체 개수 선행 체크
            const totalFileCount = this.state.existingFiles.length + this.state.newFiles.length + files.length;
            if (totalFileCount > maxFileCount) {
                uiCommon.fnShowAlertModal(`최대 ${maxFileCount}개까지 업로드 가능합니다.<br>현재 선택 포함 시 ${totalFileCount}개로 제한을 초과합니다.`);
                return;
            }

            const validFiles = [];
            const rejectedFiles = [];

            // 유효성 검사 루프
            for (const file of files) {
                const fileTypeNm = this.extractFileExtension(file.name).toLowerCase();
                let reason = "";

                if (!allowedExtensions.includes(fileTypeNm)) {
                    reason = "허용되지 않는 확장자입니다.";
                } else if (file.size > maxFileSizeBytes) {
                    reason = `최대 ${maxFileSizeMb}MB까지만 업로드 가능합니다.`;
                }

                if (reason) {
                    rejectedFiles.push(`${reason}`);
                } else {
                    validFiles.push(file);
                }
            }

            // 부적격 파일이 있을 경우 알림창 띄우기
            if (rejectedFiles.length > 0) {
                // 서두 문구 없이 목록만 줄바꿈으로 연결
                const errorMsg = rejectedFiles.join('\n');

                uiCommon.fnShowAlertModal(errorMsg, function() {
                    // 알림 확인 후 유효한 파일이 있다면 업로드 시작
                    if (validFiles.length > 0) {
                        _this.startChunkUploadProcess(validFiles);
                    }
                });
            } else {
                // 모든 파일이 유효하면 바로 업로드 시작
                this.startChunkUploadProcess(validFiles);
            }
        },

        /**
         * 유효성 검사를 통과한 파일들의 실제 업로드 프로세스
         */
        startChunkUploadProcess: async function (validFiles) {
            if (validFiles.length === 0) return;

            this.setUploading(true, '파일을 업로드 중입니다...');

            for (const file of validFiles) {
                try {
                    const uploadedInfo = await this.uploadChunkedFile(file);
                    if (uploadedInfo) {
                        this.state.newFiles.push(uploadedInfo);
                    }
                } catch (err) {
                    console.error(err);
                    uiCommon.fnShowAlertModal(`${file.name} 업로드 중 오류가 발생했습니다.`);
                    this.setUploading(false);
                    return;
                }
            }

            this.setUploading(false, '');
            this.renderFileList();
            this.updateUploadGuide('파일을 첨부해주세요');
        },

        uploadChunkedFile: async function (file) {
            if (!file || file.size === 0) {
                throw new Error('비어있는 파일은 업로드할 수 없습니다.');
            }
            const chunkSize = this.state.chunkSize;
            const totalChunks = Math.max(Math.ceil(file.size / chunkSize), 1);
            const identifier = `${this.state.uploadTargetId}-${file.name}-${file.size}-${file.lastModified}`;
            let uploadedInfo = null;

            for (let chunkNumber = 1; chunkNumber <= totalChunks; chunkNumber++) {
                const start = (chunkNumber - 1) * chunkSize;
                const end = Math.min(file.size, start + chunkSize);
                const chunk = file.slice(start, end);

                const formData = new FormData();
                formData.append('file', chunk, file.name);
                formData.append('resumableChunkNumber', chunkNumber);
                formData.append('resumableTotalChunks', totalChunks);
                formData.append('resumableIdentifier', identifier);
                formData.append('resumableFilename', file.name);
                formData.append('strgFileCpct', file.size);
                formData.append('targetId', this.state.uploadTargetId);
                formData.append('rfrncSeCd', this.state.rfrncSeCd);

                const response = await API.upload(this.state.uploadUrl, formData);

                if (chunkNumber === totalChunks) {
                    uploadedInfo = response;
                }

                this.updateUploadGuide(`${file.name} 업로드 중... (${chunkNumber}/${totalChunks})`);
            }

            return uploadedInfo;
        },

        setUploading: function (uploading, message) {
            this.state.isUploading = uploading;
            if (message) {
                this.updateUploadGuide(message);
            }
            $('#notice_file_input').prop('disabled', uploading);
            $('#notice_file_upload_box').toggleClass('is-uploading', uploading);
        },

        updateUploadGuide: function (message, isError) {
            const guideEl = $('#file_upload_guide');
            if (!guideEl.length) return;
            guideEl.text(message || '');
            guideEl.toggleClass('error', !!isError);
        },

        renderFileList: function () {
            const listEl = $('#notice_file_list');
            if (!listEl.length) return;

            const fragments = [];
            this.state.existingFiles.forEach(file => {
                const sizeText = this.formatFileSize(file.strgFileCpct);
                fragments.push(`<p data-file-type="existing" data-file-attach-no="${file.fileOid}">
                    ${file.orgnlFileNm} (${sizeText})
                    <a class="icon_del" href="javascript:;">파일삭제</a>
                </p>`);
            });

            this.state.newFiles.forEach((file, index) => {
                const sizeText = this.formatFileSize(file.strgFileCpct);
                fragments.push(`<p data-file-type="new" data-file-index="${index}">
                    ${file.originalStrgFileNm} (${sizeText})
                    <a class="icon_del" href="javascript:;">파일삭제</a>
                </p>`);
            });

            listEl.html(fragments.join(''));

            // 첫 번째 파일이 이미지인 경우에만 대체 텍스트 입력란 표시
            const firstFile = this.state.existingFiles[0] || this.state.newFiles[0];
            const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp', 'svg'];
            
            if (firstFile) {
                const fileName = firstFile.originalStrgFileNm || '';
                const ext = fileName.split('.').pop().toLowerCase();
                const isFirstFileImage = imageExts.includes(ext);
                $('#first_file_alt_text_container').toggle(isFirstFileImage);
            } else {
                $('#first_file_alt_text_container').hide();
            }
        },

        removeExistingFile: function (attachNo) {
            const _this = this;
            if (!attachNo) return;
            uiCommon.fnShowConfirmModal('해당 파일을 삭제하시겠습니까?', function(){
                uiCommon.fnHideConfirmModal();
                if (!_this.state.deleteAttachNos.includes(attachNo)) {
                    _this.state.deleteAttachNos.push(attachNo);
                }
                _this.state.existingFiles = _this.state.existingFiles.filter(file => file.fileOid !== attachNo);
                _this.renderFileList();
            });
        },

        removeNewFile: function (index) {
            const _this = this;
            const fileInfo = _this.state.newFiles[index];
            if (!fileInfo) return;
            uiCommon.fnShowConfirmModal('해당 파일을 삭제하시겠습니까?', function(){
                uiCommon.fnHideConfirmModal();
                _this.deleteTempUploadedFile(fileInfo)
                        .then(() => {
                            _this.state.newFiles.splice(index, 1);
                            _this.renderFileList();
                        })
                        .catch((error) => {
                            console.error(error);
                            _this.updateUploadGuide(error.message || '파일 삭제 중 오류가 발생했습니다.', true);
                        });
            })
        },

        deleteTempUploadedFile: function (fileInfo, useBeacon) {
            if (!fileInfo) return Promise.resolve();
            return fetch(this.state.tempDeleteUrl, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    strgFilePath: fileInfo.strgFilePath,
                    storedStrgFileNm: fileInfo.storedStrgFileNm
                }),
                keepalive: !!useBeacon
            }).then(res => {
                if (!res.ok) {
                    throw new Error('파일 삭제에 실패했습니다.');
                }
            });
        },

        cleanupTempFiles: function (useBeacon) {
            if (!this.state.newFiles.length) {
                return Promise.resolve();
            }
            const deletions = this.state.newFiles.map(fileInfo =>
                    this.deleteTempUploadedFile(fileInfo, useBeacon).catch((err) => {
                        console.error(err);
                    })
            );
            this.state.newFiles = [];
            return Promise.allSettled(deletions);
        },

        formatFileSize: function (bytes) {
            if (!bytes) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return `${(bytes / Math.pow(1024, i)).toFixed(2)} ${units[i]}`;
        }
    };

    $(document).ready(function () {
        admin601_1.init();
    });

    window.addEventListener('beforeunload', function () {
        admin601_1.cleanupTempFiles(true);
    });
</script>
