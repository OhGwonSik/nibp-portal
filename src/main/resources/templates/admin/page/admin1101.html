<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin_layout}">
<head>
    <meta charset="UTF-8">
    <title>정기발간자료 > 다운로드</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div layout:fragment="admin_content" class="right_wrap">
    <div class="location_wrap">
        <div class="search_wrap col30">
            <ul>
                <li>
                    <label for="admin1101_keyword">검색어</label>
                    <input type="text" id="admin1101_keyword" placeholder="제목을 입력해주세요." title="검색어 입력">
                </li>
                <li>
                    <label>공개상태</label>
                    <span class="radio-box"><input type="radio" id="admin1101_open_all" name="admin1101_open_yn" value="" checked><label for="admin1101_open_all">전체</label></span>
                    <span class="radio-box"><input type="radio" id="admin1101_open_y" name="admin1101_open_yn" value="Y"><label for="admin1101_open_y">공개</label></span>
                    <span class="radio-box"><input type="radio" id="admin1101_open_n" name="admin1101_open_yn" value="N"><label for="admin1101_open_n">비공개</label></span>
                </li>
                <li>
                    <label for="admin1101_start_dt">기간</label>
                    <div class="flex_col">
                        <span class="datepicker">
                            <input type="text" id="admin1101_start_dt" class="datepick" placeholder="시작일">
                            <img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="시작일 선택" title="시작일 선택">
                        </span>
                        ~
                        <span class="datepicker">
                            <input type="text" id="admin1101_end_dt" class="datepick" placeholder="종료일">
                            <img class="ui-datepicker-trigger" th:src="@{/admin/images/ico_date.png}" alt="종료일 선택" title="종료일 선택">
                        </span>
                    </div>
                </li>
            </ul>
            <div class="s_wrap"><a id="admin1101_btn_search" class="btn_search" href="javascript:;"><span>검색</span></a></div>
        </div>
    </div>
    <hr class="h_bg_type">
    <div class="sub_cont_wrap">
        <div class="table_top_btn mb10">
            <a href="javascript:;" id="admin1101_btn_register" class="btn_basic bg_type01">등록</a>
            <a href="javascript:;" id="admin1101_btn_delete" class="btn_basic bg_type02">삭제</a>
            <a href="javascript:;" id="admin1101_btn_excel_down" class="s_btn_basic download"><span>엑셀 다운로드</span></a>
        </div>
        <div class="table_layout02 list_type mb20">
            <table>
                <caption>정기발간자료 리스트</caption>
                <colgroup>
                    <col style="width: 80px;">
                    <col style="width: 80px;">
                    <col style="width: auto;">
                    <col style="width: 15%;">
                    <col style="width: 15%;">
                    <col style="width: 10%;">
                </colgroup>
                <thead>
                    <tr>
                        <th scope="col">번호</th>
                        <th scope="col"><input type="checkbox" id="check_all"></th>
                        <th scope="col">제목</th>
                        <th scope="col">등록일</th>
                        <th scope="col">공개여부</th>
                        <th scope="col">조회수</th>
                    </tr>
                </thead>
                <tbody id="periodical_list_container"></tbody>
            </table>
            <span class="scroll_img">스크롤</span>
        </div>
        <div id="paging_wrap" class="paging_wrap">
            <a href="javascript:" class="first page_first">첫 페이지</a>
            <a href="javascript:" class="previous page_prev">전 페이지</a>
            <div class="namber pagination_container"></div>
            <a href="javascript:" class="next page_next">다음 페이지</a>
            <a href="javascript:" class="last page_last">끝 페이지</a>
        </div>
    </div>
</div>
<script layout:fragment="scripts" th:inline="javascript" type="text/javascript">
    let admin1101 = {
        state: {
            all: null,
            pageIndex: 1,
            pageCnt: 10
        },

        init: function () {
            this.initEvent();

            // 저장된 검색조건 복원
            const saved = SearchState.restoreForm('admin1101', '.search_wrap');
            if (saved) {
                this.state.pageIndex = saved._extra.pageIndex || 1;
            }

            this.getListData();
        },

        initEvent: function () {
            const _this = this;

            uiCommon.datepicker.init('#admin1101_start_dt', {
                onSelect: function(selectedDate, inst) {
                    const startDate = $(this).datepicker('getDate');
                    const endDatePicker = $('#admin1101_end_dt');
                    endDatePicker.datepicker('option', 'minDate', startDate);
                    const currentEndDate = endDatePicker.datepicker('getDate');
                    if (currentEndDate && startDate && startDate.getTime() > currentEndDate.getTime()) {
                        endDatePicker.datepicker('setDate', startDate);
                    }
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });
            uiCommon.datepicker.init('#admin1101_end_dt', {
                onSelect: function(selectedDate, inst) {
                    const endDate = $(this).datepicker('getDate');
                    const startDatePicker = $('#admin1101_start_dt');
                    startDatePicker.datepicker('option', 'maxDate', endDate);
                    const currentStartDate = startDatePicker.datepicker('getDate');
                    if (currentStartDate && endDate && endDate.getTime() < currentStartDate.getTime()) {
                        startDatePicker.datepicker('setDate', endDate);
                    }
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });

            // 검색 버튼 클릭
            document.getElementById("admin1101_btn_search").addEventListener("click", function (e) {
                e.preventDefault();
                _this.state.pageIndex = 1;
                _this.getListData();
            });

            // 키워드 엔터키 검색
            document.getElementById("admin1101_keyword").addEventListener("keydown", function (e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    _this.state.pageIndex = 1;
                    _this.getListData();
                }
            });

            // 공개상태 라디오 변경 시 검색
            document.querySelectorAll('input[name="admin1101_open_yn"]').forEach(function (radio) {
                radio.addEventListener("change", function () {
                    _this.state.pageIndex = 1;
                    _this.getListData();
                });
            });

            document.getElementById("admin1101_btn_register").addEventListener("click", function (e) {
                e.preventDefault();
                SearchState.clear('admin1101');
                window.location.href = contextPath + '/admin/page/admin1101-1';
            });

            document.getElementById("admin1101_btn_delete").addEventListener("click", function (e) {
                e.preventDefault();
                _this.fnDelete();
            });

            document.getElementById("admin1101_btn_excel_down").addEventListener("click", function (e) {
                e.preventDefault();
                _this.fnExcelDownload();
            });

            document.getElementById("check_all").addEventListener("change", function (e) {
                const checkboxes = document.querySelectorAll(".row_check");
                checkboxes.forEach(function(checkbox) {
                    checkbox.checked = e.target.checked;
                });
            });

            document.querySelector("#periodical_list_container").addEventListener("click", function (e) {
                const link = e.target.closest(".periodical_link");
                if (!link) return;
                e.preventDefault();
                const id = Number(link.dataset.id);
                _this.fnGoToDetail(id);
            });
        },

        renderPagination: function () {
            const _this = this;
            if (!_this.state.all) return;
            const totalPages = _this.state.all.pages;
            uiCommon.pagination.render({
                currentPage: _this.state.pageIndex,
                totalPages: totalPages,
                onPageChange: function(page) {
                    _this.state.pageIndex = page;
                    _this.getListData();
                }
            });
        },

        renderTable: function () {
            const tbody = document.getElementById("periodical_list_container");
            tbody.innerHTML = '';

            if (!this.state.all || !this.state.all.list || this.state.all.list.length === 0) {
                tbody.innerHTML = '<tr><td class="tac" colspan="6">조회된 결과가 없습니다.</td></tr>';
                return;
            }

            const list = this.state.all.list;
            let html = '';
            list.forEach(function (item) {
                html += `
                    <tr>
                        <td class="tac">${item.fxtmPblsDataOid || ''}</td>
                        <td class="tac">
                            <input type="checkbox" class="row_check" value="${item.fxtmPblsDataOid || ''}">
                        </td>
                        <td class="tal">
                            <a href="javascript:" class="a_link periodical_link" data-id="${item.fxtmPblsDataOid}">${item.fxtmPblsDataTtl || ''}</a>
                        </td>
                        <td class="tac">${common.formatDate(item.pblcnDt)}</td>
                        <td class="tac">${item.openYn === "Y" ? "공개" : "비공개"}</td>
                        <td class="tac">${item.inqCnt || 0}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
            document.getElementById('check_all').checked = false;
        },

        getListData: async function () {
            SearchState.saveForm('admin1101', '.search_wrap', { pageIndex: this.state.pageIndex });

            const param = {
                page: this.state.pageIndex,
                size: this.state.pageCnt,
                searchKeyword: document.getElementById('admin1101_keyword').value.trim() || '',
                openYn: document.querySelector('input[name="admin1101_open_yn"]:checked')?.value || '',
                bgngDt: document.getElementById('admin1101_start_dt').value.trim() || '',
                endDt: document.getElementById('admin1101_end_dt').value.trim() || ''
            };

            try {
                const response = await API.post('/api/admin/admin1101/list/filter', param);
                this.state.all = response;
                this.renderTable();
                this.renderPagination();
            } catch (error) {
                console.error('목록 조회 실패:', error);
            }
        },

        fnDelete: function () {
            const _this = this;
            const checkedItems = document.querySelectorAll(".row_check:checked");
            if (checkedItems.length === 0) {
                uiCommon.fnShowAlertModal('삭제할 항목을 선택해주세요.');
                return;
            }

            const ids = [];
            checkedItems.forEach(function(item) {
                ids.push(Number(item.value));
            });

            uiCommon.fnShowConfirmModal(`선택한 ${ids.length}개의 항목을 삭제하시겠습니까?`, async function () {
                uiCommon.fnHideConfirmModal();
                try {
                    await API.post('/api/admin/admin1101/delete', { fxtmPblsDataOids: ids });
                    uiCommon.fnShowAlertModal('삭제되었습니다.');
                    await _this.getListData();
                } catch (error) {
                    console.error('삭제 실패:', error);
                    uiCommon.fnShowAlertModal('삭제에 실패했습니다.');
                }
            });
        },

        fnExcelDownload: async function () {
            const reason = await uiCommon.fnShowPromptModal('엑셀 다운로드 받으시겠습니까?', {
                    title: '엑셀 다운로드 요청',
                    defaultValue: '',
                    placeholder: '사유 입력',
            });

            
            // 취소 시 조용히 종료
            if (reason === null) {
                return;
            }

            // 빈 값 체크
            if (reason.trim() === '') {
                uiCommon.fnShowAlertModal('사유는 필수 입니다.');
                return;
            }

            // 2자 미만 체크
            if (reason.trim().length < 2) {
                uiCommon.fnShowAlertModal('사유는 2자 이상 입력해주세요.');
                return;
            }

            const param = {
                searchKeyword: document.getElementById('admin1101_keyword').value.trim() || '',
                openYn: document.querySelector('input[name="admin1101_open_yn"]:checked')?.value || '',
                bgngDt: document.getElementById('admin1101_start_dt').value.trim() || '',
                endDt: document.getElementById('admin1101_end_dt').value.trim() || '',
                reason: reason.trim()
            };

            try {
                await API.excelDownload('/api/admin/admin1101/excel/download', param);
            } catch (error) {
                console.error('엑셀 다운로드 실패:', error);
                uiCommon.fnShowAlertModal('엑셀 다운로드에 실패했습니다.');
            }
        },

        fnGoToDetail: function (fxtmPblsDataOid) {
            window.location.href = contextPath + '/admin/page/admin1101-2?fxtmPblsDataOid=' + fxtmPblsDataOid;
        }
    };

    $(document).ready(function () {
        admin1101.init();
    });
</script>
</body>
</html>
