<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>NIBP Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--css-->
    <link rel="stylesheet" th:href="@{/portal/css/base.css}">
    <link rel="stylesheet" th:href="@{/common/css/font.css}">
    <link rel="stylesheet" th:href="@{/portal/css/layer.css}">
    <link rel="stylesheet" th:href="@{/portal/css/style.css}">
    <link rel="stylesheet" th:href="@{/portal/css/ie.css}">
    <link rel="stylesheet" th:href="@{/common/css/jquery-ui.css}">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">

    <!--개별 페이지 style-->
    <th:block layout:fragment="main_style"></th:block>
</head>
<body>
    <div th:replace="~{fragments/skip_nav :: skip_nav}"></div>

    <div th:replace="~{fragments/main_header :: main_header}"></div>

    <div th:replace="~{fragments/main_nav :: main_nav}"></div>

    <div id="contents" layout:fragment="main_content"></div>

    <div th:replace="~{fragments/main_quick :: main_quick}"></div>

    <div th:replace="~{fragments/main_footer:: main_footer}"></div>

    <div id="bg_overlay" class="bg_overlay"></div>
    <div layout:fragment="main_modal"></div>

    <!-- 공통 UI Fragments -->
    <div th:replace="~{fragments/modal :: modal}"></div>

    <!--js-->
    <script th:src="@{/common/js/jquery.min.js}"></script>
    <script th:src="@{/common/js/jquery-ui.js}"></script>
    <script th:src="@{/common/js/common.js}"></script>
    <script th:inline="javascript">window.CKEDITOR_BASEPATH = /*[[${ckeditorBasePath}]]*/ '/common/libs/ckeditor/';</script>
    <script th:src="@{/common/libs/ckeditor/ckeditor.js}"></script>
    <script th:src="@{/common/js/commonCKEditor.js}"></script>
    <script th:src="@{/common/js/api.js}"></script>
    <script th:src="@{/common/js/session.js}"></script>
    <script th:src="@{/common/js/style.js}"></script>
    <script th:src="@{/common/js/slick.min.js}"></script>
    <script th:src="@{/portal/js/common.js}"></script>
    <script th:src="@{/portal/js/html5.js}"></script>
    <script th:src="@{/portal/js/menu.js}"></script>
    <script th:src="@{/common/js/search-state.js}"></script>
    <script th:inline="javascript">
        window.contextPath = /*[[${#request.contextPath}]]*/'';
        window.isAuthenticated = /*[[${#authorization.expression('isAuthenticated()')}]]*/ false;
        window.sessionExpiry = /*[[${sessionExpiry}]]*/ 1800000;
    </script>

    <!--개별 페이지 script-->
    <th:block layout:fragment="main_scripts"></th:block>
</body>
</html>
