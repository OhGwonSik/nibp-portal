<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>NICE 본인인증 실패</title>
    <script type="text/javascript" th:inline="javascript">
        /*<![CDATA[*/
        window.onload = function () {
            var msg = /*[[${errorMessage}]]*/ null;
            if (!msg) {
                msg = '인증에 실패했습니다. 다시 시도해 주세요.';
            }

            var purpose = /*[[${purpose}]]*/ null;

            var result = {
                success: false,
                code: /*[[${errorCode}]]*/ null,
                message: msg
            };

            try {
                if (window.opener && !window.opener.closed) {
                    if (purpose === 'ADMIN_LOGIN') {
                        // 관리자 로그인 실패 처리
                        if (typeof window.opener.adminNiceAuthErrorCallback === 'function') {
                            window.opener.adminNiceAuthErrorCallback(result);
                        } else {
                            alert(msg);
                        }
                    } else if (purpose === 'SIGNUP') {
                        // 회원가입 본인인증 실패 처리
                        if (typeof window.opener.signupNiceAuthErrorCallback === 'function') {
                            window.opener.signupNiceAuthErrorCallback(result);
                        } else {
                            alert(msg);
                        }
                    } else if (purpose === 'CHANGE_PWD') {
                        // 비밀번호 변경 본인인증 실패 처리
                        if (typeof window.opener.changePwdNiceAuthErrorCallback === 'function') {
                            window.opener.changePwdNiceAuthErrorCallback(result);
                        } else {
                            alert(msg);
                        }
                    } else if (purpose === 'ADMIN_RESET_PWD') {
                        // 관리자 비밀번호 재설정 본인인증 실패 처리
                        if (typeof window.opener.adminResetPwdNiceAuthErrorCallback === 'function') {
                            window.opener.adminResetPwdNiceAuthErrorCallback(result);
                        } else {
                            alert(msg);
                        }
                    } else if (purpose === 'RESET_PWD' || !purpose) {
                        // 비밀번호 재설정 또는 purpose 없는 경우
                        if (window.opener.reset_pwd &&
                            typeof window.opener.reset_pwd.onNiceAuthSuccess === 'function') {
                            window.opener.reset_pwd.onNiceAuthSuccess(result);
                        } else if (typeof window.opener.changePwdNiceAuthErrorCallback === 'function') {
                            window.opener.changePwdNiceAuthErrorCallback(result);
                        } else {
                            alert(msg);
                        }
                    } else {
                        alert(msg);
                    }
                } else {
                    alert(msg);
                }
            } catch (e) {
                alert(msg);
            } finally {
                window.close();
            }
        }
        /*]]>*/
    </script>
</head>
<body>
로딩 중...
</body>
</html>
