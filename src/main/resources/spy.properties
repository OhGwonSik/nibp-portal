# P6Spy 로깅 설정
appender=com.p6spy.engine.spy.appender.Slf4JLogger
# logMessageFormat=%now | execution time : %executionTime ms | connection: %connectionId | %category | SQL: %effectiveSql
#customLogMessageFormat=%(currentTime) | execution time : %(executionTime)ms | %(category) | SQL: %(sqlSingleLine)
customLogMessageFormat=%(currentTime) | %(executionTime)ms | %(category) | SQL: %(sql)
logMessageFormat=com.p6spy.engine.spy.appender.MultiLineFormat

# 실제 JDBC URL (MariaDB)
realdatasourceclass=org.mariadb.jdbc.MariaDbDataSource

# 느린 쿼리 임계값 (밀리초) - 0으로 설정하면 모든 쿼리 로깅
executionThreshold=0

# 로그 필터 - statement만 남기고 나머지 제외
excludecategories=info,debug,result,resultset,batch,commit,rollback

# 날짜 포맷
dateformat=yyyy-MM-dd HH:mm:ss.SSS

# 로그 활성화
#filter=false
#exclude=
autoflush=true