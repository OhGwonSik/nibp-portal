/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'java'
    id 'maven-publish'
    id 'war'
    id 'org.springframework.boot' version '2.7.18'
    id 'io.spring.dependency-management' version '1.1.3'
    // id 'io.freefair.lombok' version '8.6'
}

repositories {
    mavenCentral()
    maven {
        url = uri('https://maven.egovframe.go.kr/maven/') // 전자정부 프레임워크
    }
}

configurations {
    all {
        exclude group: 'ch.qos.logback', module: 'logback-classic'
        exclude group: 'org.apache.logging.log4j', module: 'log4j-to-slf4j'
        exclude group: 'commons-dbcp', module: 'commons-dbcp'
        resolutionStrategy {
            force 'org.apache.commons:commons-pool2:2.12.0'
            force 'com.lowagie:itext:2.1.7'
        }
    }
}

dependencies {
    // eGovFrame 필수 컴포넌트
    implementation ("org.egovframe.rte:org.egovframe.rte.ptl.mvc:4.3.0")
    implementation ("org.egovframe.rte:org.egovframe.rte.psl.dataaccess:4.3.0")
    implementation ("org.egovframe.rte:org.egovframe.rte.fdl.cmmn:4.3.0")
    implementation ("org.egovframe.rte:org.egovframe.rte.fdl.logging:4.3.0")
    implementation ("org.egovframe.rte:org.egovframe.rte.fdl.crypto:4.3.0")

    // Spring boot
    implementation 'org.springframework.boot:spring-boot-starter-web'
    // Logging
    implementation 'org.springframework.boot:spring-boot-starter-log4j2'
    implementation 'org.apache.logging.log4j:log4j-api:2.17.1'
    implementation 'org.apache.logging.log4j:log4j-core:2.17.1'
    implementation 'org.apache.logging.log4j:log4j-slf4j-impl:2.17.1'
    implementation 'org.springframework.boot:spring-boot-starter-thymeleaf' // thymeleaf
    implementation 'org.thymeleaf.extras:thymeleaf-extras-springsecurity5'
    implementation 'org.thymeleaf:thymeleaf-spring5:3.0.15.RELEASE'// thymeleaf 추가 보안
    implementation 'nz.net.ultraq.thymeleaf:thymeleaf-layout-dialect' // thymeleaf layout
    // Spring Security
    implementation 'org.springframework.boot:spring-boot-starter-security'

    // 테스트 의존성 기본 로깅 제외
    testImplementation('org.springframework.boot:spring-boot-starter-test') {
        exclude group: 'org.springframework.boot', module: 'spring-boot-starter-logging'
    }
    testImplementation('org.springframework.boot:spring-boot-starter-data-jpa') {
        exclude group: 'org.springframework.boot', module: 'spring-boot-starter-logging'
    }
    implementation 'org.springframework.boot:spring-boot-devtools' // dev tools
    // springdoc-openapi (Swagger replacement)
    implementation 'org.springdoc:springdoc-openapi-ui:1.7.0'
    // dbcp
    implementation 'org.apache.commons:commons-dbcp2:2.12.0'
    implementation 'org.apache.commons:commons-pool2:2.12.0'
    // lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    // testCompileOnly 'org.projectlombok:lombok'
    // testAnnotationProcessor 'org.projectlombok:lombok'
    // DB
    runtimeOnly 'org.mariadb.jdbc:mariadb-java-client'
    implementation 'com.github.gavlyukovskiy:p6spy-spring-boot-starter:1.9.0'

    // mybatis
    implementation 'org.mybatis.spring.boot:mybatis-spring-boot-starter:2.3.1'
    // hibernate
    implementation 'org.hibernate:hibernate-validator:7.0.4.Final'
    // querydsl 
    testImplementation 'com.querydsl:querydsl-jpa:5.0.0'
    compileOnly 'com.querydsl:querydsl-apt:5.0.0'
    // 이메일
    implementation 'org.springframework.boot:spring-boot-starter-mail'
    // JWT
    implementation 'io.jsonwebtoken:jjwt-api:0.11.5'
    runtimeOnly   'io.jsonwebtoken:jjwt-impl:0.11.5'
    runtimeOnly   'io.jsonwebtoken:jjwt-jackson:0.11.5'  // JSON 직렬화용

    // Caffeine Cache (Rate Limiting)
    implementation 'com.github.ben-manes.caffeine:caffeine:3.1.8'

    // Redis
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'

    // User Agent 파싱
    implementation 'eu.bitwalker:UserAgentUtils:1.21'

    // pagehelper
    implementation 'com.github.pagehelper:pagehelper-spring-boot-starter:1.4.7'
    // @Valid, Bean Validation
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // Rome (RSS Parser)
    implementation 'com.rometools:rome:1.18.0'

    // POI excel core
    implementation 'org.apache.poi:poi:5.2.5'
    // jxls
    implementation 'org.jxls:jxls:2.12.0'
    implementation 'org.jxls:jxls-poi:2.12.0'
    // jexl
    implementation 'org.apache.commons:commons-jexl3:3.5.0'
    // poi xml format
    implementation 'org.apache.poi:poi-ooxml:5.2.5'
    // Rome
    implementation 'com.rometools:rome:1.18.0'
    // Jasper Reports
    implementation 'net.sf.jasperreports:jasperreports:7.0.3'
    implementation 'net.sf.jasperreports:jasperreports-pdf:7.0.3'
    implementation 'com.github.librepdf:openpdf:1.3.30'
    // Java compiler
    implementation 'org.eclipse.jdt.core.compiler:ecj:4.6.1'
    // Groovy
    implementation 'org.codehaus.groovy:groovy-all:3.0.21'
    // Jackson 타입 추가
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.13.5'

    // SFTP
    implementation 'com.jcraft:jsch:0.1.55'
    implementation 'org.apache.tika:tika-core:2.9.1'

    // thumbnailator
    implementation 'net.coobird:thumbnailator:0.4.20'

    // HTML parsing
    implementation 'org.jsoup:jsoup:1.17.2'

    // NICE jar 등 외부 jar파일
    // implementation fileTree(dir: 'libs', include: ['*.jar'])

    // simplecaptcha
    implementation("cn.apiclub.tool:simplecaptcha:1.2.2")

    // nice
    implementation files('src/main/resources/libs/NiceID_v1.2.jar')

    // dotenv
    implementation 'io.github.cdimascio:java-dotenv:5.1.1'
}


group = 'kr.nibp'
version = '1.0.0'
description = 'egovframework'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
        // languageVersion = JavaLanguageVersion.of(8)
    }
}

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}

tasks.named('test') {
    useJUnitPlatform()
}
